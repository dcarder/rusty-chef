<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="app">

<div id="home" class="page active">
<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* 🧺 INGREDIENTS */
const ingredientItems = [
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Flour","Sugar",
"Salt","Pepper","Olive oil","Soy sauce","Lemon","Tortilla","Bread","Parmesan","Cheddar",
"Shrimp","Salmon","Coconut milk","Curry powder","BBQ sauce","Peanut butter","Chicken broth",
"Beef broth","Yogurt","Oats","Corn","Lettuce"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");
let current=null;
let mode="simple";

/* 🍳 25 REAL RECIPES */
const recipes = [

{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
simpleSteps:[{t:"Cook rice"},{t:"Cook chicken & eggs"},{t:"Stir fry"}],

},

{
name:"Spaghetti Bolognese",

simpleSteps:[{t:"Boil pasta"},{t:"Cook beef sauce"},{t:"Combine"}],
chefSteps:[{t:"Al dente pasta"},{t:"Brown beef deeply"},{t:"Simmer sauce"}]
},

{
name:"Chicken Tacos",
ingredients:["Chicken breast","Tortilla","Cheese","Onions","Lime"],
simpleSteps:[{t:"Cook chicken"},{t:"Warm tortillas"},{t:"Assemble"}],
chefSteps:[{t:"Sear chicken"},{t:"Shred after resting"},{t:"Finish lime"}]
},

{
name:"Beef Stir Fry",
ingredients:["Ground beef","Broccoli","Carrots","Soy sauce","Rice"],
simpleSteps:[{t:"Cook beef"},{t:"Add veg"},{t:"Serve"}],
chefSteps:[{t:"High heat beef"},{t:"Stir fry veg"},{t:"Soy glaze"}]
},

{
name:"Garlic Shrimp Pasta",
ingredients:["Shrimp","Pasta","Butter","Garlic","Lemon"],
simpleSteps:[{t:"Cook pasta"},{t:"Cook shrimp"},{t:"Mix"}],
chefSteps:[{t:"Sauté shrimp"},{t:"Garlic butter"},{t:"Lemon finish"}]
},

{
name:"Chicken Alfredo",
ingredients:["Chicken breast","Pasta","Cream","Parmesan","Garlic"],
simpleSteps:[{t:"Cook pasta"},{t:"Cook chicken"},{t:"Add sauce"}],
chefSteps:[{t:"Cream sauce"},{t:"Sear chicken"},{t:"Mix pasta"}]
},

{
name:"Grilled Cheese",
ingredients:["Bread","Cheese","Butter"],
simpleSteps:[{t:"Butter bread"},{t:"Melt cheese"},{t:"Grill"}],
chefSteps:[{t:"Low heat toast"},{t:"Melt fully"},{t:"Crisp finish"}]
},

{
name:"Chicken Curry",
ingredients:["Chicken breast","Curry powder","Coconut milk","Onions","Rice"],
simpleSteps:[{t:"Cook chicken"},{t:"Add curry"},{t:"Serve"}],
chefSteps:[{t:"Cook onions"},{t:"Add spices"},{t:"Simmer sauce"}]
},

{
name:"BBQ Chicken Sandwich",
ingredients:["Chicken breast","BBQ sauce","Bread","Onions"],
simpleSteps:[{t:"Cook chicken"},{t:"Add BBQ"},{t:"Assemble"}],
chefSteps:[{t:"Shred chicken"},{t:"Mix sauce"},{t:"Toast bread"}]
},

{
name:"Vegetable Omelette",
ingredients:["Eggs","Bell peppers","Onions","Cheese","Spinach"],

},

{
name:"Tuna Sandwich",
ingredients:["Tuna","Bread","Mayonnaise","Lettuce"],
simpleSteps:[{t:"Mix tuna"},{t:"Add mayo"},{t:"Serve"}],
chefSteps:[{t:"Drain tuna"},{t:"Mix mayo"},{t:"Assemble"}]
},

{
name:"Pancakes",
ingredients:["Flour","Milk","Eggs","Sugar","Butter"],
simpleSteps:[{t:"Mix batter"},{t:"Cook"},{t:"Serve"}],
chefSteps:[{t:"Whisk batter"},{t:"Cook bubbles"},{t:"Flip"}]
},

{

ingredients:["Pasta","Cheddar","Milk","Butter","Flour"],
simpleSteps:[{t:"Cook pasta"},{t:"Cheese sauce"},{t:"Mix"}],

},

{

simpleSteps:[{t:"Simmer broth"},{t:"Add chicken"},{t:"Add noodles"}],
chefSteps:[{t:"Simmer base"},{t:"Add veg"},{t:"Cook noodles"}]
},

{
name:"Teriyaki Bowl",

},

{

ingredients:["Ground beef","Eggs","Breadcrumbs","Tomatoes","Garlic"],
simpleSteps:[{t:"Form meatballs"},{t:"Cook"},{t:"Add sauce"}],
chefSteps:[{t:"Mix beef"},{t:"Brown meatballs"},{t:"Simmer"}]
},

{
name:"Fried Chicken",
ingredients:["Chicken breast","Flour","Eggs","Oil","Salt"],
simpleSteps:[{t:"Coat"},{t:"Fry"},{t:"Serve"}],
chefSteps:[{t:"Bread chicken"},{t:"Deep fry"},{t:"Rest crispy"}]
},

{
name:"Veggie Stir Fry",
ingredients:["Broccoli","Carrots","Soy sauce","Garlic","Rice"],

chefSteps:[{t:"High heat veg"},{t:"Garlic soy"},{t:"Finish"}]
},

},

{

},

{

},

{

},

chefSteps:[{t:"Heat base"},{t:"Add peanut butter"},{t:"Set"}]
}

];

/* MATCH */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match: ${r.match}
</div>`;
});

html+=`<div class="btn" onclick="show('home')">Home</div>`;
document.getElementById("results").innerHTML=html;
show("results");
}

/* PANTRY */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});
html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>
<div class="btn" onclick="show('home')">Home</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* RECIPE */
function openRecipe(name){
current=recipes.find(r=>r.name===name);
mode="simple";
render();
show("recipe");
}

function switchMode(){
mode = mode==="simple"?"chef":"simple";
render();
}

function render(){

let missing=current.ingredients.filter(i=>!selected.includes(i));

let steps = mode==="simple"?current.simpleSteps:current.chefSteps;

let stepsHTML = steps.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.t}</b>
</div>
`).join("");

let missingHTML=`<div class="header">Missing Ingredients</div>`;
missing.forEach(i=>{
missingHTML+=`<div class="card">${i}</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="btn" onclick="switchMode()">Switch Mode</div>

${stepsHTML}
${missingHTML}

<div class="btn" onclick="show('home')">Home</div>
`;
}

show("home");

</script>

</body>
</html>
