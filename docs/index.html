<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v13</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

/* UI */
.header{text-align:center;font-size:22px;font-weight:700;margin-bottom:10px;}
.card{background:rgba(255,255,255,.08);border-radius:14px;padding:14px;margin:10px 0;border:1px solid rgba(255,255,255,.15);}
.item{padding:10px;margin:6px 0;border-radius:10px;border:1px solid rgba(255,255,255,.2);cursor:pointer;}
.item.selected{background:rgba(79,172,254,.25);}
.btn{padding:14px;background:#4facfe;color:black;font-weight:700;text-align:center;border-radius:12px;margin-top:10px;cursor:pointer;}

/* SHOP */
.shopBtn{display:inline-block;margin-top:8px;margin-right:8px;padding:10px 14px;border-radius:10px;font-weight:700;text-decoration:none;color:white;}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

/* HOME */
#homeBg{position:fixed;inset:0;z-index:-1;}
#homeBg img{width:100%;height:100%;object-fit:cover;}

/* 🔥 TITLE */
#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleRow{
display:flex;
align-items:center;
justify-content:center;
gap:18px;
}

.titleText{
display:flex;
flex-direction:column;
font-weight:900;
line-height:.9;
text-align:center;
}

.the{font-size:36px;}
.rusty{font-size:64px;}
.chef{font-size:54px;}

/* 🔥 FIRE ON SIDES OF RUSTY */
.flameSide{
width:60px;
height:120px;
position:relative;
overflow:hidden;
}

.flameSide span{
position:absolute;
bottom:0;
font-size:18px;
animation:fireSide 1.2s infinite ease-in-out;
opacity:0;
filter:drop-shadow(0 0 10px orange);
}

.flameSide span:nth-child(1){left:50%;animation-delay:0s;}
.flameSide span:nth-child(2){left:40%;animation-delay:.2s;}
.flameSide span:nth-child(3){left:60%;animation-delay:.4s;}
.flameSide span:nth-child(4){left:45%;animation-delay:.6s;}
.flameSide span:nth-child(5){left:55%;animation-delay:.8s;}

@keyframes fireSide{
0%{transform:translateY(20px) scale(.6);opacity:0;}
25%{opacity:1;}
100%{transform:translateY(-40px) scale(1.2);opacity:0;}
}

.fireGlow{
text-shadow:0 0 10px orange,0 0 20px red,0 0 30px yellow;
}

/* HOME BUTTONS */
.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="home" class="page active">
<div id="homeBg"><img src="copilot_image_1777179019874.jpeg"></div>

<div id="introLogo">

  <div class="titleRow">

    <!-- LEFT FIRE -->
    <div class="flameSide">
      <span>🔥</span><span>🔥</span><span>🔥</span><span>🔥</span><span>🔥</span>
    </div>

    <!-- TEXT -->
    <div class="titleText">
      <div class="the">THE</div>
      <div class="rusty"><span class="fireGlow">RUSTY</span></div>
      <div class="chef">CHEF</div>
    </div>

    <!-- RIGHT FIRE -->
    <div class="flameSide">
      <span>🔥</span><span>🔥</span><span>🔥</span><span>🔥</span><span>🔥</span>
    </div>

  </div>

</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

<script>

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* PANTRY */
const ingredientItems=[
"Chicken breast","Ground beef","Rice","Eggs","Pasta","Cheese","Garlic","Onions","Tomatoes","Soy sauce"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* RECIPES */
const recipes=[
{
name:"Chicken Fried Rice",
ingredients:["Chicken breast","Rice","Eggs","Soy sauce","Onions"],
steps:[{item:"Chicken",amount:"1 lb",time:8,temp:375}]
}
];

function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
let missing=r.ingredients.filter(i=>!selected.includes(i));
return {...r,match,missing};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match);

document.getElementById("results").innerHTML=
`<div class="header">🍳 Recipes</div>`+
top.map(r=>`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${r.match}<br>
Missing: ${r.missing.join(", ")||"None"}
</div>`).join("");

show("results");
}

function openPantry(){
document.getElementById("pantry").innerHTML=
`<div class="header">🧺 Pantry</div>`+
ingredientItems.map(i=>
`<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`
).join("")+
`<div class="btn" onclick="showMatches()">Find Recipes</div>`;

show("pantry");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);
render();
show("recipe");
}

function render(){

document.getElementById("recipe").innerHTML=
`<div class="header">${current.name}</div>

<div class="card">
Step: ${current.steps[0].item}<br>
Time: ${current.steps[0].time} min<br>
Temp: ${current.steps[0].temp}°F
</div>

<div class="btn" onclick="show('home')">Home</div>`;
}

show("home");

</script>

</body>
</html>
