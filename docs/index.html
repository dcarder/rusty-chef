<!DOCTYPE html>  <html lang="en">  
<head>  
  <meta charset="UTF-8" />    <!-- Request landscape mode -->    <meta name="viewport" content="initial-scale=1.0, user-scalable=no, viewport-fit=cover" />  
  <meta name="screen-orientation" content="landscape" />  
  <meta name="x5-orientation" content="landscape" />  
  <meta name="full-screen" content="yes" />  
  <meta name="x5-fullscreen" content="true" />  
  <meta name="browsermode" content="application" />    <title>Chef Jeff</title>  
  <link rel="manifest" href="manifest.json" />    <style>  
    html, body {  
      margin: 0;  
      padding: 0;  
      width: 100vw;  
      height: 100vh;  
      background: black;  
      overflow: hidden;  
      display: flex;  
      justify-content: center;  
      align-items: center;  
      position: relative;  
    }  
  
    img.fullscreen {  
      width: 100vw;  
      height: 100vh;  
      object-fit: contain;      /* Show whole picture */  
      object-position: center;  
      background-color: black;  
      display: block;  
    }  
  
    /* Transparent hotspot over the Camera button */  
    #cameraBtn {  
      position: absolute;  
      left: 36%;   /* fine‑tuned */  
      top: 72%;    /* fine‑tuned */  
      width: 28%;  /* fine‑tuned */  
      height: 14%; /* fine‑tuned */  
      cursor: pointer;  
    }  
  
    /* Overlay for results */  
    #overlay {  
      position: fixed;  
      inset: 0;  
      background: rgba(0, 0, 0, 0.85);  
      color: #fff;  
      display: none;  
      flex-direction: column;  
      justify-content: center;  
      align-items: center;  
      padding: 20px;  
      box-sizing: border-box;  
      z-index: 10;  
      text-align: left;  
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;  
    }  
  
    #overlayContent {  
      max-width: 800px;  
      max-height: 80vh;  
      overflow-y: auto;  
      background: #111;  
      border-radius: 12px;  
      padding: 20px;  
      box-shadow: 0 0 20px rgba(0,0,0,0.6);  
    }  
  
    #overlay h2 {  
      margin-top: 0;  
    }  
  
    #overlay button {  
      margin-top: 16px;  
      padding: 10px 18px;  
      border-radius: 999px;  
      border: none;  
      background: #ff7a1a;  
      color: #fff;  
      font-weight: 600;  
      cursor: pointer;  
    }  
  
    #overlay button:hover {  
      background: #ff8f3d;  
    }  
  </style>  </head>  <body>    <!-- Transparent clickable area over the Camera button -->    <div id="cameraBtn"></div>    <!-- Main background image -->    <img src="copilot_image_1777179019874.jpeg" class="fullscreen" />    <!-- Overlay for ingredients + recipes -->    <div id="overlay">  
    <div id="overlayContent">  
      <h2>Chef Jeff Suggestions</h2>  
      <div id="overlayBody"></div>  
      <button id="overlayClose">Back</button>  
    </div>  
  </div>    <script>  
    // Register service worker for PWA  
    if ("serviceWorker" in navigator) {  
      navigator.serviceWorker.register("service-worker.js");  
    }  
  
    // Open camera and let user take a picture  
    async function openCamera() {  
      const input = document.createElement("input");  
      input.type = "file";  
      input.accept = "image/*";  
      input.capture = "environment"; // back camera  
  
      return new Promise(resolve => {  
        input.onchange = () => resolve(input.files[0]);  
        input.click();  
      });  
    }  
  
    // Convert file to base64 (for Gemini)  
    function fileToBase64(file) {  
      return new Promise(resolve => {  
        const reader = new FileReader();  
        reader.onload = () => resolve(reader.result.split(",")[1]);  
        reader.readAsDataURL(file);  
      });  
    }  
  
    // Call Gemini Vision to detect ingredients + recipes  
    async function detectIngredients(imageFile) {  
      const apiKey = "YOUR_GEMINI_API_KEY_HERE"; // <-- insert your key  
  
      const base64 = await fileToBase64(imageFile);  
  
      const response = await fetch(  
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro-vision:generateContent?key=" + apiKey,  
        {  
          method: "POST",  
          headers: { "Content-Type": "application/json" },  
          body: JSON.stringify({  
            contents: [{  
              parts: [  
                { text: "You are a cooking assistant. Look at this image and:\n1) List the main food ingredients you see.\n2) Suggest 3 recipe ideas I can make with them.\nRespond in this JSON format: {\"ingredients\": [\"...\"], \"recipes\": [\"Recipe name - short description\"]}" },  
                { inline_data: { mime_type: imageFile.type, data: base64 } }  
              ]  
            }]  
          })  
        }  
      );  
  
      const data = await response.json();  
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";  
  
      try {  
        const jsonStart = text.indexOf("{");  
        const jsonEnd = text.lastIndexOf("}");  
        const jsonString = text.slice(jsonStart, jsonEnd + 1);  
        return JSON.parse(jsonString);  
      } catch (e) {  
        return {  
          ingredients: ["Could not parse ingredients"],  
          recipes: ["Could not parse recipes"]  
        };  
      }  
    }  
  
    // Show overlay with results  
    function showOverlay(ingredients, recipes) {  
      const overlay = document.getElementById("overlay");  
      const body = document.getElementById("overlayBody");  
  
      body.innerHTML = "";  
  
      const ingTitle = document.createElement("h3");  
      ingTitle.textContent = "Ingredients I see:";  
      body.appendChild(ingTitle);  
  
      const ingList = document.createElement("ul");  
      ingredients.forEach(i => {  
        const li = document.createElement("li");  
        li.textContent = i;  
        ingList.appendChild(li);  
      });  
      body.appendChild(ingList);  
  
      const recTitle = document.createElement("h3");  
      recTitle.textContent = "Recipes you can make:";  
      body.appendChild(recTitle);  
  
      const recList = document.createElement("ul");  
      recipes.forEach(r => {  
        const li = document.createElement("li");  
        li.textContent = r;  
        recList.appendChild(li);  
      });  
      body.appendChild(recList);  
  
      overlay.style.display = "flex";  
    }  
  
    // Hide overlay  
    document.getElementById("overlayClose").onclick = () => {  
      document.getElementById("overlay").style.display = "none";  
    };  
  
    // Wire up Camera hotspot  
    document.getElementById("cameraBtn").onclick = async () => {  
      try {  
        const picture = await openCamera();  
        if (!picture) return;  
  
        const result = await detectIngredients(picture);  
        const ingredients = result.ingredients || [];  
        const recipes = result.recipes || [];  
  
        showOverlay(ingredients, recipes);  
      } catch (err) {  
        console.error(err);  
        alert("Something went wrong while analyzing the picture.");  
      }  
    };  
  </script>  </body>  
</html>
