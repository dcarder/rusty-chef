<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff AI</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* SCREENS */
.screen{
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition: opacity 900ms ease, transform 900ms ease;
transform: scale(1.08);
z-index:10;
}

.screen.active{
opacity:1;
pointer-events:auto;
transform: scale(1);
}

.screen img{
width:100%;
height:100%;
object-fit:cover;
transform: scale(1.05);
transition: transform 900ms ease;
}

.screen.active img{
transform: scale(1);
}

/* CAMERA */
#cameraView{
position:fixed;
inset:0;
z-index:1;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

canvas{display:none;}

/* UI */
#ui{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}

.button{
pointer-events:auto;
position:absolute;
bottom:35px;
width:110px;
height:110px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:14px;
}

#cameraBtn{right:20px;}
#factsBtn{left:20px;}
#recipeBtn{left:50%;transform:translateX(-50%);bottom:20px;}

#statusText{
position:absolute;
bottom:170px;
width:100%;
text-align:center;
color:white;
font-size:14px;
}

/* PANEL */
#panel{
position:fixed;
inset:0;
background:black;
color:white;
z-index:2000;
opacity:0;
pointer-events:none;
transition:opacity 300ms ease;
overflow:auto;
padding:20px;
}

#panel.active{
opacity:1;
pointer-events:auto;
}

.card{
padding:15px;
margin:12px 0;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.smallBtn{
padding:12px;
border:1px solid white;
text-align:center;
cursor:pointer;
margin-top:20px;
}

/* LOADING */
#loading{
position:fixed;
inset:0;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
z-index:3000;
flex-direction:column;
}

.spinner{
width:45px;
height:45px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="logo" class="screen active">
<img src="your_logo.jpeg">
</div>

<div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div>

<!-- CAMERA -->
<div id="cameraView">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>

<!-- UI -->
<div id="ui">
<div id="cameraBtn" class="button">📷 Scan</div>
<div id="factsBtn" class="button">📘 Facts</div>
<div id="recipeBtn" class="button">🍳 Recipe</div>
<div id="statusText">Loading AI...</div>
</div>

<!-- PANEL -->
<div id="panel"></div>

<!-- LOADING -->
<div id="loading">
<div class="spinner"></div>
<div>Chef AI Thinking...</div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const panel = document.getElementById("panel");
const loading = document.getElementById("loading");
const statusText = document.getElementById("statusText");

function vibrate(){if(navigator.vibrate) navigator.vibrate(80);}
function speak(t){try{speechSynthesis.speak(new SpeechSynthesisUtterance(t));}catch(e){}}

function showLoading(){loading.style.display="flex";}
function hideLoading(){loading.style.display="none";}

function openPanel(html){
panel.innerHTML = html;
panel.classList.add("active");
vibrate();
speak("Chef AI response ready");
}

function closePanel(){
panel.classList.remove("active");
}

async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});
video.srcObject = stream;
}

function captureImage(){
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
const ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0);
return canvas.toDataURL("image/jpeg");
}

/* ===== REAL AI CALL ===== */
async function callAI(prompt,image=null){
showLoading();

const content=[];
content.push({type:"input_text",text:prompt});
if(image) content.push({type:"input_image",image_url:image});

try{
const res = await fetch("https://api.openai.com/v1/responses",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY_HERE"
},
body:JSON.stringify({
model:"gpt-4.1-mini",
input:[{role:"user",content}]
})
});

const data = await res.json();
const text = data.output?.[0]?.content?.[0]?.text || "No response";

hideLoading();
openPanel(`
<h2>🍳 Chef AI</h2>
<div class="card">${text}</div>
<div class="smallBtn" onclick="closePanel()">Close</div>
`);

speak(text);

}catch(err){
hideLoading();
openPanel(`
<div class="card">AI Error - check API key or connection</div>
<div class="smallBtn" onclick="closePanel()">Close</div>
`);
}
}

/* BUTTONS */
document.getElementById("cameraBtn").onclick = ()=>{
const img = captureImage();
callAI("Identify this food and explain it",img);
};

document.getElementById("factsBtn").onclick = ()=>{
callAI("Give seasoning science for chicken, beef, and pork and why it works");
};

/* 🍳 REAL RECIPE GENERATOR */
document.getElementById("recipeBtn").onclick = ()=>{
const img = captureImage();

callAI(
`You are a professional chef AI.

1. Identify the food
2. Create a FULL recipe
3. Include ingredients with exact measurements
4. Step-by-step cooking instructions
5. Cooking time + difficulty
6. Chef tips to improve flavor, texture, and plating

Make it simple, practical, and restaurant quality.`,
img
);
};

/* FLOW */
const logo = document.getElementById("logo");
const intro = document.getElementById("intro");

function show(s){
document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
s.classList.add("active");
}

show(logo);

setTimeout(()=>show(intro),4000);

setTimeout(()=>{
logo.style.display="none";
intro.style.display="none";
startCamera();
statusText.innerText="Ready to cook with AI";
},8000);

</script>

</body>
</html>
