<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff AI</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* ================= SPLASH ================= */
#splash{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
opacity:1;
}

#splashLogo{
transform:scale(1.2);
opacity:1;
transition:transform 3s ease;
margin-bottom:40px;
}

#splashLogo img{
width:60%;
max-width:320px;
}

/* PROGRESS BAR */
#loadingWrap{
width:70%;
max-width:280px;
text-align:center;
color:white;
font-size:14px;
}

#loadingBar{
width:100%;
height:6px;
background:rgba(255,255,255,0.15);
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

#loadingFill{
height:100%;
width:0%;
background:white;
transition:width 0.2s linear;
}

/* ================= INTRO ================= */
.screen{
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition: opacity 800ms ease, transform 800ms ease;
transform: scale(1.05);
z-index:10;
}

.screen.active{
opacity:1;
pointer-events:auto;
transform: scale(1);
}

.screen img{
width:100%;
height:100%;
object-fit:cover;
}

/* ================= CAMERA ================= */
#cameraView{
position:fixed;
inset:0;
z-index:1;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* ================= UI ================= */
#ui{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}

.button{
pointer-events:auto;
position:absolute;
bottom:35px;
width:110px;
height:110px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:14px;
}

#cameraBtn{right:20px;}
#factsBtn{left:20px;}
#recipeBtn{left:50%;transform:translateX(-50%);bottom:20px;}

#statusText{
position:absolute;
bottom:170px;
width:100%;
text-align:center;
color:white;
font-size:14px;
}

/* ================= PANEL ================= */
#panel{
position:fixed;
inset:0;
background:black;
color:white;
z-index:2000;
opacity:0;
pointer-events:none;
transition:opacity 300ms ease;
overflow:auto;
padding:20px;
}

#panel.active{
opacity:1;
pointer-events:auto;
}

.card{
padding:15px;
margin:12px 0;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.smallBtn{
padding:12px;
border:1px solid white;
text-align:center;
cursor:pointer;
margin-top:20px;
}

/* ================= LOADING ================= */
#loading{
position:fixed;
inset:0;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
z-index:3000;
flex-direction:column;
}

.spinner{
width:45px;
height:45px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splashLogo">
    <img src="rusty_logo.jpeg">
  </div>

  <div id="loadingWrap">
    <div id="loadingBar">
      <div id="loadingFill"></div>
    </div>
    <div id="loadingText">Loading Chef AI... 0%</div>
  </div>
</div>

<!-- INTRO -->
<div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div>

<!-- CAMERA -->
<div id="cameraView">
<video id="video" autoplay playsinline></video>
</div>

<!-- UI -->
<div id="ui">
<div id="cameraBtn" class="button">📷 Scan</div>
<div id="factsBtn" class="button">🥩 Facts</div>
<div id="recipeBtn" class="button">🍳 Recipe</div>
<div id="statusText">Booting Chef AI...</div>
</div>

<!-- PANEL -->
<div id="panel"></div>

<!-- LOADING -->
<div id="loading">
<div class="spinner"></div>
<div>Chef AI Thinking...</div>
</div>

<script>

const splash = document.getElementById("splash");
const splashLogo = document.getElementById("splashLogo");
const loadingFill = document.getElementById("loadingFill");
const loadingText = document.getElementById("loadingText");

const intro = document.getElementById("intro");
const video = document.getElementById("video");
const panel = document.getElementById("panel");
const statusText = document.getElementById("statusText");

/* ================= UTIL ================= */
function preload(src){
return new Promise(res=>{
const img = new Image();
img.src = src;
img.onload = res;
});
}

function simulateProgress(){
return new Promise(res=>{
let p = 0;

const interval = setInterval(()=>{
p += Math.random()*10;

if(p >= 100){
p = 100;
clearInterval(interval);
res();
}

loadingFill.style.width = p + "%";
loadingText.innerText = "Loading Chef AI... " + Math.floor(p) + "%";

},140);
});
}

/* ================= CAMERA ================= */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});
video.srcObject = stream;
statusText.innerText = "Ready to scan food";
}catch(e){
statusText.innerText = "Camera blocked or unavailable";
}
}

/* ================= PANEL ================= */
function openPanel(html){
panel.innerHTML = html;
panel.classList.add("active");
}

function closePanel(){
panel.classList.remove("active");
}

/* ================= AI ================= */
async function callAI(prompt){
document.getElementById("loading").style.display="flex";

try{
const res = await fetch("https://api.openai.com/v1/responses",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY_HERE"
},
body:JSON.stringify({
model:"gpt-4.1-mini",
input:[{
role:"user",
content:[{type:"input_text",text:prompt}]
}]
})
});

const data = await res.json();

const text =
data.output?.[0]?.content?.find(c => c.type === "output_text")?.text
|| "No response";

document.getElementById("loading").style.display="none";

openPanel(`
<h2>🍳 Chef AI</h2>
<div class="card">${text}</div>
<div class="smallBtn" onclick="closePanel()">Close</div>
`);

}catch(e){
document.getElementById("loading").style.display="none";

openPanel(`
<div class="card">AI Error</div>
<div class="smallBtn" onclick="closePanel()">Close</div>
`);
}
}

/* ================= BUTTONS ================= */
document.getElementById("cameraBtn").onclick=()=>{
callAI("Identify food and describe it like a chef.");
};

document.getElementById("factsBtn").onclick=()=>{
openPanel(`
<h2>🥩 Meats & Seasonings</h2>

<div class="card">
<h3>🐔 Chicken</h3>
<p>Garlic → savory depth</p>
<p>Lemon → brightness</p>
<p>Paprika → warmth</p>
</div>

<div class="card">
<h3>🐖 Pork</h3>
<p>Brown sugar → caramelization</p>
<p>Mustard → balance fat</p>
<p>Smoked paprika → BBQ flavor</p>
</div>

<div class="card">
<h3>🐄 Beef</h3>
<p>Salt → crust enhancement</p>
<p>Black pepper → sharpness</p>
<p>Onion powder → depth</p>
</div>

<div class="smallBtn" onclick="closePanel()">Back</div>
`);
};

document.getElementById("recipeBtn").onclick=()=>{
callAI("Create a full restaurant-quality recipe with steps, ingredients, and tips.");
};

/* ================= BOOT ================= */
async function boot(){

/* preload assets */
await Promise.all([
preload("rusty_logo.jpeg"),
preload("rusty_intro.jpeg")
]);

/* logo animation */
setTimeout(()=>{
splashLogo.style.transform = "scale(1)";
},200);

/* progress */
await simulateProgress();

/* fade splash */
splash.style.opacity = "0";

/* intro */
setTimeout(()=>{
intro.classList.add("active");
splash.style.display = "none";
},700);

/* camera */
setTimeout(()=>{
intro.style.display = "none";
startCamera();
},3000);

}

boot();

</script>

</body>
</html>
