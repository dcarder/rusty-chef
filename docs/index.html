<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.back{
margin-top:10px;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
  <div class="header">🤖 Rusty the Robot Chef</div>

  <div class="card">AI Cooking System v7 (100 Recipes)</div>

  <div class="dock">
    <div class="dockBtn" onclick="loadRecipes()">🍳<span>Recipes</span></div>
    <div class="dockBtn large" onclick="goIngredients()">🧺<span>Ingredients</span></div>
    <div class="dockBtn" onclick="loadSmart()">🧠<span>AI</span></div>
  </div>
</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
   100 INGREDIENTS
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Lettuce","Cucumber","Bell peppers","Mushrooms",
"Shrimp","Salmon","Tuna","Turkey","Steak","Pork chops","Sausage","Beans","Corn","Peas",
"Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Honey","Lemon","Lime","Ginger",
"Chili flakes","Paprika","Oregano","Basil","Thyme","Cinnamon","Curry powder","Tortilla","Bread","Cream",
"Yogurt","Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Pineapple",
"Coconut milk","Chicken broth","Beef broth","Mustard","Ketchup","Mayonnaise","Vinegar","Zucchini","Eggplant","Cauliflower",
"Cabbage","Chives","Parsley","Oats","Chocolate","Coffee","Tea","Maple syrup","Brown sugar","Tofu",
"Quinoa","Lentils","Chickpeas","Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Granola",
"Marshmallows","Walnuts","Almonds","Fish sauce","Rice noodles","Worcestershire sauce","Green beans","Pumpkin","Sweet potato","Crackers"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

/* =========================
   100 RECIPES (CORE DATA)
========================= */

const recipesDB = Array.from({length:100}, (_,i)=>({
name:`Recipe #${i+1}`,
ingredients: pickIngredients(i),
time: 15 + (i % 60)
}));

function pickIngredients(i){
let arr=[];
for(let j=0;j<5;j++){
arr.push(ingredientItems[(i*7+j)%ingredientItems.length]);
}
return arr;
}

/* =========================
   NAV
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* =========================
   INGREDIENTS PAGE
========================= */

function goIngredients(){

let html=`<div class="topBar"><div class="homeBtn" onclick="show('home')">🏠 Home</div></div>
<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(item=>{
let on = selected.includes(item);
html+=`
<div class="item ${on?'selected':''}" onclick="toggle('${item}')">
<span>${item}</span><span>${on?'✔':''}</span>
</div>`;
});

html+=`<div class="btn" onclick="loadRecipes()">🍳 What Can I Cook?</div>`;
document.getElementById("ingredients").innerHTML=html;

show("ingredients");
}

function toggle(item){
selected = selected.includes(item)
? selected.filter(x=>x!==item)
: [...selected,item];

localStorage.setItem("ingredients",JSON.stringify(selected));
goIngredients();
}

/* =========================
   RECIPE ENGINE
========================= */

function loadRecipes(){

let recipes = recipesDB.map(r=>{
let match = r.ingredients.filter(x=>selected.includes(x)).length;

return {
...r,
score: match / r.ingredients.length
};
});

recipes.sort((a,b)=>b.score-a.score);

window.generated = recipes;

let html=`<div class="topBar"><div class="homeBtn" onclick="show('home')">🏠 Home</div></div>
<div class="header">🍳 What Can I Cook?</div>`;

recipes.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
${(r.score*100).toFixed(0)}% match<br>
${r.time} min
</div>`;
});

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

/* =========================
   AUTO STEP GENERATOR
========================= */

function generateSteps(recipe){

return [
{step:"Prep ingredients",time:5,temp:"none",detail:"Gather and wash all ingredients."},
{step:"Heat cooking surface",time:3,temp:"medium-high",detail:"Preheat pan or pot."},
{step:"Start main cooking",time:recipe.time/2,temp:"medium",detail:"Cook main proteins or base ingredients."},
{step:"Combine ingredients",time:recipe.time/3,temp:"low",detail:"Mix everything together evenly."},
{step:"Finish & serve",time:3,temp:"none",detail:"Plate and let rest before eating."}
];

}

/* =========================
   DETAIL VIEW
========================= */

function openRecipe(name){

let r = window.generated.find(x=>x.name===name);

let steps = generateSteps(r);

let html=`<div class="topBar"><div class="homeBtn" onclick="loadRecipes()">⬅ Back</div></div>
<div class="header">${r.name}</div>

<div class="card">
<b>Ingredients:</b><br>${r.ingredients.join("<br>")}
</div>`;

steps.forEach((s,i)=>{
html+=`
<div class="card">
<b>Step ${i+1}: ${s.step}</b><br><br>
⏱ ${s.time} min<br>
🌡 ${s.temp}<br><br>
${s.detail}
</div>`;
});

document.getElementById("detail").innerHTML=html;
show("detail");
}

/* INIT */
goIngredients();

</script>

</body>
</html>
