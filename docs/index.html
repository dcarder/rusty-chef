<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* SCREENS */
.screen{
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition:opacity 800ms ease, transform 800ms ease;
transform:scale(1.05);
z-index:10;
}
.screen.active{
opacity:1;
pointer-events:auto;
transform:scale(1);
}
.screen img{
width:100%;
height:100%;
object-fit:cover;
}

/* CAMERA */
#cameraView{
position:fixed;
inset:0;
z-index:1;
}
video{
width:100%;
height:100%;
object-fit:cover;
}

/* UI */
#ui{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}
.button{
pointer-events:auto;
position:absolute;
bottom:35px;
width:110px;
height:110px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:14px;
}
#cameraBtn{right:20px;}
#factsBtn{left:20px;}
#recipeBtn{left:50%;transform:translateX(-50%);bottom:20px;}

#statusText{
position:absolute;
bottom:170px;
width:100%;
text-align:center;
color:white;
}

/* PANEL */
#panel{
position:fixed;
inset:0;
background:black;
color:white;
z-index:2000;
opacity:0;
pointer-events:none;
transition:opacity 300ms ease;
overflow:auto;
padding:20px;
}
#panel.active{
opacity:1;
pointer-events:auto;
}

.card{
padding:15px;
margin:10px 0;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.smallBtn{
padding:12px;
border:1px solid white;
margin-top:15px;
text-align:center;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logo" class="screen active">
<img src="rusty_logo.jpeg">
</div>

<!-- INTRO -->
<div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div>

<!-- CAMERA -->
<div id="cameraView">
<video id="video" autoplay playsinline></video>
</div>

<!-- UI -->
<div id="ui">
<div id="cameraBtn" class="button">📷 Pantry</div>
<div id="factsBtn" class="button">🥩 Facts</div>
<div id="recipeBtn" class="button">🍳 Recipes</div>
<div id="statusText">Booting Chef...</div>
</div>

<!-- PANEL -->
<div id="panel"></div>

<script>
const video = document.getElementById("video");
const panel = document.getElementById("panel");
const statusText = document.getElementById("statusText");

/* CAMERA */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});
video.srcObject = stream;
statusText.innerText = "Manage your pantry";
}catch(e){
statusText.innerText = "Camera unavailable";
}
}

/* PANEL */
function openPanel(html){
panel.innerHTML = html;
panel.classList.add("active");
}
function closePanel(){
panel.classList.remove("active");
}

/* STORAGE */
function getPantry(){
return JSON.parse(localStorage.getItem("pantry") || "[]");
}
function savePantry(p){
localStorage.setItem("pantry", JSON.stringify(p));
}

/* INGREDIENTS */
const ingredientsList = [
"chicken","beef","pork","rice","garlic","onion",
"pepper","salt","butter","egg","cheese","tomato"
];

/* RECIPES */
const recipes = [
{
name:"Garlic Chicken Rice",
ingredients:["chicken","rice","garlic"],
time:20,
steps:"Cook chicken, sauté garlic, serve over rice."
},
{
name:"Beef Stir Fry",
ingredients:["beef","onion","pepper"],
time:15,
steps:"Stir fry beef with onion and pepper."
},
{
name:"Cheesy Omelette",
ingredients:["egg","cheese","butter"],
time:10,
steps:"Cook eggs in butter, add cheese, fold."
},
{
name:"Pork Skillet",
ingredients:["pork","garlic","onion"],
time:25,
steps:"Cook pork with garlic and onion."
}
];

/* PANTRY UI */
function showPantry(){
let pantry = getPantry();

let html = `<h2>🧺 Your Pantry</h2>`;

ingredientsList.forEach(i=>{
let checked = pantry.includes(i) ? "checked" : "";
html += `
<div class="card">
<label>
<input type="checkbox" value="${i}" ${checked}> ${i}
</label>
</div>`;
});

html += `
<div class="smallBtn" onclick="savePantryUI()">Save Pantry</div>
<div class="smallBtn" onclick="showRecipes()">Find Recipes</div>
<div class="smallBtn" onclick="closePanel()">Close</div>
`;

openPanel(html);
}

function savePantryUI(){
const checked = document.querySelectorAll("input:checked");
const pantry = Array.from(checked).map(i=>i.value);
savePantry(pantry);
alert("Saved!");
showPantry();
}

/* MATCHING */
function scoreRecipe(recipe, pantry){
let matched = recipe.ingredients.filter(i=>pantry.includes(i));
return {
...recipe,
score: matched.length / recipe.ingredients.length,
missing: recipe.ingredients.filter(i=>!pantry.includes(i))
};
}

/* SHOW RECIPES */
function showRecipes(){
let pantry = getPantry();

if(pantry.length === 0){
alert("Add ingredients first");
return;
}

let maxTime = prompt("Max cook time? (optional)");
maxTime = maxTime ? parseInt(maxTime) : null;

let results = recipes
.map(r=>scoreRecipe(r,pantry))
.filter(r=>!maxTime || r.time <= maxTime)
.sort((a,b)=>b.score - a.score)
.slice(0,3);

let html = `<h2>🍳 Top Recipes</h2>`;

results.forEach(r=>{
html += `
<div class="card">
<h3>${r.name}</h3>
<p>Match: ${Math.round(r.score*100)}%</p>
<p>⏱ ${r.time} min</p>
<p>${r.steps}</p>
<p><b>Missing:</b> ${r.missing.join(", ") || "None"}</p>
</div>`;
});

html += `<div class="smallBtn" onclick="closePanel()">Close</div>`;

openPanel(html);
}

/* BUTTONS */
document.getElementById("cameraBtn").onclick = showPantry;
document.getElementById("recipeBtn").onclick = showRecipes;

document.getElementById("factsBtn").onclick = ()=>{
openPanel(`
<h2>🥩 Meat Guide</h2>
<div class="card">Chicken → garlic, lemon</div>
<div class="card">Beef → salt, pepper</div>
<div class="smallBtn" onclick="closePanel()">Back</div>
`);
};

/* FLOW */
setTimeout(()=>{
document.getElementById("logo").classList.remove("active");
document.getElementById("intro").classList.add("active");
},3500);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
startCamera();
},8000);
</script>

</body>
</html>
