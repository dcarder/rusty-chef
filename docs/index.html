<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
padding-bottom:120px;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

/* HOME */
#homeBg{
position:fixed;
inset:0;
z-index:-2;
}
#homeBg img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.4);
}

#introLogo{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleText{
display:flex;
flex-direction:column;
font-weight:900;
line-height:.85;
text-shadow:0 0 20px rgba(255,80,0,0.6);
}
.the{font-size:32px;}
.rusty{font-size:64px;color:#ffb347;}
.chef{font-size:54px;color:#ff6a00;}

/* UI */
.header{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin:10px;
cursor:pointer;
}

.bottomDock{
position:fixed;
bottom:10px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:12px;
}
.bottomDock .btn{width:150px;}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div id="introLogo">
<div class="titleText">
<div class="the">THE</div>
<div class="rusty">RUSTY</div>
<div class="chef">CHEF</div>
</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>

</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* ================= 100 INGREDIENTS ================= */

const ingredientItems=[
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic","Onions",
"Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon","Tuna",
"Steak","Pork chops","Turkey","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Corn","Baking powder"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* ================= 25 RECIPES ================= */

const recipes=[

/* BREAKFAST */
{name:"Pancakes",category:"Breakfast",
ingredients:["Flour","Milk","Eggs"],
simpleSteps:[{t:"Mix batter.",a:"mix"},{t:"Cook.",a:"pan"}],
chefSteps:[{t:"Smooth batter consistency.",a:"mix",visual:"thick pourable batter",smell:"slight vanilla",feel:"silky"}]},

{name:"Breakfast Burrito",category:"Breakfast",
ingredients:["Eggs","Tortilla","Cheese"],
simpleSteps:[{t:"Cook eggs.",a:"3 eggs"},{t:"Wrap.",a:"final"}],
chefSteps:[{t:"Scramble eggs soft.",a:"3 eggs",visual:"fluffy yellow eggs",smell:"buttery",feel:"soft"}]},

{name:"Avocado Toast",category:"Breakfast",
ingredients:["Bread","Avocado"],
simpleSteps:[{t:"Toast.",a:"2 slices"},{t:"Add avocado.",a:"final"}],
chefSteps:[{t:"Mash avocado smooth.",a:"2 slices",visual:"green creamy spread",smell:"fresh grass notes",feel:"buttery"}]},

{name:"French Toast",category:"Breakfast",
ingredients:["Bread","Eggs","Milk"],
simpleSteps:[{t:"Dip bread.",a:"mix"},{t:"Cook.",a:"pan"}],
chefSteps:[{t:"Soak evenly.",a:"mix",visual:"golden crust",smell:"sweet cinnamon",feel:"soft inside"}]},

/* DINNER */
{name:"Spaghetti Bolognese",category:"Dinner",
ingredients:["Pasta","Ground beef","Tomatoes"],
simpleSteps:[{t:"Boil pasta.",a:"box"},{t:"Cook sauce.",a:"final"}],
chefSteps:[{t:"Pasta al dente.",a:"box",visual:"firm noodles",smell:"tomato richness",feel:"slight bite"}]},

{name:"Chicken Curry",category:"Dinner",
ingredients:["Chicken breast","Curry powder","Coconut milk"],
simpleSteps:[{t:"Cook chicken.",a:"1 lb"},{t:"Simmer.",a:"final"}],
chefSteps:[{t:"Spices bloom.",a:"1 lb",visual:"golden sauce",smell:"deep curry aroma",feel:"thick sauce"}]},

{name:"Lasagna",category:"Dinner",
ingredients:["Pasta","Cheese","Ground beef"],
simpleSteps:[{t:"Layer.",a:"all"},{t:"Bake.",a:"oven"}],
chefSteps:[{t:"Stack layers tight.",a:"all",visual:"melting cheese top",smell:"baked richness",feel:"soft layers"}]},

{name:"Chicken Fried Rice",category:"Dinner",
ingredients:["Rice","Eggs","Chicken breast"],
simpleSteps:[{t:"Cook rice.",a:"1 cup"},{t:"Mix.",a:"final"}],
chefSteps:[{t:"Separate grains.",a:"1 cup",visual:"dry rice",smell:"soy aroma",feel:"light texture"}]},

{name:"Beef Stir Fry",category:"Dinner",
ingredients:["Beef","Broccoli","Soy sauce"],
simpleSteps:[{t:"Cook beef.",a:"1 lb"},{t:"Mix.",a:"final"}],
chefSteps:[{t:"High heat sear.",a:"1 lb",visual:"brown crust",smell:"smoky soy",feel:"tender bite"}]},

{name:"Fried Chicken",category:"Dinner",
ingredients:["Chicken breast","Flour","Oil"],
simpleSteps:[{t:"Coat.",a:"flour"},{t:"Fry.",a:"oil"}],
chefSteps:[{t:"Crunch coating.",a:"flour",visual:"golden crust",smell:"fried aroma",feel:"crispy outside"}]},

/* LUNCH */
{name:"Grilled Cheese",category:"Lunch",
ingredients:["Bread","Cheese","Butter"],
simpleSteps:[{t:"Butter.",a:"2 slices"},{t:"Grill.",a:"pan"}],
chefSteps:[{t:"Golden toast.",a:"2 slices",visual:"crispy brown",smell:"buttery",feel:"crunch outside"}]},

{name:"Quesadilla",category:"Lunch",
ingredients:["Tortilla","Cheese"],
simpleSteps:[{t:"Fill.",a:"cheese"},{t:"Cook.",a:"pan"}],
chefSteps:[{t:"Melt center.",a:"cheese",visual:"oozing cheese",smell:"toasted tortilla",feel:"crispy shell"}]},

{name:"Burger",category:"Lunch",
ingredients:["Ground beef","Bread","Cheese"],
simpleSteps:[{t:"Cook patty.",a:"1 lb"},{t:"Assemble.",a:"final"}],
chefSteps:[{t:"Juicy sear.",a:"1 lb",visual:"char marks",smell:"grill smoke",feel:"juicy bite"}]},

/* COMFORT */
{name:"Chili",category:"Comfort",
ingredients:["Ground beef","Tomatoes"],
simpleSteps:[{t:"Cook.",a:"1 lb"},{t:"Simmer.",a:"final"}],
chefSteps:[{t:"Thick stew.",a:"1 lb",visual:"deep red",smell:"spicy warmth",feel:"heavy texture"}]},

{name:"Tomato Soup",category:"Comfort",
ingredients:["Tomatoes","Onions"],
simpleSteps:[{t:"Cook.",a:"pot"},{t:"Blend.",a:"final"}],
chefSteps:[{t:"Blend smooth.",a:"pot",visual:"bright red",smell:"sweet tomato",feel:"silky"}]},

{name:"Ramen Bowl",category:"Comfort",
ingredients:["Ramen noodles","Eggs"],
simpleSteps:[{t:"Cook noodles.",a:"pack"},{t:"Add egg.",a:"final"}],
chefSteps:[{t:"Soft egg yolk.",a:"pack",visual:"broth steam",smell:"savory broth",feel:"slurp texture"}]},

{name:"Shepherd's Pie",category:"Comfort",
ingredients:["Ground beef","Potatoes"],
simpleSteps:[{t:"Layer.",a:"all"},{t:"Bake.",a:"oven"}],
chefSteps:[{t:"Golden crust.",a:"all",visual:"baked top",smell:"roasted meat",feel:"soft inside"}]},

/* SEAFOOD */
{name:"Garlic Shrimp Pasta",category:"Seafood",
ingredients:["Shrimp","Pasta","Garlic"],
simpleSteps:[{t:"Cook shrimp.",a:"1/2 lb"},{t:"Mix.",a:"final"}],
chefSteps:[{t:"Pink curl shrimp.",a:"1/2 lb",visual:"glossy garlic oil",smell:"garlic butter",feel:"tender bite"}]},

{name:"Salmon Rice Bowl",category:"Seafood",
ingredients:["Rice","Salmon"],
simpleSteps:[{t:"Cook salmon.",a:"1 fillet"},{t:"Serve.",a:"final"}],
chefSteps:[{t:"Flake salmon.",a:"1 fillet",visual:"pink flakes",smell:"ocean richness",feel:"soft fish"}]}

];

/* ================= SYSTEM ================= */

function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match: ${r.match}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});
html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* ================= RECIPE ================= */

let current=null;
let mode="simple";

function openRecipe(name){
current=recipes.find(r=>r.name===name);
mode="simple";
render();
show("recipe");
}

function switchMode(){
mode=mode==="simple"?"chef":"simple";
render();
}

function render(){

let steps=current[mode==="simple"?"simpleSteps":"chefSteps"];

let html=steps.map((s,i)=>{

let extra = mode==="chef"
? `<br><i>👁 ${s.visual||""}</i><br><i>👃 ${s.smell||""}</i><br><i>✋ ${s.feel||""}</i>`
:"";

return `
<div class="card">
<b>${i+1}. ${s.t}</b><br><br>
🍴 ${s.a}
${extra}
</div>`;
}).join("");

/* Walmart */
let shopHTML=`<div class="header">🛒 Missing Ingredients</div>`;
current.ingredients.filter(i=>!selected.includes(i)).forEach(item=>{
shopHTML+=`
<div class="card">
<b>${item}</b><br>
<a class="btn" target="_blank"
style="display:inline-block;margin-top:8px;background:#0071ce;color:white;"
href="https://www.walmart.com/search?q=${encodeURIComponent(item)}">
🛒 Walmart
</a>
</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name} (${mode.toUpperCase()})</div>
<div class="btn" onclick="switchMode()">Switch Mode</div>
${html}
${shopHTML}
<div class="btn" onclick="show('home')">Home</div>
`;
}

show("home");

</script>

</body>
</html>
