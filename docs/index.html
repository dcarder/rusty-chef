<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v13</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

/* UI */
.header{text-align:center;font-size:22px;font-weight:700;margin-bottom:10px;}
.card{background:rgba(255,255,255,.08);border-radius:14px;padding:14px;margin:10px 0;border:1px solid rgba(255,255,255,.15);}
.item{padding:10px;margin:6px 0;border-radius:10px;border:1px solid rgba(255,255,255,.2);cursor:pointer;}
.item.selected{background:rgba(79,172,254,.25);}
.btn{padding:14px;background:#4facfe;color:black;font-weight:700;text-align:center;border-radius:12px;margin-top:10px;cursor:pointer;}

/* SHOP */
.shopBtn{display:inline-block;margin-top:8px;margin-right:8px;padding:10px 14px;border-radius:10px;font-weight:700;text-decoration:none;color:white;}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

/* HOME */
#homeBg{position:fixed;inset:0;z-index:-1;}
#homeBg img{width:100%;height:100%;object-fit:cover;}

/* TITLE */
#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}
.titleRow{display:flex;align-items:center;gap:16px;}
.titleText{display:flex;flex-direction:column;font-weight:900;line-height:.9;}
.the{font-size:36px;}
.rusty{font-size:64px;}
.chef{font-size:54px;}

.flame{width:50px;height:120px;position:relative;}
.flame span{
position:absolute;
bottom:0;
font-size:22px;
animation:rise 1.2s infinite;
opacity:0;
}
@keyframes rise{
0%{opacity:0;transform:translateY(0);}
30%{opacity:1;}
100%{opacity:0;transform:translateY(-120px);}
}

/* HOME BUTTONS */
.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div id="introLogo">
<div class="titleRow">

<div class="flame">
<span>🔥</span><span>🔥</span><span>🔥</span>
</div>

<div class="titleText">
<div class="the">THE</div>
<div class="rusty">RUSTY</div>
<div class="chef">CHEF</div>
</div>

<div class="flame">
<span>🔥</span><span>🔥</span><span>🔥</span>
</div>

</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* =========================
🔥 ADAPTIVE AI ENGINE
========================= */

let servings = 2; // default

function setServings(n){
servings = n;
if(current) render();
}

/* scaling logic */
function scaleAmount(val){
let base = current.baseServings || 2;
return +(val * (servings/base)).toFixed(2);
}

/* non-linear cooking time scaling */
function scaleTime(t){
let base = current.baseServings || 2;
let factor = 1 + ((servings/base) - 1) * 0.35;
return Math.max(1, Math.round(t * factor));
}

/* heat adjustment */
function adjustHeat(temp){
if(servings >= 4) return "Medium (avoid overcrowding)";
if(servings >= 2) return temp;
return temp;
}

/* pan recommendation */
function panSize(){
if(servings >= 6) return "Large stock pot / extra large skillet";
if(servings >= 4) return "Large skillet (12–14 inch)";
if(servings >= 2) return "Medium skillet";
return "Small pan";
}

/* batch logic */
function batchWarning(){
if(servings >= 4){
return "⚠ Large batch detected: cook in 2 batches for best texture.";
}
return "";
}

/* =========================
INGREDIENTS
========================= */

const ingredientItems = ["Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic"];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
RECIPES
========================= */

const recipes = [
{
name:"Chicken Fried Rice",
baseServings:2,
ingredients:[
{item:"Rice",amount:2},
{item:"Chicken breast",amount:1},
{item:"Eggs",amount:2},
{item:"Soy sauce",amount:2},
{item:"Onions",amount:1}
],
steps:[
{t:"Prep ingredients",time:5,temp:"Room"},
{t:"Cook chicken",time:8,temp:"375°F"},
{t:"Fry rice mix",time:7,temp:"400°F"}
]
}
];

/* MATCH */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i.item)).length;
let missing=r.ingredients.filter(i=>!selected.includes(i.item));
return {...r,match,missing};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top AI Matches</div>`;
top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${r.match}
</div>`;
});
document.getElementById("results").innerHTML=html;
show("results");
}

/* PANTRY */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});
html+=`
<div class="btn" onclick="setServings(1)">1 Person</div>
<div class="btn" onclick="setServings(2)">2 People</div>
<div class="btn" onclick="setServings(4)">Family</div>
<div class="btn" onclick="showMatches()">Find Recipes</div>
`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* RECIPE */
let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);
render();
show("recipe");
}

function render(){

let missing=current.ingredients.filter(i=>!selected.includes(i.item));

let stepsHTML=current.steps.map((s,i)=>`
<div class="card">
<b>Step ${i+1}</b><br>
${s.t}<br>
⏱ ${scaleTime(s.time)} min<br>
🔥 Heat: ${adjustHeat(s.temp)}
</div>
`).join("");

let shopHTML=`<div class="header">🛒 Missing Ingredients</div>`;
missing.forEach(i=>{
let q=encodeURIComponent(i.item);
shopHTML+=`
<div class="card">
<b>${i.item}</b> (${scaleAmount(i.amount)} units)<br>
<a class="shopBtn instacartBtn" target="_blank"
href="https://www.instacart.com/store/search?search=${q}">Instacart</a>
<a class="shopBtn walmartBtn" target="_blank"
href="https://www.walmart.com/search?q=${q}">Walmart</a>
</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="card">
🍳 Pan: ${panSize()}<br>
${batchWarning()}
</div>

${stepsHTML}
${shopHTML}

<div class="btn" onclick="show('home')">Home</div>
`;
}

show("home");

</script>

</body>
</html>
