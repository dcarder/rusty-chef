<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
padding:12px;
}
.page.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
background:#0071ce;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}

#homeBg img{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleRow{display:flex;align-items:center;gap:16px;}
.the{font-size:30px;}
.rusty{font-size:60px;}
.chef{font-size:50px;}

@keyframes rise{
0%{transform:translateY(0);opacity:0;}
30%{opacity:1;}
100%{transform:translateY(-100px);opacity:0;}
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div id="introLogo">
<div class="titleRow">
<div class="the">THE RUSTY CHEF</div>
</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* =========================
   100+ INGREDIENT PANTRY
========================= */
const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Turkey","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce",
"Lemon","Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla",
"Bread","Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth",
"Beef broth","Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce",
"Worcestershire sauce","Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup",
"Brown sugar","Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise",
"Vinegar","Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage",
"Parsley","Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Corn"
];

let selected = JSON.parse(localStorage.getItem("ing")||"[]");

/* =========================
   25 FULL RECIPES RESTORED
========================= */

const recipes = [
{
name:"Beef Tacos",
ingredients:["Ground beef","Tortilla","Cheese","Onions","Tomatoes","Lettuce"],
steps:[
{t:"Cook beef until browned.",a:"sizzle until firm"},
{t:"Season meat.",a:"taco seasoning"},
{t:"Warm tortillas.",a:"soft heat"},
{t:"Assemble tacos.",a:"final"}
]
},
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Carrots","Onions"],
steps:[
{t:"Cook chicken.",a:"sizzle until firm"},
{t:"Add vegetables.",a:"soften"},
{t:"Add rice.",a:"crackle heat"},
{t:"Season.",a:"soy sauce mix"}
]
},
{
name:"Spaghetti Bolognese",
ingredients:["Pasta","Ground beef","Tomatoes","Garlic","Onions"],
steps:[
{t:"Boil pasta.",a:"soft but firm"},
{t:"Cook beef.",a:"brown fully"},
{t:"Simmer sauce.",a:"thick aroma"},
{t:"Combine.",a:"mix hot"}
]
}
];

/* ========================= */

function score(r){
let m=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match:m};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);
let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match: ${r.match}
</div>`;
});
document.getElementById("results").innerHTML=html;
show("results");
}

function openPantry(){
let html=`<div class="header">🧺 Pantry</div>
<div class="btn" onclick="clearPantry()">Clear Pantry</div>`;
ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function clearPantry(){
selected=[];
localStorage.setItem("ing",JSON.stringify(selected));
openPantry();
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ing",JSON.stringify(selected));
openPantry();
}

let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);

let missing=current.ingredients.filter(i=>!selected.includes(i));

let html=`<div class="header">${current.name}</div>`;

current.steps.forEach((s,i)=>{
html+=`<div class="card"><b>${i+1}. ${s.t}</b><br>${s.a}</div>`;
});

html+=`<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{
let q=encodeURIComponent(item);
html+=`
<div class="card">
<b>${item}</b><br>
<a class="shopBtn" target="_blank"
href="https://www.walmart.com/search?q=${q}">Walmart</a>
</div>`;
});

html+=`<div class="btn" onclick="show('home')">Home</div>`;

document.getElementById("recipe").innerHTML=html;
show("recipe");
}

show("home");

</script>

</body>
</html>
