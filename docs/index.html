<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v16</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
padding:10px;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* PANTRY ITEMS */
const ingredientItems = [
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Shrimp","Salmon",
"Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon","Tortilla","Bread",
"Parmesan","Cheddar","Coconut milk","Curry powder","BBQ sauce","Peanut butter","Chicken broth",
"Beef broth","Yogurt","Oats","Corn","Lettuce"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");
let current=null;
let mode="simple";

/* =======================
25 REAL RECIPES
======================= */

const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
simpleSteps:[{t:"Cook rice"},{t:"Cook chicken"},{t:"Stir fry"}],
chefSteps:[{t:"Use cold rice"},{t:"Sear chicken"},{t:"High heat fry"}]
},
{
name:"Spaghetti Bolognese",
ingredients:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],
simpleSteps:[{t:"Boil pasta"},{t:"Cook beef sauce"},{t:"Mix"}],
chefSteps:[{t:"Al dente pasta"},{t:"Brown beef"},{t:"Simmer sauce"}]
},
{
name:"Chicken Tacos",
ingredients:["Chicken breast","Tortilla","Cheese","Onions","Lime"],
simpleSteps:[{t:"Cook chicken"},{t:"Warm tortilla"},{t:"Assemble"}],
chefSteps:[{t:"Sear chicken"},{t:"Rest shred"},{t:"Finish lime"}]
},
{
name:"Peanut Butter Fudge",
ingredients:["Peanut butter","Sugar","Butter","Milk"],
simpleSteps:[{t:"Melt"},{t:"Mix"},{t:"Chill"}],
chefSteps:[{t:"Heat mix"},{t:"Smooth blend"},{t:"Set cool"}]
},
{
name:"Grilled Cheese",
ingredients:["Bread","Cheese","Butter"],
simpleSteps:[{t:"Butter bread"},{t:"Melt cheese"},{t:"Grill"}],
chefSteps:[{t:"Low toast"},{t:"Melt slow"},{t:"Crisp flip"}]
},
{
name:"Pancakes",
ingredients:["Flour","Milk","Eggs","Sugar","Butter"],
simpleSteps:[{t:"Mix"},{t:"Cook"},{t:"Flip"}],
chefSteps:[{t:"Whisk batter"},{t:"Heat pan"},{t:"Golden flip"}]
},
{
name:"Chicken Curry",
ingredients:["Chicken breast","Curry powder","Coconut milk","Onions","Rice"],
simpleSteps:[{t:"Cook chicken"},{t:"Add curry"},{t:"Serve"}],
chefSteps:[{t:"Sauté onions"},{t:"Bloom spices"},{t:"Simmer coconut milk"}]
},
{
name:"Beef Stir Fry",
ingredients:["Ground beef","Broccoli","Carrots","Soy sauce","Rice"],
simpleSteps:[{t:"Cook beef"},{t:"Add veg"},{t:"Serve"}],
chefSteps:[{t:"High heat beef"},{t:"Toss veg"},{t:"Glaze sauce"}]
},
{
name:"Mac and Cheese",
ingredients:["Pasta","Cheddar","Milk","Butter"],
simpleSteps:[{t:"Boil pasta"},{t:"Make sauce"},{t:"Mix"}],
chefSteps:[{t:"Cook pasta"},{t:"Cheese melt"},{t:"Creamy mix"}]
},
{
name:"Chicken Alfredo",
ingredients:["Chicken breast","Pasta","Cream","Parmesan","Garlic"],
simpleSteps:[{t:"Cook pasta"},{t:"Cook chicken"},{t:"Add sauce"}],
chefSteps:[{t:"Boil pasta"},{t:"Sear chicken"},{t:"Cream sauce"}]
},
{
name:"Omelette",
ingredients:["Eggs","Cheese","Onions","Bell peppers"],
simpleSteps:[{t:"Whisk eggs"},{t:"Cook"},{t:"Fold"}],
chefSteps:[{t:"Sauté veg"},{t:"Soft eggs"},{t:"Fold cheese"}]
},
{
name:"Tuna Sandwich",
ingredients:["Tuna","Bread","Mayonnaise","Lettuce"],
simpleSteps:[{t:"Mix tuna"},{t:"Spread"},{t:"Assemble"}],
chefSteps:[{t:"Drain tuna"},{t:"Mix mayo"},{t:"Build sandwich"}]
},
{
name:"BBQ Chicken Sandwich",
ingredients:["Chicken breast","BBQ sauce","Bread","Onions"],
simpleSteps:[{t:"Cook chicken"},{t:"Add BBQ"},{t:"Serve"}],
chefSteps:[{t:"Shred chicken"},{t:"Mix sauce"},{t:"Toast bread"}]
},
{
name:"Tomato Soup",
ingredients:["Tomatoes","Cream","Onions","Garlic","Butter"],
simpleSteps:[{t:"Cook"},{t:"Blend"},{t:"Add cream"}],
chefSteps:[{t:"Simmer base"},{t:"Blend smooth"},{t:"Finish creamy"}]
},
{
name:"Fish Tacos",
ingredients:["Fish","Tortilla","Lime","Cabbage"],
simpleSteps:[{t:"Cook fish"},{t:"Warm tortilla"},{t:"Assemble"}],
chefSteps:[{t:"Pan sear fish"},{t:"Crisp cabbage"},{t:"Finish lime"}]
},
{
name:"Fried Chicken",
ingredients:["Chicken breast","Flour","Eggs","Oil"],
simpleSteps:[{t:"Coat"},{t:"Fry"},{t:"Serve"}],
chefSteps:[{t:"Season coat"},{t:"Deep fry"},{t:"Rest crisp"}]
},
{
name:"Teriyaki Bowl",
ingredients:["Chicken breast","Rice","Teriyaki sauce","Broccoli"],
simpleSteps:[{t:"Cook rice"},{t:"Cook chicken"},{t:"Add sauce"}],
chefSteps:[{t:"Sear chicken"},{t:"Glaze sauce"},{t:"Steam broccoli"}]
},
{
name:"Breakfast Burrito",
ingredients:["Eggs","Tortilla","Cheese","Sausage","Potatoes"],
simpleSteps:[{t:"Cook filling"},{t:"Wrap"},{t:"Serve"}],
chefSteps:[{t:"Cook filling"},{t:"Toast burrito"},{t:"Crisp wrap"}]
},
{
name:"Caesar Salad",
ingredients:["Chicken breast","Lettuce","Parmesan"],
simpleSteps:[{t:"Cook chicken"},{t:"Mix salad"},{t:"Serve"}],
chefSteps:[{t:"Grill chicken"},{t:"Toss greens"},{t:"Add cheese"}]
},
{
name:"Garlic Shrimp Pasta",
ingredients:["Shrimp","Pasta","Butter","Garlic","Lemon"],
simpleSteps:[{t:"Cook pasta"},{t:"Cook shrimp"},{t:"Mix"}],
chefSteps:[{t:"Boil pasta"},{t:"Sauté shrimp"},{t:"Lemon finish"}]
},
{
name:"Chicken Soup",
ingredients:["Chicken broth","Chicken breast","Carrots","Onions"],
simpleSteps:[{t:"Simmer broth"},{t:"Add chicken"},{t:"Serve"}],
chefSteps:[{t:"Slow simmer"},{t:"Add veg"},{t:"Shred chicken"}]
},
{
name:"Veggie Stir Fry",
ingredients:["Broccoli","Carrots","Soy sauce","Garlic","Rice"],
simpleSteps:[{t:"Cook veg"},{t:"Add sauce"},{t:"Serve"}],
chefSteps:[{t:"High heat veg"},{t:"Add garlic soy"},{t:"Serve rice"}]
},
{
name:"Quesadilla",
ingredients:["Tortilla","Cheese","Chicken"],
simpleSteps:[{t:"Fill"},{t:"Cook"},{t:"Cut"}],
chefSteps:[{t:"Toast tortilla"},{t:"Melt cheese"},{t:"Slice crisp"}]
}
];

/* MATCHING */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match: ${r.match}
</div>`;
});

html+=`<div class="btn" onclick="show('home')">Home</div>`;
document.getElementById("results").innerHTML=html;
show("results");
}

/* PANTRY */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggleItem(\`${i}\`)">${i}</div>`;
});

html+=`
<div class="btn" onclick="show('home')">Home</div>
<div class="btn" onclick="showMatches()">Find Recipes</div>
`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggleItem(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* RECIPE VIEW */
function openRecipe(name){
current=recipes.find(r=>r.name===name);
mode="simple";
render();
show("recipe");
}

function render(){
let missing=current.ingredients.filter(i=>!selected.includes(i));

let steps = mode==="simple"?current.simpleSteps:current.chefSteps;

let stepsHTML=steps.map((s,i)=>`
<div class="card"><b>${i+1}. ${s.t}</b></div>
`).join("");

let missingHTML=`<div class="header">Missing Ingredients</div>`;
missing.forEach(i=>{
missingHTML+=`<div class="card">${i}</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="btn" onclick="mode=mode==='simple'?'chef':'simple';render()">
Switch Mode
</div>

${stepsHTML}
${missingHTML}

<div class="btn" onclick="show('home')">Home</div>
`;
}

show("home");

</script>

</body>
</html>
