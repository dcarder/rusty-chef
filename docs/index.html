<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff V8</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

.stage{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
}

.stage img{
width:100%;
height:100%;
object-fit:cover;
}

/* HUB */
#hub{
position:fixed;
inset:0;
display:none;
background:black;
padding:20px;
overflow:auto;
z-index:2000;
}

.card{
padding:15px;
margin:10px 0;
border:1px solid rgba(255,255,255,0.2);
border-radius:12px;
}

.btn{
padding:14px;
margin-top:10px;
border:1px solid white;
text-align:center;
border-radius:10px;
cursor:pointer;
}

small{opacity:0.7;}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logo" class="stage" style="background:black;">
<img src="rusty_logo.jpeg">
</div>

<!-- RUSTY -->
<div id="rusty" class="stage" style="display:none;">
<img src="rusty_intro.jpeg">
</div>

<!-- HUB -->
<div id="hub"></div>

<script>

let currentRecipe = null;
let stepIndex = 0;
let timer = null;

/* FLOW */
setTimeout(()=>{
document.getElementById("logo").style.display="none";
document.getElementById("rusty").style.display="flex";
},3000);

setTimeout(()=>{
document.getElementById("rusty").style.display="none";
showHub();
},6000);

/* ================= PANTRY (100+ ITEMS) ================= */

const pantryItems = [
"chicken","beef","pork","turkey","salmon","shrimp",
"rice","pasta","bread","tortilla","oats","quinoa",
"egg","milk","cheese","butter","cream",
"garlic","onion","tomato","carrot","broccoli","spinach","lettuce",
"cucumber","pepper","mushroom","zucchini","potato","sweet potato",
"corn","peas","cabbage","cauliflower",
"apple","banana","orange","lemon","lime",
"salt","pepper","paprika","oregano","basil","thyme",
"soy sauce","olive oil","vinegar","ketchup","mustard","sugar",
"beans","lentils","broth","coconut milk"
];

/* ================= RECIPES ================= */

const recipes = [
{
name:"Garlic Chicken Rice",
ingredients:["chicken","rice","garlic","salt","olive oil"],
time:25,
steps:[
{ text:"Season chicken", time:2, temp:"Room temp" },
{ text:"Cook chicken", time:10, temp:"165°F medium heat" },
{ text:"Add garlic", time:2, temp:"Medium heat" },
{ text:"Mix rice", time:5, temp:"Low heat" }
]
},
{
name:"Veg Stir Fry",
ingredients:["broccoli","carrot","onion","soy sauce"],
time:15,
steps:[
{ text:"Chop vegetables", time:5, temp:"—" },
{ text:"Heat pan", time:2, temp:"High heat" },
{ text:"Stir fry", time:6, temp:"High heat" }
]
},
{
name:"Cheesy Eggs",
ingredients:["egg","cheese","butter","salt"],
time:10,
steps:[
{ text:"Whisk eggs", time:2, temp:"Room temp" },
{ text:"Melt butter", time:2, temp:"Medium heat" },
{ text:"Cook eggs", time:3, temp:"Low heat" },
{ text:"Add cheese", time:1, temp:"Low heat" }
]
}
];

/* ================= HUB ================= */

function showHub(){
hub.style.display="block";
hub.innerHTML = `
<h1>🤖 Copilot Hub V8</h1>

<div class="card">Smart Cooking Engine Ready</div>

<div class="btn" onclick="showPantry()">🧺 Pantry</div>
<div class="btn" onclick="showSmart()">🧠 Smart Cook</div>
<div class="btn" onclick="showRecipes()">🍳 Recipes</div>
`;
}

/* ================= PANTRY ================= */

function showPantry(){

let saved = JSON.parse(localStorage.getItem("pantry") || "[]");

let html = `<h2>🧺 Pantry</h2>`;

pantryItems.forEach(i=>{
let checked = saved.includes(i) ? "checked" : "";
html += `
<div class="card">
<label>
<input type="checkbox" value="${i}" ${checked}> ${i}
</label>
</div>`;
});

html += `
<div class="btn" onclick="savePantry()">💾 Save</div>
<div class="btn" onclick="showHub()">Back</div>
`;

hub.innerHTML = html;
}

function savePantry(){
let checked = document.querySelectorAll("input:checked");
let pantry = Array.from(checked).map(i=>i.value);
localStorage.setItem("pantry", JSON.stringify(pantry));
alert("Saved!");
showHub();
}

/* ================= MATCH SCORE ================= */

function score(recipe, pantry){
let match = recipe.ingredients.filter(i=>pantry.includes(i));
let missing = recipe.ingredients.filter(i=>!pantry.includes(i));
return {...recipe, score: match.length / recipe.ingredients.length, missing};
}

/* ================= SMART COOK ================= */

function showSmart(){

let pantry = JSON.parse(localStorage.getItem("pantry") || "[]");

let ranked = recipes
.map(r=>score(r, pantry))
.sort((a,b)=>b.score-a.score)
.slice(0,3);

let html = `<h2>🧠 Top Matches</h2>`;

ranked.forEach(r=>{
html += `
<div class="card">
<h3>${r.name}</h3>
<p>Match: ${(r.score*100).toFixed(0)}%</p>
<p><small>Missing: ${r.missing.join(", ") || "None"}</small></p>

<div class="btn" onclick='startCook(${JSON.stringify(r)})'>
🍳 Cook
</div>
</div>
`;
});

html += `<div class="btn" onclick="showHub()">Back</div>`;
hub.innerHTML = html;
}

/* ================= COOK MODE ================= */

function startCook(recipe){
currentRecipe = recipe;
stepIndex = 0;
renderStep();
}

function renderStep(){

clearInterval(timer);

let step = currentRecipe.steps[stepIndex];

hub.innerHTML = `
<h2>🍳 Cooking: ${currentRecipe.name}</h2>

<div class="card">
<h3>Step ${stepIndex+1}/${currentRecipe.steps.length}</h3>
<p>${step.text}</p>
<p><small>⏱ ${step.time} min | 🔥 ${step.temp}</small></p>
</div>

<div class="card">
<div id="timer">Timer: ${step.time}:00</div>
</div>

<div class="btn" onclick="nextStep()">Next Step ➜</div>
<div class="btn" onclick="showSmart()">Exit</div>
`;

startTimer(step.time);
}

function startTimer(min){
let sec = min * 60;
let t = document.getElementById("timer");

timer = setInterval(()=>{
sec--;
let m = Math.floor(sec/60);
let s = sec%60;

t.innerText = `Timer: ${m}:${s<10?"0"+s:s}`;

if(sec<=0){
clearInterval(timer);
t.innerText = "Done ⏰";
}
},1000);
}

function nextStep(){
if(stepIndex < currentRecipe.steps.length-1){
stepIndex++;
renderStep();
}else{
hub.innerHTML = `
<div class="card">
<h2>🎉 Finished!</h2>
<p>${currentRecipe.name} complete</p>
</div>

<div class="btn" onclick="showHub()">Home</div>
`;
}
}

</script>

</body>
</html>
