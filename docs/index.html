<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v14</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
cursor:pointer;
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}

.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}
#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-weight:900;
}

.titleRow{
display:flex;
align-items:center;
gap:16px;
}

.the{font-size:36px;}
.rusty{font-size:64px;}
.chef{font-size:54px;}

.flame span{
font-size:22px;
animation:rise 1.2s infinite;
opacity:0;
}

@keyframes rise{
0%{opacity:0;transform:translateY(0);}
30%{opacity:1;}
100%{opacity:0;transform:translateY(-120px);}
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

<!-- ✅ RESTORED COPILOT IMAGE -->
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div id="introLogo">
<div class="titleRow">
<div>🔥 THE RUSTY CHEF 🔥</div>
</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* =========================
   INGREDIENTS (RECIPE BASED)
========================= */
const ingredientItems = [
"Rice","Eggs","Chicken breast","Ground beef","Tortilla","Cheese","Onions","Garlic","Tomatoes",
"Butter","Milk","Flour","Salt","Pepper","Olive oil","Soy sauce","Lime","Pasta","Bread",
"Potatoes","Carrots","Broccoli","Cream","Basil","Chicken broth","Beans","Curry powder","Coconut milk","Sugar"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
   RECIPES (SENSORY FORMAT)
========================= */
const recipes = [
{
name:"Skillet Beef Tacos",
serves:4,
ingredients:{
main:["Ground beef","Tortilla","Cheese","Onions"],
optional:["Lettuce","Tomato","Sour cream"]
},
steps:[
{title:"Heat the pan",sensory:"Warm air rises as skillet heats.",instruction:"Medium heat for 1 minute."},
{title:"Cook beef",sensory:"Strong sizzling as meat browns.",instruction:"Break apart until crumbly."},
{title:"Season",sensory:"Spices release deep aroma.",instruction:"Mix seasoning evenly."},
{title:"Add water",sensory:"Quick hiss, sauce thickens.",instruction:"Add 3 tbsp water."},
{title:"Assemble",sensory:"Tortillas feel soft and warm.",instruction:"Fill and serve."}
]
},

{
name:"Chicken Fried Rice",
serves:3,
ingredients:{
main:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
optional:["Peas"]
},
steps:[
{title:"Cook rice",sensory:"Steam rises from fluffy rice.",instruction:"Cook until slightly dry."},
{title:"Cook chicken",sensory:"Sharp sizzling sound.",instruction:"Cook until firm."},
{title:"Scramble eggs",sensory:"Soft curds form quickly.",instruction:"Cook gently."},
{title:"Combine",sensory:"Savory aroma fills pan.",instruction:"Mix everything with soy sauce."}
]
}
];

/* =========================
   MATCHING
========================= */
function score(r){
let all=[...r.ingredients.main,...(r.ingredients.optional||[])];
let match=all.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match Score: ${r.match}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

/* =========================
   PANTRY (FIXED BUTTON RESTORED)
========================= */
function openPantry(){

let html=`<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
html+=`
<div class="card" onclick="toggle('${i}')">
${selected.includes(i)?"✅ ":""}${i}
</div>`;
});

/* ✅ RESTORED BUTTON */
html+=`<div class="btn" onclick="showMatches()">🍳 Find Possible Recipes</div>`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* =========================
   RECIPE VIEW (SENSORY)
========================= */
function openRecipe(name){
let r=recipes.find(x=>x.name===name);

let ingMain=r.ingredients.main.map(i=>`• ${i}`).join("<br>");
let ingOpt=(r.ingredients.optional||[]).length
? "<br><br><b>Optional:</b><br>" + r.ingredients.optional.map(i=>`• ${i}`).join("<br>")
: "";

let steps=r.steps.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.title}</b><br><br>
👃 ${s.sensory}<br><br>
🍳 ${s.instruction}
</div>
`).join("");

document.getElementById("recipe").innerHTML=`
<div class="header">${r.name} (Serves ${r.serves})</div>

<div class="card">
<b>Ingredients</b><br><br>
${ingMain}
${ingOpt}
</div>

${steps}

<div class="btn" onclick="show('results')">⬅ Back</div>
`;

show("recipe");
}

</script>

</body>
</html>
