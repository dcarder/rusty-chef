<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
padding:12px;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div class="header">🔥 THE RUSTY CHEF 🔥</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* ================= PANTRY ================= */
const ingredientItems = [
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Onions","Garlic","Tomatoes","Butter",
"Milk","Flour","Salt","Pepper","Olive oil","Soy sauce","Lime","Bread","Potatoes","Carrots",
"Broccoli","Cheddar","Parmesan","Tortilla","Cream","Basil"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* ================= 25 RECIPES ================= */
const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
steps:[
{t:"Cook rice.",a:"1 cup"},
{t:"Cook chicken.",a:"1 breast"},
{t:"Scramble eggs.",a:"2 eggs"},
{t:"Mix hot.",a:"final"}
]
},
{
name:"Spaghetti Bolognese",
ingredients:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],
steps:[
{t:"Boil pasta.",a:"1 box"},
{t:"Cook beef.",a:"1 lb"},
{t:"Add sauce.",a:"tomatoes"},
{t:"Simmer.",a:"final"}
]
},
{
name:"Chicken Tacos",
ingredients:["Chicken breast","Tortilla","Cheese","Onions","Lime"],
steps:[
{t:"Cook chicken.",a:"1 lb"},
{t:"Warm tortillas.",a:"8"},
{t:"Assemble.",a:"final"}
]
},
{
name:"Grilled Cheese",
ingredients:["Bread","Cheese","Butter"],
steps:[
{t:"Butter bread.",a:"2 slices"},
{t:"Cook until melted.",a:"final"}
]
},
{
name:"Beef Stir Fry",
ingredients:["Ground beef","Broccoli","Carrots","Soy sauce","Rice"],
steps:[
{t:"Cook beef.",a:"1 lb"},
{t:"Add vegetables.",a:"final"}
]
},
{
name:"Creamy Tomato Soup",
ingredients:["Tomatoes","Cream","Onions","Garlic"],
steps:[
{t:"Cook onions.",a:"1 onion"},
{t:"Simmer tomatoes.",a:"4"},
{t:"Blend.",a:"final"}
]
},
{
name:"Chicken Alfredo",
ingredients:["Chicken breast","Pasta","Cream","Parmesan"],
steps:[
{t:"Cook pasta.",a:"8 oz"},
{t:"Cook chicken.",a:"1 breast"},
{t:"Mix sauce.",a:"final"}
]
},
{
name:"BBQ Chicken Sandwich",
ingredients:["Chicken breast","BBQ sauce","Bread"],
steps:[
{t:"Cook chicken.",a:"2 breasts"},
{t:"Shred + sauce.",a:"final"}
]
},
{
name:"Veggie Omelette",
ingredients:["Eggs","Bell peppers","Onions","Cheese"],
steps:[
{t:"Cook veg.",a:"1 cup"},
{t:"Add eggs.",a:"final"}
]
},
{
name:"Lemon Salmon",
ingredients:["Salmon","Lemon","Garlic"],
steps:[
{t:"Cook salmon.",a:"1 fillet"},
{t:"Finish lemon.",a:"final"}
]
},
{
name:"Chicken Noodle Soup",
ingredients:["Chicken broth","Chicken breast","Carrots","Noodles"],
steps:[
{t:"Simmer broth.",a:"4 cups"},
{t:"Add chicken.",a:"final"}
]
},
{
name:"Teriyaki Bowl",
ingredients:["Chicken breast","Rice","Teriyaki sauce"],
steps:[
{t:"Cook chicken.",a:"1 breast"},
{t:"Add sauce.",a:"final"}
]
},
{
name:"Pancakes",
ingredients:["Flour","Milk","Eggs","Butter"],
steps:[
{t:"Mix batter.",a:"1 cup"},
{t:"Cook.",a:"final"}
]
},
{
name:"Fried Rice",
ingredients:["Rice","Eggs","Soy sauce","Onions"],
steps:[
{t:"Cook rice.",a:"2 cups"},
{t:"Stir fry.",a:"final"}
]
},
{
name:"Beef Tacos",
ingredients:["Ground beef","Tortilla","Cheese"],
steps:[
{t:"Cook beef.",a:"1 lb"},
{t:"Assemble.",a:"final"}
]
},
{
name:"Shrimp Pasta",
ingredients:["Shrimp","Pasta","Garlic","Butter"],
steps:[
{t:"Cook pasta.",a:"8 oz"},
{t:"Cook shrimp.",a:"final"}
]
},
{
name:"Chili",
ingredients:["Ground beef","Tomatoes","Beans"],
steps:[
{t:"Cook beef.",a:"1 lb"},
{t:"Simmer.",a:"final"}
]
},
{
name:"Buttered Noodles",
ingredients:["Pasta","Butter"],
steps:[
{t:"Boil pasta.",a:"8 oz"},
{t:"Add butter.",a:"final"}
]
},
{
name:"Avocado Toast",
ingredients:["Bread","Avocado"],
steps:[
{t:"Toast bread.",a:"1 slice"},
{t:"Add avocado.",a:"final"}
]
},
{
name:"Chicken Stir Fry",
ingredients:["Chicken breast","Broccoli","Soy sauce"],
steps:[
{t:"Cook chicken.",a:"1 lb"},
{t:"Stir fry.",a:"final"}
]
},
{
name:"Meatball Subs",
ingredients:["Meatballs","Bread","Cheese"],
steps:[
{t:"Heat meatballs.",a:"1 jar"},
{t:"Assemble.",a:"final"}
]
},
{
name:"Omelette",
ingredients:["Eggs","Cheese"],
steps:[
{t:"Cook eggs.",a:"2 eggs"},
{t:"Fold cheese.",a:"final"}
]
},
{
name:"Veggie Stir Fry",
ingredients:["Broccoli","Carrots","Soy sauce"],
steps:[
{t:"Cook veg.",a:"2 cups"},
{t:"Add sauce.",a:"final"}
]
},
{
name:"Breakfast Bowl",
ingredients:["Eggs","Potatoes","Cheese"],
steps:[
{t:"Cook potatoes.",a:"1 cup"},
{t:"Add eggs.",a:"final"}
]
},
{
name:"Quesadilla",
ingredients:["Tortilla","Cheese"],
steps:[
{t:"Fill tortilla.",a:"cheese"},
{t:"Cook.",a:"final"}
]
}
];

/* ================= MATCH ================= */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Recipes</div>`;
top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe(\`${r.name}\`)">
<b>${r.name}</b><br>Match: ${r.match}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

/* ================= PANTRY ================= */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
html+=`
<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});

html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* ================= RECIPE ================= */
let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);
render();
show("recipe");
}

function render(){

let missing=current.ingredients.filter(i=>!selected.includes(i));

let stepsHTML=current.steps.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.t}</b><br><br>
🍴 ${s.a}
</div>
`).join("");

let shopHTML=`<div class="header">🛒 Missing Ingredients</div>`;

if(!missing.length){
shopHTML+=`<div class="card">🎉 You have everything!</div>`;
} else {
missing.forEach(item=>{
if(!item) return;
let q=encodeURIComponent(item.trim());

shopHTML+=`
<div class="card">
<b>${item}</b><br>

<a class="shopBtn instacartBtn"
target="_blank"
href="https://www.instacart.com/store/search?search=${q}">
Instacart
</a>

<a class="shopBtn walmartBtn"
target="_blank"
href="https://www.walmart.com/search?q=${q}">
Walmart
</a>
</div>`;
});
}

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

${stepsHTML}
${shopHTML}

<div class="btn" onclick="showMatches()">⬅ Back</div>
<div class="btn" onclick="show('home')">Home</div>
`;
}

show("home");

</script>

</body>
</html>
