<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
padding:12px;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
background:#0071ce;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}

#homeBg img{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* =========================
   PANTRY (100+ INGREDIENTS)
========================= */
const ingredientItems=[
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Tortilla","Bread","Parmesan",
"Cheddar","Mozzarella","Avocado","Strawberries","Bananas","Chicken broth","Beef broth","BBQ sauce","Teriyaki sauce",
"Peanut butter","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar","Oats","Honey","Corn",
"Chocolate","Coffee","Tea","Cornstarch","Lettuce","Cucumber","Zucchini","Eggplant","Chili powder","Fish sauce"
];

let selected=JSON.parse(localStorage.getItem("ing")||"[]");

/* =========================
   25 REAL RECIPES
========================= */
const recipes=[
{
name:"Beef Tacos",
ingredients:["Ground beef","Tortilla","Cheese","Onions","Tomatoes"],
steps:[
{t:"Heat pan until warm and slightly smoking.","a":"pan heat"},
{t:"Add ground beef and listen for a strong sizzle.","a":"beef"},
{t:"Break meat until crumbly and no pink remains.","a":"cook 5-7 min"},
{t:"Add seasoning and stir until coated.","a":"taco seasoning"},
{t:"Warm tortillas until soft and flexible.","a":"tortillas"},
{t:"Assemble with toppings and serve hot.","a":"final"}
]
},
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Carrots","Onions"],
steps:[
{t:"Cook rice and let it cool slightly.","a":"rice"},
{t:"Cook chicken until firm and fully done.","a":"chicken"},
{t:"Scramble eggs until soft curds form.","a":"eggs"},
{t:"Stir fry vegetables until slightly tender.","a":"veg"},
{t:"Add rice and soy sauce and mix well.","a":"final"}
]
},
{
name:"Spaghetti Bolognese",
ingredients:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],
steps:[
{t:"Boil pasta until firm but tender.","a":"pasta"},
{t:"Cook beef until browned completely.","a":"beef"},
{t:"Add onions and garlic until fragrant.","a":"aroma"},
{t:"Simmer tomatoes until thick sauce forms.","a":"sauce"},
{t:"Combine with pasta and serve.","a":"final"}
]
},
{
name:"Grilled Cheese",
ingredients:["Bread","Cheese","Butter"],
steps:[
{t:"Butter both slices of bread evenly.","a":"bread"},
{t:"Place cheese between slices.","a":"assemble"},
{t:"Cook in pan until golden brown.","a":"heat"},
{t:"Flip and repeat until melted.","a":"final"}
]
},
{
name:"Chicken Curry",
ingredients:["Chicken breast","Curry powder","Coconut milk","Rice"],
steps:[
{t:"Cook chicken until lightly browned.","a":"chicken"},
{t:"Add curry powder and stir until fragrant.","a":"spices"},
{t:"Pour coconut milk and simmer.","a":"simmer"},
{t:"Serve over rice.","a":"final"}
]
}
];

/* ========================= */

function score(r){
let m=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match:m};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Recipes</div>`;
top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match Score: ${r.match}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

function openPantry(){
let html=`
<div class="header">🧺 Pantry</div>
<input id="search" placeholder="Search ingredients..."
style="width:100%;padding:10px;border-radius:10px;border:none;margin-bottom:10px"
oninput="filterPantry()"/>
<div class="btn" onclick="clearPantry()">Clear Pantry</div>
<div id="list">`;

ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});

html+=`</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function filterPantry(){
let q=document.getElementById("search").value.toLowerCase();
let list=document.getElementById("list");
list.innerHTML=ingredientItems
.filter(i=>i.toLowerCase().includes(q))
.map(i=>`
<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>
`).join("");
}

function clearPantry(){
selected=[];
localStorage.setItem("ing",JSON.stringify(selected));
openPantry();
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ing",JSON.stringify(selected));
openPantry();
}

let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);

let missing=current.ingredients.filter(i=>!selected.includes(i));

let html=`<div class="header">${current.name}</div>`;

current.steps.forEach((s,i)=>{
html+=`<div class="card"><b>${i+1}. ${s.t}</b><br>${s.a}</div>`;
});

html+=`<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{
let q=encodeURIComponent(item);
html+=`
<div class="card">
<b>${item}</b><br>
<a class="shopBtn" target="_blank"
href="https://www.walmart.com/search?q=${q}">Walmart</a>
</div>`;
});

html+=`<div class="btn" onclick="show('home')">Home</div>`;

document.getElementById("recipe").innerHTML=html;
show("recipe");
}

show("home");

</script>

</body>
</html>
