<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
padding-bottom:120px;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

/* ================= HOME ================= */

#homeBg{
position:fixed;
inset:0;
z-index:-2;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.4);
}

#introLogo{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleRow{
display:flex;
align-items:center;
gap:18px;
justify-content:center;
}

.titleText{
display:flex;
flex-direction:column;
font-weight:900;
line-height:.85;
text-shadow:0 0 20px rgba(255,80,0,0.6);
}

.the{font-size:32px;}
.rusty{font-size:64px; color:#ffb347;}
.chef{font-size:54px; color:#ff6a00;}

.flame span{
position:absolute;
bottom:0;
font-size:22px;
animation:rise 1.2s infinite;
opacity:0;
}

@keyframes rise{
0%{opacity:0;transform:translateY(0);}
30%{opacity:1;}
100%{opacity:0;transform:translateY(-120px);}
}

/* ================= UI ================= */

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin:10px;
cursor:pointer;
}

.bottomDock{
position:fixed;
bottom:10px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:12px;
}
.bottomDock .btn{width:150px;}

.filterBar{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin:10px;
}

.filter{
padding:8px 12px;
border-radius:20px;
border:1px solid white;
cursor:pointer;
font-size:12px;
}
.filter.active{
background:white;
color:black;
}
</style>
</head>

<body>

<div id="app">

<!-- ================= HOME ================= -->
<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div id="introLogo">
<div class="titleRow">
<div style="position:relative;width:50px;height:120px;">
<span>🔥</span><span>🔥</span><span>🔥</span>
</div>

<div class="titleText">
<div class="the">THE</div>
<div class="rusty">RUSTY</div>
<div class="chef">CHEF</div>
</div>

<div style="position:relative;width:50px;height:120px;">
<span>🔥</span><span>🔥</span><span>🔥</span>
</div>

</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>

</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* ================= 100 INGREDIENTS ================= */

const ingredientItems=[
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic","Onions",
"Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon","Tuna",
"Steak","Pork chops","Turkey","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Corn","Baking powder"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* ================= 25 RECIPES ================= */

const recipes=[

{name:"Pancakes",category:"Breakfast",
ingredients:["Flour","Milk","Eggs","Sugar"],
simpleSteps:[{t:"Mix.",a:"mix"},{t:"Cook.",a:"pan"}],
chefSteps:[{t:"Smooth batter.",a:"mix"},{t:"Flip when bubbling.",a:"pan"}]},

{name:"Breakfast Burrito",category:"Breakfast",
ingredients:["Eggs","Tortilla","Cheese"],
simpleSteps:[{t:"Cook eggs.",a:"3 eggs"},{t:"Wrap.",a:"final"}],
chefSteps:[{t:"Soft fluffy eggs.",a:"3 eggs"},{t:"Wrap warm tortilla.",a:"final"}]},

{name:"Avocado Toast",category:"Breakfast",
ingredients:["Bread","Avocado"],
simpleSteps:[{t:"Toast.",a:"2 slices"},{t:"Add avocado.",a:"final"}],
chefSteps:[{t:"Crisp bread.",a:"2 slices"},{t:"Creamy avocado.",a:"final"}]},

{name:"Spaghetti Bolognese",category:"Dinner",
ingredients:["Pasta","Ground beef","Tomatoes"],
simpleSteps:[{t:"Boil.",a:"box"},{t:"Cook sauce.",a:"final"}],
chefSteps:[{t:"Al dente pasta.",a:"box"},{t:"Rich sauce.",a:"final"}]},

{name:"Chicken Curry",category:"Dinner",
ingredients:["Chicken breast","Curry powder","Coconut milk"],
simpleSteps:[{t:"Cook chicken.",a:"1 lb"},{t:"Simmer.",a:"final"}],
chefSteps:[{t:"Golden chicken.",a:"1 lb"},{t:"Fragrant curry.",a:"final"}]},

{name:"Lasagna",category:"Dinner",
ingredients:["Pasta","Cheese","Ground beef"],
simpleSteps:[{t:"Layer.",a:"all"},{t:"Bake.",a:"oven"}],
chefSteps:[{t:"Stacked layers.",a:"all"},{t:"Golden top.",a:"oven"}]},

{name:"Chicken Alfredo",category:"Dinner",
ingredients:["Pasta","Chicken breast","Milk","Cheese"],
simpleSteps:[{t:"Cook chicken.",a:"1 lb"},{t:"Make sauce.",a:"milk"}],
chefSteps:[{t:"Juicy chicken.",a:"1 lb"},{t:"Creamy sauce.",a:"milk"}]},

{name:"Steak & Potatoes",category:"Dinner",
ingredients:["Steak","Potatoes"],
simpleSteps:[{t:"Cook steak.",a:"1 lb"},{t:"Cook potatoes.",a:"final"}],
chefSteps:[{t:"Seared steak.",a:"1 lb"},{t:"Soft potatoes.",a:"final"}]},

{name:"Chicken Fried Rice",category:"Dinner",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce"],
simpleSteps:[{t:"Cook rice.",a:"1 cup"},{t:"Mix.",a:"final"}],
chefSteps:[{t:"Dry rice.",a:"1 cup"},{t:"Hot stir fry.",a:"final"}]},

{name:"Beef Stir Fry",category:"Dinner",
ingredients:["Beef","Broccoli","Soy sauce"],
simpleSteps:[{t:"Cook beef.",a:"1 lb"},{t:"Mix.",a:"final"}],
chefSteps:[{t:"Brown beef.",a:"1 lb"},{t:"Crisp veggies.",a:"final"}]},

{name:"Grilled Cheese",category:"Lunch",
ingredients:["Bread","Cheese","Butter"],
simpleSteps:[{t:"Butter.",a:"2 slices"},{t:"Grill.",a:"pan"}],
chefSteps:[{t:"Golden toast.",a:"2 slices"},{t:"Melted cheese.",a:"pan"}]},

{name:"Quesadilla",category:"Lunch",
ingredients:["Tortilla","Cheese"],
simpleSteps:[{t:"Fill.",a:"cheese"},{t:"Cook.",a:"pan"}],
chefSteps:[{t:"Melted center.",a:"cheese"},{t:"Crisp shell.",a:"pan"}]},

{name:"Burger",category:"Lunch",
ingredients:["Ground beef","Bread","Cheese"],
simpleSteps:[{t:"Cook patty.",a:"1 lb"},{t:"Assemble.",a:"final"}],
chefSteps:[{t:"Juicy patty.",a:"1 lb"},{t:"Melt cheese.",a:"final"}]},

{name:"Chili",category:"Comfort",
ingredients:["Ground beef","Tomatoes","Onions"],
simpleSteps:[{t:"Cook.",a:"1 lb"},{t:"Simmer.",a:"final"}],
chefSteps:[{t:"Deep flavor.",a:"1 lb"},{t:"Thick stew.",a:"final"}]},

{name:"Tomato Soup",category:"Comfort",
ingredients:["Tomatoes","Onions"],
simpleSteps:[{t:"Cook.",a:"pot"},{t:"Blend.",a:"final"}],
chefSteps:[{t:"Sweet aroma.",a:"pot"},{t:"Smooth soup.",a:"final"}]},

{name:"Ramen Bowl",category:"Comfort",
ingredients:["Ramen noodles","Eggs"],
simpleSteps:[{t:"Cook noodles.",a:"pack"},{t:"Add egg.",a:"final"}],
chefSteps:[{t:"Springy noodles.",a:"pack"},{t:"Soft yolk.",a:"final"}]},

{name:"Shepherd's Pie",category:"Comfort",
ingredients:["Ground beef","Potatoes"],
simpleSteps:[{t:"Layer.",a:"all"},{t:"Bake.",a:"oven"}],
chefSteps:[{t:"Golden top.",a:"all"},{t:"Hot center.",a:"oven"}]},

{name:"Garlic Shrimp Pasta",category:"Seafood",
ingredients:["Shrimp","Pasta","Garlic"],
simpleSteps:[{t:"Cook shrimp.",a:"1/2 lb"},{t:"Mix.",a:"final"}],
chefSteps:[{t:"Pink shrimp.",a:"1/2 lb"},{t:"Garlic aroma.",a:"final"}]},

{name:"Salmon Rice Bowl",category:"Seafood",
ingredients:["Rice","Salmon"],
simpleSteps:[{t:"Cook salmon.",a:"1 fillet"},{t:"Serve.",a:"final"}],
chefSteps:[{t:"Flaky salmon.",a:"1 fillet"},{t:"Soft rice.",a:"final"}]}

];

/* ================= SYSTEM ================= */

function getAllRecipes(){return recipes;}

function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=getAllRecipes().map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match: ${r.match}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});
html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

let current=null;
let mode="simple";

function openRecipe(name){
current=recipes.find(r=>r.name===name);
mode="simple";
render();
show("recipe");
}

function switchMode(){
mode=mode==="simple"?"chef":"simple";
render();
}

function render(){
let steps=current[mode==="simple"?"simpleSteps":"chefSteps"];

let html=steps.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.t}</b><br><br>
🍴 ${s.a}
</div>
`).join("");

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>
<div class="btn" onclick="switchMode()">Switch Mode</div>
${html}
<div class="btn" onclick="show('home')">Home</div>
`;
}

show("home");

</script>

</body>
</html>
