<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.back{
margin-top:10px;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

/* =========================
   FIXED HOME BACKGROUND
========================= */

#homeBg{
position:fixed;
inset:0;
z-index:-1;
background:black;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
opacity:1; /* FIX: force visible immediately */
}
</style>
</head>

<body>

<div id="app">

<!-- HOME (3 BUTTON PAGE) -->
<div id="home" class="page active">

  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg" />
  </div>

  <div class="header">🤖 Rusty the Robot Chef</div>

  <div class="card">40 Real Recipes + 100 Ingredients + Chef Instructions</div>

  <div class="dock">
    <div class="dockBtn" onclick="openRecipes()">🍳<span>Recipes</span></div>
    <div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
    <div class="dockBtn" onclick="goHome()">🏠<span>Home</span></div>
  </div>
</div>

<!-- OTHER PAGES -->
<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
   100 INGREDIENTS (UNCHANGED)
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

/* =========================
   RECIPES + STEPS (UNCHANGED LOGIC)
========================= */

const recipesDB = [
{name:"Grilled Chicken Breast",ingredients:["Chicken breast","Olive oil","Salt","Pepper","Garlic"],time:25},
{name:"Chicken Alfredo",ingredients:["Chicken breast","Pasta","Butter","Cream","Parmesan"],time:30},
{name:"Chicken Stir Fry",ingredients:["Chicken breast","Soy sauce","Bell peppers","Onions"],time:25},
{name:"Chicken Parmesan",ingredients:["Chicken breast","Tomatoes","Mozzarella","Parmesan"],time:40},
{name:"Chicken Tacos",ingredients:["Chicken breast","Tortilla","Cheese","Lettuce"],time:20},
{name:"Beef Tacos",ingredients:["Ground beef","Tortilla","Cheese","Onions"],time:20},
{name:"Spaghetti Bolognese",ingredients:["Ground beef","Pasta","Tomatoes","Onions"],time:40},
{name:"Cheeseburger",ingredients:["Ground beef","Bread","Cheese","Lettuce"],time:20},
{name:"Beef Stir Fry",ingredients:["Beef","Soy sauce","Bell peppers","Onions"],time:25},
{name:"Beef Stew",ingredients:["Beef","Potatoes","Carrots","Beef broth"],time:120}
];

/* =========================
   ULTRA DETAILED STEPS (UNCHANGED FROM LAST VERSION)
========================= */

function getSteps(r){
let fish=/Salmon|Shrimp|Fish/.test(r.name);
let chicken=/Chicken/.test(r.name);
let beef=/Beef|Steak/.test(r.name);
let pasta=/Pasta|Alfredo|Carbonara|Lasagna/.test(r.name);
let dessert=/Cookie|Brownie/.test(r.name);

if(fish){
return[
"Pat fish dry completely for proper searing.",
"Season with salt, pepper, lemon.",
"Heat pan to 375–400°F.",
"Sear 3–5 minutes without moving.",
"Flip and cook 2–4 minutes.",
"Baste with butter if desired.",
"Cook to 145°F internal temp.",
"Rest before serving."
];
}

if(chicken){
return[
"Dry chicken thoroughly.",
"Season evenly.",
"Heat pan to 350°F.",
"Sear 5–7 minutes per side.",
"Cook to 165°F internal temp.",
"Rest 5 minutes."
];
}

if(beef){
return[
"Bring to room temp.",
"Season heavily.",
"Heat pan 400–450°F.",
"Sear 3–5 minutes per side.",
"Rest 5–10 minutes.",
"Slice against grain."
];
}

if(pasta){
return[
"Boil salted water.",
"Cook 8–12 minutes.",
"Reserve pasta water.",
"Mix with sauce.",
"Emulsify.",
"Serve hot."
];
}

return[
"Prep ingredients.",
"Cook base.",
"Season.",
"Simmer.",
"Serve."
];
}

/* =========================
   UI FUNCTIONS
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){
let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
<span>${i}</span><span>${on?'✔':''}</span></div>`;
});

html+=`<div class="btn" onclick="openRecipes()">🍳 What Can I Cook?</div>`;
document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){
let list=recipesDB.map(r=>{
let m=r.ingredients.filter(x=>selected.includes(x)).length;
return {...r,score:m/r.ingredients.length};
});
list.sort((a,b)=>b.score-a.score);
window.generated=list;

let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🍳 What Can I Cook?</div>`;

list.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
${(r.score*100).toFixed(0)}% match<br>
${r.time} min
</div>`;
});

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

function openRecipe(name){
let r=window.generated.find(x=>x.name===name);
let steps=getSteps(r);

let html=`<div class="topBar"><div class="homeBtn" onclick="openRecipes()">⬅ Back</div></div>
<div class="header">${r.name}</div>

<div class="card"><b>Ingredients:</b><br>${r.ingredients.join("<br>")}</div>`;

steps.forEach((s,i)=>{
html+=`<div class="card"><b>Step ${i+1}</b><br><br>${s}</div>`;
});

document.getElementById("detail").innerHTML=html;
show("detail");
}

function goHome(){
show("home");
}

openIngredients();

</script>

</body>
</html>
