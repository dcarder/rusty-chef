<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* FULL SCREEN STAGE SYSTEM */
.stage{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
}

.stage img{
width:100%;
height:100%;
object-fit:cover;
}

/* COPILOT HUB */
#hub{
position:fixed;
inset:0;
display:none;
background:black;
color:white;
padding:20px;
overflow:auto;
z-index:2000;
}

.card{
padding:15px;
margin:10px 0;
border:1px solid rgba(255,255,255,0.2);
border-radius:12px;
}

.btn{
padding:14px;
margin-top:10px;
border:1px solid white;
text-align:center;
border-radius:10px;
cursor:pointer;
}

/* recipe steps */
ol{padding-left:18px;}
small{opacity:0.7;}
</style>
</head>

<body>

<!-- 1. LOGO -->
<div id="logo" class="stage" style="display:flex;">
<img src="rusty_logo.jpeg">
</div>

<!-- 2. RUSTY -->
<div id="rusty" class="stage">
<img src="rusty_intro.jpeg">
</div>

<!-- 3. COPILOT -->
<div id="hub"></div>

<script>

/* ================= SAFE FLOW CONTROL ================= */

function show(id){
document.getElementById("logo").style.display="none";
document.getElementById("rusty").style.display="none";
document.getElementById("hub").style.display="none";

document.getElementById(id).style.display =
id === "hub" ? "block" : "flex";
}

/* STEP 1: LOGO */
show("logo");

/* STEP 2: RUSTY */
setTimeout(()=>{
show("rusty");
},3000);

/* STEP 3: COPILOT HUB */
setTimeout(()=>{
show("hub");
loadHub();
},6000);

/* ================= COPILOT HUB ================= */

function loadHub(){
document.getElementById("hub").innerHTML = `
<h1>🤖 Copilot Hub</h1>

<div class="card">Welcome to Chef Jeff</div>

<div class="btn" onclick="showRecipes()">🍳 Recipes</div>
<div class="btn" onclick="showPantry()">🧺 Pantry</div>
<div class="btn" onclick="showFavorites()">❤️ Favorites</div>
`;
}

/* ================= RECIPES ================= */

const recipes = [
{
name:"Garlic Chicken Rice",
ingredients:["chicken","rice","garlic","salt"],
time:25,
steps:[
{ text:"Season chicken", time:"2 min", temp:"Room temp" },
{ text:"Cook chicken", time:"10 min", temp:"165°F medium heat" },
{ text:"Add garlic", time:"2 min", temp:"Medium heat" },
{ text:"Mix rice", time:"5 min", temp:"Low heat" }
]
},
{
name:"Veg Stir Fry",
ingredients:["broccoli","carrot","pepper","soy sauce"],
time:15,
steps:[
{ text:"Chop vegetables", time:"5 min", temp:"—" },
{ text:"Heat pan", time:"2 min", temp:"High heat" },
{ text:"Stir fry", time:"6 min", temp:"High heat" }
]
}
];

/* ================= RECIPES LIST ================= */

function showRecipes(){

let html = `<h2>🍳 Recipes</h2>`;

recipes.forEach(r=>{
html += `
<div class="card" onclick='openRecipe(${JSON.stringify(r)})' style="cursor:pointer">
<h3>${r.name}</h3>
<p>⏱ ${r.time} min</p>
</div>`;
});

html += `<div class="btn" onclick="loadHub()">⬅ Back</div>`;

document.getElementById("hub").innerHTML = html;
}

/* ================= RECIPE DETAIL ================= */

function openRecipe(recipe){

let steps = recipe.steps.map(s=>`
<li>
${s.text}<br>
<small>⏱ ${s.time} | 🔥 ${s.temp}</small>
</li>
`).join("");

document.getElementById("hub").innerHTML = `
<h2>${recipe.name}</h2>

<div class="card">
<p><b>Time:</b> ${recipe.time} min</p>
<p><b>Ingredients:</b> ${recipe.ingredients.join(", ")}</p>
</div>

<div class="card">
<h3>Steps</h3>
<ol>${steps}</ol>
</div>

<div class="btn" onclick="loadHub()">⬅ Back</div>
`;
}

/* ================= PLACEHOLDERS ================= */

function showPantry(){
document.getElementById("hub").innerHTML = `
<div class="card">🧺 Pantry coming next version</div>
<div class="btn" onclick="loadHub()">Back</div>
`;
}

function showFavorites(){
document.getElementById("hub").innerHTML = `
<div class="card">❤️ Favorites coming next version</div>
<div class="btn" onclick="loadHub()">Back</div>
`;
}

</script>

</body>
</html>
