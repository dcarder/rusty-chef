<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
padding:12px;
}
.page.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.shopBtn{
display:inline-block;
margin-top:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
background:#0071ce;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}

#homeBg img{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.the{font-size:34px;}
.rusty{font-size:64px;}
.chef{font-size:52px;}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div id="introLogo">
<div class="the">THE</div>
<div class="rusty">RUSTY</div>
<div class="chef">CHEF</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* ================= INGREDIENTS ================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Bread","Tortilla","Avocado"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* ================= MODE ================= */

let current = null;
let mode = "simple";

/* ================= CLEAR PANTRY ================= */

function clearPantry(){
selected = [];
localStorage.setItem("ingredients", JSON.stringify(selected));
openPantry();
}

/* ================= RECIPES ================= */

const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce"],
simpleSteps:[
{t:"Cook rice",a:"fluffy rice"},
{t:"Cook chicken",a:"until done"},
{t:"Scramble eggs",a:"soft"},
{t:"Mix together",a:"final"}
],
chefSteps:[
{t:"Cook rice until grains are dry and separate",a:"rice"},
{t:"Cook chicken until firm and hot throughout",a:"chicken"},
{t:"Scramble eggs slowly into soft curds",a:"eggs"},
{t:"Stir fry everything until aromatic",a:"final"}
]
}
];

/* ================= PANTRY ================= */

function openPantry(){
let html = `<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
html += `
<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">
${i}
</div>`;
});

html += `
<div class="btn" onclick="showMatches()">🍳 Find Recipes</div>
<div class="btn" style="background:#ff4d4d;color:white" onclick="clearPantry()">
🗑 Clear Pantry
</div>
`;

document.getElementById("pantry").innerHTML = html;
show("pantry");
}

/* ================= TOGGLE ================= */

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients", JSON.stringify(selected));
openPantry();
}

/* ================= MATCH ================= */

function showMatches(){
let top = recipes.map(r=>{
return {...r,match:r.ingredients.filter(i=>selected.includes(i)).length};
}).sort((a,b)=>b.match-a.match);

let html = `<div class="header">🍳 Recipes</div>`;

top.forEach(r=>{
html += `<div class="card" onclick="openRecipe('${r.name}')">${r.name}<br>Match: ${r.match}</div>`;
});

document.getElementById("results").innerHTML = html;
show("results");
}

/* ================= RECIPE ================= */

function openRecipe(name){
current = recipes.find(x=>x.name===name);
renderRecipe();
show("recipe");
}

function switchMode(){
mode = mode === "simple" ? "chef" : "simple";
renderRecipe();
}

function renderRecipe(){

let steps = mode === "simple"
? current.simpleSteps
: current.chefSteps;

let html = `<div class="header">${current.name}</div>`;

steps.forEach((s,i)=>{
html += `
<div class="card">
<b>${i+1}. ${s.t}</b><br><br>
${s.a}
</div>`;
});

/* 🛒 Missing ingredients (Walmart only here) */
let missing = current.ingredients.filter(i=>!selected.includes(i));

if(missing.length){
html += `<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{
let q = encodeURIComponent(item);
html += `
<div class="card">
<b>${item}</b><br>
<a class="shopBtn" target="_blank"
href="https://www.walmart.com/search?q=${q}">
Buy on Walmart
</a>
</div>`;
});
}

html += `
<div class="btn" onclick="switchMode()">
${mode === "simple" ? "🔥 Switch to Chef Mode" : "🍳 Switch to Simple Mode"}
</div>

<div class="btn" onclick="show('home')">Home</div>
`;

document.getElementById("recipe").innerHTML = html;
}

show("home");

</script>

</body>
</html>
