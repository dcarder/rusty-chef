<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Jeff AI</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* ===== SCREENS (FADE + ZOOM) ===== */
.screen{
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition: opacity 900ms ease, transform 900ms ease;
transform: scale(1.08);
z-index:10;
}

.screen.active{
opacity:1;
pointer-events:auto;
transform: scale(1);
}

.screen img{
width:100%;
height:100%;
object-fit:cover;
transition: transform 900ms ease;
transform: scale(1.05);
}

.screen.active img{
transform: scale(1);
}

/* CAMERA SCREEN */
#copilot{
position:fixed;
inset:0;
display:block;
z-index:1;
}

/* UI */
#ui{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}

.button{
pointer-events:auto;
position:absolute;
bottom:40px;
width:140px;
height:140px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:18px;
}

#cameraBtn{right:30px;}
#factsBtn{left:30px;}

#text{
position:absolute;
bottom:220px;
width:100%;
text-align:center;
color:white;
font-size:18px;
}

/* PANEL */
#panel{
position:fixed;
inset:0;
background:black;
color:white;
padding:20px;
opacity:0;
pointer-events:none;
overflow:auto;
z-index:2000;
transition:opacity 400ms ease;
}

#panel.active{
opacity:1;
pointer-events:auto;
}

.card{
margin:15px 0;
padding:15px;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.smallBtn{
margin-top:20px;
padding:12px;
border:1px solid white;
text-align:center;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SCREENS -->
<div id="logo" class="screen active">
<img src="your_logo.jpeg">
</div>

<div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div>

<div id="copilot" class="screen">
<img src="copilot_image_1777179019874.jpeg">
</div>

<!-- UI -->
<div id="ui">
<div id="cameraBtn" class="button">📷 Camera</div>
<div id="factsBtn" class="button">📘 Facts</div>
<div id="text">Tap camera to scan food</div>
</div>

<!-- FACTS PANEL -->
<div id="panel"></div>

<script>
const logo = document.getElementById("logo");
const intro = document.getElementById("intro");
const copilot = document.getElementById("copilot");
const panel = document.getElementById("panel");

/* ===== SCREEN SWITCH ===== */
function show(screen){
logo.classList.remove("active");
intro.classList.remove("active");
copilot.classList.remove("active");
panel.classList.remove("active");

setTimeout(()=>{
screen.classList.add("active");
},50);
}

/* ===== FACTS BUTTON ===== */
document.getElementById("factsBtn").onclick = () => {
panel.innerHTML = `
<h1>🍳 Food Facts (Seasonings + WHY they work)</h1>

<div class="card">
<h3>🐔 Chicken</h3>
<p><b>Garlic</b> – enhances mild meat by boosting savory depth.</p>
<p><b>Lemon</b> – cuts fat and brightens flavor.</p>
<p><b>Paprika</b> – adds sweetness + color perception.</p>
<p><b>Oregano</b> – prevents bland taste.</p>
<p><b>Black pepper</b> – increases umami perception.</p>
</div>

<div class="card">
<h3>🐖 Pork</h3>
<p><b>Brown sugar</b> – caramelizes for BBQ sweetness.</p>
<p><b>Mustard</b> – cuts richness with acidity.</p>
<p><b>Rosemary</b> – matches strong pork flavor.</p>
<p><b>Garlic</b> – deep savory fat flavor.</p>
<p><b>Smoked paprika</b> – adds smoky BBQ effect.</p>
</div>

<div class="card">
<h3>🐄 Beef</h3>
<p><b>Salt</b> – improves crust + flavor extraction.</p>
<p><b>Black pepper</b> – boosts natural beef umami.</p>
<p><b>Onion powder</b> – adds base depth.</p>
<p><b>Cumin</b> – earthy fat balance.</p>
<p><b>Smoked paprika</b> – grill flavor effect.</p>
</div>

<div class="smallBtn" onclick="show(copilot)">Back</div>
`;

panel.classList.add("active");
};

/* ===== CAMERA BUTTON ===== */
document.getElementById("cameraBtn").onclick = () => {
show(copilot);
};

/* ===== INTRO SEQUENCE (UPDATED TIMING) ===== */
show(logo);

// 5 seconds logo
setTimeout(() => {
show(intro);
}, 5000);

// 7 seconds intro (total 12s)
setTimeout(() => {
show(copilot);
}, 12000);

</script>

</body>
</html>
