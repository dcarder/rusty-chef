function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top 3 Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match Score: ${r.match}
</div>`;
});
html+=`<div class="btn" onclick="show('home')">Home</div>`;
document.getElementById("results").innerHTML=html;
show("results");
}

function openPantry(){
let html=`<div class="header">🧺 Pantry</div>

<div class="card">
<input id="searchBox"
placeholder="Search ingredients..."
style="width:100%;padding:12px;border-radius:10px;border:none;outline:none;"
oninput="filterIngredients()"/>
</div>

<div id="ingredientList">`;

ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});

html+=`</div>

<div class="btn" onclick="showMatches()">Find Recipes</div>
<div class="btn" onclick="clearPantry()">Clear Pantry</div>
<div class="btn" onclick="show('home')">Home</div>`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function filterIngredients(){
let q=document.getElementById("searchBox").value.toLowerCase();
let list=document.getElementById("ingredientList");

let filtered=ingredientItems.filter(i=>i.toLowerCase().includes(q));

list.innerHTML=filtered.map(i=>`
<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>
`).join("");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

function clearPantry(){
selected=[];
localStorage.removeItem("ingredients");
openPantry();
}

let current=null;
let mode="simple";

function openRecipe(name){
current=recipes.find(r=>r.name===name);
mode="simple";
render();
show("recipe");
}

function switchMode(){
mode = mode==="simple"?"chef":"simple";
render();
}

function render(){
let missing=current.ingredients.filter(i=>!selected.includes(i));

let stepsArray = mode==="simple"?current.simpleSteps:current.chefSteps;

let stepsHTML=stepsArray.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.t}</b><br><br>
🍴 ${s.a}
</div>
`).join("");

let shopHTML=`<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{
let q=encodeURIComponent(item);
shopHTML+=`
<div class="card">
<b>${item}</b><br>
<a class="shopBtn walmartBtn"
href="https://www.walmart.com/search?q=${q}" target="_blank">Walmart</a>
</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="btn" onclick="switchMode()">
${mode==="simple"?"Switch to Chef Mode 🔥":"Switch to Simple Mode 🍳"}
</div>

${stepsHTML}
${shopHTML}

<div class="btn" onclick="show('home')">Home</div>
`;
}

show("home");
