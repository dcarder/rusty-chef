<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v13</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;

position:fixed;
inset:0;
overflow:hidden;
}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
width:100%;
height:100%;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:opacity .25s ease, transform .25s ease;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
z-index:2;
}

/* UI */
.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,0.15);
white-space:pre-wrap;
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

/* SHOP */
.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}

.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

/* HOME */
#homeBg{
position:fixed;
inset:0;
z-index:-2;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

/* FIRE TITLE */
#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

.titleRow{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
}

.titleText{
display:flex;
flex-direction:column;
font-weight:900;
line-height:0.9;
}

.the{font-size:34px;}
.rusty{font-size:56px;}
.chef{font-size:48px;}

/* FIRE ANIMATION */
.flame{
width:45px;
height:110px;
position:relative;
overflow:hidden;
}

.flame span{
position:absolute;
bottom:0;
animation:rise 1.2s infinite ease-in-out;
opacity:0;
font-size:20px;
filter:drop-shadow(0 0 10px orange);
}

.flame span:nth-child(1){left:50%;animation-delay:0s;}
.flame span:nth-child(2){left:40%;animation-delay:.2s;}
.flame span:nth-child(3){left:60%;animation-delay:.4s;}
.flame span:nth-child(4){left:45%;animation-delay:.6s;}
.flame span:nth-child(5){left:55%;animation-delay:.8s;}

@keyframes rise{
0%{transform:translateY(0) scale(.6);opacity:0;}
20%{opacity:1;}
60%{transform:translateY(-60px) scale(1.2);}
100%{transform:translateY(-120px) scale(.7);opacity:0;}
}

/* HOME BUTTONS */
.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
z-index:5;
}

.bottomDock .btn{
width:160px;
}

/* =========================
🔥 ADDED: HOME BOOT ANIMATION (ONLY CHANGE)
========================= */

body.boot #homeBg{
animation:bgIn 1.2s ease forwards;
}

body.boot #introLogo{
animation:logoIn 1.4s ease forwards;
}

body.boot .bottomDock{
opacity:0;
transform:translateY(40px);
animation:dockIn 0.9s ease forwards;
animation-delay:1.2s;
}

@keyframes dockIn{
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg"/>
  </div>

  <div id="introLogo">

    <div class="titleRow">

      <div class="flame">
        <span>🔥</span><span>🔥</span><span>🔥</span><span>🔥</span><span>🔥</span>
      </div>

      <div class="titleText">
        <div class="the">THE</div>
        <div class="rusty">RUSTY</div>
        <div class="chef">CHEF</div>
      </div>

      <div class="flame">
        <span>🔥</span><span>🔥</span><span>🔥</span><span>🔥</span><span>🔥</span>
      </div>

    </div>

  </div>

  <div class="bottomDock">
    <div class="btn" onclick="openPantry()">🧺 Pantry</div>
    <div class="btn" onclick="showMatches()">🍳 Recipes</div>
  </div>

</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

/* PAGE SWITCH */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>{
document.getElementById(id).classList.add("active");
});
}

/* 🔥 ADDED: boot animation trigger */
window.addEventListener("load",()=>{
document.body.classList.add("boot");
});

/* INGREDIENTS */
const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* RECIPES */
const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
steps:[
{t:"Prep ingredients",time:5,temp:"Room"},
{t:"Cook chicken",time:8,temp:"375°F"},
{t:"Stir-fry vegetables",time:5,temp:"350°F"},
{t:"Add rice + soy sauce",time:7,temp:"400°F"}
]
}
];

/* MATCH */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
let missing=r.ingredients.filter(i=>!selected.includes(i));
return {...r,match,missing};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match);
let html=`<div class="header">🍳 Recipes</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">${r.name}</div>`;
});
document.getElementById("results").innerHTML=html;
show("results");
}

/* PANTRY */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});
html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected=selected.includes(i)
?selected.filter(x=>x!==i)
:[...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* RECIPE */
let current=null;
let stepIndex=0;

function openRecipe(name){
current=recipes.find(r=>r.name===name);
stepIndex=0;
render();
show("recipe");
}

function render(){
let step=current.steps[stepIndex];

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="card">
Step: ${step.t}<br>
Time: ${step.time} min<br>
Temp: ${step.temp}
</div>

<div class="btn" onclick="goHome()">Home</div>
`;
}

/* HOME */
function goHome(){show("home");}

show("home");

</script>

</body>
</html>
