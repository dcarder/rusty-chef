<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Kitchen OS v5</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
white-space:pre-wrap;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg"/>
</div>

<div class="card">PRO KITCHEN OS v5 - COOKBOOK AI CHEF</div>

<div class="dock">
<div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
<div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
</div>

</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
INGREDIENTS
========================= */

const ingredientItems=[
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Broccoli","Spinach","Shrimp","Salmon","Steak",
"Olive oil","Soy sauce","Lemon","Lime","Rice noodles","Tortilla","Bread",
"Carrots","Bell peppers","Mushrooms","Chicken broth","Beef broth","Hot sauce",
"BBQ sauce","Teriyaki sauce","Sesame oil","Vinegar","Sugar","Salt","Pepper"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
COOK PROFILES
========================= */

function getCookProfile(i){

const map={
"Chicken breast":{time:"12–18 min",temp:"400°F"},
"Steak":{time:"8–12 min",temp:"450°F"},
"Eggs":{time:"3–6 min",temp:"300°F"},
"Rice":{time:"15–20 min",temp:"200°F simmer"},
"Pasta":{time:"8–12 min",temp:"212°F boil"},
"Potatoes":{time:"25–35 min",temp:"425°F"},
"Broccoli":{time:"6–10 min",temp:"350°F"},
"Onions":{time:"8–12 min",temp:"350°F"},
"Tomatoes":{time:"5–8 min",temp:"300°F"},
"Shrimp":{time:"4–6 min",temp:"375°F"},
"Salmon":{time:"10–14 min",temp:"400°F"}
};

return map[i]||{time:"10–15 min",temp:"375°F"};
}

/* =========================
CLASSIFY SYSTEM
========================= */

function classify(list){

let c={protein:[],veg:[],starch:[],fat:[],acid:[],other:[]};

list.forEach(i=>{

if(["Chicken breast","Ground beef","Eggs","Shrimp","Salmon","Steak"].includes(i))
c.protein.push(i);

else if(["Broccoli","Onions","Tomatoes","Carrots","Spinach","Mushrooms","Bell peppers"].includes(i))
c.veg.push(i);

else if(["Rice","Pasta","Bread","Tortilla","Potatoes"].includes(i))
c.starch.push(i);

else if(["Butter","Olive oil","Cheese"].includes(i))
c.fat.push(i);

else if(["Lemon","Lime","Vinegar"].includes(i))
c.acid.push(i);

else c.other.push(i);

});

return c;
}

/* =========================
COOKBOOK STYLE ENGINE
========================= */

function buildInstructions(main, sides, support){

let mainP = getCookProfile(main);

let text = `### Instructions\n\n`;

text += `1. Prepare ${main} and all selected ingredients. Wash, chop, and organize everything before cooking for a smooth workflow.\n\n`;

text += `2. Season ${main} with salt, pepper, and aromatics. Let it rest for 10–15 minutes to absorb flavor.\n\n`;

text += `3. Heat cooking surface to ${mainP.temp}. Cook ${main} for ${mainP.time}, ensuring proper browning and doneness. Avoid overcrowding the pan.\n\n`;

if(sides.length){
text += `4. Meanwhile, cook side ingredients (${sides.join(", ")}) separately at medium heat (350–425°F). Stir frequently for even cooking.\n\n`;
}

if(support.length){
text += `5. Add supporting flavors (${support.join(", ")}). Reduce heat to 200–250°F and gently combine to build depth of flavor.\n\n`;
}

text += `6. Combine all components carefully. Taste and adjust seasoning. Let rest for 2–3 minutes before serving.\n`;

return text;
}

/* =========================
RECIPE ENGINE
========================= */

function generateAIRecipe(){

let cat=classify(selected);

let main=cat.protein[0]||cat.starch[0]||"Mixed Dish";
let sides=[...cat.veg,...cat.starch].filter(i=>i!==main);
let support=[...cat.fat,...cat.acid];

return [{
name:`Chef-Style ${main}`,
instructions: buildInstructions(main, sides, support)
}];
}

/* =========================
UI
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){

let html=`<div class="header">Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
${i} ${on?'✔':''}
</div>`;
});

html+=`<div class="btn" onclick="openRecipes()">Generate Recipe</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){

let r = generateAIRecipe()[0];

document.getElementById("detail").innerHTML=`
<div class="header">${r.name}</div>

<div class="card">
${r.instructions}
</div>

<div class="btn" onclick="show('home')">Back Home</div>
`;

show("detail");
}

openIngredients();

</script>

</body>
</html>
