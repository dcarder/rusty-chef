<!DOCTYPE html><html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Jeff AI</title><style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

.screen{
background:black;
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition:opacity 500ms ease;
}

.screen.active{
opacity:1;
pointer-events:auto;
z-index:10;
}

img{
width:100%;
height:100%;
object-fit:cover;
}

#cameraView{
position:fixed;
inset:0;
z-index:1;
}

#cameraScreen{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

#ui{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}

.button{
pointer-events:auto;
position:absolute;
bottom:40px;
width:140px;
height:140px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:18px;
}

#cameraBtn{right:30px;}
#factsBtn{left:30px;}

#text{
position:absolute;
bottom:220px;
width:100%;
text-align:center;
color:white;
font-size:18px;
}

#panel{
position:fixed;
inset:0;
background:black;
color:white;
padding:20px;
opacity:0;
pointer-events:none;
overflow:auto;
z-index:2000;
transition:opacity 400ms ease;
}

#panel.active{
opacity:1;
pointer-events:auto;
}

.card{
margin:15px 0;
padding:15px;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.smallBtn{
margin-top:20px;
padding:12px;
border:1px solid white;
text-align:center;
cursor:pointer;
}
</style></head><body><div id="logo" class="screen active">
<img src="your_logo.jpeg">
</div><div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div><img id="cameraScreen" src="copilot_image_1777179019874.jpeg"><div id="ui">
<div id="cameraBtn" class="button">📷 Camera</div>
<div id="factsBtn" class="button">📘 Facts</div>
<div id="text">Tap camera to scan food</div>
</div><div id="panel"></div><script>
const State={LOGO:"logo",INTRO:"intro",CAMERA:"camera",FACTS:"facts"};

const logo=document.getElementById("logo");
const intro=document.getElementById("intro");
const panel=document.getElementById("panel");
const cam=document.getElementById("cameraScreen");

function set(state){
logo.classList.remove("active");
intro.classList.remove("active");
panel.classList.remove("active");

if(state==="logo")logo.classList.add("active");
if(state==="intro")intro.classList.add("active");
if(state==="camera")cam.style.display="block";

if(state==="facts"){
panel.innerHTML=`
<h1>🍳 Food Facts (Seasonings + WHY they work)</h1>

<div class="card">
<h3>🐔 Chicken</h3>
<p><b>Garlic</b> – works because chicken is mild and absorbs seasoning deeply, boosting savory flavor.</p>
<p><b>Lemon</b> – acidity cuts through natural fat and brightens taste.</p>
<p><b>Paprika</b> – adds sweetness + color, enhancing perception of flavor.</p>
<p><b>Oregano</b> – herbal balance that prevents blandness.</p>
<p><b>Black pepper</b> – enhances umami without overpowering light meat.</p>
</div>

<div class="card">
<h3>🐖 Pork</h3>
<p><b>Brown sugar</b> – caramelizes during heat, amplifying natural pork sweetness.</p>
<p><b>Mustard</b> – cuts fatty richness with sharp acidity.</p>
<p><b>Rosemary</b> – strong aroma matches pork’s heavy flavor profile.</p>
<p><b>Garlic</b> – binds with fat to deepen savory notes.</p>
<p><b>Smoked paprika</b> – mimics slow BBQ cooking flavor.</p>
</div>

<div class="card">
<h3>🐄 Beef</h3>
<p><b>Salt</b> – draws out moisture and forms a flavorful crust when cooked.</p>
<p><b>Black pepper</b> – intensifies beef’s natural umami compounds.</p>
<p><b>Onion powder</b> – builds background savory depth.</p>
<p><b>Cumin</b> – adds earthy warmth that pairs with fat content.</p>
<p><b>Smoked paprika</b> – adds grilled smokiness without charcoal.</p>
</div>

<div class="smallBtn" onclick="set('camera')">Back</div>
`;
panel.classList.add("active");
}
}

document.getElementById("factsBtn").onclick=()=>set("facts");
document.getElementById("cameraBtn").onclick=()=>set("camera");

set("logo");
setTimeout(()=>set("intro"),3500);
setTimeout(()=>set("camera"),8000);
</script></body>
</html>s
