<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff AI</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* ===== SPLASH ===== */
.stage{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.logoStage{
background:url("your_logo.jpeg") center center no-repeat;
background-size:cover;
}

.logoOverlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
display:flex;
align-items:center;
justify-content:center;
}

.logoAnim{
width:100%;
height:100%;
object-fit:cover;
animation:netflixIntro 5s ease forwards;
}

@keyframes netflixIntro{
0%{transform:scale(1.2);filter:blur(14px);opacity:0;}
20%{opacity:1;filter:blur(8px);}
55%{transform:scale(1.05);filter:blur(0);opacity:1;}
85%{transform:scale(1);opacity:1;}
100%{transform:scale(1);opacity:1;}
}

/* NEXT SCREEN */
.stage img{
width:100%;
height:100%;
object-fit:cover;
}

/* APP */
#app{
position:fixed;
inset:0;
display:none;
background:black;
}

/* HOME */
.page{
display:none;
height:100%;
overflow:hidden;
position:relative;
}

.page.active{
display:block;
}

/* COPILOT BACKGROUND */
.copilotBg{
position:fixed;
inset:0;
background:url("copilot_image_1777179019874.jpeg") center center no-repeat;
background-size:cover;
filter:brightness(0.5);
z-index:-1;
}

/* HEADER */
.header{
font-size:22px;
font-weight:700;
padding:20px;
}

/* ===== DOCK BUTTONS ===== */
.dock{
position:fixed;
bottom:90px;
left:0;
right:0;

display:flex;
justify-content:center;
align-items:flex-end;
gap:22px;

z-index:10;
}

/* base */
.dockBtn{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

border-radius:50%;

background:rgba(255,255,255,0.10);
border:1px solid rgba(255,255,255,0.18);
backdrop-filter: blur(20px);

box-shadow:
0 12px 35px rgba(0,0,0,0.55),
inset 0 1px 0 rgba(255,255,255,0.15);

cursor:pointer;
transition:0.25s ease;

color:white;
font-weight:600;
}

/* small buttons */
.dockBtn.small{
width:78px;
height:78px;
font-size:20px;
}

/* big middle button */
.dockBtn.large{
width:110px;
height:110px;
font-size:26px;

background:rgba(255,255,255,0.14);
box-shadow:
0 18px 55px rgba(0,0,0,0.65),
0 0 25px rgba(79,172,254,0.25);
}

.dockBtn span{
font-size:10px;
margin-top:6px;
opacity:0.75;
}

/* press effect */
.dockBtn:active{
transform:scale(0.92);
}

/* CARD */
.card{
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.12);
border-radius:16px;
padding:14px;
margin:10px 20px;
backdrop-filter: blur(10px);
}

/* NAV (optional kept) */
#nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.1);
z-index:10;
}

.navBtn{
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<!-- LOGO -->
<div id="logo" class="stage logoStage">
  <div class="logoOverlay">
    <img src="your_logo.jpeg" class="logoAnim">
  </div>
</div>

<!-- INTRO -->
<div id="rusty" class="stage" style="display:none;">
  <img src="rusty_intro.jpeg">
</div>

<!-- APP -->
<div id="app">

<div id="home" class="page active">

<div class="copilotBg"></div>

<div class="header">🤖 Copilot Hub</div>

<div class="card">Smart Cooking Assistant Ready</div>

<!-- DOCK BUTTONS -->
<div class="dock">

  <div class="dockBtn small" onclick="openRecipes()">
    <div>🍳</div>
    <span>Recipes</span>
  </div>

  <div class="dockBtn large" onclick="openSmart()">
    <div>🧠</div>
    <span>Smart Cook</span>
  </div>

  <div class="dockBtn small" onclick="openPantry()">
    <div>🧺</div>
    <span>Pantry</span>
  </div>

</div>

</div>

<div id="recipes" class="page"></div>
<div id="smart" class="page"></div>
<div id="pantry" class="page"></div>

</div>

<script>

/* SPLASH FLOW */
window.onload = () => {

  setTimeout(() => {
    document.getElementById("logo").style.opacity = "0";
  }, 5000);

  setTimeout(() => {
    document.getElementById("logo").style.display = "none";
    document.getElementById("rusty").style.display = "flex";
  }, 5500);

  setTimeout(() => {
    document.getElementById("rusty").style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 9000);

};

/* SIMPLE NAV */
function openRecipes(){
document.getElementById("recipes").classList.add("active");
document.getElementById("home").classList.remove("active");
document.getElementById("smart").classList.remove("active");
document.getElementById("pantry").classList.remove("active");
}

function openSmart(){
document.getElementById("smart").classList.add("active");
document.getElementById("home").classList.remove("active");
document.getElementById("recipes").classList.remove("active");
document.getElementById("pantry").classList.remove("active");
}

function openPantry(){
document.getElementById("pantry").classList.add("active");
document.getElementById("home").classList.remove("active");
document.getElementById("recipes").classList.remove("active");
document.getElementById("smart").classList.remove("active");
}

</script>

</body>
</html>
