<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff V11</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* SPLASH */
.stage{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
}

.stage img{
width:100%;
height:100%;
object-fit:cover;
}

/* APP */
#app{
position:fixed;
inset:0;
display:none;
background:black;
}

/* PAGES */
.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
padding-bottom:100px;
}

.page.active{
display:block;
}

/* HEADER */
.header{
font-size:22px;
font-weight:700;
margin-bottom:12px;
}

/* ===== VIBRANT MODERN BUTTONS ===== */
.btn{
display:flex;
align-items:center;
gap:14px;

padding:18px;
margin-top:14px;

border-radius:22px;

background:linear-gradient(135deg,rgba(255,255,255,0.18),rgba(255,255,255,0.06));
border:1px solid rgba(255,255,255,0.22);
backdrop-filter: blur(22px);

box-shadow:
0 15px 40px rgba(0,0,0,0.5),
0 0 25px rgba(255,255,255,0.06),
inset 0 1px 0 rgba(255,255,255,0.18);

cursor:pointer;
transition:0.25s ease;

position:relative;
overflow:hidden;
}

.btn::before{
content:"";
position:absolute;
inset:-2px;
border-radius:24px;
background:linear-gradient(120deg,#ff7a18,#af002d,#4facfe,#00f2fe);
opacity:0.25;
filter:blur(10px);
z-index:0;
}

.btn:hover{
transform:translateY(-3px) scale(1.01);
box-shadow:
0 20px 60px rgba(0,0,0,0.6),
0 0 35px rgba(255,255,255,0.1);
}

.btn:active{
transform:scale(0.97);
}

/* ICON */
.btnIcon{
font-size:22px;
width:42px;
height:42px;
border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.18);

box-shadow:inset 0 1px 0 rgba(255,255,255,0.15);
z-index:1;
}

/* TEXT */
.btnText{
display:flex;
flex-direction:column;
z-index:1;
}

.btnTitle{
font-size:16px;
font-weight:700;
}

.btnSub{
font-size:11px;
opacity:0.65;
}

/* CARDS */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:16px;
padding:14px;
margin:10px 0;
backdrop-filter: blur(10px);
}

/* NAV */
#nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:rgba(0,0,0,0.85);
backdrop-filter: blur(15px);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.1);
}

.navBtn{
font-size:12px;
text-align:center;
opacity:0.6;
cursor:pointer;
}
.navBtn.active{opacity:1;}

/* FLOAT BUTTON */
.fab{
position:fixed;
bottom:85px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#ff7a18,#af002d);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* PANTRY CHECKBOX FIX */
input[type="checkbox"]{
transform:scale(1.2);
margin-right:8px;
}

</style>
</head>

<body>

<!-- LOGO -->
<div id="logo" class="stage">
<img src="rusty_logo.jpeg">
</div>

<!-- RUSTY -->
<div id="rusty" class="stage" style="display:none;">
<img src="rusty_intro.jpeg">
</div>

<!-- APP -->
<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div class="header">🤖 Copilot Hub</div>

<div class="card">Smart Cooking Assistant Ready</div>

<div class="btn" onclick="openRecipes()">
<div class="btnIcon">🍳</div>
<div class="btnText">
<div class="btnTitle">Recipes</div>
<div class="btnSub">Discover meals instantly</div>
</div>
</div>

<div class="btn" onclick="openSmart()">
<div class="btnIcon">🧠</div>
<div class="btnText">
<div class="btnTitle">Smart Cook</div>
<div class="btnSub">Best match from pantry</div>
</div>
</div>

<div class="btn" onclick="openPantry()">
<div class="btnIcon">🧺</div>
<div class="btnText">
<div class="btnTitle">Pantry</div>
<div class="btnSub">Your ingredients database</div>
</div>
</div>

</div>

<!-- RECIPES -->
<div id="recipes" class="page"></div>

<!-- SMART -->
<div id="smart" class="page"></div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

</div>

<!-- FLOAT -->
<div class="fab" onclick="openSmart()">🍳</div>

<!-- NAV -->
<div id="nav">
<div class="navBtn active" onclick="show('home')">🏠<br>Home</div>
<div class="navBtn" onclick="openRecipes()">🍳<br>Recipes</div>
<div class="navBtn" onclick="openSmart()">🧠<br>Smart</div>
<div class="navBtn" onclick="openPantry()">🧺<br>Pantry</div>
</div>

<script>

/* FLOW */
setTimeout(()=>{
document.getElementById("logo").style.display="none";
document.getElementById("rusty").style.display="flex";
},3000);

setTimeout(()=>{
document.getElementById("rusty").style.display="none";
document.getElementById("app").style.display="block";
},6000);

/* NAV */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* PANTRY */
const pantryItems = [
"chicken","beef","pork","rice","pasta","egg","milk","cheese",
"garlic","onion","tomato","carrot","broccoli",
"salt","pepper","olive oil","butter","soy sauce",
"potato","spinach","lettuce","corn","beans"
];

/* RECIPES */
const recipes = [
{
name:"Garlic Chicken Rice",
time:25,
ingredients:["chicken","rice","garlic","salt"]
},
{
name:"Veg Stir Fry",
time:15,
ingredients:["broccoli","carrot","soy sauce"]
},
{
name:"Cheesy Eggs",
time:10,
ingredients:["egg","cheese","butter"]
}
];

/* RECIPES */
function openRecipes(){
let html = `<div class="header">🍳 Recipes</div>`;
recipes.forEach(r=>{
html += `
<div class="card">
<h3>${r.name}</h3>
<p>⏱ ${r.time} min</p>
</div>`;
});
document.getElementById("recipes").innerHTML = html;
show("recipes");
}

/* SMART */
function openSmart(){
let pantry = JSON.parse(localStorage.getItem("pantry") || "[]");

let ranked = recipes.map(r=>{
let match = r.ingredients.filter(i=>pantry.includes(i)).length;
return {...r, score: match/r.ingredients.length};
}).sort((a,b)=>b.score-a.score);

let html = `<div class="header">🧠 Smart Cook</div>`;

ranked.forEach(r=>{
html += `
<div class="card">
<h3>${r.name}</h3>
<p>Match: ${(r.score*100).toFixed(0)}%</p>
</div>`;
});

document.getElementById("smart").innerHTML = html;
show("smart");
}

/* PANTRY */
function openPantry(){
let saved = JSON.parse(localStorage.getItem("pantry") || "[]");

let html = `<div class="header">🧺 Pantry</div>`;

pantryItems.forEach(i=>{
let checked = saved.includes(i) ? "checked" : "";
html += `
<div class="card">
<label>
<input type="checkbox" value="${i}" ${checked}> ${i}
</label>
</div>`;
});

html += `<div class="card" onclick="savePantry()">💾 Save Pantry</div>`;

document.getElementById("pantry").innerHTML = html;
show("pantry");
}

function savePantry(){
let checked = document.querySelectorAll("input:checked");
let pantry = Array.from(checked).map(i=>i.value);
localStorage.setItem("pantry", JSON.stringify(pantry));
alert("Saved!");
}

</script>

</body>
</html>
