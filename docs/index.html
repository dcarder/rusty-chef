<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v14</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}

.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}
#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div class="header">🔥 THE RUSTY CHEF 🔥</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* =========================
   PANTRY INGREDIENTS
========================= */
const ingredientItems = [
"Rice","Eggs","Chicken breast","Ground beef","Pasta","Tortilla","Cheese","Onions","Garlic","Tomatoes",
"Butter","Milk","Flour","Salt","Pepper","Olive oil","Soy sauce","Lime","Bread","Potatoes",
"Carrots","Broccoli","Cream","Basil","Chicken broth","Beans","Curry powder","Coconut milk","Sugar","Lettuce",
"Tomato","Sour cream","Peas","Marinara","Mixed vegetables","Italian seasoning","Cheddar","Parmesan"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
   25 SENSORY RECIPES
========================= */
const recipes = [

{
name:"Skillet Beef Tacos",
serves:4,
ingredients:{main:["Ground beef","Tortilla","Cheese","Onions"],optional:["Lettuce","Tomato","Sour cream"]},
steps:[
{title:"Heat pan",sensory:"Warm air rises from skillet.",instruction:"Medium heat 1 minute."},
{title:"Cook beef",sensory:"Strong sizzling fills kitchen.",instruction:"Break apart until browned."},
{title:"Season",sensory:"Rich spice aroma blooms.",instruction:"Mix seasoning evenly."},
{title:"Add water",sensory:"Quick hiss, sauce thickens.",instruction:"Add 3 tbsp water."},
{title:"Assemble",sensory:"Tortillas feel soft and warm.",instruction:"Fill and serve."}
]
},

{
name:"Chicken Fried Rice",
serves:3,
ingredients:{main:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],optional:["Peas"]},
steps:[
{title:"Cook rice",sensory:"Steam rises gently.",instruction:"Cook until slightly dry."},
{title:"Cook chicken",sensory:"Sharp sizzling sound.",instruction:"Cook until firm."},
{title:"Scramble eggs",sensory:"Soft fluffy texture forms.",instruction:"Cook gently."},
{title:"Combine",sensory:"Savory aroma fills air.",instruction:"Mix everything together."}
]
},

{
name:"Spaghetti Bolognese",
serves:4,
ingredients:{main:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],optional:["Parmesan"]},
steps:[
{title:"Boil pasta",sensory:"Water bubbles rapidly.",instruction:"Cook until tender."},
{title:"Brown beef",sensory:"Meat sizzles and darkens.",instruction:"Cook fully."},
{title:"Simmer sauce",sensory:"Tomato aroma deepens.",instruction:"Add tomatoes and simmer."},
{title:"Serve",sensory:"Steam rises from plate.",instruction:"Combine and serve."}
]
},

{
name:"Creamy Tomato Soup",
serves:2,
ingredients:{main:["Tomatoes","Onions","Garlic","Cream","Basil"],optional:["Bread"]},
steps:[
{title:"Sauté",sensory:"Onions soften and smell sweet.",instruction:"Cook onions + garlic."},
{title:"Simmer",sensory:"Soup thickens gently.",instruction:"Add tomatoes."},
{title:"Blend",sensory:"Texture becomes silky smooth.",instruction:"Blend fully."},
{title:"Finish",sensory:"Cream softens acidity.",instruction:"Stir in cream."}
]
},

{
name:"Grilled Cheese",
serves:1,
ingredients:{main:["Bread","Cheese","Butter"],optional:[]},
steps:[
{title:"Butter bread",sensory:"Butter melts instantly.",instruction:"Spread evenly."},
{title:"Grill",sensory:"Cheese melts and stretches.",instruction:"Cook until golden."}
]
},

{
name:"Scrambled Eggs",
serves:1,
ingredients:{main:["Eggs","Milk","Butter"],optional:["Salt","Pepper"]},
steps:[
{title:"Whisk",sensory:"Eggs become smooth.",instruction:"Mix eggs + milk."},
{title:"Cook",sensory:"Soft curds form.",instruction:"Cook low heat."}
]
},

{
name:"Chicken Tacos",
serves:3,
ingredients:{main:["Chicken breast","Tortilla","Cheese","Onions","Lime"],optional:["Sour cream"]},
steps:[
{title:"Cook chicken",sensory:"Sizzling sharp sound.",instruction:"Cook until golden."},
{title:"Shred",sensory:"Chicken becomes tender.",instruction:"Shred meat."},
{title:"Assemble",sensory:"Warm tortillas soften.",instruction:"Fill and serve."}
]
},

{
name:"Simple Chili",
serves:4,
ingredients:{main:["Ground beef","Tomatoes","Beans","Onions","Chili powder"],optional:[]},
steps:[
{title:"Brown beef",sensory:"Deep sizzling aroma.",instruction:"Cook beef fully."},
{title:"Simmer",sensory:"Thick bubbling stew.",instruction:"Cook 20 min."}
]
},

{
name:"Buttered Noodles",
serves:2,
ingredients:{main:["Pasta","Butter","Salt"],optional:[]},
steps:[
{title:"Boil",sensory:"Steam rises from pot.",instruction:"Cook pasta."},
{title:"Mix",sensory:"Butter melts instantly.",instruction:"Toss with butter."}
]
},

{
name:"Avocado Toast",
serves:1,
ingredients:{main:["Bread","Avocado","Salt"],optional:["Pepper"]},
steps:[
{title:"Toast",sensory:"Crunchy warm bread.",instruction:"Toast bread."},
{title:"Mash",sensory:"Creamy avocado texture.",instruction:"Spread and season."}
]
}

];

/* =========================
   MATCH SYSTEM
========================= */
function score(r){
let all=[...r.ingredients.main,...(r.ingredients.optional||[])];
let match=all.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match Score: ${r.match}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

/* =========================
   PANTRY
========================= */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
html+=`<div class="card" onclick="toggle('${i}')">
${selected.includes(i)?"✅ ":""}${i}
</div>`;
});

html+=`<div class="btn" onclick="showMatches()">🍳 Find Possible Recipes</div>`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* =========================
   RECIPE VIEW + SHOPPING
========================= */
function openRecipe(name){
let r = recipes.find(x=>x.name===name);

let ingMain = r.ingredients.main.map(i=>`• ${i}`).join("<br>");
let ingOpt = (r.ingredients.optional||[]).length
? "<br><br><b>Optional:</b><br>" +
r.ingredients.optional.map(i=>`• ${i}`).join("<br>")
: "";

/* 🛒 missing ingredients */
let missing = r.ingredients.main.filter(i=>!selected.includes(i));

let shopHTML = `<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{
let q = encodeURIComponent(item);

shopHTML += `
<div class="card">
<b>${item}</b><br>
<a class="shopBtn instacartBtn" target="_blank"
href="https://www.instacart.com/store/search?search=${q}">Instacart</a>

<a class="shopBtn walmartBtn" target="_blank"
href="https://www.walmart.com/search?q=${q}">Walmart</a>
</div>`;
});

let steps = r.steps.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.title}</b><br><br>
👃 ${s.sensory}<br><br>
🍳 ${s.instruction}
</div>
`).join("");

document.getElementById("recipe").innerHTML=`
<div class="header">${r.name} (Serves ${r.serves})</div>

<div class="card">
<b>Ingredients</b><br><br>
${ingMain}
${ingOpt}
</div>

${shopHTML}

${steps}

<div class="btn" onclick="show('results')">⬅ Back</div>
`;

show("recipe");
}

</script>

</body>
</html>
