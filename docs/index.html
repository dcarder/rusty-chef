<!DOCTYPE html><html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Jeff</title><style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* GLOBAL SCREEN SYSTEM (PRO TRANSITIONS) */
.screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
opacity:0;
transform:scale(1.05);
filter:blur(10px);
pointer-events:none;
transition:opacity 900ms ease, transform 900ms ease, filter 900ms ease;
}

.screen.active{
opacity:1;
transform:scale(1);
filter:blur(0);
pointer-events:auto;
z-index:10;
}

.screen img{
width:100%;
height:100%;
object-fit:contain;
}

/* CAMERA LAYER */
#cameraScreen{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 900ms ease;
z-index:1;
}

#cameraScreen.active{
opacity:1;
}

/* UI TEXT */
#cameraText{
position:absolute;
bottom:220px;
width:100%;
text-align:center;
color:white;
font-size:20px;
opacity:0;
transform:translateY(10px);
transition:all 800ms ease;
z-index:5;
}

#cameraText.active{
opacity:1;
transform:translateY(0);
}

/* BUTTONS (PRO FLOAT) */
.camera-hotspot{
position:absolute;
bottom:60px;
padding:28px;
border-radius:50%;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.25);
color:white;
font-size:18px;
opacity:0;
transform:translateY(20px) scale(0.9);
transition:all 700ms cubic-bezier(.2,.8,.2,1);
z-index:20;
}

.camera-hotspot.active{
opacity:1;
transform:translateY(0) scale(1);
}

#cameraButton{right:40px;}
#factsButton{left:40px;}

.navButton{
margin:20px auto;
padding:14px;
width:200px;
text-align:center;
border:2px solid white;
color:white;
cursor:pointer;
}

/* FACTS PAGES */
.fullScreenPage{
position:fixed;
inset:0;
background:black;
color:white;
padding:30px;
opacity:0;
transform:translateY(20px);
pointer-events:none;
transition:all 700ms ease;
z-index:5;
overflow:auto;
}

.fullScreenPage.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
z-index:50;
}
</style></head>
<body><!-- SCREENS --><div id="logo" class="screen active">
<img src="your_logo.jpeg">
</div><div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div><img id="cameraScreen" src="copilot_image_1777179019874.jpeg"><div id="cameraText">Take a picture of your food 🍽️</div><!-- BUTTONS --><div id="cameraButton" class="camera-hotspot">📷 Camera</div>
<div id="factsButton" class="camera-hotspot">📘 Facts</div><input type="file" id="cameraInput" accept="image/*" capture="environment"><!-- FACTS --><div id="factsPage" class="fullScreenPage">
<h1>Food Facts</h1>
<p>Pork, Beef, Chicken seasoning science made simple.</p>
<div class="navButton" id="backBtn">Back</div>
</div><script>
console.log("PRO TRANSITIONS LOADED");

const logo=document.getElementById("logo");
const intro=document.getElementById("intro");
const cam=document.getElementById("cameraScreen");
const camBtn=document.getElementById("cameraButton");
const factsBtn=document.getElementById("factsButton");
const text=document.getElementById("cameraText");
const facts=document.getElementById("factsPage");

/* SEQUENCE ENGINE (CLEAN + EVENT BASED) */
setTimeout(()=>{
logo.classList.remove("active");
intro.classList.add("active");
},2500);

setTimeout(()=>{
intro.classList.remove("active");
cam.classList.add("active");
camBtn.classList.add("active");
factsBtn.classList.add("active");
text.classList.add("active");
},6000);

/* CAMERA BUTTON */
camBtn.onclick=()=>document.getElementById("cameraInput").click();

/* FACTS OPEN */
factsBtn.onclick=()=>{
facts.classList.add("active");
cam.classList.remove("active");
camBtn.classList.remove("active");
factsBtn.classList.remove("active");
text.classList.remove("active");
};

/* FACTS CLOSE */
document.getElementById("backBtn").onclick=()=>{
facts.classList.remove("active");
cam.classList.add("active");
camBtn.classList.add("active");
factsBtn.classList.add("active");
text.classList.add("active");
};
</script></body>
</html>
