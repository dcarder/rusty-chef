<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff V9</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* SPLASH SCREENS */
.stage{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
}

.stage img{
width:100%;
height:100%;
object-fit:cover;
}

/* APP WRAPPER */
#app{
position:fixed;
inset:0;
display:none;
background:black;
}

/* PAGES */
.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
padding-bottom:90px;
}

.page.active{
display:block;
}

/* HEADER */
.header{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

/* CARDS */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:16px;
padding:14px;
margin:10px 0;
backdrop-filter: blur(10px);
}

/* BUTTONS */
.btn{
padding:14px;
border-radius:14px;
background:linear-gradient(135deg,rgba(255,255,255,0.18),rgba(255,255,255,0.06));
border:1px solid rgba(255,255,255,0.2);
margin-top:10px;
text-align:center;
font-weight:600;
cursor:pointer;
transition:0.15s;
}
.btn:active{transform:scale(0.96);}

/* BOTTOM NAV */
#nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:rgba(0,0,0,0.85);
backdrop-filter: blur(15px);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.1);
}

.navBtn{
font-size:12px;
text-align:center;
opacity:0.6;
cursor:pointer;
}
.navBtn.active{opacity:1;}

/* FLOAT BUTTON */
.fab{
position:fixed;
bottom:85px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#ff7a18,#af002d);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<!-- LOGO -->
<div id="logo" class="stage">
<img src="rusty_logo.jpeg">
</div>

<!-- RUSTY -->
<div id="rusty" class="stage" style="display:none;">
<img src="rusty_intro.jpeg">
</div>

<!-- APP -->
<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div class="header">🤖 Copilot Hub</div>

<div class="card">Smart Cooking Assistant Ready</div>

<div class="btn" onclick="openRecipes()">🍳 Recipes</div>
<div class="btn" onclick="openSmart()">🧠 Smart Cook</div>
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
</div>

<!-- RECIPES -->
<div id="recipes" class="page"></div>

<!-- SMART -->
<div id="smart" class="page"></div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

</div>

<!-- FLOAT BUTTON -->
<div class="fab" onclick="openSmart()">🍳</div>

<!-- NAV -->
<div id="nav">
<div class="navBtn active" onclick="show('home')">🏠<br>Home</div>
<div class="navBtn" onclick="openRecipes()">🍳<br>Recipes</div>
<div class="navBtn" onclick="openSmart()">🧠<br>Smart</div>
<div class="navBtn" onclick="openPantry()">🧺<br>Pantry</div>
</div>

<script>

/* ===== FLOW ===== */
setTimeout(()=>{
document.getElementById("logo").style.display="none";
document.getElementById("rusty").style.display="flex";
},3000);

setTimeout(()=>{
document.getElementById("rusty").style.display="none";
document.getElementById("app").style.display="block";
},6000);

/* ===== NAV CONTROL ===== */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* ===== PANTRY ===== */
const pantryItems = [
"chicken","beef","pork","rice","pasta","egg","milk","cheese",
"garlic","onion","tomato","carrot","broccoli","pepper",
"salt","pepper","olive oil","butter","soy sauce",
"potato","lettuce","spinach","cucumber","corn","beans"
];

/* ===== RECIPES ===== */
const recipes = [
{
name:"Garlic Chicken Rice",
time:25,
ingredients:["chicken","rice","garlic","salt"]
},
{
name:"Veg Stir Fry",
time:15,
ingredients:["broccoli","carrot","soy sauce"]
},
{
name:"Cheesy Eggs",
time:10,
ingredients:["egg","cheese","butter"]
}
];

/* ===== RECIPES ===== */
function openRecipes(){

let html = `<div class="header">🍳 Recipes</div>`;

recipes.forEach(r=>{
html += `
<div class="card">
<h3>${r.name}</h3>
<p>⏱ ${r.time} min</p>
</div>`;
});

document.getElementById("recipes").innerHTML = html;
show("recipes");
}

/* ===== SMART MATCH ===== */
function openSmart(){

let pantry = JSON.parse(localStorage.getItem("pantry") || "[]");

let ranked = recipes.map(r=>{
let match = r.ingredients.filter(i=>pantry.includes(i)).length;
return {...r, score: match/r.ingredients.length};
}).sort((a,b)=>b.score-a.score);

let html = `<div class="header">🧠 Smart Cook</div>`;

ranked.forEach(r=>{
html += `
<div class="card">
<h3>${r.name}</h3>
<p>Match: ${(r.score*100).toFixed(0)}%</p>
</div>`;
});

document.getElementById("smart").innerHTML = html;
show("smart");
}

/* ===== PANTRY ===== */
function openPantry(){

let saved = JSON.parse(localStorage.getItem("pantry") || "[]");

let html = `<div class="header">🧺 Pantry</div>`;

pantryItems.forEach(i=>{
let checked = saved.includes(i) ? "checked" : "";
html += `
<div class="card">
<label>
<input type="checkbox" value="${i}" ${checked}> ${i}
</label>
</div>`;
});

html += `<div class="btn" onclick="savePantry()">💾 Save Pantry</div>`;

document.getElementById("pantry").innerHTML = html;
show("pantry");
}

function savePantry(){
let checked = document.querySelectorAll("input:checked");
let pantry = Array.from(checked).map(i=>i.value);
localStorage.setItem("pantry", JSON.stringify(pantry));
alert("Pantry Saved!");
}

</script>

</body>
</html>
