<title>The Rusty Chef v18</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
pointer-events:none;
transition:opacity .25s ease;
overflow-y:auto;

box-sizing:border-box;

}

.page.active{
opacity:1;
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.chef-card {
background: rgba(255, 145, 77, 0.12);
border-radius: 14px;
padding: 16px;
margin: 10px 0;
border: 1px solid rgba(255, 145, 77, 0.35);
}

.chef-card .step-title {
font-size: 15px;
font-weight: 700;
color: #ff914d;
margin-bottom: 8px;
}

.chef-card .step-body {
font-size: 14px;
line-height: 1.65;
color: rgba(255,255,255,0.88);
}

.chef-card .step-tip {
margin-top: 10px;
font-size: 12px;
color: rgba(255, 200, 130, 0.8);
font-style: italic;
border-top: 1px solid rgba(255,145,77,0.2);
padding-top: 8px;
}

.step-number {
display: inline-block;
background: #ff914d;
color: black;
font-weight: 900;
font-size: 12px;
border-radius: 50%;
width: 22px;
height: 22px;
line-height: 22px;
text-align: center;
margin-right: 8px;
flex-shrink: 0;
}

.step-header {
display: flex;
align-items: center;
margin-bottom: 8px;
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
transition:.2s;
}

.item:hover{
background:rgba(255,255,255,.08);
}

.item.selected{
background:rgba(79,172,254,.25);
border-color:#4facfe;
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
transition:.2s;
user-select:none;
}

.btn:hover{
transform:scale(1.02);
}


.btn-feedback {
background: rgba(255,145,77,0.15);
color: #ff914d;
border: 1px solid rgba(255,145,77,0.4);
font-weight: 700;
}

.btn-feedback:hover {
background: rgba(255,145,77,0.25);
transform: scale(1.02);
}

.btn-fav {
background: rgba(255, 215, 0, 0.12);
color: #ffd700;
border: 1px solid rgba(255, 215, 0, 0.4);
font-weight: 700;
}

.btn-fav:hover {
background: rgba(255, 215, 0, 0.25);
transform: scale(1.02);
}

.fav-star {
font-size: 32px;
cursor: pointer;
user-select: none;
transition: transform 0.2s, color 0.2s;
display: inline-block;
color: rgba(255,255,255,0.3);
line-height: 1;
}

.fav-star.saved {
color: #ffd700;
text-shadow: 0 0 10px rgba(255,215,0,0.6);
}

.fav-star:active {
transform: scale(1.5);
}

.fav-badge {
display: inline-block;
background: rgba(255,215,0,0.2);
border: 1px solid rgba(255,215,0,0.4);
border-radius: 20px;
padding: 3px 10px;
font-size: 12px;
color: #ffd700;
margin-left: 8px;
vertical-align: middle;
}

.shopBtn{
display:inline-block;
margin-top:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
background:#0071ce;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
z-index:5;
}

.bottomDock .btn{
width:160px;
margin-top:0;
}

#homeBg img{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

#homeBg::after{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:-1;
}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:100%;
}

.the{
font-size:34px;
letter-spacing:4px;
}

.rusty{
font-size:64px;
font-weight:900;
color:#ff914d;
text-shadow:
0 0 10px #ff6600,
0 0 20px #ff3300,
0 0 40px #ff0000;
animation:flicker 2s infinite alternate;
}

.chef{
font-size:52px;
font-weight:800;
}

.fire{
font-size:40px;
animation:fireFloat 1.5s infinite alternate ease-in-out;
display:inline-block;
margin:0 10px;
}

@keyframes flicker{
0%{opacity:1;}
25%{opacity:.85;}
50%{opacity:1;}
75%{opacity:.9;}
100%{opacity:1;}
}

@keyframes fireFloat{
from{transform:translateY(0px);}
to{transform:translateY(-8px);}
}

.recipeTitle{
font-size:24px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}


.searchInput{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
font-size:16px;
box-sizing:border-box;
}

<!-- Permanent tab bar -->
<div id="tabBar" style="position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(0,0,0,0.92);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,0.1);padding:8px 12px 12px;display:flex;gap:8px;">
  <div class="btn" onclick="openPantry()" style="flex:1;margin-top:0;padding:10px 4px;font-size:12px;line-height:1.4;">🧺<br>Pantry</div>

  <div class="btn" onclick="showPrivacy()" style="flex:1;margin-top:0;padding:10px 4px;font-size:12px;line-height:1.4;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.15);">🔒<br>Privacy</div>
</div>

<script>

/* ================= NAV ================= */
function show(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  requestAnimationFrame(() => document.getElementById(id).classList.add("active"));
}

/* ================= INGREDIENTS ================= */
const ingredientItems = [
  "Allspice","Avocado","Bacon","Baking soda","Bananas","Basil","BBQ sauce","Beans","Beef broth","Bell peppers","Bread","Breadcrumbs","Broccoli","Brown sugar","Butter","Cabbage","Carrots","Cheddar","Cheese","Chicken breast","Chicken broth","Chickpeas","Chocolate","Cinnamon","Coconut milk","Cornstarch","Crackers","Cream","Curry powder","Egg noodles","Eggs","Flour","Garlic","Garlic powder","Ginger","Ground beef","Honey","Hot sauce","Italian seasoning","Lemon","Lettuce","Lime","Maple syrup","Marinara sauce","Mayonnaise","Milk","Mushrooms","Noodles","Nutmeg","Oats","Oil","Olive oil","Onions","Paprika","Parmesan","Parsley","Pepper","Pasta","Pineapple","Pork chops","Potatoes","Ramen noodles","Ravioli","Rice","Salmon","Salt","Sausage","Sesame oil","Shrimp","Soy sauce","Steak","Sugar","Teriyaki sauce","Tofu","Tomatoes","Tortilla","Tuna","Turkey","Turmeric","Vanilla extract","Vinegar"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

function toggleFavorite(idx){
  const name = typeof idx === "number" ? recipes[idx].name : idx;
  favorites = favorites.includes(name) ? favorites.filter(f=>f!==name) : [...favorites, name];
  localStorage.setItem("favorites", JSON.stringify(favorites));
  const star = document.querySelector('.fav-star');
  const isFav = favorites.includes(name);
  if(star){
    if(isFav){
      star.classList.add('saved');
      star.style.transform = 'scale(1.5)';
      setTimeout(() => star.style.transform = '', 200);
    } else {
      star.classList.remove('saved');
    }
  }
}

function showFavorites(){
  let html = `<div class="header">⭐ Saved Recipes</div>`;
  if(favorites.length === 0){
    html += `<div class="card" style="text-align:center;opacity:0.6;padding:30px;">
      No saved recipes yet.<br><br>Tap ⭐ on any recipe to save it here.
    </div>`;
  } else {
    favorites.forEach(name => {
      const r = recipes.find(x => x.name === name);
      if(!r) return;
      const match = r.ingredients.filter(i => selected.includes(i)).length;
      html += `
        <div class="card" style="display:flex;align-items:center;justify-content:space-between;" onclick="openRecipe(${recipes.findIndex(x=>x.name===name)})">
          <div><b>${name}</b><br><small style="opacity:0.6">Match: ${match}/${r.ingredients.length}</small></div>
          <span style="font-size:20px;color:#ffd700;">★</span>
        </div>`;
    });
  }
  document.getElementById("favorites").innerHTML = html;
  show("favorites");
}

function clearPantry(){
  selected = [];
  localStorage.setItem("ingredients", JSON.stringify(selected));
  openPantry();
}

/* ================= PRIVACY ================= */
function showPrivacy(){
  document.getElementById("privacy").innerHTML = `
    <div class="header">🔒 Privacy Policy</div>
    <div style="text-align:center;margin-bottom:16px;font-size:12px;color:rgba(255,255,255,0.4);">Effective: May 23, 2026</div>

    <div class="priv-section">
      <div class="priv-section-hd"><span class="priv-section-icon">📋</span><div class="priv-section-title">About This Policy</div></div>
      <div class="priv-section-body">
        <p>This privacy policy applies to <strong>The Rusty Chef</strong> app for mobile devices, provided as a free service. This service is intended for use "AS IS".</p>
      </div>
    </div>

    <div class="priv-section">
      <div class="priv-section-hd"><span class="priv-section-icon">🛡️</span><div class="priv-section-title">Data Collection</div></div>
      <div class="priv-section-body">
        <div class="priv-highlight">The Rusty Chef does <strong>not</strong> collect, store, or sell any personal data. No information is ever transmitted from your device.</div>
        <p style="margin-top:12px;">All app data — including your selected ingredients and saved recipes — is stored locally on your device only and never leaves it.</p>
        <p>The app does <strong>not</strong> use AI technologies to process your data.</p>
      </div>
    </div>

    <div class="priv-section">
      <div class="priv-section-hd"><span class="priv-section-icon">👶</span><div class="priv-section-title">Children</div></div>
      <div class="priv-section-body">
        <p>The app does not address anyone under the age of 13, and no personal information is knowingly collected from children. Since no data is collected at all, there is no risk of children's information being stored or shared.</p>
      </div>
    </div>

    <div class="priv-section">
      <div class="priv-section-hd"><span class="priv-section-icon">🔄</span><div class="priv-section-title">Changes to This Policy</div></div>
      <div class="priv-section-body">
        <p>This Privacy Policy may be updated from time to time. Any changes will be reflected by updating this page. Continued use of the app constitutes acceptance of the current policy.</p>
      </div>
    </div>

    <div class="priv-section">
      <div class="priv-section-hd"><span class="priv-section-icon">✅</span><div class="priv-section-title">Your Consent</div></div>
      <div class="priv-section-body">
        <p>By using the app, you are consenting to the practices described in this Privacy Policy.</p>
      </div>
    </div>

    <div class="priv-section">
      <div class="priv-section-hd"><span class="priv-section-icon">✉️</span><div class="priv-section-title">Contact</div></div>
      <div class="priv-section-body">
        <p>Questions? Reach out:</p>
        <a class="priv-contact" href="mailto:therustychef1@gmail.com">📬 therustychef1@gmail.com</a>
      </div>
    </div>

    <div style="text-align:center;margin-top:24px;margin-bottom:20px;font-size:12px;color:rgba(255,255,255,0.25);">© 2026 The Rusty Chef</div>
  `;
  show("privacy");
}

/* ================= RECIPES ================= */
const recipes = [
{name:"Chicken Fried Rice",category:"lunch",ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],chefSteps:[{t:"Prep and cook the rice",a:"Rinse the rice under cold water 2–3 times until the water runs mostly clear — this removes excess starch and prevents a gummy texture. Cook using a 1:1.5 rice-to-water ratio. Once done, spread the rice on a tray or plate and refrigerate for at least 30 minutes (overnight is even better). Cold, dry rice fries instead of steams, giving you those distinct separated grains.",tip:"Day-old leftover rice is ideal. Never use freshly cooked rice — it'll clump and turn mushy."},{t:"Season and cook the chicken",a:"Dice the chicken breast into small, even ½-inch cubes so they cook quickly and evenly. Season generously with salt and pepper. Heat a wok or large skillet over high heat until it just begins to smoke. Add a thin layer of neutral oil and cook the chicken in a single layer without stirring for 90 seconds to develop a golden sear, then toss and finish cooking through. Remove from pan and set aside.",tip:"High heat is non-negotiable. A hot wok creates 'wok hei' — that smoky, slightly charred flavor you can't get at low temperatures."},{t:"Scramble the eggs separately",a:"Push everything to the side of the wok or use a clean pan. Add a touch of butter and crack in the eggs. Scramble them low and slow — stir gently and pull off heat while still slightly underdone and glossy. They'll finish cooking from residual heat. Soft, custardy eggs fold into the rice beautifully rather than becoming rubbery chunks.",tip:"Salt your eggs just before scrambling, not ahead of time — pre-salting draws out moisture and makes them watery."},{t:"Fry the rice and combine everything",a:"Add the cold rice to the hot wok and press it flat. Let it sit undisturbed for 60–90 seconds so the bottom layer starts to crisp. Then toss and repeat once more. Add the soy sauce in a ring around the outer edge of the wok (not directly on the rice) so it hits the hot metal first and caramelizes slightly before mixing in. Return the chicken and eggs, then add diced onions and carrots. Toss everything together over high heat for 2 minutes. Taste and adjust salt.",tip:"Add a few drops of sesame oil right at the end, off the heat, for aromatic depth. It burns easily if cooked too long."}]},
{name:"Spaghetti Bolognese",category:"dinner",ingredients:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],chefSteps:[{t:"Build your soffritto base",a:"Finely dice the onions and mince the garlic. Cook them in olive oil over medium-low heat for 10–12 minutes, stirring occasionally, until completely softened and lightly golden — not browned. This slow cook transforms them from sharp and pungent into sweet and deeply savory. This is the flavor foundation that separates a good bolognese from a great one.",tip:"Patience here pays dividends. Rushing the soffritto leaves a raw, one-dimensional base."},{t:"Brown the beef deeply",a:"Raise heat to medium-high and add the ground beef in a single layer if possible. Do not stir for the first 3–4 minutes — you want a real sear, not a gray steam. Once a crust develops on the bottom, break it apart and continue browning. Season with salt and pepper. The goal is deeply caramelized, not just gray and cooked. Drain any excess fat if needed, but leave a little for richness.",tip:"Use 80/20 ground beef for best flavor. Leaner beef dries out and lacks richness."},{t:"Build and simmer the sauce",a:"Add the crushed or diced tomatoes and stir to combine. Bring to a gentle bubble, then reduce to a low simmer. Cook uncovered for at least 25–30 minutes, stirring every few minutes. The sauce should reduce and thicken until it clings to a spoon rather than sliding off watery. Add a small pinch of sugar if the tomatoes taste sharp. Taste and adjust salt.",tip:"A splash of whole milk or cream added in the last 5 minutes of simmering mellows acidity and adds silkiness — a classic Italian trick."},{t:"Cook and combine the pasta",a:"Boil pasta in heavily salted water until just shy of al dente — about 1 minute less than the package says. Reserve a large mug of pasta water before draining. Add the pasta directly into the sauce and toss over medium heat for 1–2 minutes, adding splashes of pasta water to loosen and emulsify. The starchy water helps the sauce coat every strand.",tip:"Never rinse your pasta. The surface starch is what makes sauce stick."}]},
{name:"Chicken Tacos",category:"dinner",ingredients:["Chicken breast","Tortilla","Cheese","Onions","Lime"],chefSteps:[{t:"Season and cook the chicken",a:"Flatten the chicken breasts to an even thickness by pounding with a pan or rolling pin. Season both sides generously with salt, pepper, cumin, and a pinch of paprika. Heat a cast iron or heavy skillet over medium-high until very hot. Cook 4–5 minutes per side without moving, then rest for 5 minutes before slicing.",tip:"Slice against the grain for the most tender bite."},{t:"Char the tortillas",a:"Place corn tortillas directly over a gas burner flame and char for 15–20 seconds per side. Stack them in a folded kitchen towel to keep warm and pliable.",tip:"Never skip charring. A raw, untoasted tortilla tastes like paper."},{t:"Build and finish with lime",a:"Layer sliced chicken on the tortilla, then add finely diced raw onion, shredded cheese, and any other toppings. Finish with a generous squeeze of fresh lime over the entire taco just before eating.",tip:"Street taco style: keep toppings minimal and quality."}]},
{name:"Garlic Butter Shrimp Pasta",category:"dinner",ingredients:["Shrimp","Pasta","Butter","Garlic","Lemon"],chefSteps:[{t:"Prep the shrimp properly",a:"Pat the shrimp completely dry with paper towels. Season with salt, pepper, and a pinch of red pepper flakes.",tip:"Dry shrimp = sear. Wet shrimp = steam."},{t:"Cook pasta and reserve water",a:"Cook pasta until 1 minute shy of al dente. Before draining, scoop out a full cup of starchy pasta water.",tip:"The pasta water is the secret sauce ingredient."},{t:"Make the garlic butter sauce",a:"Melt butter slowly until it foams. Add thinly sliced garlic and cook 60–90 seconds until fragrant and just barely golden.",tip:"Keep the heat moderate for the garlic."},{t:"Sear shrimp and bring it together",a:"Add shrimp in a single layer and cook 90 seconds per side until pink and curled. Return shrimp, squeeze in fresh lemon juice, and toss once more.",tip:"Shrimp are done the moment they form a 'C' shape."}]},
{name:"Beef Stir Fry",category:"dinner",ingredients:["Ground beef","Broccoli","Soy sauce","Carrots","Rice"],chefSteps:[{t:"Prep your vegetables",a:"Cut broccoli into small, uniform florets. Slice carrots on a diagonal for more surface area. Have everything ready before you turn on the heat.",tip:"The diagonal cut on carrots isn't just aesthetic — more surface area means faster, more even cooking."},{t:"Brown the beef with intention",a:"Heat the wok until it just starts to smoke, then add oil and the ground beef in one layer. Leave completely untouched for 2–3 minutes to develop a deep brown crust.",tip:"Those dark bits stuck to the pan are flavor."},{t:"Stir fry the vegetables",a:"Push beef to the side. Add carrots first (they take longest), cook 2 minutes, then add broccoli. Cook over high heat, stirring constantly.",tip:"If the pan starts to dry out, add a tablespoon of water."},{t:"Build and finish the sauce",a:"Drizzle soy sauce around the edges of the wok so it caramelizes before mixing in. Add honey or brown sugar to balance, a splash of sesame oil off the heat.",tip:"Add a teaspoon of cornstarch mixed with water for a thicker, glossy sauce."}]},
{name:"Grilled Cheese",category:"lunch",ingredients:["Bread","Cheese","Butter"],chefSteps:[{t:"Prepare the bread and butter",a:"Use thick-cut bread. Soften the butter to room temperature so it spreads easily all the way to the edges without tearing.",tip:"Mayo on the outside instead of butter gives an incredibly even, deep golden crust."},{t:"Choose and layer the cheese",a:"Use a blend: something melty (American, fontina) combined with something flavorful (sharp cheddar). Grate your own — pre-shredded has anti-caking powder that prevents smooth melting.",tip:"Grating your own cheese makes a huge difference."},{t:"Cook low and slow for perfection",a:"Place in a cold or barely warm pan, then turn to medium-low. Cook 3–4 minutes per side. If bread is golden but cheese isn't melted, cover with a lid for 60 seconds.",tip:"The lid trick is the single best technique for perfectly melted cheese without burnt bread."}]},
{name:"Lindzi's Breakfast Burrito",category:"breakfast",ingredients:["Eggs","Tortilla","Cheese","Bacon"],chefSteps:[{t:"Cook the bacon properly",a:"Lay bacon strips in a cold pan, then bring to medium heat. Cook until fat is rendered and edges crisp up. Reserve a teaspoon of bacon fat for the eggs.",tip:"Cold pan start for bacon prevents curling."},{t:"Make perfect soft scrambled eggs",a:"Whisk eggs with a pinch of salt. Add to the bacon fat pan over medium-low heat. Stir constantly, pulling pan off heat periodically. Remove when slightly underdone and glossy.",tip:"Low and slow gives you creamy, custardy eggs."},{t:"Warm tortilla and wrap tightly",a:"Warm a large flour tortilla in a dry pan for 20–30 seconds per side. Layer eggs, crumbled bacon, then cheese. Fold sides in, roll from bottom up, then seal seam-side down.",tip:"Don't overfill. Less is more for a clean wrap."}]},
{name:"Chicken Curry",category:"dinner",ingredients:["Chicken breast","Curry powder","Coconut milk","Onions"],chefSteps:[{t:"Build the aromatics base",a:"Dice onions finely and cook in oil over medium heat for 12–15 minutes until deeply golden. Add garlic in the last 2 minutes.",tip:"Under-cooked onions make a sharp, acrid curry."},{t:"Bloom the curry powder",a:"Add the curry powder to the onion-garlic mixture and stir constantly for 60–90 seconds over medium heat.",tip:"Blooming spices in fat is the single most important step in curry."},{t:"Add and brown the chicken",a:"Cube chicken into 1.5-inch chunks. Add to the pot and stir to coat. Cook over medium-high heat for 3–4 minutes until the chicken develops some color.",tip:"Don't rush to add liquid. Let the chicken sear in the spices first."},{t:"Simmer to finish",a:"Pour in the coconut milk. Bring to a gentle simmer. Cook 15–20 minutes uncovered until the sauce thickens.",tip:"A squeeze of lime juice just before serving brightens the whole dish."}]},
{name:"Veggie Omelette",category:"breakfast",ingredients:["Eggs","Bell peppers","Onions","Cheese"],chefSteps:[{t:"Prep and cook the vegetables",a:"Dice bell peppers and onions into small, even pieces. Cook in butter over medium heat for 3–4 minutes until softened and slightly caramelized. Remove and set aside.",tip:"Slightly undercooked vegetables are okay — they'll warm through again."},{t:"Whisk eggs properly",a:"Crack 3 eggs into a bowl and whisk vigorously for a full 30 seconds until slightly frothy. Season with salt. Add a teaspoon of water or milk for extra tenderness.",tip:"Vigorous whisking makes the difference between a fluffy omelette and a dense one."},{t:"Cook and fold the omelette",a:"Melt butter until it foams. Pour in eggs. Let sit 10 seconds, then pull cooked edges inward while tilting pan. When mostly set but still glossy, add filling on one half and fold.",tip:"The goal is no color on the exterior and a custardy interior."}]},
{name:"BBQ Chicken Sandwich",category:"lunch",ingredients:["Chicken breast","BBQ sauce","Bread","Onions"],chefSteps:[{t:"Cook chicken to stay juicy",a:"Pound chicken breasts to an even 3/4-inch thickness. Season with salt, pepper, smoked paprika, and garlic powder. Cook 4–5 minutes per side without pressing or poking.",tip:"Never press or poke the chicken while it cooks."},{t:"Caramelize the onions",a:"Slice onions into thin rings. Cook in butter over medium-low heat for 20–25 minutes until deeply golden, jammy, and sweet.",tip:"True caramelized onions take 20+ minutes."},{t:"Sauce and assemble",a:"Toss sliced chicken in BBQ sauce over low heat. Toast bread cut-side down in butter until golden. Layer and serve immediately.",tip:"Toast the bread. Untoasted bread gets soggy within seconds."}]},
{name:"Salmon Lemon Herb",category:"dinner",ingredients:["Salmon","Lemon","Garlic","Olive oil"],chefSteps:[{t:"Prep the salmon",a:"Bring salmon to room temperature 15–20 minutes before cooking. Pat completely dry. Score the skin lightly every inch to prevent curling.",tip:"Dry fish sears beautifully. Wet fish steams."},{t:"Achieve the perfect sear",a:"Heat a cast iron skillet over medium-high until very hot. Add olive oil. Place salmon skin-side DOWN and press gently for 10 seconds. Cook skin-side down for 4 minutes without touching.",tip:"Do not move the salmon. It will release naturally when properly seared."},{t:"Finish and rest",a:"Flip and cook flesh-side down for just 60–90 seconds. Let rest in the pan 2 minutes. Finish with garlic sautéed in butter and squeeze fresh lemon over just before serving.",tip:"Overcooked salmon is dry and chalky. Pull it when the thickest part still looks slightly underdone."}]},
{name:"Chicken Alfredo",category:"dinner",ingredients:["Chicken breast","Pasta","Cream","Parmesan"],chefSteps:[{t:"Cook and rest the chicken",a:"Season and sear in a hot pan — 5 minutes per side until golden. Rest 5 full minutes before slicing. Deglaze the pan with a splash of cream into your sauce.",tip:"Those browned bits from chicken are concentrated flavor."},{t:"Make a real Alfredo sauce",a:"Melt butter, add minced garlic for 60 seconds. Pour in heavy cream, simmer 3–4 minutes. Lower heat to minimum, then add freshly grated Parmesan in small handfuls.",tip:"Freshly grated Parmesan is essential. Pre-grated contains cellulose that prevents proper melting."},{t:"Combine and serve immediately",a:"Add cooked pasta to the sauce and toss to coat. Add reserved pasta water by the tablespoon if needed. Slice rested chicken and arrange on top.",tip:"Alfredo thickens rapidly as it cools. Serve immediately in warm bowls."}]},
{name:"Tuna Sandwich",category:"lunch",ingredients:["Tuna","Bread","Mayonnaise"],chefSteps:[{t:"Make a proper tuna mix",a:"Drain tuna very thoroughly — press firmly in the strainer. Combine with mayonnaise and mix just until combined. Season with salt, pepper, a squeeze of lemon, and optional Dijon.",tip:"Start with less mayo than you think."},{t:"Toast and assemble thoughtfully",a:"Toast bread until golden and crisp. Let cool 60 seconds. Spread a thin layer of mayo on both sides as a moisture barrier. Add tuna mix and lettuce if available.",tip:"Lettuce between bread and tuna is a moisture barrier, not just garnish."}]},
{name:"Pancakes",category:"breakfast",ingredients:["Flour","Milk","Eggs","Sugar"],chefSteps:[{t:"Mix the batter correctly",a:"Combine dry ingredients in one bowl, wet in another. Pour wet into dry and stir until just combined — lumps are fine and expected. Let rest 5 minutes.",tip:"Lumpy batter makes fluffy pancakes. Smooth batter makes tough ones."},{t:"Cook with control",a:"Add butter to pan — when it foams and subsides, the pan is ready. Pour about ¼ cup per pancake. Flip only when bubbles pop and stay open. Flip once only.",tip:"Flip once. Every extra flip deflates the rise."}]},
{name:"Fried Chicken",category:"dinner",ingredients:["Chicken breast","Flour","Oil"],chefSteps:[{t:"Season the flour and prep for coating",a:"Season flour generously with salt, pepper, garlic powder, paprika, and cayenne. Dip chicken in buttermilk or egg, then press firmly into the seasoned flour. Let sit on a rack 10 minutes.",tip:"Pressing the flour coating onto the chicken is critical."},{t:"Fry at the right temperature",a:"Heat oil to 350°F. Fry in batches — never crowd the pot. Cook 6–8 minutes for breast pieces, turning halfway. Rest on a rack, never paper towels.",tip:"A wire rack keeps the bottom crust crispy. Paper towels destroy the crunch."}]},
{name:"Chicken Noodle Soup",category:"lunch",ingredients:["Chicken broth","Chicken breast","Carrots","Noodles"],chefSteps:[{t:"Build flavor into the broth",a:"Sauté diced onion, sliced carrots, and celery in butter for 5–6 minutes. Add garlic for the last minute. Deglaze with broth. Simmer 15 minutes before adding chicken.",tip:"Sautéing vegetables before adding broth builds flavor most people skip."},{t:"Poach the chicken gently",a:"Add raw chicken breasts to gently simmering broth. Keep at a very gentle simmer — never boiling. Cook 15–18 minutes, then shred with two forks.",tip:"Poaching at 180°F gives silky chicken. Boiling at 212°F gives rubbery chicken."},{t:"Add noodles and finish",a:"Bring broth back to a boil and add noodles. Cook 1–2 minutes less than the package says. Return shredded chicken. Finish with parsley and a squeeze of lemon.",tip:"Add noodles last and cook them slightly underdone."}]},
{name:"Simple Chili",category:"dinner",ingredients:["Ground beef","Tomatoes","Beans"],chefSteps:[{t:"Brown the beef deeply",a:"Cook ground beef over medium-high heat. Don't stir for 3–4 minutes to develop a deep brown crust. Season with salt, pepper, cumin, chili powder, and smoked paprika.",tip:"Pale gray beef makes for a thin-tasting, one-dimensional chili."},{t:"Build and simmer the chili",a:"Add crushed tomatoes and deglaze. Add beans. Simmer uncovered for 30–40 minutes until thick. Taste and adjust seasoning.",tip:"Chili is always better the next day."}]},
{name:"Mac And Cheese",category:"lunch",ingredients:["Pasta","Cheddar","Milk","Butter"],chefSteps:[{t:"Cook pasta perfectly",a:"Boil pasta in heavily salted water to just barely al dente — 1 minute less than the package minimum. Reserve a cup of pasta water.",tip:"Under-cooking pasta slightly is deliberate."},{t:"Make a proper béchamel cheese sauce",a:"Melt butter, whisk in equal flour and cook 60–90 seconds. Slowly pour in warm milk while whisking. Cook 4–5 minutes until thickened. Season with salt, pepper, and mustard powder.",tip:"Adding cold milk to a hot roux causes lumps. Warm your milk first."},{t:"Melt in the cheese and combine",a:"Remove sauce from heat. Stir in freshly grated sharp cheddar in small handfuls off the heat. Add pasta and toss, adding pasta water to reach a flowing, creamy consistency.",tip:"Never add cheese to a sauce that's actively boiling."}]},
{name:"Steak And Potatoes",category:"dinner",ingredients:["Steak","Potatoes","Butter","Garlic"],chefSteps:[{t:"Prep and dry brine the steak",a:"Season steak generously with salt at least 40 minutes before cooking. Pat dry with paper towels right before cooking.",tip:"Dry brining overnight transforms cheap steaks."},{t:"Get a restaurant-quality sear",a:"Use a cast iron skillet. Heat empty over high heat 3–4 minutes. Add oil, lay steak away from you, don't touch for 2–3 minutes. Baste with butter, garlic, and thyme in the last minute.",tip:"The butter baste is the single biggest upgrade to home steak cooking."},{t:"Rest the steak — non-negotiable",a:"Rest on a cutting board for AT LEAST 5 minutes. While it rests, cook diced potatoes in the same buttery pan.",tip:"Rest time equals cut thickness in minutes as a rough guide."}]},
{name:"Shrimp Tacos",category:"dinner",ingredients:["Shrimp","Tortilla","Lime","Cheese"],chefSteps:[{t:"Season and sear the shrimp",a:"Pat shrimp dry. Season with salt, pepper, cumin, and chili powder. Cook 60–90 seconds per side until pink and curl into a C shape. Squeeze lime into the hot pan at the end.",tip:"Shrimp go from perfect to overcooked in under 30 seconds."},{t:"Make a quick slaw or sauce",a:"Shred cabbage and toss with lime juice, salt, and a small amount of mayo or sour cream for a quick slaw.",tip:"Acid (lime) is what makes tacos bright and fresh."},{t:"Char tortillas and assemble",a:"Char corn tortillas 15–20 seconds per side. Double up two small tortillas per taco. Layer shrimp, slaw, cheese, and finish with fresh lime.",tip:"Two tortillas per taco is the street taco standard."}]},
{name:"Loaded Baked Potato",category:"lunch",ingredients:["Potatoes","Cheddar","Bacon","Butter"],chefSteps:[{t:"Bake the potato properly",a:"Rub all over with oil and coat generously with coarse salt. Pierce all over with a fork. Place directly on the oven rack at 400°F for 50–60 minutes.",tip:"Oven rack placement is key. Airflow all around = crispy skin."},{t:"Prepare toppings while potato bakes",a:"Cook bacon cold-pan-start until crispy. Drain and crumble. Grate the cheddar fresh.",tip:"Grating your own cheddar melts more smoothly."},{t:"Open and load the potato",a:"Cut a slit across the top and squeeze both ends to open. Drop in butter first, then sour cream, cheddar, and bacon.",tip:"The butter goes in first. It melts into every crevice."}]},
{name:"Teriyaki Chicken",category:"dinner",ingredients:["Chicken breast","Teriyaki sauce","Rice","Broccoli"],chefSteps:[{t:"Prep and sear the chicken",a:"Slice chicken breasts in half horizontally to create thinner cutlets. Pat dry and season lightly. Sear 3–4 minutes per side until golden.",tip:"Thin cutlets cook in half the time and stay juicier."},{t:"Make or reduce the teriyaki glaze",a:"Add bottled teriyaki sauce to the empty pan and cook over medium heat for 2–3 minutes until it reduces and becomes noticeably thicker and glossier.",tip:"Reduced teriyaki sauce is completely different from the straight-from-bottle version."},{t:"Steam the broccoli and plate",a:"Steam broccoli until bright green and just tender. Serve glazed chicken sliced over rice with broccoli on the side.",tip:"Bright green broccoli means it's cooked right."}]},
{name:"French Toast",category:"breakfast",ingredients:["Bread","Eggs","Milk","Butter"],chefSteps:[{t:"Make the custard soak",a:"Whisk together eggs, milk, a pinch of salt, a teaspoon of sugar, and vanilla extract. Whisk until completely smooth.",tip:"Using cream instead of milk gives you a richer, more custardy interior."},{t:"Soak the bread properly",a:"Use thick-cut bread. Let each slice soak for 20–30 seconds per side — you want the custard to fully penetrate.",tip:"Stale bread works better than fresh. It absorbs the custard without getting soggy."},{t:"Cook to golden perfection",a:"Melt butter over medium heat until it foams. Cook 2–3 minutes per side until deep golden-brown.",tip:"Medium heat is key. Too high = burnt outside, raw custard inside."}]},
{name:"Creamy Mushroom Pasta",category:"dinner",ingredients:["Pasta","Mushrooms","Cream","Garlic"],chefSteps:[{t:"Brown the mushrooms properly",a:"Spread mushrooms in a single layer in a hot, dry pan. Let sit undisturbed for 2–3 minutes until moisture evaporates. Only then add butter and continue cooking until deeply golden-brown. Season with salt only after browning.",tip:"The mushroom moisture must fully evaporate before browning begins."},{t:"Build the sauce",a:"Add minced garlic and cook 60 seconds. Add a splash of white wine or pasta water. Pour in cream and simmer 4–5 minutes until thick. Finish with freshly grated Parmesan.",tip:"A small pinch of freshly grated nutmeg in a cream sauce adds warmth and depth."},{t:"Combine pasta and serve",a:"Add pasta directly to the mushroom cream sauce and toss, adding pasta water as needed for a silky consistency.",tip:"The pasta water transforms a cream sauce from heavy to light and glossy."}]},
{name:"Chicken Quesadilla",category:"lunch",ingredients:["Chicken breast","Tortilla","Cheese","Butter"],chefSteps:[{t:"Cook and season the chicken",a:"Dice chicken into small cubes and season with salt, pepper, cumin, and smoked paprika. Don't stir for the first 2 minutes to develop a sear.",tip:"Slightly cooled chicken filling gives the quesadilla time to crisp before the cheese melts."},{t:"Build and seal the quesadilla",a:"Grate cheese fresh. Spread cheese on one half of a large flour tortilla, then add chicken on top. Fold over. Brush outside with softened butter.",tip:"Cheese underneath the filling is what holds the quesadilla together when you cut it."},{t:"Cook for maximum crunch",a:"Place in a dry pan over medium heat. Press firmly with a spatula and cook 2–3 minutes until deeply golden. Flip and repeat.",tip:"No oil in the pan — the butter on the outside is enough."}]},
{name:"Honey Garlic Chicken",category:"dinner",ingredients:["Chicken breast","Honey","Garlic","Soy sauce","Rice"],chefSteps:[{t:"Pound and sear the chicken",a:"Pound to an even 3/4-inch thickness. Sear in a hot skillet — 4 minutes per side without moving. Remove and set aside on a plate. Don't wipe the pan.",tip:"The fond left in the pan after searing is the most flavorful part of your dish."},{t:"Build the honey garlic sauce",a:"Add minced garlic to the same pan and cook 60 seconds. Add honey, soy sauce, and a splash of water. Simmer 2–3 minutes until slightly reduced and glossy.",tip:"If the sauce tastes too sweet, a small splash of rice vinegar will balance it."},{t:"Glaze and finish",a:"Return chicken to the pan and spoon the sauce over it continuously for 2–3 minutes. The chicken will develop a lacquered, glossy coating.",tip:"Continuous basting creates a professional-looking, deeply flavored glaze."}]},
{name:"Pulled Pork",category:"dinner",ingredients:["Pork chops","BBQ sauce","Onions","Garlic","Brown sugar"],chefSteps:[{t:"Build the dry rub",a:"Combine brown sugar, salt, black pepper, paprika, garlic powder, and cayenne. Pat pork dry then coat every surface generously. Let sit in fridge at least 1 hour, ideally overnight.",tip:"Overnight dry brining makes the difference between surface and deep seasoning."},{t:"Build flavor before slow cooking",a:"Sear the pork in a hot pan — 2 minutes per side until dark brown. Place in slow cooker with sliced onions, minced garlic, and a splash of broth. Cook low and slow 8–10 hours.",tip:"The sear creates a flavor crust that survives the long cook."},{t:"Shred and finish with sauce",a:"Shred with two forks pulling along the grain. Add cooking juices back into the meat. Stir in BBQ sauce gradually.",tip:"Always add some cooking juices back."}]},
{name:"Egg Fried Noodles",category:"lunch",ingredients:["Noodles","Eggs","Soy sauce","Onions","Oil"],chefSteps:[{t:"Cook and dry the noodles",a:"Boil noodles, drain and rinse briefly under cold water. Toss with a few drops of oil. Spread on a plate to air dry for a few minutes.",tip:"The cold rinse and oil toss are non-negotiable."},{t:"Fry noodles for char",a:"Heat a wok over the highest heat your stove produces. Spread noodles flat and leave undisturbed for 90 seconds to develop golden-brown spots.",tip:"High heat and patience is everything. Stirring constantly just steams them."},{t:"Add eggs and season",a:"Push noodles to the side. Crack eggs in and scramble quickly — 30–40 seconds — then immediately fold through the noodles. Add soy sauce around the edge of the wok.",tip:"Folding eggs into noodles while still slightly wet creates a glossy coating."}]},
{name:"Caesar Salad",category:"lunch",ingredients:["Lettuce","Parmesan","Olive oil","Garlic","Lemon"],chefSteps:[{t:"Make the dressing from scratch",a:"Mince garlic almost to a paste. Whisk with lemon juice, Worcestershire, and Dijon mustard. Slowly drizzle in olive oil while whisking constantly. Stir in grated Parmesan.",tip:"Whisking the oil in slowly is what creates an emulsified dressing."},{t:"Prep the romaine properly",a:"Use only the inner leaves of romaine. Wash and dry completely. Wet lettuce dilutes the dressing.",tip:"Drying the lettuce is as important as making the dressing."},{t:"Dress and serve immediately",a:"Add dressing to the bowl first, then add lettuce and toss. Add shaved Parmesan over the top.",tip:"Dress just before serving. A dressed Caesar left for 10 minutes turns limp."}]},
{name:"Spicy Ramen",category:"lunch",ingredients:["Ramen noodles","Eggs","Soy sauce","Chicken broth","Mushrooms"],chefSteps:[{t:"Build a proper broth base",a:"Start with chicken broth. Add soy sauce, sesame oil, minced garlic, and chili paste. Bring to a gentle simmer and let cook for 10 minutes.",tip:"A 10-minute simmer transforms store-bought broth."},{t:"Make soft-boiled ramen eggs",a:"Boil eggs exactly 6 minutes 30 seconds. Transfer immediately to an ice bath for 5 minutes. Peel and slice in half just before serving.",tip:"The ice bath stops cooking instantly."},{t:"Cook noodles separately and assemble",a:"Cook ramen noodles in a separate pot of plain boiling water. Sauté mushrooms in butter until golden. Ladle hot broth over everything. Top with the halved soft-boiled egg.",tip:"Cooking noodles in plain water keeps the broth clear and clean-tasting."}]},
{name:"Daniel's Stuffed Bell Peppers",category:"dinner",ingredients:["Bell peppers","Ground beef","Rice","Tomatoes","Cheese"],chefSteps:[{t:"Pre-cook the peppers",a:"Slice tops off bell peppers and remove seeds. Place cut-side down on a baking tray and roast at 400°F for 10 minutes.",tip:"Pre-roasting is the step most recipes skip."},{t:"Build a flavorful filling",a:"Brown ground beef deeply. Season with salt, pepper, garlic powder, and paprika. Add diced tomatoes and cooked rice. Simmer 3–4 minutes.",tip:"Over-season the filling slightly. The pepper will dilute the flavor."},{t:"Fill, top, and bake",a:"Pack filling firmly, mounding above the rim. Top generously with shredded cheese. Bake at 375°F for 20–25 minutes until cheese is bubbling.",tip:"Packing the filling firmly prevents it from shrinking away from the sides."}]},
{name:"Pesto Pasta",category:"dinner",ingredients:["Pasta","Basil","Parmesan","Olive oil","Garlic"],chefSteps:[{t:"Make proper pesto",a:"Combine fresh basil, Parmesan, garlic, and salt in a food processor. Pulse until roughly chopped. With motor running, slowly drizzle in olive oil.",tip:"Over-processing turns pesto warm and bitter. Short pulses only."},{t:"Cook pasta and reserve water",a:"Cook pasta in well-salted water until al dente. Reserve a full cup of pasta water before draining.",tip:"The pasta water is what makes pesto saucy instead of clumpy."},{t:"Combine off the heat",a:"Let drained pasta cool 30 seconds before adding pesto — hot pasta oxidizes the basil and turns it brown. Toss with pasta water until glossy.",tip:"Off-heat mixing preserves the bright green color."}]},
{name:"Fish Tacos",category:"dinner",ingredients:["Salmon","Tortilla","Lime","Cabbage","Mayonnaise"],chefSteps:[{t:"Season and cook the fish",a:"Pat salmon dry and season with salt, pepper, cumin, and chili powder. Cook skin-side up 3 minutes, then flip and cook 2 more minutes. Break into large flakes.",tip:"Don't move the fish for the first 3 minutes."},{t:"Make the lime crema slaw",a:"Shred cabbage and toss with lime juice and salt. Let sit 5 minutes. Stir in a spoonful of mayonnaise and another squeeze of lime.",tip:"Letting cabbage sit in lime juice for 5 minutes transforms it."},{t:"Char tortillas and build",a:"Char corn tortillas 15 seconds per side. Double them up per taco. Layer slaw first, then flaked fish, then a squeeze of lime.",tip:"Slaw underneath the fish keeps everything in place."}]},
{name:"Vegetable Curry",category:"dinner",ingredients:["Potatoes","Chickpeas","Coconut milk","Curry powder","Tomatoes","Onions"],chefSteps:[{t:"Build the flavor base",a:"Dice onions finely and cook in oil for 12 minutes until deeply golden. Add garlic, then curry powder and stir constantly for 90 seconds. Add diced tomatoes and cook 5 more minutes.",tip:"The oil separating from the tomato-spice mixture signals the base is properly cooked."},{t:"Add vegetables and build the curry",a:"Add cubed potatoes and chickpeas and stir to coat. Cook 3 minutes in the spiced oil before adding liquid. Pour in coconut milk and enough water to just cover.",tip:"Toasting vegetables in spice base before adding liquid builds flavor."},{t:"Simmer to finish",a:"Simmer uncovered 20–25 minutes until potatoes are tender and the sauce has thickened. Finish with a squeeze of lime.",tip:"Pressing some chickpeas against the pot thickens the curry naturally."}]},
{name:"Beef Tacos",category:"dinner",ingredients:["Ground beef","Tortilla","Cheese","Tomatoes","Onions","Lime"],chefSteps:[{t:"Season and brown the beef properly",a:"Cook ground beef over medium-high. Don't stir for 3 minutes — let a deep brown crust develop. Season with salt, pepper, cumin, chili powder, garlic powder, and oregano.",tip:"The dark bits from browning are where all the taco flavor lives."},{t:"Make a quick fresh salsa",a:"Dice tomatoes and onions. Combine with lime, salt, and optional cilantro. Let sit 5 minutes.",tip:"Salting the salsa and letting it rest 5 minutes creates a cohesive, saucy texture."},{t:"Char tortillas and build",a:"Char corn tortillas 15 seconds per side. Double up two tortillas per taco. Layer beef, fresh salsa, and shredded cheese. Finish with a squeeze of lime.",tip:"Fresh lime squeezed right before eating brightens every other flavor."}]},
{name:"Liam's Banana Pancakes",category:"breakfast",ingredients:["Bananas","Eggs","Oats","Butter"],chefSteps:[{t:"Choose ripe bananas and make the batter",a:"Use very ripe bananas — deeply spotted or nearly black. Mash thoroughly. Whisk in eggs. If using oats, blend them first to create a fine flour.",tip:"Overripe bananas you'd never eat are the best bananas for this."},{t:"Rest the batter",a:"Let the batter rest 5 minutes after mixing. If it seems too thick, add a splash of milk.",tip:"Rested batter makes fluffier pancakes."},{t:"Cook low and slow",a:"Melt butter in a non-stick pan over medium-low heat. Pour small amounts — about 3 tablespoons each. Cook until bubbles form and edges look set, then flip gently.",tip:"Smaller pancakes are easier to flip. Banana batter is delicate."}]},
{name:"Sausage And Peppers",category:"dinner",ingredients:["Sausage","Bell peppers","Onions","Olive oil","Garlic"],chefSteps:[{t:"Sear the sausage for color",a:"Slice sausages into 1-inch rounds. Heat a wide pan over medium-high. Add sausage and don't touch for 2–3 minutes to get a deep brown sear on the cut faces.",tip:"Leaving the sausage undisturbed for the sear is critical."},{t:"Build the peppers and onions",a:"In the same pan with the sausage drippings, add sliced bell peppers and onions. Cook over medium heat 12–15 minutes until soft and slightly jammy. Add garlic in the last 2 minutes.",tip:"The sausage drippings are the secret flavor base."},{t:"Combine and finish",a:"Return the sausage, add a small splash of water to deglaze, and cook together over medium heat for 5 minutes.",tip:"The final 5 minutes together allows the sausage to absorb the pepper and onion flavors."}]},
{name:"Shakshuka",category:"breakfast",ingredients:["Eggs","Tomatoes","Bell peppers","Onions","Garlic","Paprika"],chefSteps:[{t:"Build the tomato sauce base",a:"Cook diced onions and bell peppers in olive oil 8 minutes. Add garlic, then paprika, cumin, and cayenne for 60 seconds. Add crushed tomatoes and simmer 15 minutes uncovered until thick.",tip:"A properly reduced sauce is essential."},{t:"Poach the eggs in the sauce",a:"Create small wells in the sauce. Crack eggs one at a time into a cup first, then gently slide each into a well. Cover and cook over medium-low heat for 5–7 minutes.",tip:"Cracking eggs into a cup first gives you control."},{t:"Serve directly from the pan",a:"Shakshuka waits for no one — serve immediately. Finish with a drizzle of olive oil and cracked black pepper.",tip:"Every minute off heat the yolks continue to set."}]},
{name:"Baked Salmon",category:"dinner",ingredients:["Salmon","Olive oil","Lemon","Garlic","Parsley"],chefSteps:[{t:"Prep and season the salmon",a:"Bring salmon to room temperature 15 minutes before cooking. Pat dry. Mix minced garlic, olive oil, salt, pepper, and lemon zest into a paste and spread over the flesh side. Lay thin lemon slices on top.",tip:"Lemon slices on top create a steam barrier that keeps the fish moist."},{t:"Bake at the right temperature",a:"Bake at 400°F for 12–15 minutes depending on thickness. The fish is done when it flakes easily but the center still looks slightly translucent.",tip:"Pull salmon 1–2 minutes before it looks fully done."},{t:"Rest and finish",a:"Rest on the tray for 2 minutes. Squeeze fresh lemon directly over the fish right before serving and scatter chopped fresh parsley.",tip:"Lemon zest adds fragrance throughout cooking. Fresh lemon juice at the end adds brightness."}]},
{name:"Loaded Nachos",category:"lunch",ingredients:["Crackers","Cheddar","Ground beef","Tomatoes","Onions","Beans"],chefSteps:[{t:"Season the beef and build the base",a:"Brown ground beef with spices. Spread chips in a single layer on a baking tray — not piled up. Distribute beef and beans evenly across every chip.",tip:"Single layer nachos every time."},{t:"Layer cheese properly",a:"Grate cheese fresh. Distribute evenly over everything. Bake at 400°F for 8–10 minutes until cheese is fully melted.",tip:"Cheese goes on last, directly over everything."},{t:"Add fresh toppings after baking",a:"Never bake fresh toppings. Add cold toppings immediately after pulling from the oven: diced tomatoes, raw onion, sour cream, and salsa.",tip:"Hot + cold contrast is what makes nachos great."}]},
{name:"Creamy Tomato Soup",category:"lunch",ingredients:["Tomatoes","Cream","Onions","Garlic","Butter","Chicken broth"],chefSteps:[{t:"Roast the tomatoes first",a:"Halve tomatoes, drizzle with olive oil, salt, and pepper. Roast at 400°F for 25–30 minutes until caramelized and slightly charred at the edges.",tip:"Roasting vs. boiling tomatoes is the single biggest quality difference."},{t:"Build and simmer the soup",a:"Add roasted tomatoes and juices to the pot with sautéed onions. Pour in chicken broth and simmer 10 minutes. Blend until completely smooth.",tip:"Never fill a blender more than halfway with hot liquid."},{t:"Finish with cream and season",a:"Return blended soup to the pot. Stir in heavy cream and heat gently — don't boil after adding cream. Taste and adjust salt aggressively.",tip:"Adding cream then immediately boiling breaks the emulsion."}]},
{name:"Turkey Meatballs",category:"dinner",ingredients:["Turkey","Eggs","Breadcrumbs","Garlic","Parmesan","Olive oil"],chefSteps:[{t:"Mix the meatball base correctly",a:"Combine ground turkey with a beaten egg, breadcrumbs soaked in milk, minced garlic, grated Parmesan, salt, pepper, and oregano. Mix with hands until just combined.",tip:"The milk-soaked breadcrumb (panade) is the difference between juicy and dry meatballs."},{t:"Roll and sear for color",a:"Wet your hands lightly with water and roll into uniform 1.5-inch balls. Sear in olive oil in batches — don't crowd. Cook 2 minutes per side until golden.",tip:"Wet hands make rolling effortless."},{t:"Finish in sauce",a:"Transfer seared meatballs to a pot of simmering tomato sauce or chicken broth. Simmer gently for 15–20 minutes.",tip:"Finishing in liquid is what keeps turkey meatballs moist."}]},
{name:"Avocado Toast",category:"breakfast",ingredients:["Avocado","Bread","Lemon","Salt","Eggs"],chefSteps:[{t:"Choose and prepare the avocado",a:"Use a ripe avocado. Add a generous squeeze of lemon immediately after scooping. Mash with a fork to your preferred texture. Season with flaky salt and black pepper.",tip:"The lemon goes in before tasting, not after."},{t:"Toast the bread properly",a:"Toast thick-cut sourdough until deeply golden and crisp. For extra flavor, rub the hot toast immediately with a cut clove of raw garlic.",tip:"Rubbing hot toast with raw garlic is a life-changing move."},{t:"Build and finish",a:"Spread avocado generously right before eating — never ahead of time. Top with a soft-poached egg if desired. Finish with flaky salt, pepper, and a final squeeze of lemon.",tip:"Assemble right before eating."}]},
{name:"Sweet And Sour Chicken",category:"dinner",ingredients:["Chicken breast","Pineapple","Bell peppers","Soy sauce","Vinegar","Sugar"],chefSteps:[{t:"Prep and cook the chicken",a:"Cut chicken into uniform 1-inch cubes. Toss in cornstarch before cooking — this creates a crisp surface. Cook in a hot, oiled pan without stirring for 2–3 minutes until golden.",tip:"The cornstarch coating is what makes restaurant sweet and sour chicken crisp."},{t:"Build the sweet and sour sauce",a:"In the same pan, combine pineapple juice, rice vinegar, soy sauce, sugar, and ketchup. Mix cornstarch with cold water and pour into the simmering sauce while whisking.",tip:"Adding the cornstarch slurry to simmering liquid makes it thicken instantly."},{t:"Stir fry vegetables and combine",a:"Add diced bell peppers and cook 2 minutes. Add pineapple chunks for the last 30 seconds. Return chicken and pour sauce over. Toss over high heat 60 seconds.",tip:"The vegetables should stay slightly crunchy."}]},
{name:"Lemon Garlic Pasta",category:"dinner",ingredients:["Pasta","Lemon","Garlic","Olive oil","Parmesan"],chefSteps:[{t:"Cook pasta and build the base",a:"Cook pasta until al dente. Reserve a generous cup of pasta water. In a wide pan, warm olive oil and add garlic. Cook slowly for 2–3 minutes until fragrant and just barely golden.",tip:"Slow-cooked garlic in olive oil becomes mellow and sweet."},{t:"Build the lemon sauce",a:"Add lemon zest and cook 30 seconds. Add a big splash of pasta water and swirl. Squeeze in the juice of a whole lemon.",tip:"Zest before juice, always."},{t:"Finish with Parmesan and serve",a:"Add drained pasta and toss, adding more pasta water as needed. Remove from heat and stir in freshly grated Parmesan in small handfuls.",tip:"This dish demands freshly grated Parmesan."}]},
{name:"Potato Soup",category:"lunch",ingredients:["Potatoes","Chicken broth","Butter","Milk","Onions","Cheddar"],chefSteps:[{t:"Build the flavor base",a:"Dice onions and cook in butter for 8–10 minutes until softened and golden. Add garlic for the last minute. Add diced potatoes and stir to coat in the butter before adding any liquid.",tip:"Sautéing potatoes briefly before adding liquid creates a caramelized surface."},{t:"Simmer until tender",a:"Pour in chicken broth until potatoes are just covered. Simmer 15–20 minutes until completely tender.",tip:"Fully tender potatoes blend silky-smooth."},{t:"Blend, add dairy, and finish",a:"Use an immersion blender to blend about half the soup. Stir in milk or cream and heat gently. Add shredded cheddar off the heat in small handfuls.",tip:"Half-blend technique gives you both creamy body and satisfying potato chunks."}]},
{name:"Chicken Fajitas",category:"dinner",ingredients:["Chicken breast","Bell peppers","Onions","Tortilla","Lime"],chefSteps:[{t:"Marinate and sear the chicken",a:"Slice chicken breast into thin strips and season with salt, pepper, cumin, chili powder, garlic powder, and lime. Heat a cast iron pan until just smoking. Sear without stirring for 90 seconds.",tip:"Overcrowding drops the temperature and you'll steam instead of sear."},{t:"Char the vegetables",a:"In the same hot pan, add sliced bell peppers and onions. Cook over high heat without stirring for 2 minutes until char marks develop.",tip:"Restaurant fajitas are sizzling because of extremely high heat."},{t:"Char tortillas and serve sizzling",a:"Char flour tortillas over a gas flame or in the dry pan. Serve the chicken and vegetables immediately while still sizzling hot.",tip:"Serve immediately from the hot pan. The sizzle fades fast."}]},
{name:"Egg Drop Soup",category:"lunch",ingredients:["Eggs","Chicken broth","Cornstarch","Soy sauce","Onions"],chefSteps:[{t:"Season and thicken the broth",a:"Bring chicken broth to a gentle simmer. Season with soy sauce, sesame oil, salt, and white pepper. Mix cornstarch with cold water into a slurry and pour slowly into the simmering broth while stirring.",tip:"Cornstarch must be mixed with cold water first."},{t:"Stream eggs correctly",a:"Whisk eggs thoroughly. Stir soup in a slow circular motion to create a whirlpool. While swirling, pour the beaten eggs in a slow, thin stream from a height of 6–8 inches.",tip:"The pouring height matters — it breaks the egg into finer streams."},{t:"Finish and serve immediately",a:"Let the soup sit undisturbed for 30 seconds. Stir gently once. Ladle immediately into bowls. Garnish with sliced green onions.",tip:"Serve within 1–2 minutes of finishing."}]},
{name:"Baked Mac And Cheese",category:"dinner",ingredients:["Pasta","Cheddar","Milk","Butter","Flour","Breadcrumbs"],chefSteps:[{t:"Make the béchamel base",a:"Melt butter, add equal amount of flour and whisk constantly for 90 seconds. Pour warm milk in gradually while whisking. Cook 5–6 minutes until thick. Season with salt, pepper, mustard powder, and nutmeg.",tip:"Warm milk prevents lumps far better than cold."},{t:"Melt in cheese and combine",a:"Remove sauce from heat. Stir in freshly grated sharp cheddar in handfuls. Add cooked al-dente pasta and stir to coat thoroughly.",tip:"Make the sauce saucier than seems right before baking."},{t:"Top and bake for the crust",a:"Pour pasta into a buttered baking dish. Mix breadcrumbs with melted butter and spread in an even layer. Bake at 375°F for 25–30 minutes until the top is deep golden-brown.",tip:"Buttered breadcrumbs are the move. Plain breadcrumbs turn dry and pale."}]},
{name:"Honey Sriracha Wings",category:"lunch",ingredients:["Chicken breast","Honey","Hot sauce","Butter","Garlic","Soy sauce"],chefSteps:[{t:"Get the chicken crispy",a:"Pat chicken pieces completely dry. Season with salt, pepper, and a light coating of cornstarch or baking powder. Bake at 425°F on a wire rack over a baking tray for 35–40 minutes, flipping halfway.",tip:"Baking powder on chicken skin is the restaurant trick for incredible crispiness."},{t:"Make the honey sriracha glaze",a:"Combine honey, sriracha, soy sauce, minced garlic, and a tablespoon of butter in a saucepan. Simmer 3–4 minutes until slightly reduced and glossy.",tip:"The butter in the sauce is the 'cling' ingredient."},{t:"Toss and serve immediately",a:"Remove chicken from the oven and immediately toss in the sauce while piping hot. Serve immediately while crispy.",tip:"Toss in sauce right before serving, never ahead of time."}]},
{name:"Crispy Tofu Stir Fry",category:"tofu",ingredients:["Tofu","Soy sauce","Broccoli","Garlic","Sesame oil","Cornstarch","Rice"],chefSteps:[{t:"Press the tofu properly",a:"Wrap tofu in a kitchen towel, place something heavy on top, and let press for at least 20 minutes. After pressing, cut into uniform 1-inch cubes. Season with salt and pepper.",tip:"Pressing is non-negotiable. Unpressed tofu will never get crispy."},{t:"Coat and fry for maximum crunch",a:"Toss tofu cubes lightly in cornstarch. Heat a pan over medium-high with a generous layer of oil. Add tofu in a single layer and do not touch for 3 full minutes. Flip and repeat on all sides.",tip:"Cornstarch coating is the secret to restaurant-style crispy tofu."},{t:"Build the stir fry sauce and combine",a:"Cook minced garlic 60 seconds. Add broccoli and cook 3 minutes. Mix soy sauce with water and cornstarch for a quick sauce. Pour in, toss, then return the crispy tofu and fold gently. Finish with sesame oil.",tip:"Add tofu back at the very end and fold gently."}]},
{name:"Egg Noodle Soup",category:"lunch",ingredients:["Egg noodles","Chicken broth","Eggs","Garlic","Soy sauce","Onions","Sesame oil"],chefSteps:[{t:"Build a deeply flavored broth",a:"Start with chicken broth. Add smashed garlic cloves, soy sauce, sesame oil, and sliced onions. Simmer 12 minutes uncovered.",tip:"A properly built broth is 80% of the dish."},{t:"Cook egg noodles separately",a:"Cook egg noodles in a separate pot of boiling salted water. Drain and toss with sesame oil to prevent clumping. Place noodles in the serving bowl first.",tip:"Cooking noodles in broth muddies it."},{t:"Poach an egg directly in the broth",a:"Bring strained broth to a gentle simmer. Crack an egg into a small cup. Create a gentle swirl in the broth, then slide the egg in. Cook 3 minutes for runny yolk. Place on top of the noodles.",tip:"Cracking the egg into a cup first gives you control."}]},
{name:"Chocolate Lava Cake",category:"dessert",ingredients:["Chocolate","Butter","Eggs","Sugar","Flour"],chefSteps:[{t:"Make the chocolate base",a:"Combine chopped chocolate with butter in a heatproof bowl over barely simmering water. Stir until melted and glossy. Remove from heat and let cool 3 minutes.",tip:"Never melt chocolate over direct heat."},{t:"Build the batter",a:"Whisk eggs, egg yolks, and sugar until pale and slightly thick — about 90 seconds. Fold the chocolate mixture into the eggs gently, then sift in flour and fold until just combined.",tip:"Folding preserves the air you whisked in."},{t:"Bake with precision",a:"Butter and flour individual ramekins thoroughly. Fill 3/4 full. Bake at 425°F for exactly 12 minutes. The edges should be set but the center should still jiggle. Rest 1 minute, then invert onto a plate immediately.",tip:"Timing is everything. 12 min = flowing center. 14 min = no lava."}]},
{name:"Banana Bread",category:"dessert",ingredients:["Bananas","Flour","Butter","Sugar","Eggs","Baking soda"],chefSteps:[{t:"Use the right bananas",a:"The bananas must be very overripe — deeply black-spotted or completely black. Mash thoroughly until almost no chunks remain.",tip:"Can't wait for bananas to ripen? Bake unpeeled at 300°F for 20 minutes until skins turn black."},{t:"Mix wet and dry separately",a:"Melt butter, whisk with sugar, add eggs one at a time. Fold in mashed banana. Whisk flour, baking soda, and salt separately. Add dry to wet and fold until just combined.",tip:"The fold-until-just-combined rule is the most important step in any quick bread."},{t:"Bake low and slow",a:"Pour into a buttered loaf pan. Bake at 350°F for 55–65 minutes. The loaf is done when a toothpick comes out with just a few moist crumbs. Cool completely before slicing.",tip:"Cool completely before slicing. Hot quick breads are gummy."}]},
{name:"Classic Brownies",category:"dessert",ingredients:["Chocolate","Butter","Sugar","Eggs","Flour","Vanilla extract"],chefSteps:[{t:"Build the fudgy base",a:"Melt butter and chocolate together. Let cool 5 minutes. Whisk in sugar, then add eggs one at a time, whisking vigorously after each. Add vanilla. The batter should turn glossy and ribbon-like.",tip:"That glossy ribbon texture is the key indicator of a properly emulsified fudgy brownie."},{t:"Add flour minimally",a:"Sift flour directly into the chocolate mixture. Fold with a spatula using 10 to 15 folds maximum. Stop the moment no dry flour is visible.",tip:"Less mixing = more fudge. More mixing = more cake."},{t:"Bake to the right doneness",a:"Pour into a buttered 8x8 pan. Bake at 350°F for 20–25 minutes. Pull out when the edge toothpick is clean but the center toothpick still has moist crumbs. Cool completely before cutting.",tip:"Refrigerating before cutting is the difference between clean squares and crumbly smears."}]},
{name:"Cinnamon French Toast Sticks",category:"dessert",ingredients:["Bread","Eggs","Milk","Butter","Cinnamon","Sugar","Vanilla extract","Maple syrup"],chefSteps:[{t:"Make the spiced custard",a:"Whisk eggs, milk, cinnamon, sugar, vanilla extract, and a tiny pinch of salt until completely smooth. Cut thick bread slices into thirds lengthwise.",tip:"Thick-cut brioche or Texas toast makes the best sticks."},{t:"Soak and cook for texture",a:"Soak each stick 20 seconds per side. Melt butter in a non-stick pan over medium heat. Cook sticks on all four sides until deeply golden-brown, about 2 minutes per side.",tip:"Cook all four sides. The full caramelization is what makes them indulgent."},{t:"Finish with cinnamon sugar",a:"While still hot from the pan, immediately toss or dust with cinnamon and sugar. Serve immediately with warm maple syrup for dipping.",tip:"The cinnamon sugar coating goes on while hot."}]},
{name:"Chocolate Chip Cookies",category:"dessert",ingredients:["Flour","Butter","Sugar","Brown sugar","Eggs","Vanilla extract","Chocolate","Baking soda","Salt"],chefSteps:[{t:"Brown the butter first",a:"Melt butter in a light-colored pan over medium heat, swirling constantly, until the milk solids turn golden-brown and smell nutty — about 5 minutes. Pour into a bowl and let cool.",tip:"Brown butter is the single biggest upgrade to chocolate chip cookies."},{t:"Mix the dough and rest it",a:"Whisk cooled brown butter with both white and brown sugar. Add eggs and vanilla extract. Fold in flour, baking soda, and salt until just combined, then fold in chocolate chips. Refrigerate at least 30 minutes.",tip:"Overnight rest is the difference between flat cookies and thick, chewy bakery-style ones."},{t:"Bake and pull early",a:"Roll into balls and place on parchment-lined sheet. Bake at 375°F for 10–11 minutes. Pull out when edges are set but centers still look slightly underdone. Sprinkle with flaky salt immediately.",tip:"Underbake slightly every time. Cookies continue cooking on the hot pan."}]},
{name:"Tofu Scramble",category:"tofu",ingredients:["Tofu","Turmeric","Bell peppers","Onions","Soy sauce","Garlic","Olive oil"],chefSteps:[{t:"Press and crumble the tofu",a:"Press firm tofu for 15 minutes. Crumble into irregular pieces using your hands — vary the sizes from fine crumbles to larger chunks, just like real scrambled eggs.",tip:"Irregular crumble sizes mimic real scrambled eggs far better than uniform fine crumbles."},{t:"Season with turmeric and spices",a:"Heat olive oil over medium-high. Add crumbled tofu in a single layer and let sit 2 minutes to develop golden color. Add turmeric, garlic powder, and a splash of soy sauce.",tip:"Kala namak (black salt) is the secret ingredient for egg flavor."},{t:"Add vegetables and finish",a:"Push tofu to the side and add diced bell peppers and onions. Cook 2 minutes over high heat. Fold through the tofu. Add another splash of soy sauce and toss 60 seconds.",tip:"Keep some pieces crispy and some soft — the texture contrast is what makes it satisfying."}]},
{name:"Miso Glazed Tofu",category:"tofu",ingredients:["Tofu","Soy sauce","Sesame oil","Garlic","Ginger","Brown sugar","Rice"],chefSteps:[{t:"Press and prep the tofu",a:"Press extra-firm tofu for at least 20 minutes. Slice into 1-inch thick rectangular slabs. Score the surface of each slab lightly with a knife in a crosshatch pattern.",tip:"Scoring the surface doubles the glaze contact area."},{t:"Build the glaze",a:"Whisk together soy sauce, brown sugar, minced garlic, grated fresh ginger, and sesame oil. Brush generously over both sides of each tofu slab. Let marinate at least 10 minutes.",tip:"Grating ginger rather than mincing releases more juice and flavor."},{t:"Caramelize for maximum flavor",a:"For pan method: sear tofu 3–4 minutes per side without moving. For oven method: bake at 400°F for 25 minutes, flipping halfway and brushing with extra glaze each time.",tip:"The caramelized dark spots are flavor, not burning."}]},
{name:"Mika's Fried Ravioli",category:"lunch",ingredients:["Ravioli","Breadcrumbs","Eggs","Parmesan","Italian seasoning","Garlic powder","Oil","Marinara sauce"],chefSteps:[{t:"Set up the breading station",a:"Set up three bowls: flour with salt and pepper, beaten eggs, and breadcrumbs mixed with finely grated Parmesan, Italian seasoning, garlic powder, and salt. Use fresh or refrigerated ravioli, not frozen.",tip:"The Parmesan-breadcrumb combo is what separates Mika's version from basic fried ravioli."},{t:"Bread each ravioli properly",a:"Dredge in flour, dip in egg, then press firmly into the breadcrumb mixture on both sides. Place on a wire rack and let rest 5 minutes before frying.",tip:"Resting the breaded ravioli for 5 minutes before frying makes the coating stick dramatically better."},{t:"Fry to golden perfection",a:"Heat oil to 350°F. Fry in small batches — crowding makes them greasy. Cook 2–3 minutes per side until deep golden brown. Drain on a wire rack. Season immediately with extra Parmesan and salt while still hot.",tip:"Season the moment they come out of the oil."},{t:"Serve with warm marinara",a:"Warm marinara in a small pan over low heat. Add a pinch of Italian seasoning and garlic powder. Pour into a dipping bowl. Serve immediately.",tip:"Warming the marinara with extra seasoning makes store-bought taste house-made."}]},
{name:"Wanda's Swedish Meatballs",category:"dinner",ingredients:["Ground beef","Olive oil","Flour","Beef broth","Nutmeg","Brown sugar","Pepper","Cream","Allspice"],chefSteps:[{t:"Make the gravy base",a:"Heat a pot over medium heat and add 2 tablespoons of olive oil. Add 1/4 cup of all-purpose flour and stir constantly for 2-3 minutes until the flour turns golden and smells nutty.",tip:"Keep stirring the flour the entire time. Walk away for even 30 seconds and it burns."},{t:"Build the sauce with broth and spices",a:"Pour in the entire box of beef broth while whisking constantly. Add 1/4 teaspoon ground allspice, 1/4 teaspoon freshly grated nutmeg, and 1 to 2 tablespoons of brown sugar. Add pepper to taste.",tip:"Freshly grated nutmeg has dramatically more flavor than pre-ground."},{t:"Slow cook and finish with cream",a:"Cook on high in a slow cooker for 6 to 8 hours. After about 3 hours, stir in 1/4 cup of heavy whipping cream. Add more cream if needed toward the end.",tip:"Adding cream mid-cook rather than at the end gives it time to mellow and enrich the sauce."}]}
];

/* ================= PANTRY ================= */
function openPantry(){
  let html = `
    <div class="header">🧺 Pantry</div>
    <div class="card">
      <input id="searchBox" class="searchInput" placeholder="Search ingredients..." oninput="filterIngredients()"/>
    </div>
    <div id="ingredientList">`;

  ingredientItems.forEach(i => {
    html += `<div class="item ${selected.includes(i)?'selected':''}" data-item="${i}">${i}</div>`;
  });

  html += `</div>
    <div class="btn" style="margin-bottom:8px;" onclick="showMatches()">🔍 Find Recipes</div>
    <div class="btn" style="background:#ff4d4d;color:white;margin-bottom:100px;" onclick="clearPantry()">🗑 Clear Pantry</div>
    `;

  document.getElementById("pantry").innerHTML = html;
  document.querySelectorAll(".item").forEach(el => { el.onclick = () => toggle(el.dataset.item); });
  show("pantry");
}

function filterIngredients(){
  let q = document.getElementById("searchBox").value.toLowerCase();
  let filtered = ingredientItems.filter(i => i.toLowerCase().includes(q));
  document.getElementById("ingredientList").innerHTML = filtered.map(i =>
    `<div class="item ${selected.includes(i)?'selected':''}" data-item="${i}">${i}</div>`
  ).join("");
  document.querySelectorAll(".item").forEach(el => { el.onclick = () => toggle(el.dataset.item); });
}

function toggle(i){
  selected = selected.includes(i) ? selected.filter(x=>x!==i) : [...selected,i];
  localStorage.setItem("ingredients", JSON.stringify(selected));
  filterIngredients();
}

/* ================= MATCH ================= */
const categoryOrder = ["breakfast","lunch","dinner","tofu","dessert"];
const categoryLabels = {
  breakfast: "🌅 Breakfast",
  lunch: "☀️ Lunch",
  dinner: "🌙 Dinner",
  tofu: "🥢 Tofu",
  dessert: "🍰 Dessert"
};

let activeCategory = "all";

function showMatches(cat){
  if(cat !== undefined) activeCategory = cat;

  let scored = recipes.map(r => ({
    ...r,
    match: r.ingredients.filter(i => selected.includes(i)).length
  }));

  let html = `<div class="header">🍳 Recipes</div>`;

  const allCats = ["all", ...categoryOrder.filter(c => scored.some(r => r.category === c))];
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">`;
  allCats.forEach(c => {
    const active = activeCategory === c;
    const label = c === "all" ? "🍽 All" : categoryLabels[c];
    html += `<div onclick="showMatches('${c}')" style="padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid ${active ? '#4facfe' : 'rgba(255,255,255,0.25)'};background:${active ? 'rgba(79,172,254,0.25)' : 'rgba(255,255,255,0.06)'};">${label}</div>`;
  });
  html += `</div>`;

  if(activeCategory === "all"){
    categoryOrder.forEach(cat => {
      const group = scored.filter(r => r.category === cat).sort((a,b) => b.match - a.match);
      if(!group.length) return;
      const top3 = group.slice(0, 3);
      const hasMore = group.length > 3;
      html += `<div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 6px;">
        <div style="font-size:15px;font-weight:800;color:#ff914d;letter-spacing:1px;">${categoryLabels[cat]}</div>
        ${hasMore ? `<div onclick="showMatches('${cat}')" style="font-size:12px;color:#4facfe;cursor:pointer;font-weight:600;">See all ${group.length} →</div>` : ''}
      </div>`;
      top3.forEach(r => {
        const isFav = favorites.includes(r.name);
        html += `<div class="card" onclick="openRecipe(${recipes.findIndex(x=>x.name===r.name)})" style="display:flex;align-items:center;justify-content:space-between;">
          <div><b>${r.name}</b>${isFav ? '<span class="fav-badge">★ Saved</span>' : ''}<br><small style="opacity:0.6;margin-top:4px;display:block;">Match: ${r.match}/${r.ingredients.length}</small></div>
          <div style="font-size:20px;opacity:0.4;">›</div>
        </div>`;
      });
    });
  } else {
    const group = scored.filter(r => r.category === activeCategory).sort((a,b) => b.match - a.match);
    group.forEach(r => {
      const isFav = favorites.includes(r.name);
      html += `<div class="card" onclick="openRecipe(${recipes.findIndex(x=>x.name===r.name)})" style="display:flex;align-items:center;justify-content:space-between;">
        <div><b>${r.name}</b>${isFav ? '<span class="fav-badge">★ Saved</span>' : ''}<br><small style="opacity:0.6;margin-top:4px;display:block;">Match: ${r.match}/${r.ingredients.length}</small></div>
        <div style="font-size:20px;opacity:0.4;">›</div>
      </div>`;
    });
  }

  html += `<div style="margin-bottom:100px;"></div>`;
  document.getElementById("results").innerHTML = html;
  show("results");
}

/* ================= RECIPE ================= */
let current = null;

function openRecipe(idx){
  current = recipes[idx];
  renderRecipe();
  show("recipe");
}

function renderRecipe(){
  let steps = current.chefSteps;

  let isFav = favorites.includes(current.name);
  let html = `
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;">
      <div class="recipeTitle" style="margin-bottom:0;">${current.name}</div>
      <span class="fav-star ${isFav ? 'saved' : ''}" onclick="toggleFavorite(${recipes.indexOf(current)})">☆</span>
    </div>`;

  steps.forEach((s, i) => {
    html += `
      <div class="chef-card">
        <div class="step-header">
          <span class="step-number">${i+1}</span>
          <div class="step-title">${s.t}</div>
        </div>
        <div class="step-body">${s.a}</div>
        ${s.tip ? `<div class="step-tip">💡 Pro tip: ${s.tip}</div>` : ''}
      </div>`;
  });

  html += `<div class="header">🧂 Ingredients</div>`;
  current.ingredients.forEach(i => {
    let has = selected.includes(i);
    html += `<div class="card">${has ? "✅" : "❌"} ${i}</div>`;
  });

  let missing = current.ingredients.filter(i => !selected.includes(i));
  if(missing.length){
    html += `<div class="header">🛒 Missing Ingredients</div>`;
    missing.forEach(item => {
      let q = encodeURIComponent(item);
      html += `
        <div class="card">
          <b>${item}</b><br>
          <a class="shopBtn" target="_blank" href="https://www.walmart.com/search?q=${q}">Walmart</a>
        </div>`;
    });
  }

  html += `
    <div class="btn" onclick="showMatches()" style="margin-bottom:4px;">⬅ Back To Recipes</div>
    <a class="btn btn-feedback" href="mailto:therustychef1@gmail.com?subject=Rusty%20Chef%20Feedback" style="display:block;text-align:center;text-decoration:none;margin-bottom:100px;">✉️ Send Feedback</a>
    `;

  document.getElementById("recipe").innerHTML = html;
}

show("home");
</script>
