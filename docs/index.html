<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chef Jeff</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
        user-select: none;
        touch-action: manipulation;
    }

    /* Intro container */
    #introContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        z-index: 3;
        opacity: 0;
        animation: fadeIn 2s ease-in-out forwards;
    }

    /* Fade-in animation */
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Fade-out animation */
    @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
    }

    /* Responsive Rusty intro image */
    #introLogo {
        width: 100%;
        height: 100%;
        object-fit: contain;
        max-width: 100vw;
        max-height: 100vh;
    }

    /* Camera screen background */
    #cameraScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }

    /* Camera hotspot */
    .camera-hotspot {
        position: absolute;
        bottom: 8vh;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(6px);
        border: 2px solid rgba(255, 255, 255, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 18px;
        text-align: center;
        z-index: 4;
    }

    #cameraInput {
        display: none;
    }
</style>
</head>

<body>

<!-- Intro screen -->
<div id="introContainer">
    <img id="introLogo" src="rusty_intro.jpeg" alt="Rusty Intro Logo">
</div>

<!-- Camera screen -->
<img id="cameraScreen" src="copilot_image_1777179019874.jpeg" alt="Chef Jeff Camera Screen">

<!-- Robot voice -->
<audio id="robotVoice" src="robot_voice.mp3"></audio>

<!-- Camera hotspot -->
<div class="camera-hotspot" id="cameraButton">
    📷 Camera
</div>

<!-- Hidden camera input -->
<input type="file" id="cameraInput" accept="image/*" capture="environment"/>

<script>
/* Play robot voice on first tap */
document.addEventListener("click", () => {
    const audio = document.getElementById("robotVoice");
    audio.currentTime = 0;
    audio.play();
}, { once: true });

/* Fade-out intro after 15 seconds */
setTimeout(() => {
    const intro = document.getElementById("introContainer");
    intro.style.animation = "fadeOut 1.5s ease-in-out forwards";

    setTimeout(() => {
        document.getElementById("cameraScreen").style.opacity = "1";
    }, 1500);

}, 15000);

/* Camera hotspot triggers camera */
document.getElementById("cameraButton").addEventListener("click", () => {
    document.getElementById("cameraInput").click();
});

/* Handle photo selection */
document.getElementById("cameraInput").addEventListener("change", async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("image", file);

    const response = await fetch("/api/detect", {
        method: "POST",
        body: formData
    });

    const result = await response.json();
    window.location.href = `/recipes?items=${encodeURIComponent(JSON.stringify(result.ingredients))}`;
});
</script>

</body>
</html>
