<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.card:active{transform:scale(0.98);}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.back{
margin-top:10px;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

/* HOME */
#homeBg{
position:fixed;
inset:0;
z-index:-1;
}
#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

/* BUTTONS */
.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:90px;
height:90px;
border-radius:22px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
transition:0.2s;
border:2px solid rgba(255,255,255,0.15);
box-shadow:0 6px 20px rgba(0,0,0,0.5);
backdrop-filter: blur(8px);
}

.dockBtn span{
font-size:11px;
opacity:0.9;
margin-top:6px;
}

.dockBtn:nth-child(1){
background:linear-gradient(135deg,#ff9a3c,#ff5c00);
color:white;
}

.dockBtn.large{
width:120px;
height:120px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
box-shadow:0 0 25px rgba(79,172,254,0.6);
}

.dockBtn:nth-child(3){
background:linear-gradient(135deg,#42e695,#3bb2b8);
color:white;
}

.dockBtn:active{transform:scale(0.95);}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg">
  </div>

  <div class="header">🤖 Rusty the Robot Chef</div>
  <div class="card">AI Cooking System v4 (Real Recipes)</div>

  <div class="dock">
    <div class="dockBtn" onclick="openRecipes()">🍳<span>Recipes</span></div>
    <div class="dockBtn large" onclick="openSmart()">🧠<span>AI Cook</span></div>
    <div class="dockBtn" onclick="openPantry()">🧺<span>Pantry</span></div>
  </div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="detail" class="page"></div>
<div id="smart" class="page"></div>

</div>

<script>

let selected = JSON.parse(localStorage.getItem("pantry") || "[]");

/* NAV */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
window.scrollTo(0,0);
}

function goHome(){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("home").classList.add("active");
}

/* FIXED BUTTONS */
function openPantry(){ loadPantry(); }
function openRecipes(){ findRecipes(); }
function openSmart(){ loadSmart(); }

/* PANTRY */
const pantryItems = ["Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic","Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Lettuce","Cucumber","Bell peppers","Mushrooms","Shrimp","Salmon","Tuna","Turkey","Steak","Pork chops","Sausage","Beans","Corn","Peas","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Honey","Lemon","Lime","Ginger","Chili flakes","Paprika","Oregano","Basil","Thyme","Cinnamon","Nutmeg","Curry powder","Rice noodles","Tortilla","Bread","Cream","Yogurt","Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Pineapple","Coconut milk","Chicken broth","Beef broth","Fish sauce","Mustard","Ketchup","Mayonnaise","Vinegar","Green beans","Zucchini","Eggplant","Cauliflower","Cabbage","Chives","Parsley","Dill","Walnuts","Almonds","Oats","Chocolate","Coffee","Tea","Maple syrup","Brown sugar","Tofu","Quinoa","Lentils","Chickpeas","Hot sauce","BBQ sauce","Teriyaki sauce","Worcestershire sauce","Sesame oil","Peanut butter","Jam","Crackers","Granola","Marshmallows"];

/* REAL RECIPE DB (short sample set, expandable to 200+) */
const recipesDB = [
{
name:"Grilled Chicken Breast",
ingredients:["Chicken breast","Olive oil","Salt","Pepper","Garlic"],
steps:["Season chicken","Preheat pan","Cook 6–7 min per side","Rest meat","Serve"],
time:20
},
{
name:"Chicken Alfredo Pasta",
ingredients:["Pasta","Chicken breast","Butter","Cream","Parmesan","Garlic"],
steps:["Boil pasta","Cook chicken","Make sauce","Combine","Serve"],
time:30
},
{
name:"Beef Tacos",
ingredients:["Ground beef","Tortilla","Onion","Taco seasoning","Cheese"],
steps:["Brown beef","Add seasoning","Warm tortillas","Assemble","Serve"],
time:25
},
{
name:"Spaghetti Bolognese",
ingredients:["Pasta","Ground beef","Tomato sauce","Onion","Garlic"],
steps:["Cook pasta","Brown beef","Simmer sauce","Mix","Serve"],
time:40
},
{
name:"Bacon and Eggs",
ingredients:["Bacon","Eggs","Salt","Pepper"],
steps:["Cook bacon","Fry eggs","Season","Serve"],
time:10
}
];

/* ENGINE */
function makeRecipe(i){

let base = recipesDB[i % recipesDB.length];

let match = base.ingredients.filter(x=>selected.includes(x)).length;

return {
name:base.name,
ingredients:base.ingredients,
steps:base.steps,
time:base.time,
score:match/base.ingredients.length
};
}

/* PANTRY */
function loadPantry(){

let html = `<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div><div class="header">🧺 Pantry</div>`;

pantryItems.forEach(item=>{
let on = selected.includes(item);
html += `<div class="item ${on?'selected':''}" onclick="toggleItem('${item}')">
<span>${item}</span><span>${on?'✔':''}</span>
</div>`;
});

html += `<div class="btn" onclick="findRecipes()">🍳 Generate Recipes</div><div class="back" onclick="goHome()">⬅ Home</div>`;
document.getElementById("pantry").innerHTML = html;
show("pantry");
}

function toggleItem(item){
selected = selected.includes(item)
? selected.filter(i=>i!==item)
: [...selected,item];

localStorage.setItem("pantry",JSON.stringify(selected));
loadPantry();
}

/* RECIPES */
function findRecipes(){

let recipes = [];

for(let i=0;i<50;i++){
recipes.push(makeRecipe(i));
}

recipes.sort((a,b)=>b.score-a.score);
window.generatedRecipes = recipes;

let html = `<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div><div class="header">🍳 Recipes</div>`;

recipes.forEach(r=>{
html += `<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
${(r.score*100).toFixed(0)}% match<br>
${r.time} min
</div>`;
});

html += `<div class="back" onclick="loadPantry()">⬅ Pantry</div>`;
document.getElementById("results").innerHTML = html;
show("results");
}

/* DETAIL */
function openRecipe(name){

let r = (window.generatedRecipes||[]).find(x=>x.name===name);
if(!r){goHome();return;}

let html = `<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">${r.name}</div>

<div class="card">
⏱ ${r.time} min<br><br>
<b>Ingredients:</b><br>${r.ingredients.join("<br>")}
</div>

<div class="card">
<b>Steps:</b><br>${r.steps.map(s=>"• "+s).join("<br>")}
</div>

<div class="back" onclick="findRecipes()">⬅ Back</div>`;

document.getElementById("detail").innerHTML = html;
show("detail");
}

/* SMART */
function loadSmart(){
document.getElementById("smart").innerHTML = `
<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🧠 AI Chef Mode</div>
<div class="card">Real recipe engine active.</div>
<div class="back" onclick="goHome()">⬅ Home</div>
`;
show("smart");
}

/* INIT */
loadPantry();

</script>

</body>
</html>
