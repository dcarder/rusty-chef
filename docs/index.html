<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty AI Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{display:none;height:100%;overflow:auto;padding:20px;}
.page.active{display:block;}

.header{text-align:center;font-size:22px;font-weight:700;margin-bottom:10px;}

.topBar{display:flex;justify-content:space-between;margin-bottom:10px;}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.1);
}

.card{
background:rgba(255,255,255,0.08);
padding:14px;
margin:10px 0;
border-radius:16px;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.3);
}

.btn{
margin-top:10px;
padding:12px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
cursor:pointer;
}

.dock{
position:fixed;
bottom:90px;
left:0;right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.1);
cursor:pointer;
}

.dockBtn.large{
width:130px;height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

#homeBg{position:fixed;inset:0;z-index:-1;}
#homeBg img{width:100%;height:100%;object-fit:cover;}
</style>
</head>

<body>

<div id="app">

<div id="home" class="page active">
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg"/>
</div>

<div class="header">🤖 Rusty AI Chef</div>
<div class="card">AI Cooking Assistant with Timers</div>

<div class="dock">
<div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
<div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
<div class="dockBtn" onclick="goHome()">🏠<span>Home</span></div>
</div>
</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* INGREDIENTS */
const ingredientItems = [
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Bell peppers","Mushrooms","Shrimp","Salmon",
"Steak","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon","Lime","Paprika","Oregano",
"Basil","Curry powder","Tortilla","Bread","Parmesan","Cheddar","Mozzarella","Avocado","Chicken broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Honey","Yogurt"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

/* AI GENERATOR WITH TIMERS */
function generateAIRecipe(){

if(selected.length < 3){
return [{
name:"Select More Ingredients",
ingredients:[],
protein:"None",
steps:[{text:"Pick at least 3 ingredients.",time:0}]
}];
}

let used=[...selected].sort(()=>Math.random()-0.5).slice(0,6);

let protein = used.find(i =>
i.includes("Chicken")||i.includes("Beef")||
i.includes("Shrimp")||i.includes("Salmon")||
i.includes("Egg")
) || "Main Ingredient";

return [{
name:`AI ${protein} Dish`,
ingredients:used,
protein:protein,
steps:[
{ text:`Prep ingredients and dry ${protein}.`, time:300 },
{ text:`Heat pan to 350–400°F.`, time:120 },
{ text:`Cook ${protein} until done (see temps).`, time:480 },
{ text:`Add vegetables and cook.`, time:420 },
{ text:`Season and combine.`, time:180 },
{ text:`Rest before serving.`, time:120 }
]
}];
}

/* SPICE GUIDE */
function getCuisineGuide(name){
return [
"Salt – enhances flavor.",
"Fat – carries taste.",
"Acid – balances dish.",
"Spices – add depth."
];
}

/* TIMER ENGINE */
let timers = {};

function startTimer(i){

let step = window.generated[0].steps[i];
let time = step.time;

clearInterval(timers[i]);

let display = document.getElementById("timer"+i);

timers[i] = setInterval(()=>{

let min = Math.floor(time/60);
let sec = time%60;

display.innerHTML = `⏳ ${min}:${sec.toString().padStart(2,'0')}`;

time--;

if(time < 0){
clearInterval(timers[i]);
display.innerHTML = "✅ Done!";
navigator.vibrate && navigator.vibrate(300);
}

},1000);
}

/* UI */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){
let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
<span>${i}</span><span>${on?'✔':''}</span></div>`;
});

html+=`<div class="btn" onclick="openRecipes()">🍳 Generate Recipe</div>`;
document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){
let list=generateAIRecipe();
window.generated=list;

let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🍳 AI Recipe</div>`;

list.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b>
</div>`;
});

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

function openRecipe(name){

let r=window.generated.find(x=>x.name===name);

let html=`<div class="topBar"><div class="homeBtn" onclick="openRecipes()">⬅ Back</div></div>
<div class="header">${r.name}</div>

<div class="card"><b>Ingredients:</b><br>${r.ingredients.join("<br>")}</div>

<div class="card"><b>💪 What is Protein?</b><br><br>
Protein (${r.protein}) is the main part of your dish. It must be cooked properly:
<br><br>
Chicken → 165°F<br>
Beef → 135–145°F<br>
Fish → 145°F
</div>`;

r.steps.forEach((s,i)=>{
html+=`
<div class="card">
<b>Step ${i+1}</b><br><br>
${s.text}<br><br>

⏱ ${Math.floor(s.time/60)} min ${s.time%60}s

<div class="btn" onclick="startTimer(${i})">▶ Start</div>

<div id="timer${i}">Ready</div>
</div>`;
});

document.getElementById("detail").innerHTML=html;
show("detail");
}

function goHome(){show("home");}

openIngredients();

</script>

</body>
</html>
