<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.back{
margin-top:10px;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
  <div class="header">🤖 Rusty the Robot Chef</div>

  <div class="card">40 Real Recipe Cooking Engine + 100 Ingredients</div>

  <div class="dock">
    <div class="dockBtn" onclick="openRecipes()">🍳<span>Recipes</span></div>
    <div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
    <div class="dockBtn" onclick="goHome()">🏠<span>Home</span></div>
  </div>
</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
   100 INGREDIENTS (UNCHANGED)
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Turkey","Steak","Pork chops","Sausage","Beans","Corn","Peas","Flour","Sugar",
"Salt","Pepper","Olive oil","Soy sauce","Honey","Lemon","Lime","Coconut milk","Curry powder","Paprika",
"Oregano","Basil","Thyme","Cinnamon","Rice noodles","Tortilla","Bread","Cream","Yogurt","Parmesan",
"Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth","Ketchup",
"Mustard","Mayonnaise","Vinegar","Zucchini","Eggplant","Cauliflower","Cabbage","Chives","Parsley","Oats",
"Chocolate","Coffee","Tea","Maple syrup","Brown sugar","Tofu","Quinoa","Lentils","Chickpeas","Hot sauce",
"BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce","Green beans",
"Sweet potato","Pumpkin","Ramen noodles","Croutons","Cornstarch","Marshmallows","Granola","Crackers","Pineapple","Cucumber"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

/* =========================
   40 REAL RECIPES ONLY
========================= */

const recipesDB = [
{name:"Grilled Chicken Breast",ingredients:["Chicken breast","Olive oil","Salt","Pepper","Garlic"],time:25},
{name:"Chicken Alfredo",ingredients:["Chicken breast","Pasta","Butter","Cream","Parmesan"],time:30},
{name:"Chicken Stir Fry",ingredients:["Chicken breast","Soy sauce","Bell peppers","Onions"],time:25},
{name:"Chicken Parmesan",ingredients:["Chicken breast","Tomatoes","Mozzarella","Parmesan"],time:40},
{name:"Chicken Tacos",ingredients:["Chicken breast","Tortilla","Cheese","Lettuce"],time:20},
{name:"Chicken Curry",ingredients:["Chicken breast","Curry powder","Coconut milk","Onions"],time:40},
{name:"Teriyaki Chicken",ingredients:["Chicken breast","Teriyaki sauce","Rice"],time:30},
{name:"Chicken Soup",ingredients:["Chicken broth","Chicken breast","Carrots","Onions"],time:45},
{name:"Buffalo Wings",ingredients:["Chicken wings","Hot sauce","Butter"],time:40},
{name:"Chicken Quesadilla",ingredients:["Chicken breast","Tortilla","Cheese"],time:15},

{name:"Beef Tacos",ingredients:["Ground beef","Tortilla","Cheese","Onions"],time:20},
{name:"Spaghetti Bolognese",ingredients:["Ground beef","Pasta","Tomatoes","Onions"],time:40},
{name:"Cheeseburger",ingredients:["Ground beef","Bread","Cheese","Lettuce"],time:20},
{name:"Beef Stir Fry",ingredients:["Beef strips","Soy sauce","Bell peppers","Onions"],time:25},
{name:"Beef Stew",ingredients:["Beef","Potatoes","Carrots","Beef broth"],time:120},
{name:"Meatballs",ingredients:["Ground beef","Eggs","Bread","Tomato sauce"],time:45},
{name:"Beef Chili",ingredients:["Ground beef","Beans","Tomatoes","Onions"],time:60},
{name:"Steak",ingredients:["Steak","Salt","Pepper","Butter"],time:20},
{name:"Beef Burrito",ingredients:["Ground beef","Tortilla","Rice","Cheese"],time:25},
{name:"Beef Pho",ingredients:["Beef","Noodles","Broth","Herbs"],time:90},

{name:"Grilled Salmon",ingredients:["Salmon","Lemon","Garlic","Olive oil"],time:20},
{name:"Shrimp Scampi",ingredients:["Shrimp","Butter","Garlic","Lemon"],time:20},
{name:"Fish Tacos",ingredients:["Fish","Tortilla","Cabbage","Lime"],time:20},
{name:"Teriyaki Salmon",ingredients:["Salmon","Teriyaki sauce","Rice"],time:25},
{name:"Shrimp Fried Rice",ingredients:["Shrimp","Rice","Eggs","Soy sauce"],time:25},

{name:"Mac and Cheese",ingredients:["Pasta","Cheddar","Milk","Butter"],time:25},
{name:"Lasagna",ingredients:["Pasta","Ground beef","Cheese","Tomatoes"],time:60},
{name:"Pizza Margherita",ingredients:["Flour","Tomatoes","Mozzarella"],time:45},
{name:"Carbonara",ingredients:["Pasta","Eggs","Bacon","Parmesan"],time:25},
{name:"Pesto Pasta",ingredients:["Pasta","Basil","Garlic","Olive oil"],time:20},

{name:"Pancakes",ingredients:["Flour","Eggs","Milk","Sugar"],time:20},
{name:"Omelette",ingredients:["Eggs","Cheese","Milk"],time:10},
{name:"French Toast",ingredients:["Bread","Eggs","Milk","Cinnamon"],time:15},
{name:"Breakfast Burrito",ingredients:["Eggs","Tortilla","Cheese"],time:15},
{name:"Avocado Toast",ingredients:["Bread","Avocado","Salt"],time:10},

{name:"Veggie Stir Fry",ingredients:["Broccoli","Carrots","Soy sauce"],time:15},
{name:"Lentil Soup",ingredients:["Lentils","Carrots","Onions"],time:45},
{name:"Chickpea Salad",ingredients:["Chickpeas","Lettuce","Tomatoes"],time:10},

{name:"Chocolate Chip Cookies",ingredients:["Flour","Sugar","Butter","Chocolate"],time:25},
{name:"Brownies",ingredients:["Chocolate","Flour","Eggs","Sugar"],time:35}
];

/* =========================
   STEP SYSTEM (UNCHANGED LOGIC)
========================= */

function getSteps(r){

let fish = r.name.includes("Salmon") || r.name.includes("Shrimp") || r.name.includes("Fish");
let chicken = r.name.includes("Chicken");
let beef = r.name.includes("Beef") || r.name.includes("Steak");
let pasta = r.name.includes("Pasta") || r.name.includes("Alfredo") || r.name.includes("Carbonara");

if(fish){
return [
"Pat fish dry completely",
"Season with salt, pepper, lemon",
"Cook at medium-high heat (375°F)",
"Sear 3–5 min per side",
"Cook until 145°F internal temp",
"Rest 2 minutes before serving"
];
}

if(chicken){
return [
"Season chicken evenly",
"Cook at 350°F medium heat",
"Cook 5–7 min per side",
"Ensure 165°F internal temp",
"Rest before slicing"
];
}

if(beef){
return [
"Season beef well",
"Sear on high heat (400°F)",
"Cook 3–5 min per side",
"Rest 5–10 minutes",
"Serve immediately"
];
}

if(pasta){
return [
"Boil salted water",
"Cook pasta 8–12 min",
"Reserve pasta water",
"Mix with sauce",
"Serve hot"
];
}

return [
"Prep ingredients",
"Cook base",
"Add seasoning",
"Combine",
"Simmer",
"Serve"
];
}

/* =========================
   NAV + UI
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){
let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(i=>{
let on = selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
<span>${i}</span><span>${on?'✔':''}</span></div>`;
});

html+=`<div class="btn" onclick="openRecipes()">🍳 What Can I Cook?</div>`;
document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){

let list = recipesDB.map(r=>{
let match = r.ingredients.filter(x=>selected.includes(x)).length;
return {...r,score:match/r.ingredients.length};
});

list.sort((a,b)=>b.score-a.score);

window.generated=list;

let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🍳 What Can I Cook?</div>`;

list.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
${(r.score*100).toFixed(0)}% match<br>
${r.time} min
</div>`;
});

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

function openRecipe(name){

let r = window.generated.find(x=>x.name===name);
let steps = getSteps(r);

let html=`<div class="topBar"><div class="homeBtn" onclick="openRecipes()">⬅ Back</div></div>
<div class="header">${r.name}</div>

<div class="card"><b>Ingredients:</b><br>${r.ingredients.join("<br>")}</div>`;

steps.forEach((s,i)=>{
html+=`<div class="card"><b>Step ${i+1}</b><br>${s}</div>`;
});

document.getElementById("detail").innerHTML=html;
show("detail");
}

function goHome(){
show("home");
}

openIngredients();

</script>

</body>
</html>
