<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Jeff</title>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

/* SCREENS */
.fullScreen {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    z-index:-1;
    transition:opacity 1s;
}

.fullScreen img {
    width:100%;
    height:100%;
    object-fit:contain;
}

/* CAMERA */
#cameraScreen {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    z-index:1;
    transition:opacity 1s;
}

/* TEXT */
#cameraText {
    position:absolute;
    bottom:260px;
    width:100%;
    text-align:center;
    color:white;
    font-size:20px;
    opacity:0;
}

/* BUTTONS */
.camera-hotspot {
    position:absolute;
    bottom:60px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    padding:30px;
    color:white;
    font-size:18px;
    opacity:0;
}

#cameraButton { right:15%; }
#factsButton { left:15%; }

.navButton {
    margin:20px auto;
    padding:15px;
    width:200px;
    text-align:center;
    border:2px solid white;
    color:white;
}
</style>
</head>

<body>

<!-- SCREENS -->
<div id="logo" class="fullScreen">
    <img src="your_logo.jpeg" onerror="this.src='https://via.placeholder.com/800x600'">
</div>

<div id="intro" class="fullScreen">
    <img src="rusty_intro.jpeg" onerror="this.src='https://via.placeholder.com/800x600'">
</div>

<img id="cameraScreen" src="copilot_image_1777179019874.jpeg" 
onerror="this.src='https://via.placeholder.com/800x600'">

<div id="cameraText">
Take a picture of your food 🍽️
</div>

<!-- AUDIO -->
<audio id="introAudio" src="rusty_intro.mp3"></audio>

<!-- BUTTONS -->
<div id="cameraButton" class="camera-hotspot">📷</div>
<div id="factsButton" class="camera-hotspot">📘</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment">

<!-- FACT PAGE -->
<div id="facts" class="fullScreen">
    <div style="color:white;text-align:center">
        <h1>Food Facts</h1>
        <p>Pork loves sweet + smoky seasoning</p>
        <p>Beef = salt + pepper king</p>
        <p>Chicken = lemon + herbs</p>
        <div class="navButton" id="backBtn">Back</div>
    </div>
</div>

<script type="module">
console.log("APP START");

/* ---------------- AI SAFE LOAD ---------------- */
let model = null;

try {
    const { GoogleGenerativeAI } = await import("https://esm.run/@google/generative-ai");

    const genAI = new GoogleGenerativeAI("YOUR_GEMINI_API_KEY");
    model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    console.log("AI Loaded");
} catch (e) {
    console.warn("AI FAILED:", e);
}

/* ---------------- SCREENS ---------------- */
const logo = document.getElementById("logo");
const intro = document.getElementById("intro");

logo.style.opacity = 1;
logo.style.zIndex = 10;

setTimeout(() => {
    console.log("Intro start");

    logo.style.opacity = 0;

    intro.style.opacity = 1;
    intro.style.zIndex = 10;

    document.getElementById("introAudio").play().catch(()=>{});

}, 3000);

setTimeout(() => {
    console.log("Camera screen");

    intro.style.opacity = 0;

    document.getElementById("cameraScreen").style.opacity = 1;
    document.getElementById("cameraText").style.opacity = 1;
    document.getElementById("cameraButton").style.opacity = 1;
    document.getElementById("factsButton").style.opacity = 1;

}, 7000);

/* ---------------- CAMERA ---------------- */
document.getElementById("cameraButton").onclick = () => {
    document.getElementById("cameraInput").click();
};

document.getElementById("cameraInput").onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    if (!model) {
        alert("AI not ready yet");
        return;
    }

    alert("Analyzing food...");

    // simplified safe AI call
    try {
        const base64 = await fileToBase64(file);

        const result = await model.generateContent([
            {
                inlineData: {
                    data: base64,
                    mimeType: file.type
                }
            },
            "List food ingredients."
        ]);

        alert(result.response.text());
    } catch (err) {
        console.error(err);
        alert("AI failed");
    }
};

function fileToBase64(file) {
    return new Promise(res => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
    });
}

/* ---------------- FACTS ---------------- */
const facts = document.getElementById("facts");

document.getElementById("factsButton").onclick = () => {
    hideCamera();
    facts.style.opacity = 1;
    facts.style.zIndex = 20;
};

document.getElementById("backBtn").onclick = () => {
    facts.style.opacity = 0;
    facts.style.zIndex = -1;
    showCamera();
};

function hideCamera() {
    document.getElementById("cameraScreen").style.opacity = 0;
    document.getElementById("cameraButton").style.opacity = 0;
    document.getElementById("factsButton").style.opacity = 0;
    document.getElementById("cameraText").style.opacity = 0;
}

function showCamera() {
    document.getElementById("cameraScreen").style.opacity = 1;
    document.getElementById("cameraButton").style.opacity = 1;
    document.getElementById("factsButton").style.opacity = 1;
    document.getElementById("cameraText").style.opacity = 1;
}

</script>

</body>
</html>
