<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chef Jeff</title>

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
    }

    /* ---------------------- JEFF STUDIOS SCREEN ---------------------- */
    #jeffScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        opacity: 1;
        transition: opacity 1s ease;
    }

    #jeffScreen img {
        width: 70vw;
        max-width: 400px;
        animation: fadeIn 1.5s ease forwards;
    }

    /* ---------------------- RUSTY INTRO SCREEN ---------------------- */
    #rustyScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99998;
        opacity: 0;
        transition: opacity 1s ease;
    }

    #rustyScreen img {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
    }

    /* ---------------------- CAMERA SCREEN ---------------------- */
    #cameraScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: black;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
    }

    .camera-btn {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 18px 40px;
        font-size: 26px;
        border: none;
        border-radius: 14px;
        background: #ff9800;
        color: white;
        font-weight: bold;
        cursor: pointer;
        z-index: 9999;
        opacity: 0.95;
        box-shadow: 0 0 20px #ff9800, 0 0 40px #ff9800;
        animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 10px #ff9800; }
        50% { box-shadow: 0 0 35px #ff9800; }
        100% { box-shadow: 0 0 10px #ff9800; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }
</style>
</head>

<body>

<!-- JEFF STUDIOS SCREEN -->
<div id="jeffScreen">
    <img src="your_logo.jpeg" alt="JEFF STUDIOS">
</div>

<!-- RUSTY INTRO SCREEN -->
<div id="rustyScreen">
    <img src="rusty_intro.jpeg" alt="Rusty the Robot Chef">
</div>

<!-- CAMERA SCREEN -->
<div id="cameraScreen">
    <img src="copilot_image_1777179019874.jpeg" class="bg">
    <button id="cameraButton" class="camera-btn">Camera</button>
</div>

<script>
/* ---------------------- SCREEN SEQUENCE ---------------------- */
window.onload = () => {
    const jeff = document.getElementById("jeffScreen");
    const rusty = document.getElementById("rustyScreen");
    const camera = document.getElementById("cameraScreen");

    // Step 1: Show JEFF STUDIOS for 3 seconds
    setTimeout(() => {
        jeff.style.opacity = 0;
        setTimeout(() => jeff.style.display = "none", 1000);

        // Step 2: Show Rusty intro
        rusty.style.opacity = 1;

        // Step 3: Robot voice reads text
        const text = "Rusty the Robot Chef. Here to simplify meal prep. Take a picture of the food you have, and we'll turn it into something delicious.";
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.pitch = 0.8;
        utterance.rate = 0.9;
        utterance.volume = 1;
        utterance.voice = speechSynthesis.getVoices().find(v => v.name.toLowerCase().includes('google') || v.name.toLowerCase().includes('microsoft')) || null;
        speechSynthesis.speak(utterance);

        // Step 4: After 15 seconds, fade to camera screen
        setTimeout(() => {
            rusty.style.opacity = 0;
            setTimeout(() => {
                rusty.style.display = "none";
                camera.style.display = "flex";
            }, 1000);
        }, 15000);
    }, 3000);
};

/* ---------------------- CAMERA BUTTON LOGIC ---------------------- */
document.getElementById("cameraButton").addEventListener("click", async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.createElement("video");
        video.srcObject = stream;
        await video.play();

        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0);

        stream.getTracks().forEach(track => track.stop());
        alert("Picture taken!");
    } catch (err) {
        alert("Camera error: " + err);
    }
});
</script>

</body>
</html>
