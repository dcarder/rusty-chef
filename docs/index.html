<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg" />
  </div>

  <div class="card">AI Recipe Generator + Voice Cooking Assistant</div>

  <div class="dock">
    <div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
    <div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
    <div class="dockBtn" onclick="goHome()">🏠<span>Home</span></div>
  </div>

</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
   VOICE CHEF ENGINE
========================= */

let voiceEnabled = true;

function speak(text){
if(!voiceEnabled) return;
window.speechSynthesis.cancel();
let msg = new SpeechSynthesisUtterance(text);
msg.rate = 1;
msg.pitch = 1;
msg.volume = 1;
window.speechSynthesis.speak(msg);
}

/* =========================
   INGREDIENTS
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

/* =========================
   AI RECIPE ENGINE
========================= */

function generateAIRecipe(){

if(selected.length < 3){
return [{
name:"Select More Ingredients",
time:0,
ingredients:[],
steps:[{text:"Pick at least 3 ingredients.",time:0}]
}];
}

let protein = selected.find(i =>
i.includes("Chicken") || i.includes("Beef") ||
i.includes("Shrimp") || i.includes("Salmon") ||
i.includes("Pork") || i.includes("Turkey")
) || "Mixed Protein";

return [{
name:`Chef Style ${protein} Dish`,
time:30,
ingredients:selected.slice(0,6),
steps:[
{text:`Prep ingredients.`,time:120},
{text:`Heat pan to 375°F.`,time:60},
{text:`Cook ${protein} until fully done.`,time:420},
{text:`Add vegetables and combine.`,time:300},
{text:`Finish seasoning and plating.`,time:120}
]
}];
}

/* =========================
   TIMER + VOICE COOKING
========================= */

let currentStep = 0;
let activeRecipe = null;
let timer = null;
let timeLeft = 0;

/* =========================
   UI
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){

let html=`<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
<span>${i}</span><span>${on?'✔':''}</span></div>`;
});

html+=`<div class="btn" onclick="openRecipes()">🍳 Generate Recipe</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)
?selected.filter(x=>x!==i)
:[...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){

let list=generateAIRecipe();
activeRecipe=list[0];

let html=`<div class="header">🍳 Recipe</div>`;

html+=`
<div class="card" onclick="openRecipe()">
<b>${activeRecipe.name}</b><br>${activeRecipe.time} min
</div>`;

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

function openRecipe(){
currentStep=0;
renderStep();
show("detail");
}

/* =========================
   STEP + VOICE + TIMER
========================= */

function renderStep(){

let step = activeRecipe.steps[currentStep];

speak(step.text);

let html=`
<div class="header">${activeRecipe.name}</div>

<div class="card">
<b>Step ${currentStep+1}</b><br><br>
${step.text}
</div>

<div class="card" id="timerBox">
⏱ ${formatTime(step.time)}
</div>

<div class="btn" onclick="startTimer()">▶ Start</div>
<div class="btn" onclick="nextStep()">⏭ Next</div>
`;

document.getElementById("detail").innerHTML=html;
}

function startTimer(){

clearInterval(timer);

let step = activeRecipe.steps[currentStep];
timeLeft = step.time;

updateTimer();

timer = setInterval(()=>{
timeLeft--;
updateTimer();

if(timeLeft <= 0){
clearInterval(timer);
document.getElementById("timerBox").innerHTML="✅ Done";
speak("Step complete");
}
},1000);
}

function updateTimer(){
document.getElementById("timerBox").innerHTML="⏱ "+formatTime(timeLeft);
}

function formatTime(t){
let m=Math.floor(t/60);
let s=t%60;
return `${m}:${s.toString().padStart(2,'0')}`;
}

function nextStep(){
clearInterval(timer);

if(currentStep < activeRecipe.steps.length-1){
currentStep++;
speak("Next step");
renderStep();
}else{
speak("Recipe complete. Enjoy your meal.");
goHome();
}
}

function goHome(){
show("home");
}

openIngredients();

</script>

</body>
</html>
