<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff V6</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* ===== SPLASH SCREENS ===== */
.screen{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:opacity 1s ease, transform 1s ease;
transform:scale(1.05);
z-index:9999;
}

.screen.active{
opacity:1;
transform:scale(1);
}

.screen img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== COPILOT HUB ===== */
#hub{
position:fixed;
inset:0;
background:black;
color:white;
z-index:2000;
display:none;
padding:20px;
overflow:auto;
}

.card{
padding:15px;
margin:10px 0;
border:1px solid rgba(255,255,255,0.2);
border-radius:12px;
}

.btn{
padding:14px;
margin-top:10px;
border:1px solid white;
text-align:center;
border-radius:10px;
cursor:pointer;
}

/* recipe steps */
ol{padding-left:18px;}
small{opacity:0.7;}
</style>
</head>

<body>

<!-- 1. LOGO -->
<div id="logo" class="screen active">
<img src="rusty_logo.jpeg">
</div>

<!-- 2. RUSTY TRANSITION -->
<div id="rusty" class="screen">
<img src="rusty_intro.jpeg">
</div>

<!-- 3. COPILOT HUB -->
<div id="hub"></div>

<script>

let currentRecipe = null;
let stepIndex = 0;

/* ================= FLOW ================= */
setTimeout(()=>{
document.getElementById("logo").classList.remove("active");
document.getElementById("rusty").classList.add("active");
},3500);

setTimeout(()=>{
document.getElementById("rusty").style.display="none";
showHub();
},7000);

/* ================= COPILOT HUB ================= */
function showHub(){

document.getElementById("hub").style.display="block";

document.getElementById("hub").innerHTML = `
<h1>🤖 Copilot Hub</h1>

<div class="card">
Welcome to Chef Jeff AI
</div>

<div class="btn" onclick="showRecipes()">🍳 Recipes</div>
<div class="btn" onclick="showPantry()">🧺 Pantry</div>
<div class="btn" onclick="showFavorites()">❤️ Favorites</div>
`;
}

/* ================= DATA ================= */
const recipes = [
{
name:"Garlic Chicken Rice",
ingredients:["chicken","rice","garlic","salt"],
time:25,
steps:[
{ text:"Season chicken", time:"2 min", temp:"Room temp" },
{ text:"Cook chicken", time:"10 min", temp:"165°F / medium heat" },
{ text:"Add garlic", time:"2 min", temp:"Medium heat" },
{ text:"Mix with rice", time:"5 min", temp:"Low heat" }
]
},
{
name:"Veg Stir Fry",
ingredients:["broccoli","carrot","pepper","soy sauce"],
time:15,
steps:[
{ text:"Chop vegetables", time:"5 min", temp:"—" },
{ text:"Heat pan", time:"2 min", temp:"High heat" },
{ text:"Stir fry", time:"6 min", temp:"High heat" }
]
}
];

/* ================= RECIPES ================= */
function showRecipes(){

let html = `<h2>🍳 Recipes</h2>`;

recipes.forEach(r=>{
html += `
<div class="card" onclick='openRecipe(${JSON.stringify(r)})' style="cursor:pointer">
<h3>${r.name}</h3>
<p>⏱ ${r.time} min</p>
</div>`;
});

html += `<div class="btn" onclick="showHub()">⬅ Back</div>`;

document.getElementById("hub").innerHTML = html;
}

/* ================= RECIPE DETAIL ================= */
function openRecipe(recipe){

currentRecipe = recipe;

let steps = recipe.steps.map(s=>`
<li>${s.text}<br>
<small>⏱ ${s.time} | 🔥 ${s.temp}</small>
</li>
`).join("");

document.getElementById("hub").innerHTML = `
<h2>${recipe.name}</h2>

<div class="card">
<p><b>Time:</b> ${recipe.time} min</p>
<p><b>Ingredients:</b> ${recipe.ingredients.join(", ")}</p>
</div>

<div class="card">
<h3>Steps</h3>
<ol>${steps}</ol>
</div>

<div class="btn" onclick="startCooking()">🍳 Start Cooking Mode</div>
<div class="btn" onclick="showRecipes()">⬅ Back</div>
`;
}

/* ================= COOK MODE ================= */
function startCooking(){
stepIndex = 0;
renderStep();
}

function renderStep(){

let step = currentRecipe.steps[stepIndex];

document.getElementById("hub").innerHTML = `
<h2>🍳 Cooking Mode</h2>

<div class="card">
<h3>Step ${stepIndex+1} / ${currentRecipe.steps.length}</h3>
<p>${step.text}</p>
<p><small>⏱ ${step.time} | 🔥 ${step.temp}</small></p>
</div>

<div class="btn" onclick="nextStep()">Next Step ➜</div>
<div class="btn" onclick="openRecipe(currentRecipe)">Exit</div>
`;
}

function nextStep(){
if(stepIndex < currentRecipe.steps.length-1){
stepIndex++;
renderStep();
}else{
document.getElementById("hub").innerHTML = `
<div class="card">
<h2>🎉 Finished!</h2>
<p>You completed ${currentRecipe.name}</p>
</div>

<div class="btn" onclick="showHub()">Home</div>
`;
}
}

/* ================= PANTRY ================= */
function showPantry(){
document.getElementById("hub").innerHTML = `
<h2>🧺 Pantry</h2>
<div class="card">
Feature coming next upgrade
</div>
<div class="btn" onclick="showHub()">Back</div>
`;
}

/* ================= FAVORITES ================= */
function showFavorites(){
document.getElementById("hub").innerHTML = `
<h2>❤️ Favorites</h2>
<div class="card">
Feature coming next upgrade
</div>
<div class="btn" onclick="showHub()">Back</div>
`;
}

</script>

</body>
</html>
