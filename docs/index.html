<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v13</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}

.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{text-align:center;font-size:22px;font-weight:700;margin-bottom:10px;}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{padding:10px;margin:6px 0;border-radius:10px;border:1px solid rgba(255,255,255,.2);cursor:pointer;}
.item.selected{background:rgba(79,172,254,.25);}

.btn{padding:14px;background:#4facfe;color:black;font-weight:700;text-align:center;border-radius:12px;margin-top:10px;cursor:pointer;}

.shopBtn{display:inline-block;margin-top:8px;margin-right:8px;padding:10px 14px;border-radius:10px;font-weight:700;text-decoration:none;color:white;}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

#homeBg{position:fixed;inset:0;z-index:-1;}
#homeBg img{width:100%;height:100%;object-fit:cover;}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleRow{display:flex;align-items:center;gap:16px;}
.titleText{display:flex;flex-direction:column;font-weight:900;line-height:.9;}
.the{font-size:36px;}
.rusty{font-size:64px;}
.chef{font-size:54px;}

.flame{width:50px;height:120px;position:relative;}
.flame span{position:absolute;bottom:0;font-size:22px;animation:rise 1.2s infinite;opacity:0;}
@keyframes rise{0%{opacity:0;transform:translateY(0);}30%{opacity:1;}100%{opacity:0;transform:translateY(-120px);}}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="home" class="page active">
<div id="homeBg"><img src="copilot_image_1777179019874.jpeg"/></div>

<div id="introLogo">
<div class="titleRow">
<div class="flame"><span>🔥</span><span>🔥</span><span>🔥</span></div>
<div class="titleText">
<div class="the">THE</div>
<div class="rusty">RUSTY</div>
<div class="chef">CHEF</div>
</div>
<div class="flame"><span>🔥</span><span>🔥</span><span>🔥</span></div>
</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* 100 INGREDIENTS */
const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Turkey","Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce",
"Lemon","Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla",
"Bread","Parmesan","Cheddar","Mozzarella","Avocado","Chicken broth","Beef broth","BBQ sauce","Teriyaki sauce","Sesame oil",
"Peanut butter","Jam","Green beans","Sweet potato","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Honey",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Cinnamon","Nutmeg","Oats","Cabbage","Cucumber","Zucchini","Eggplant","Cauliflower","Corn","Parsley"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* REAL 25 RECIPES */
const recipes = [

{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots","Garlic"],
steps:[
{amount:"1 cup rice",t:"Cook chicken at 375°F until 165°F internal",time:8},
{amount:"2 eggs",t:"Scramble eggs",time:3},
{amount:"1 cup vegetables",t:"Stir fry at high heat 400°F",time:5},
{amount:"soy sauce",t:"Mix and finish",time:3}
]
},

{
name:"Garlic Butter Pasta",
ingredients:["Pasta","Garlic","Butter","Parmesan","Salt"],
steps:[
{amount:"8 oz pasta",t:"Boil at 212°F",time:10},
{amount:"3 tbsp butter",t:"Melt at 300°F",time:2},
{amount:"garlic",t:"Sauté until fragrant",time:2},
{amount:"parmesan",t:"Mix and serve",time:3}
]
},

{
name:"Beef Tacos",
ingredients:["Ground beef","Tortilla","Cheese","Lettuce","Tomatoes"],
steps:[
{amount:"1 lb beef",t:"Cook at 375°F until 160°F internal",time:10},
{amount:"seasoning",t:"Simmer beef",time:5},
{amount:"tortillas",t:"Warm and assemble",time:3}
]
},

{
name:"BBQ Chicken",
ingredients:["Chicken breast","BBQ sauce","Salt","Pepper"],
steps:[
{amount:"1 chicken breast",t:"Bake at 375°F until 165°F internal",time:25},
{amount:"BBQ sauce",t:"Glaze and finish",time:5}
]
},

{
name:"Chicken Alfredo",
ingredients:["Chicken breast","Pasta","Cream","Butter","Parmesan"],
steps:[
{amount:"8 oz pasta",t:"Boil at 212°F",time:10},
{amount:"1 chicken breast",t:"Cook at 375°F until 165°F",time:10},
{amount:"cream sauce",t:"Simmer at 300°F",time:8}
]
},

{
name:"Grilled Cheese",
ingredients:["Bread","Cheese","Butter"],
steps:[
{amount:"2 slices bread",t:"Toast at 350°F",time:5},
{amount:"cheese",t:"Melt inside",time:3}
]
},

{
name:"Omelet",
ingredients:["Eggs","Cheese","Butter"],
steps:[
{amount:"3 eggs",t:"Cook at 325°F",time:5},
{amount:"cheese",t:"Fold and melt",time:2}
]
},

{
name:"Spaghetti Bolognese",
ingredients:["Ground beef","Pasta","Tomato sauce","Onions","Garlic"],
steps:[
{amount:"1 lb beef",t:"Cook at 375°F",time:10},
{amount:"sauce",t:"Simmer 300°F",time:15},
{amount:"pasta",t:"Boil 212°F",time:10}
]
},

{
name:"Chicken Stir Fry",
ingredients:["Chicken breast","Bell peppers","Onions","Soy sauce","Rice"],
steps:[
{amount:"1 chicken breast",t:"Cook at 400°F",time:8},
{amount:"vegetables",t:"Stir fry",time:6}
]
},

{
name:"Salmon Lemon Butter",
ingredients:["Salmon","Lemon","Butter","Garlic"],
steps:[
{amount:"salmon",t:"Bake at 375°F until 145°F",time:15},
{amount:"sauce",t:"Drizzle and serve",time:3}
]
},

{
name:"Turkey Rice Bowl",
ingredients:["Turkey","Rice","Onions","Garlic"],
steps:[
{amount:"1 lb turkey",t:"Cook at 375°F",time:10},
{amount:"rice",t:"Combine",time:8}
]
}

];

/* MATCH */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
let missing=r.ingredients.filter(i=>!selected.includes(i));
return {...r,match,missing};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${r.match}<br>
Missing: ${r.missing.join(", ")||"None"}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

/* PANTRY */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});
html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
?selected.filter(x=>x!==i)
:[...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* RECIPE */
let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);
render();
show("recipe");
}

function render(){

let missing=current.ingredients.filter(i=>!selected.includes(i));

let stepsHTML=current.steps.map((s,i)=>`
<div class="card">
<b>Step ${i+1}</b><br>
${s.t}<br>
Amount: ${s.amount}<br>
Time: ${s.time} min
</div>`).join("");

let shopHTML=`<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{
let q=encodeURIComponent(item);
shopHTML+=`
<div class="card">
<b>${item}</b><br>
<a class="shopBtn instacartBtn" target="_blank" href="https://www.instacart.com/store/search?search=${q}">Instacart</a>
<a class="shopBtn walmartBtn" target="_blank" href="https://www.walmart.com/search?q=${q}">Walmart</a>
</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>
${stepsHTML}
${shopHTML}
<div class="btn" onclick="goHome()">Home</div>
`;
}

function goHome(){show("home");}

show("home");

</script>

</body>
</html>
