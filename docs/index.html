<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chef Jeff</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
        user-select: none;
        touch-action: manipulation;
    }

    /* Intro container */
    #introContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        z-index: 3;
        opacity: 0;
        animation: fadeIn 2s ease-in-out forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
    }

    #introLogo {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    /* Camera screen */
    #cameraScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }

    /* Glowing instruction text */
    #cameraText {
        position: absolute;
        bottom: 22vh;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        text-align: center;
        color: white;
        font-size: 22px;
        font-weight: 600;
        opacity: 0;
        transition: opacity 1s ease-in-out;
        z-index: 4;

        text-shadow:
            0 0 8px rgba(255, 255, 255, 0.8),
            0 0 16px rgba(255, 255, 255, 0.6),
            0 0 24px rgba(255, 255, 255, 0.4);

        animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
        0% {
            text-shadow:
                0 0 6px rgba(255, 255, 255, 0.7),
                0 0 12px rgba(255, 255, 255, 0.5),
                0 0 18px rgba(255, 255, 255, 0.3);
        }
        50% {
            text-shadow:
                0 0 12px rgba(255, 255, 255, 1),
                0 0 24px rgba(255, 255, 255, 0.8),
                0 0 36px rgba(255, 255, 255, 0.6);
        }
        100% {
            text-shadow:
                0 0 6px rgba(255, 255, 255, 0.7),
                0 0 12px rgba(255, 255, 255, 0.5),
                0 0 18px rgba(255, 255, 255, 0.3);
        }
    }

    /* Camera button */
    .camera-hotspot {
        position: absolute;
        bottom: 8vh;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(6px);
        border: 2px solid rgba(255, 255, 255, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 18px;
        text-align: center;
        z-index: 4;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }

    #cameraInput {
        display: none;
    }
</style>
</head>

<body>

<!-- Intro screen -->
<div id="introContainer">
    <img id="introLogo" src="rusty_intro.jpeg" alt="Rusty Intro Logo">
</div>

<!-- Camera screen -->
<img id="cameraScreen" src="copilot_image_1777179019874.jpeg" alt="Chef Jeff Camera Screen">

<!-- Glowing text -->
<div id="cameraText">
    Take a picture of your food and we will make something of it
</div>

<!-- Robot voice -->
<audio id="robotVoice" src="robot_voice.mp3"></audio>

<!-- Camera button -->
<div class="camera-hotspot" id="cameraButton">
    📷 Camera
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment"/>

<script>
// Play robot voice on first tap
document.addEventListener("click", () => {
    const audio = document.getElementById("robotVoice");
    audio.currentTime = 0;
    audio.play();
}, { once: true });

// Fade-out intro after 7.5 seconds (HALF of 15)
setTimeout(() => {
    const intro = document.getElementById("introContainer");

    // Fade out intro
    intro.style.animation = "fadeOut 1.5s ease-in-out forwards";

    // After fade-out completes, show camera screen + UI
    setTimeout(() => {
        document.getElementById("cameraScreen").style.opacity = "1";
        document.getElementById("cameraButton").style.opacity = "1";
        document.getElementById("cameraText").style.opacity = "1";

        // Move intro behind everything so it can't block clicks
        intro.style.zIndex = "-1";

    }, 1500);

}, 7500); // <-- updated delay

// Camera hotspot triggers camera
document.getElementById("cameraButton").addEventListener("click", () => {
    document.getElementById("cameraInput").click();
});

// Handle photo selection
document.getElementById("cameraInput").addEventListener("change", async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("image", file);

    const response = await fetch("/api/detect", {
        method: "POST",
        body: formData
    });

    const result = await response.json();
    window.location.href = `/recipes?items=${encodeURIComponent(JSON.stringify(result.ingredients))}`;
});
</script>

</body>
</html>
