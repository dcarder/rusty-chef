<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef Jeff</title>
  <link rel="manifest" href="manifest.json" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      background: url("your-image.jpg") no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .title {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: white;
      text-shadow: 0 3px 8px rgba(0,0,0,0.6);
    }

    .button-container {
      background: rgba(255,255,255,0.85);
      padding: 20px;
      border-radius: 20px 20px 0 0;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .btn-orange {
      background: #ff7f32;
      color: white;
    }

    .btn-dark {
      background: #333;
      color: white;
    }

    .btn-outline {
      background: white;
      border: 2px solid #ff7f32;
      color: #ff7f32;
    }
  </style>
</head>

<body>

  <div class="title">Cooking with Chef A.I.</div>

  <div class="button-container">
    <button class="btn btn-orange">Ingredients</button>
    <button class="btn btn-dark">Camera</button>
    <button class="btn btn-outline">Chef A.I. Recipe Book</button>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
