<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Force landscape orientation -->
  <meta name="viewport" content="width=device-height, height=device-width, initial-scale=1.0, user-scalable=no" />

  <title>Chef Jeff</title>
  <link rel="manifest" href="manifest.json" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      width: 100vh;   /* Swap width/height for landscape */
      height: 100vw;
      transform: rotate(90deg); /* Rotate screen */
      transform-origin: left top;
      position: absolute;
      top: 0;
      left: 0;
    }

    img.fullscreen {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Autofit image */
    }
  </style>
</head>

<body>

  <img src="copilot_image_1777179019874.jpeg" class="fullscreen" />

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
