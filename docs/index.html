<!DOCTYPE html><html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Jeff</title><style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* =========================
   APP ARCHITECTURE (STATE BASED)
========================= */
.screen{
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition:opacity 600ms ease;
}

.screen.active{
opacity:1;
pointer-events:auto;
z-index:10;
}

.screen img{
width:100%;
height:100%;
object-fit:contain;
}

/* CAMERA BACKGROUND */
#cameraScreen{
position:fixed;
inset:0;
object-fit:cover;
z-index:1;
opacity:0;
transition:opacity 600ms ease;
}

#cameraScreen.active{
opacity:1;
}

/* UI LAYER (ALWAYS ON TOP) */
#uiLayer{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}

/* BUTTONS */
.button{
pointer-events:auto;
position:absolute;
bottom:40px;
width:140px;
height:140px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:18px;
}

#cameraButton{right:30px;}
#factsButton{left:30px;}

#cameraText{
position:absolute;
bottom:220px;
width:100%;
text-align:center;
color:white;
font-size:20px;
}

/* FACTS PANEL */
#factsPage{
position:fixed;
inset:0;
background:black;
color:white;
padding:30px;
opacity:0;
pointer-events:none;
transition:opacity 500ms ease;
z-index:2000;
overflow:auto;
}

#factsPage.active{
opacity:1;
pointer-events:auto;
}

.navButton{
margin:20px auto;
padding:14px;
width:200px;
text-align:center;
border:2px solid white;
cursor:pointer;
}
</style></head>
<body><!-- SCREENS (STATE ROUTED) --><div id="logo" class="screen active">
<img src="your_logo.jpeg">
</div><div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div><img id="cameraScreen" src="copilot_image_1777179019874.jpeg"><!-- UI LAYER (ALWAYS VISIBLE WHEN CAMERA STATE) --><div id="uiLayer">
<div id="cameraButton" class="button">📷 Camera</div>
<div id="factsButton" class="button">📘 Facts</div>
<div id="cameraText">Take a picture of your food</div>
</div><input type="file" id="cameraInput" accept="image/*" capture="environment"><!-- FACTS --><div id="factsPage">
<h1>Food Facts</h1>
<p>Pork, Beef, Chicken seasoning basics.</p>
<div class="navButton" id="backBtn">Back</div>
</div><script>
console.log("APP ARCHITECTURE LOADED");

/* =========================
   STATE ENGINE
========================= */
const State = {
    LOGO:"logo",
    INTRO:"intro",
    CAMERA:"camera",
    FACTS:"facts"
};

let currentState = State.LOGO;

const logo = document.getElementById("logo");
const intro = document.getElementById("intro");
const cam = document.getElementById("cameraScreen");
const facts = document.getElementById("factsPage");

function setState(state){
    currentState = state;

    // reset
    logo.classList.remove("active");
    intro.classList.remove("active");
    cam.classList.remove("active");
    facts.classList.remove("active");

    switch(state){
        case State.LOGO:
            logo.classList.add("active");
            break;

        case State.INTRO:
            intro.classList.add("active");
            break;

        case State.CAMERA:
            cam.classList.add("active");
            break;

        case State.FACTS:
            facts.classList.add("active");
            break;
    }
}

/* =========================
   FLOW
========================= */
setState(State.LOGO);

setTimeout(()=>setState(State.INTRO),2500);
setTimeout(()=>setState(State.CAMERA),6000);

/* =========================
   BUTTONS
========================= */
document.getElementById("cameraButton").onclick=()=>{
    document.getElementById("cameraInput").click();
};

document.getElementById("factsButton").onclick=()=>{
    setState(State.FACTS);
};

document.getElementById("backBtn").onclick=()=>{
    setState(State.CAMERA);
};

/* =========================
   SAFETY: NEVER LOSE UI
========================= */
setInterval(()=>{
    // emergency UI restore
    if(currentState===State.CAMERA){
        document.getElementById("cameraButton").style.opacity=1;
        document.getElementById("factsButton").style.opacity=1;
    }
},2000);
</script></body>
</html>
