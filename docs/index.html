<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}
.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}
.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}
.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}
.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}
.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}
.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}
.walmartBtn{background:#0071ce;}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}
#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleRow{
display:flex;
align-items:center;
gap:16px;
}

.titleText{
display:flex;
flex-direction:column;
font-weight:900;
line-height:.9;
}

.the{font-size:36px;}
.rusty{font-size:64px;}
.chef{font-size:54px;}

.flame{
width:50px;
height:120px;
position:relative;
}

.flame span{
position:absolute;
bottom:0;
font-size:22px;
animation:rise 1.2s infinite;
opacity:0;
}

@keyframes rise{
0%{opacity:0;transform:translateY(0);}
30%{opacity:1;}
100%{opacity:0;transform:translateY(-120px);}
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div id="introLogo">
<div class="titleRow">
<div class="flame"><span>🔥</span><span>🔥</span><span>🔥</span></div>
<div class="titleText">
<div class="the">THE</div>
<div class="rusty">RUSTY</div>
<div class="chef">CHEF</div>
</div>
<div class="flame"><span>🔥</span><span>🔥</span><span>🔥</span></div>
</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Turkey","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
   FIXED + EXPANDED RECIPES (NO PLACEHOLDERS)
========================= */

const recipes = [

{
name:"Beef Tacos",
ingredients:[
"1 pound ground beef",
"1 packet taco seasoning",
"3 tablespoons water",
"8 small tortillas",
"1 cup shredded cheese",
"Optional lettuce, tomato, sour cream"
],
simpleSteps:[
{t:"Cook beef","a":"Heat pan until warm. Add beef and break apart until brown."},
{t:"Season","a":"Add taco seasoning and stir."},
{t:"Add water","a":"Mix until moist."},
{t:"Warm tortillas","a":"Heat until soft."},
{t:"Assemble","a":"Fill and serve."}
],
chefSteps:[
{t:"Heat pan","a":"Feel rising warmth before adding meat."},
{t:"Cook beef","a":"Listen for steady sizzling and break apart until crumbly."},
{t:"Cook until firm","a":"Beef changes from soft to firm, no stickiness."},
{t:"Season","a":"Smell becomes rich and savory as spices coat meat."},
{t:"Add water","a":"Brief hiss, mixture becomes moist not wet."},
{t:"Warm tortillas","a":"Should bend easily without cracking."},
{t:"Assemble","a":"Heat melts cheese slightly for soft texture."}
]
},

{
name:"Chicken Fried Rice",
ingredients:[
"2 cups cooked rice",
"2 eggs",
"1 cup chicken breast",
"Soy sauce",
"Onions",
"Carrots",
"Oil"
],
simpleSteps:[
{t:"Cook chicken","a":"Sizzle until firm."},
{t:"Add vegetables","a":"Soften onions and carrots."},
{t:"Add rice","a":"Break clumps."},
{t:"Season","a":"Add soy sauce."}
],
chefSteps:[
{t:"Heat pan","a":"Strong warmth above surface."},
{t:"Cook chicken","a":"Loud sizzling until firm."},
{t:"Add vegetables","a":"Onions soften, carrots tender."},
{t:"Add rice","a":"Dry crackle sound as rice hits pan."},
{t:"Season","a":"Stir until evenly brown and aromatic."}
]
},

{
name:"Spaghetti Bolognese",
ingredients:[
"Ground beef",
"Spaghetti",
"Tomatoes",
"Onions",
"Garlic"
],
simpleSteps:[
{t:"Boil pasta","a":"Until soft."},
{t:"Cook beef","a":"Brown fully."},
{t:"Add sauce","a":"Simmer."},
{t:"Combine","a":"Mix together."}
],
chefSteps:[
{t:"Boil pasta","a":"Flexible but not mushy."},
{t:"Cook beef","a":"Crumbly and firm."},
{t:"Cook aromatics","a":"Onion and garlic become fragrant."},
{t:"Simmer sauce","a":"Thick and rich aroma."},
{t:"Combine","a":"Coats pasta evenly."}
]
}

];

function score(r){
let m=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match:m};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);
let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">${r.name}<br>Match: ${r.match}</div>`;
});
document.getElementById("results").innerHTML=html;
show("results");
}

function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});
html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);
let html=`<div class="header">${current.name}</div>`;
current.chefSteps.forEach((s,i)=>{
html+=`<div class="card"><b>${i+1}. ${s.t}</b><br>${s.a}</div>`;
});
html+=`<div class="btn" onclick="show('home')">Home</div>`;
document.getElementById("recipe").innerHTML=html;
show("recipe");
}

show("home");

</script>

</body>
</html>
