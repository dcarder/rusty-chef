<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.back{
margin-top:10px;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

/* BACKGROUND */
#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg" />
  </div>

  <div class="header">🤖 Rusty AI Chef</div>

  <div class="card">AI Recipe Generator + 100 Ingredients System</div>

  <div class="dock">
    <div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
    <div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
    <div class="dockBtn" onclick="goHome()">🏠<span>Home</span></div>
  </div>
</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
   100 INGREDIENTS (UNCHANGED)
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

/* =========================
   🧠 REAL AI RECIPE GENERATOR
========================= */

function generateAIRecipe(){

if(selected.length < 3){
return [{
name:"Select More Ingredients",
time:0,
ingredients:[],
steps:["Pick at least 3 ingredients to generate an AI recipe."]
}];
}

const methods = ["Grilled","Pan-Seared","Stir-Fry","Baked","One-Pot","Roasted"];
const cuisines = ["Italian","Asian","Mexican","American","Mediterranean"];

let shuffled = [...selected].sort(()=>Math.random()-0.5);
let used = shuffled.slice(0,6);

let method = methods[Math.floor(Math.random()*methods.length)];
let cuisine = cuisines[Math.floor(Math.random()*cuisines.length)];

let protein = used.find(i =>
i.includes("Chicken") || i.includes("Beef") ||
i.includes("Shrimp") || i.includes("Salmon") ||
i.includes("Pork") || i.includes("Turkey")
) || "Mixed Protein";

return [{
name:`${method} ${protein} ${cuisine} Bowl`,
time: 20 + Math.floor(Math.random()*35),
ingredients: used,
steps:[
`Gather ingredients: ${used.join(", ")}.`,
`Prepare all items by washing, chopping, and seasoning lightly.`,
`Heat pan or pot to medium-high heat (350–400°F).`,
`Add oil and cook protein (${protein}) until browned on all sides.`,
`Add vegetables and aromatics from selected ingredients.`,
`Season with salt, pepper, and sauces that match ${cuisine} style.`,
`Stir and cook for 10–15 minutes until everything is tender and combined.`,
`Taste and adjust seasoning balance (salt, acid, spice).`,
`Let rest for 2 minutes before serving for best flavor absorption.`
]
}];
}

/* =========================
   UI
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){
let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
<span>${i}</span><span>${on?'✔':''}</span></div>`;
});

html+=`<div class="btn" onclick="openRecipes()">🍳 Generate AI Recipe</div>`;
document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){

let list = generateAIRecipe();
window.generated = list;

let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🍳 AI Generated Recipe</div>`;

list.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
${r.time} min
</div>`;
});

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

function openRecipe(name){

let r = window.generated.find(x=>x.name===name);

let html=`<div class="topBar"><div class="homeBtn" onclick="openRecipes()">⬅ Back</div></div>
<div class="header">${r.name}</div>

<div class="card"><b>Ingredients:</b><br>${r.ingredients.join("<br>")}</div>`;

r.steps.forEach((s,i)=>{
html+=`<div class="card"><b>Step ${i+1}</b><br><br>${s}</div>`;
});

document.getElementById("detail").innerHTML=html;
show("detail");
}

function goHome(){
show("home");
}

openIngredients();

</script>

</body>
</html>
