<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Kitchen OS</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:black;
color:white;
font-family:Arial;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,0.15);
white-space:pre-wrap;
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

/* =========================
🏠 HOME SCREEN PRO ANIMATION
========================= */

#homeBg{
position:fixed;
inset:0;
z-index:-2;
opacity:0;
animation:bgFadeIn 1.2s ease forwards;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes bgFadeIn{
from{opacity:0; transform:scale(1.05);}
to{opacity:1; transform:scale(1);}
}

/* LOGO INTRO */
#introLogo{
position:absolute;
top:38%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
font-weight:800;
opacity:0;
animation:logoIntro 1.4s ease forwards;
animation-delay:0.3s;
text-align:center;
}

@keyframes logoIntro{
0%{opacity:0; transform:translate(-50%,-60%) scale(0.85);}
60%{opacity:1;}
100%{opacity:1; transform:translate(-50%,-50%) scale(1);}
}

/* BOTTOM DOCK */
.bottomDock{
position:fixed;
bottom:-140px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
padding:10px;
opacity:0;
animation:dockSlide 1s ease forwards;
animation-delay:1.2s;
}

@keyframes dockSlide{
0%{bottom:-140px; opacity:0;}
80%{bottom:30px; opacity:1;}
100%{bottom:20px; opacity:1;}
}

.bottomDock .btn{
width:160px;
text-align:center;
animation:btnPulse 2s ease-in-out 2s infinite;
}

@keyframes btnPulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.03);}
}

</style>
</head>

<body>

<div id="app">

<!-- 🏠 HOME (ONLY CHANGE IS VISUAL LAYER + ANIMATION) -->
<div id="home" class="page active">

  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg" />
  </div>

  <div id="introLogo">🍳 Smart Kitchen OS</div>

  <div class="bottomDock" id="dock">
    <div class="btn" onclick="openPantry()">🧺 Pantry</div>
    <div class="btn" onclick="showMatches()">🍳 Recipes</div>
  </div>

</div>

<!-- 🧺 PANTRY -->
<div id="pantry" class="page"></div>

<!-- 🍳 RESULTS -->
<div id="results" class="page"></div>

<!-- 📖 RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

/* =========================
100 INGREDIENTS (UNCHANGED)
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
RECIPE ENGINE (UNCHANGED)
========================= */

const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
steps:[
{t:"Prep ingredients.",time:5,temp:"Room"},
{t:"Cook chicken at 375°F.",time:8,temp:"375°F"},
{t:"Stir-fry vegetables.",time:5,temp:"350°F"},
{t:"Add rice + soy sauce.",time:7,temp:"400°F"},
{t:"Rest.",time:2,temp:"Off heat"}
]
}
];

/* =========================
MATCH ENGINE (UNCHANGED)
========================= */

function score(r){
let match = r.ingredients.filter(i=>selected.includes(i)).length;
let missing = r.ingredients.filter(i=>!selected.includes(i));
return {...r,match,missing};
}

function topRecipes(){
return recipes.map(score)
.sort((a,b)=>b.match-a.match)
.slice(0,3);
}

/* =========================
HOME FIX (NO BEHAVIOR CHANGE)
========================= */

document.addEventListener("DOMContentLoaded", () => {
  const dock = document.getElementById("dock");
  dock.style.pointerEvents = "none";

  setTimeout(() => {
    dock.style.pointerEvents = "auto";
  }, 1500);
});

/* =========================
NAV (UNCHANGED)
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openPantry(){

let html=`<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
let on = selected.includes(i);

html+=`
<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
${i} ${on?'✔':''}
</div>`;
});

html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

function showMatches(){

let top = topRecipes();

let html=`<div class="header">🍳 Top Recipes</div>`;

top.forEach(r=>{
html+=`
<div class="card">
<b>${r.name}</b><br>
Match: ${r.match}<br>
Missing: ${r.missing.join(", ")||"None"}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

</script>

</body>
</html>
