<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<div id="home" class="page active">
  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg" />
  </div>

  <div class="header">🤖 Rusty AI Chef</div>
  <div class="card">AI Recipe Generator + Flavor Intelligence</div>

  <div class="dock">
    <div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
    <div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
    <div class="dockBtn" onclick="goHome()">🏠<span>Home</span></div>
  </div>
</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* INGREDIENTS */
const ingredientItems = [
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Bell peppers","Mushrooms","Shrimp","Salmon",
"Steak","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon","Lime","Paprika","Oregano",
"Basil","Curry powder","Tortilla","Bread","Parmesan","Cheddar","Mozzarella","Avocado","Chicken broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Honey","Yogurt"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

/* AI GENERATOR */
function generateAIRecipe(){

if(selected.length < 3){
return [{
name:"Select More Ingredients",
time:0,
ingredients:[],
steps:["Pick at least 3 ingredients."]
}];
}

const methods=["Grilled","Pan-Seared","Stir-Fry","Baked","Roasted"];
const cuisines=["Mediterranean","Mexican","Asian","Italian","American"];

let used=[...selected].sort(()=>Math.random()-0.5).slice(0,6);
let method=methods[Math.floor(Math.random()*methods.length)];
let cuisine=cuisines[Math.floor(Math.random()*cuisines.length)];

return [{
name:`${method} ${cuisine} Dish`,
time:20+Math.floor(Math.random()*30),
ingredients:used,
steps:[
"Prep ingredients.",
"Heat pan to medium-high.",
"Cook protein or base first.",
"Add vegetables and spices.",
"Simmer and combine flavors.",
"Serve hot."
]
}];
}

/* 🌍 SPICE GUIDE */
function getCuisineGuide(name){

if(name.includes("Mediterranean")){
return [
"Olive oil – smooth richness.",
"Garlic – strong base flavor.",
"Lemon – brightness and acidity.",
"Oregano/Basil – fresh herbal notes.",
"Flavor: light, fresh, tangy."
];
}

if(name.includes("Mexican")){
return [
"Chili powder – heat and depth.",
"Cumin – warm earthy flavor.",
"Paprika – smoky sweetness.",
"Lime – balances richness.",
"Flavor: bold, smoky, spicy."
];
}

if(name.includes("Asian")){
return [
"Soy sauce – umami saltiness.",
"Ginger – sharp freshness.",
"Garlic – aromatic base.",
"Sesame oil – nutty aroma.",
"Flavor: savory, aromatic."
];
}

if(name.includes("Italian")){
return [
"Garlic – flavor base.",
"Basil – sweet herb.",
"Oregano – earthy herb.",
"Tomato – rich acidity.",
"Flavor: rich, herb-based."
];
}

return [
"Salt – enhances flavor.",
"Fat – carries taste.",
"Acid – balances dish.",
"Spices – add depth."
];
}

/* UI */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){
let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
<span>${i}</span><span>${on?'✔':''}</span></div>`;
});

html+=`<div class="btn" onclick="openRecipes()">🍳 Generate Recipe</div>`;
document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){
let list=generateAIRecipe();
window.generated=list;

let html=`<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🍳 AI Recipe</div>`;

list.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>${r.time} min
</div>`;
});

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

function openRecipe(name){
let r=window.generated.find(x=>x.name===name);
let guide=getCuisineGuide(r.name);

let html=`<div class="topBar"><div class="homeBtn" onclick="openRecipes()">⬅ Back</div></div>
<div class="header">${r.name}</div>

<div class="card"><b>Ingredients:</b><br>${r.ingredients.join("<br>")}</div>

<div class="card"><b>🌍 Flavor & Spice Guide:</b><br><br>
${guide.map(g=>"• "+g).join("<br>")}
</div>`;

r.steps.forEach((s,i)=>{
html+=`<div class="card"><b>Step ${i+1}</b><br><br>${s}</div>`;
});

document.getElementById("detail").innerHTML=html;
show("detail");
}

function goHome(){show("home");}

openIngredients();

</script>

</body>
</html>
