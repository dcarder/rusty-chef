<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Kitchen OS v10</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:black;
color:white;
font-family:Arial;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:14px;
padding:14px;
margin:10px 0;
white-space:pre-wrap;
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<div id="home" class="page active">
<div class="header">Smart Kitchen OS v10</div>
<div class="btn" onclick="openPantry()">Open Pantry</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

/* =========================
100 INGREDIENTS RESTORED
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
25 REAL BUDGET RECIPES
========================= */

const recipes = [
{name:"Chicken Fried Rice",ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"]},
{name:"Garlic Pasta",ingredients:["Pasta","Garlic","Butter","Salt","Pepper"]},
{name:"Omelette",ingredients:["Eggs","Cheese","Onions","Tomatoes"]},
{name:"Chicken Bowl",ingredients:["Chicken breast","Rice","Broccoli","Soy sauce"]},
{name:"Beef Stir Fry",ingredients:["Ground beef","Soy sauce","Onions","Bell peppers"]},
{name:"Tuna Rice Bowl",ingredients:["Rice","Tuna","Lemon"]},
{name:"Baked Potatoes",ingredients:["Potatoes","Butter","Cheese"]},
{name:"Chicken Soup",ingredients:["Chicken broth","Chicken breast","Carrots","Onions"]},
{name:"Veggie Stir Fry",ingredients:["Broccoli","Carrots","Onions","Soy sauce"]},
{name:"Chicken Quesadilla",ingredients:["Chicken breast","Tortilla","Cheese"]},
{name:"Shrimp Rice Bowl",ingredients:["Shrimp","Rice","Garlic"]},
{name:"Salmon Plate",ingredients:["Salmon","Lemon","Salt"]},
{name:"Fried Rice Simple",ingredients:["Rice","Eggs","Soy sauce"]},
{name:"Garlic Butter Pasta",ingredients:["Pasta","Butter","Garlic"]},
{name:"BBQ Chicken Bowl",ingredients:["Chicken breast","BBQ sauce","Rice"]},
{name:"Teriyaki Chicken",ingredients:["Chicken breast","Teriyaki sauce","Rice"]},
{name:"Cheesy Rice",ingredients:["Rice","Cheese","Butter"]},
{name:"Chicken Garlic Rice",ingredients:["Chicken breast","Rice","Garlic","Soy sauce"]},
{name:"Egg Scramble",ingredients:["Eggs","Butter","Salt"]},
{name:"Chicken Pasta",ingredients:["Chicken breast","Pasta","Butter"]},
{name:"Veggie Rice",ingredients:["Rice","Carrots","Broccoli"]},
{name:"Steak Plate",ingredients:["Steak","Salt","Pepper"]},
{name:"Chicken Wrap",ingredients:["Chicken breast","Tortilla","Cheese"]},
{name:"Simple Soup",ingredients:["Chicken broth","Carrots","Onions"]},
{name:"Rice & Egg Bowl",ingredients:["Rice","Eggs","Soy sauce"]}
];

/* =========================
MATCH SYSTEM
========================= */

function score(r){
let match = r.ingredients.filter(i=>selected.includes(i)).length;
let missing = r.ingredients.filter(i=>!selected.includes(i));
return {...r,match,missing};
}

function topRecipes(){
return recipes
.map(score)
.sort((a,b)=>b.match-a.match)
.slice(0,3);
}

/* =========================
EXPORT SYSTEM
========================= */

function buildExportList(recipe){
let missing = recipe.ingredients.filter(i=>!selected.includes(i));
return missing.map(i=>`${i} - grocery item - search fresh`).join("\n");
}

function copyText(text){
navigator.clipboard.writeText(text);
alert("🧾 Shopping list copied!");
}

/* =========================
UI
========================= */

function openPantry(){

let html=`<div class="header">Pantry (100 Ingredients)</div>`;

ingredientItems.forEach(i=>{
let on = selected.includes(i);

html+=`
<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
${i} ${on?'✔':''}
</div>`;
});

html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

function showMatches(){

let top = topRecipes();

let html=`<div class="header">Top 3 Recipes</div>`;

top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${r.match}<br>
Missing: ${r.missing.join(", ")||"None"}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

function openRecipe(name){

let r = recipes.find(x=>x.name===name);

let instructions = `### Instructions

1. Gather ingredients: ${r.ingredients.join(", ")}
2. Prep everything (wash, chop, organize)
3. Cook main components using proper heat
4. Combine and season properly
5. Serve hot and fresh
`;

let missing = r.ingredients.filter(i=>!selected.includes(i));
let groceryText = missing.length ? missing.join(", ") : "You already have everything!";
let exportList = buildExportList(r);

document.getElementById("recipe").innerHTML=`
<div class="header">${r.name}</div>

<div class="card">${instructions}</div>

<div class="card">
🛒 Grocery List<br><br>
${groceryText}
</div>

<div class="btn" onclick="copyText(exportList)">
🧾 Export to Instacart / Walmart
</div>

<div class="btn" onclick="openPantry()">Back</div>
`;

show("recipe");
}

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

openPantry();

</script>

</body>
</html>
