<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v13</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{text-align:center;font-size:22px;font-weight:700;margin:10px 0;}
.card{background:rgba(255,255,255,.08);border-radius:14px;padding:14px;margin:10px 0;border:1px solid rgba(255,255,255,.15);}
.item{padding:10px;margin:6px 0;border-radius:10px;border:1px solid rgba(255,255,255,.2);cursor:pointer;}
.item.selected{background:rgba(79,172,254,.25);}
.btn{padding:14px;background:#4facfe;color:black;font-weight:700;text-align:center;border-radius:12px;margin-top:10px;cursor:pointer;}

.shopBtn{display:inline-block;margin-top:8px;margin-right:8px;padding:10px 14px;border-radius:10px;font-weight:700;text-decoration:none;color:white;}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

#homeBg{position:fixed;inset:0;z-index:-1;}
#homeBg img{width:100%;height:100%;object-fit:cover;}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleText{font-size:48px;font-weight:900;}

/* FIRE */
.fireGlow{
text-shadow:0 0 10px orange,0 0 20px red;
}
</style>
</head>

<body>

<div id="home" class="page active">
<div id="homeBg"><img src="copilot_image_1777179019874.jpeg"></div>

<div id="introLogo">
<div class="titleText"><span class="fireGlow">THE RUSTY CHEF</span></div>
</div>

<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* PANTRY */
const ingredientItems=[
"Chicken breast","Ground beef","Rice","Eggs","Pasta","Cheese","Garlic","Onions","Tomatoes","Soy sauce"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* RECIPES */
const recipes=[
{
name:"Chicken Fried Rice",
ingredients:["Chicken breast","Rice","Eggs","Soy sauce","Onions"],
steps:[
{
text:"Place a pan on the stove. Turn heat to HIGH. Wait until you feel strong heat when holding your hand 6 inches above pan.",
item:"Chicken breast",
amount:"1 pound diced",
time:8,
temp:375,
detail:"Pour oil. Add chicken. Listen for loud sizzling. Stir every 30 seconds. Cook until no pink remains. It should feel firm when pressed."
},
{
text:"Add rice into the same pan.",
item:"Rice",
amount:"2 cups cooked",
time:6,
temp:400,
detail:"Break rice apart with spatula. You should hear dry crackling sound. Stir constantly until rice is hot and slightly toasted."
},
{
text:"Add eggs slowly into pan.",
item:"Eggs",
amount:"2 beaten",
time:3,
temp:350,
detail:"Eggs should spread and turn solid yellow. Keep stirring until no liquid remains."
}
]
}
];

/* MATCH */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
let missing=r.ingredients.filter(i=>!selected.includes(i));
return {...r,match,missing};
}

/* RECIPES */
function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match);

document.getElementById("results").innerHTML=
`<div class="header">🍳 Recipes</div>`+
top.map(r=>`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${r.match}<br>
Missing: ${r.missing.join(", ")||"None"}
</div>`).join("");

show("results");
}

/* PANTRY */
function openPantry(){
document.getElementById("pantry").innerHTML=
`<div class="header">🧺 Pantry</div>`+
ingredientItems.map(i=>
`<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`
).join("")+
`<div class="btn" onclick="showMatches()">Find Recipes</div>`;

show("pantry");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* RECIPE */
let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);
render();
show("recipe");
}

function render(){

let missing=current.ingredients.filter(i=>!selected.includes(i));

let steps=current.steps.map((s,i)=>`
<div class="card">

<b>Step ${i+1}: ${s.item}</b><br><br>

📝 Instruction:<br>${s.text}<br><br>

⚙️ What to do:<br>${s.detail}<br><br>

📦 Amount: ${s.amount}<br>
⏱ Time: ${s.time} min<br>
🌡 Temp: ${s.temp}°F<br>

</div>
`).join("");

let shop=missing.map(i=>{
let q=encodeURIComponent(i);
return `
<div class="card">
<b>${i}</b><br>

<a class="shopBtn instacartBtn" target="_blank"
href="https://www.instacart.com/store/search?search=${q}">
Order Instacart
</a>

<a class="shopBtn walmartBtn" target="_blank"
href="https://www.walmart.com/search?q=${q}">
Order Walmart
</a>

</div>`;
}).join("");

document.getElementById("recipe").innerHTML=
`<div class="header">${current.name}</div>

${steps}

<div class="header">🛒 Missing Ingredients</div>
${shop}

<div class="btn" onclick="show('home')">Home</div>`;
}

show("home");

</script>

</body>
</html>
