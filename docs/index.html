<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chef Jeff</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        touch-action: manipulation;
        position: relative;
    }

    /* Background image */
    .bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: -1;
    }

    /* Camera hotspot */
    .camera-hotspot {
        position: absolute;
        bottom: 8vh;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(6px);
        border: 2px solid rgba(255, 255, 255, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 18px;
        text-align: center;
    }

    /* Hidden camera input */
    #cameraInput {
        display: none;
    }

    /* Intro text */
    .intro-text {
        position: absolute;
        top: 8vh;
        width: 100%;
        text-align: center;
        color: white;
        font-size: 26px;
        padding: 0 20px;
        text-shadow: 0 0 8px black;
    }
</style>
</head>

<body>

<!-- Background image -->
<img src="copilot_image_1777179019874.jpeg" class="bg" alt="Chef Jeff Background">

<!-- Robot voice -->
<audio id="robotVoice" src="robot_voice.mp3"></audio>

<!-- Intro text -->
<div class="intro-text">
    Snap a photo of your food and I’ll help you make something with it
</div>

<!-- Camera hotspot -->
<div class="camera-hotspot" id="cameraButton">
    📷 Camera
</div>

<!-- Hidden camera input -->
<input 
    type="file" 
    id="cameraInput" 
    accept="image/*" 
    capture="environment"
/>

<script>
/* One tap anywhere plays robot voice */
document.addEventListener("click", () => {
    const audio = document.getElementById("robotVoice");
    audio.currentTime = 0;
    audio.play();
}, { once: true });

/* Camera hotspot triggers camera */
document.getElementById("cameraButton").addEventListener("click", () => {
    document.getElementById("cameraInput").click();
});

/* Handle photo selection */
document.getElementById("cameraInput").addEventListener("change", async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    // Send to backend
    const formData = new FormData();
    formData.append("image", file);

    const response = await fetch("/api/detect", {
        method: "POST",
        body: formData
    });

    const result = await response.json();

    // Redirect to recipes page
    window.location.href = `/recipes?items=${encodeURIComponent(JSON.stringify(result.ingredients))}`;
});
</script>

</body>
</html>
