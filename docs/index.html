<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
    }

    .bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: contain; /* fits entire image */
        background-color: black;
    }

    @media screen and (orientation: portrait) {
        body::before {
            content: "Rotate to landscape";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
        }
        .bg {
            display: none;
        }
    }
</style>
</head>
<body>
    <img src="copilot_image_1777179019874.jpeg" class="bg">
</body>
</html>
