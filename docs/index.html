<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* APP */
#app{
position:fixed;
inset:0;
background:black;
}

/* PAGES */
.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{
display:block;
}

/* HEADER */
.header{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
padding:12px;
margin:10px 0;
}

/* ITEM */
.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin:6px 0;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:12px;
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

/* BUTTON */
.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

/* BACK */
.back{
margin-top:10px;
padding:10px;
border:1px solid rgba(255,255,255,0.3);
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* DOCK HOME UI */
.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:22px;
}

.dockBtn{
width:85px;
height:85px;
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
cursor:pointer;
}

.dockBtn.large{
width:110px;
height:110px;
}

.dockBtn span{
font-size:10px;
margin-top:6px;
opacity:0.7;
}

</style>
</head>

<body>

<div id="app">

<!-- HOME (3 BUTTON SCREEN) -->
<div id="home" class="page active">
<div class="header">🤖 Rusty the Robot Chef</div>

<div class="card">🧂 The Salty Chef’s help is ready</div>

<div class="dock">
  <div class="dockBtn" onclick="openRecipes()">🍳<span>Recipes</span></div>
  <div class="dockBtn large" onclick="openSmart()">🧠<span>Smart Cook</span></div>
  <div class="dockBtn" onclick="openPantry()">🧺<span>Pantry</span></div>
</div>

</div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- DETAIL -->
<div id="detail" class="page"></div>

</div>

<script>

/* ======================
   NAV RESET FIX (IMPORTANT)
====================== */

function goHome(){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById("home").classList.add("active");
}

/* ======================
   PANTRY DATA
====================== */

let selected = JSON.parse(localStorage.getItem("pantry") || "[]");

const pantryItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Sausage","Pork chops",
"Potatoes","Onions","Garlic","Carrots","Broccoli","Spinach",
"Rice","Pasta","Cheese","Milk","Butter","Tomatoes","Beans"
];

/* ======================
   LOAD PANTRY
====================== */

function loadPantry(){

let html = `<div class="header">🧺 Pantry</div>`;

pantryItems.forEach(item=>{
let on = selected.includes(item);

html += `
<div class="item ${on ? "selected" : ""}" onclick="toggleItem('${item}')">
<span>${item}</span>
<span>${on ? "✔" : ""}</span>
</div>
`;
});

html += `
<div class="btn" onclick="findRecipes()">🍳 What can I cook?</div>
<div class="back" onclick="goHome()">⬅ Back to Home</div>
`;

document.getElementById("pantry").innerHTML = html;

show("pantry");
}

/* ======================
   TOGGLE INGREDIENTS
====================== */

function toggleItem(item){

if(selected.includes(item)){
selected = selected.filter(i=>i!==item);
}else{
selected.push(item);
}

localStorage.setItem("pantry", JSON.stringify(selected));
loadPantry();
}

/* ======================
   RECIPES
====================== */

const recipes = [
{
name:"Garlic Butter Chicken Rice",
ingredients:["Chicken breast","Rice","Garlic","Butter","Onions"],
time:25,
temp:"375°F",
steps:[
"Season chicken",
"Sear in butter",
"Add garlic + onions",
"Cook rice",
"Combine and simmer"
]
},
{
name:"Cheesy Bacon Pasta",
ingredients:["Bacon","Pasta","Cheese","Milk","Butter"],
time:20,
temp:"350°F",
steps:[
"Cook pasta",
"Cook bacon",
"Add milk + butter",
"Melt cheese",
"Combine"
]
},
{
name:"Veggie Stir Fry",
ingredients:["Broccoli","Carrots","Onions","Garlic","Rice"],
time:15,
temp:"High heat",
steps:[
"Heat pan",
"Add garlic",
"Add vegetables",
"Stir fry",
"Serve"
]
}
];

/* ======================
   MATCH ENGINE
====================== */

function findRecipes(){

let ranked = recipes.map(r=>{
let match = r.ingredients.filter(i=>selected.includes(i)).length;
return {...r, score: match / r.ingredients.length};
}).sort((a,b)=>b.score-a.score);

let html = `<div class="header">🍳 Best Matches</div>`;

ranked.forEach(r=>{
html += `
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${(r.score*100).toFixed(0)}%<br>
Time: ${r.time} min
</div>
`;
});

html += `<div class="back" onclick="loadPantry()">⬅ Back</div>`;

document.getElementById("results").innerHTML = html;
show("results");
}

/* ======================
   RECIPE DETAIL
====================== */

function openRecipe(name){

let r = recipes.find(x=>x.name===name);

let html = `
<div class="header">${r.name}</div>

<div class="card">
⏱ Time: ${r.time} min<br>
🌡 Temp: ${r.temp}<br><br>
<b>Ingredients:</b><br>
${r.ingredients.join("<br>")}
</div>

<div class="card">
<b>Steps:</b><br>
${r.steps.map(s=>"• "+s).join("<br>")}
</div>

<div class="back" onclick="findRecipes()">⬅ Back</div>
`;

document.getElementById("detail").innerHTML = html;
show("detail");
}

/* ======================
   NAV
====================== */

function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* INIT */
loadPantry();

</script>

</body>
</html>
