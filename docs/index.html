<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Jeff AI</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

.screen{
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition:opacity 500ms ease;
z-index:10;
}

.screen.active{
opacity:1;
pointer-events:auto;
}

img{
width:100%;
height:100%;
object-fit:cover;
}

#cameraScreen{
position:fixed;
inset:0;
display:none;
z-index:1;
}

#ui{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}

.button{
pointer-events:auto;
position:absolute;
bottom:40px;
width:140px;
height:140px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:18px;
}

#cameraBtn{right:30px;}
#factsBtn{left:30px;}

#text{
position:absolute;
bottom:220px;
width:100%;
text-align:center;
color:white;
font-size:18px;
}

#panel{
position:fixed;
inset:0;
background:black;
color:white;
padding:20px;
opacity:0;
pointer-events:none;
overflow:auto;
z-index:2000;
transition:opacity 400ms ease;
}

#panel.active{
opacity:1;
pointer-events:auto;
}

.card{
margin:15px 0;
padding:15px;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.smallBtn{
margin-top:20px;
padding:12px;
border:1px solid white;
text-align:center;
cursor:pointer;
}
</style>
</head>

<body>

<div id="logo" class="screen active">
<img src="your_logo.jpeg">
</div>

<div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div>

<img id="cameraScreen" src="copilot_image_1777179019874.jpeg">

<div id="ui">
<div id="cameraBtn" class="button">📷 Camera</div>
<div id="factsBtn" class="button">📘 Facts</div>
<div id="text">Tap camera to scan food</div>
</div>

<div id="panel"></div>

<script>
const logo=document.getElementById("logo");
const intro=document.getElementById("intro");
const panel=document.getElementById("panel");
const cam=document.getElementById("cameraScreen");

function hideAll(){
logo.classList.remove("active");
intro.classList.remove("active");
panel.classList.remove("active");
cam.style.display="none";
}

function set(state){
hideAll();

if(state==="logo"){
logo.classList.add("active");
}

if(state==="intro"){
intro.classList.add("active");
}

if(state==="camera"){
cam.style.display="block";
}

if(state==="facts"){
panel.innerHTML=`
<h1>🍳 Food Facts (Seasonings + WHY they work)</h1>

<div class="card">
<h3>🐔 Chicken</h3>
<p><b>Garlic</b> – enhances mild meat by boosting savory depth.</p>
<p><b>Lemon</b> – acidity balances fat and brightens flavor.</p>
<p><b>Paprika</b> – adds sweetness and color perception.</p>
<p><b>Oregano</b> – herbal balance prevents bland taste.</p>
<p><b>Black pepper</b> – increases perceived umami.</p>
</div>

<div class="card">
<h3>🐖 Pork</h3>
<p><b>Brown sugar</b> – caramelization creates BBQ sweetness.</p>
<p><b>Mustard</b> – cuts fat with acidity.</p>
<p><b>Rosemary</b> – strong aroma matches richness.</p>
<p><b>Garlic</b> – deepens savory fat-based flavor.</p>
<p><b>Smoked paprika</b> – adds grill-smoke effect.</p>
</div>

<div class="card">
<h3>🐄 Beef</h3>
<p><b>Salt</b> – improves crust and moisture control.</p>
<p><b>Black pepper</b> – amplifies natural beef umami.</p>
<p><b>Onion powder</b> – adds base savory depth.</p>
<p><b>Cumin</b> – earthy balance for fatty cuts.</p>
<p><b>Smoked paprika</b> – gives BBQ smokiness.</p>
</div>

<div class="smallBtn" onclick="set('camera')">Back</div>
`;

panel.classList.add("active");
}
}

// buttons
document.getElementById("factsBtn").onclick=()=>set("facts");
document.getElementById("cameraBtn").onclick=()=>set("camera");

// 🔥 FIXED INTRO SEQUENCE (no conflicts)
set("logo");

setTimeout(()=>set("intro"),3500);
setTimeout(()=>set("camera"),8000);

</script>

</body>
</html>
