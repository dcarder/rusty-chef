<!DOCTYPE html>
<html lang="en">
<head>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;

.page{

.page.active{

.header{
text-align:center;
font-size:22px;

margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);

padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);

}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

/* BACKGROUND */
#homeBg{
position:fixed;
inset:0;
z-index:-1;
}
#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

/* RUSTY CHEF LOGO */
#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleRow{
display:flex;
align-items:center;
gap:16px;
}

.titleText{
display:flex;
flex-direction:column;
font-weight:900;
line-height:.9;
}

.the{font-size:36px;}
.rusty{font-size:64px;}
.chef{font-size:54px;}

/* FIRE */
.flame{
width:50px;
height:120px;
position:relative;
}

.flame span{
position:absolute;
bottom:0;
font-size:22px;
animation:rise 1.2s infinite;
opacity:0;
}

@keyframes rise{
0%{opacity:0;transform:translateY(0);}
30%{opacity:1;}
100%{opacity:0;transform:translateY(-120px);}
}

/* BOTTOM NAV */
.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}

</style>
</head>

/* ======================
MATCH
====================== */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top 3 Matches</div>`;
top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match Score: ${r.match}
</div>`;
});
document.getElementById("results").innerHTML=html;
show("results");
}

PANTRY
====================== */
function openPantry(){

let html=`
<div class="header">🧺 Pantry</div>

<div class="card">
<input id="searchBox"
placeholder="Search ingredients..."
style="width:100%;padding:12px;border-radius:10px;border:none;outline:none;"
oninput="filterIngredients()"/>
</div>

<div id="ingredientList">
`;

ingredientItems.forEach(i=>{
html+=`
<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});

html+=`
</div>
<div class="btn" onclick="showMatches()">Find Recipes</div>
`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}
