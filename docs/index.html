<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* APP */
#app{
position:fixed;
inset:0;
background:black;
}

/* PAGES */
.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{
display:block;
}

/* HEADER */
.header{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

/* ITEM */
.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin:6px 0;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:12px;
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

/* BUTTON */
.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
padding:12px;
margin:10px 0;
}

/* BACK */
.back{
margin-top:10px;
padding:10px;
border:1px solid rgba(255,255,255,0.3);
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* SCROLL FIX */
.page{
-webkit-overflow-scrolling:touch;
}

</style>
</head>

<body>

<div id="app">

<!-- PANTRY -->
<div id="pantry" class="page active"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- RECIPE DETAIL -->
<div id="detail" class="page"></div>

</div>

<script>

let selected = JSON.parse(localStorage.getItem("pantry") || "[]");

/* =========================
   PANTRY V4 (70+ ITEMS)
========================= */

function loadPantry(){

let items = [
/* MEATS */
"Chicken breast","Ground beef","Bacon","Eggs","Sausage","Pork chops","Turkey","Steak","Ham","Shrimp","Salmon",

/* VEGGIES */
"Potatoes","Onions","Garlic","Carrots","Broccoli","Spinach","Tomatoes","Lettuce","Celery","Bell peppers","Cucumbers","Mushrooms","Zucchini","Corn","Green beans","Cabbage","Sweet potatoes","Jalapeños","Avocado",

/* FRUITS */
"Apples","Bananas","Oranges","Lemons","Limes","Strawberries","Blueberries","Grapes","Pineapple","Peaches",

/* DAIRY */
"Milk","Butter","Cheese","Yogurt","Sour cream","Cream cheese","Heavy cream","Parmesan","Half & half",

/* STARCHES */
"Rice","Pasta","Bread","Tortillas","Oats","Flour","Cereal","Crackers","Potato chips",

/* CANNED */
"Canned beans","Canned tomatoes","Canned tuna","Canned soup","Broth","Peanut butter","Jam","Honey",

/* SPICES */
"Salt","Black pepper","Garlic powder","Onion powder","Paprika","Cumin","Oregano","Thyme","Cayenne","Chili powder","Italian seasoning","Cinnamon","Red pepper flakes","Seasoned salt",

/* SAUCES */
"Ketchup","Mustard","Mayonnaise","Soy sauce","BBQ sauce","Hot sauce","Ranch","Worcestershire","Salad dressing","Teriyaki sauce",

/* OILS / BAKING */
"Olive oil","Vegetable oil","Vinegar","Brown sugar","White sugar","Baking powder","Baking soda"
];

let html = `
<div class="header">🧺 Pantry</div>
<p>Select ingredients you have:</p>
`;

items.forEach(item=>{
let on = selected.includes(item);

html += `
<div class="item ${on ? "selected" : ""}" onclick="toggleItem('${item}')">
<span>${item}</span>
<span>${on ? "✔" : ""}</span>
</div>
`;
});

/* BUTTONS */
html += `
<div class="btn" onclick="show('home')">⬅ Back to Home</div>
<div class="btn" onclick="findRecipes()">🍳 What can I cook?</div>
`;

document.getElementById("pantry").innerHTML = html;
show("pantry");
}

/* =========================
   TOGGLE ITEMS
========================= */

function toggleItem(item){

if(selected.includes(item)){
selected = selected.filter(i=>i!==item);
}else{
selected.push(item);
}

localStorage.setItem("pantry", JSON.stringify(selected));
loadPantry();
}

/* =========================
   RECIPES DATABASE
========================= */

const recipes = [
{
name:"Garlic Butter Chicken Rice",
ingredients:["Chicken breast","Rice","Garlic","Butter","Onions"],
time:25,
temp:"375°F",
steps:[
"Season chicken",
"Sear in butter",
"Add garlic + onions",
"Cook rice",
"Combine and simmer"
]
},
{
name:"Cheesy Bacon Pasta",
ingredients:["Bacon","Pasta","Cheese","Milk","Butter"],
time:20,
temp:"350°F",
steps:[
"Cook pasta",
"Cook bacon",
"Add milk + butter",
"Melt cheese",
"Combine"
]
},
{
name:"Veggie Stir Fry",
ingredients:["Broccoli","Carrots","Onions","Garlic","Rice"],
time:15,
temp:"High heat",
steps:[
"Heat pan",
"Add garlic",
"Add vegetables",
"Stir fry",
"Serve over rice"
]
}
];

/* =========================
   MATCH ENGINE
========================= */

function findRecipes(){

let ranked = recipes.map(r=>{
let match = r.ingredients.filter(i=>selected.includes(i)).length;
return {...r, score: match / r.ingredients.length};
}).sort((a,b)=>b.score-a.score);

let html = `<div class="header">🍳 Best Matches</div>`;

ranked.forEach(r=>{
html += `
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${(r.score*100).toFixed(0)}%<br>
Time: ${r.time} min
</div>
`;
});

html += `<div class="back" onclick="loadPantry()">⬅ Back</div>`;

document.getElementById("results").innerHTML = html;

show("results");
}

/* =========================
   RECIPE DETAIL
========================= */

function openRecipe(name){

let r = recipes.find(x=>x.name===name);

let html = `
<div class="header">${r.name}</div>

<div class="card">
⏱ Time: ${r.time} min<br>
🌡 Temp: ${r.temp}<br><br>
<b>Ingredients:</b><br>
${r.ingredients.join("<br>")}
</div>

<div class="card">
<b>Steps:</b><br>
${r.steps.map(s=>"• "+s).join("<br>")}
</div>

<div class="back" onclick="findRecipes()">⬅ Back to results</div>
`;

document.getElementById("detail").innerHTML = html;

show("detail");
}

/* =========================
   NAV
========================= */

function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* INIT */
loadPantry();

</script>

</body>
</html>
