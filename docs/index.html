<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Kitchen OS v11</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:black;
color:white;
font-family:Arial;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:14px;
padding:14px;
margin:10px 0;
white-space:pre-wrap;
border:1px solid rgba(255,255,255,0.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.timer{
font-size:20px;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<div id="home" class="page active">
<div class="header">Smart Kitchen OS v11</div>
<div class="btn" onclick="openPantry()">Open Pantry</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

/* =========================
PANTRY
========================= */

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
RECIPES (NOW WITH TIMELINE + TEMP)
========================= */

const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
steps:[
{t:"Prep chicken, chop vegetables, cook rice ahead.",time:5,temp:"Room"},
{t:"Heat pan to 375°F, add oil and cook chicken until browned.",time:8,temp:"375°F"},
{t:"Add vegetables, stir-fry until softened.",time:5,temp:"Medium-high"},
{t:"Add rice + soy sauce, stir 5–7 min until combined.",time:7,temp:"400°F high heat"},
{t:"Let rest 2 minutes before serving.",time:2,temp:"Off heat"}
]
},

{
name:"Garlic Butter Pasta",
ingredients:["Pasta","Garlic","Butter","Salt","Pepper"],
steps:[
{t:"Boil water and cook pasta until al dente.",time:10,temp:"212°F boiling"},
{t:"Melt butter in pan at medium heat.",time:2,temp:"325°F"},
{t:"Add garlic, cook until fragrant.",time:2,temp:"300°F"},
{t:"Toss pasta into butter sauce.",time:3,temp:"Low heat"},
{t:"Season and serve hot.",time:1,temp:"Off heat"}
]
},

{
name:"Chicken Bowl",
ingredients:["Chicken breast","Rice","Broccoli","Soy sauce"],
steps:[
{t:"Cook rice separately.",time:15,temp:"212°F"},
{t:"Heat pan to 375°F, cook chicken until golden.",time:10,temp:"375°F"},
{t:"Steam broccoli until tender.",time:6,temp:"212°F steam"},
{t:"Combine all and add soy sauce.",time:3,temp:"Low heat"},
{t:"Rest before serving.",time:2,temp:"Off heat"}
]
}
];

/* =========================
MATCH SYSTEM
========================= */

function score(r){
let match = r.ingredients.filter(i=>selected.includes(i)).length;
let missing = r.ingredients.filter(i=>!selected.includes(i));
return {...r,match,missing};
}

function topRecipes(){
return recipes
.map(score)
.sort((a,b)=>b.match-a.match)
.slice(0,3);
}

/* =========================
UI
========================= */

function openPantry(){

let html=`<div class="header">Pantry</div>`;

selected.forEach(i=>{
html+=`<div class="item">${i}</div>`;
});

html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function showMatches(){

let top = topRecipes();

let html=`<div class="header">Top 3 Recipes</div>`;

top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${r.match}<br>
Missing: ${r.missing.join(", ")||"None"}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

/* =========================
COOKING ENGINE (STEP TIMER)
========================= */

let current=null;
let stepIndex=0;
let timer=null;
let timeLeft=0;

function openRecipe(name){

current = recipes.find(r=>r.name===name);
stepIndex=0;

renderStep();
show("recipe");
}

function renderStep(){

let step = current.steps[stepIndex];

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="card">
<b>Step ${stepIndex+1}</b><br><br>
${step.t}<br><br>
🔥 Temperature: ${step.temp}<br>
⏱ Time: ${step.time} min
</div>

<div class="timer" id="timerBox">Ready</div>

<div class="btn" onclick="startTimer()">Start Step Timer</div>
<div class="btn" onclick="nextStep()">Next Step</div>
<div class="btn" onclick="openPantry()">Back</div>
`;
}

function startTimer(){

clearInterval(timer);

let step = current.steps[stepIndex];
timeLeft = step.time * 60;

timer = setInterval(()=>{

timeLeft--;

let m = Math.floor(timeLeft/60);
let s = timeLeft%60;

document.getElementById("timerBox").innerHTML =
`⏱ ${m}:${s.toString().padStart(2,"0")}`;

if(timeLeft<=0){
clearInterval(timer);
document.getElementById("timerBox").innerHTML="✔ Step Complete";
}
},1000);
}

function nextStep(){
clearInterval(timer);

if(stepIndex < current.steps.length-1){
stepIndex++;
renderStep();
}else{
document.getElementById("recipe").innerHTML +=
`<div class="card">🎉 Recipe Complete!</div>`;
}
}

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

openPantry();

</script>

</body>
</html>
