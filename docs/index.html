<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v13</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{text-align:center;font-size:22px;font-weight:700;margin:10px 0;}
.card{background:rgba(255,255,255,.08);border-radius:14px;padding:14px;margin:10px 0;border:1px solid rgba(255,255,255,.15);}
.item{padding:10px;margin:6px 0;border-radius:10px;border:1px solid rgba(255,255,255,.2);cursor:pointer;}
.item.selected{background:rgba(79,172,254,.25);}
.btn{padding:14px;background:#4facfe;color:black;font-weight:700;text-align:center;border-radius:12px;margin-top:10px;cursor:pointer;}

.shopBtn{display:inline-block;margin-top:8px;margin-right:8px;padding:10px 14px;border-radius:10px;font-weight:700;text-decoration:none;color:white;}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

#homeBg{position:fixed;inset:0;z-index:-1;}
#homeBg img{width:100%;height:100%;object-fit:cover;}

/* FIRE TITLE */
#introLogo{
position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
align-items:center;
gap:20px;
}

.titleText{
font-size:48px;
font-weight:900;
display:flex;
gap:15px;
align-items:center;
}

.flame{
font-size:32px;
animation:fire 0.8s infinite alternate;
}

@keyframes fire{
0%{transform:translateY(0);opacity:.6;}
100%{transform:translateY(-6px);opacity:1;}
}

.fireGlow{
text-shadow:0 0 10px orange,0 0 20px red;
}

/* BOTTOM BUTTONS */
.bottomButtons{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:15px;
}

.bottomButtons .btn{
width:160px;
}
</style>
</head>

<body>

<div id="home" class="page active">
<div id="homeBg"><img src="copilot_image_1777179019874.jpeg"></div>

<div id="introLogo">
<span class="flame">🔥</span>
<div class="titleText">
<span class="fireGlow">RUSTY</span>
<span class="fireGlow">CHEF</span>
</div>
<span class="flame">🔥</span>
</div>

<div class="bottomButtons">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* =========================
🔥 100 INGREDIENT PANTRY RESTORED
========================= */
const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
RECIPES (FULL DETAIL RESTORED STYLE)
========================= */
const recipes=[
{
name:"Chicken Fried Rice",
ingredients:["Chicken breast","Rice","Eggs","Soy sauce","Onions"],
steps:[
{
item:"Chicken breast",
text:"Heat pan to high heat until very hot.",
amount:"1 lb diced",
time:8,
temp:375,
detail:"Cook until no pink remains and edges brown slightly."
},
{
item:"Rice",
text:"Add cooked rice and break apart.",
amount:"2 cups",
time:6,
temp:400,
detail:"Stir constantly until slightly crispy."
},
{
item:"Eggs",
text:"Push rice aside and scramble eggs.",
amount:"2 eggs beaten",
time:3,
temp:350,
detail:"Cook until fully solid and mixed in."
}
]
}
];

/* MATCH */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
let missing=r.ingredients.filter(i=>!selected.includes(i));
return {...r,match,missing};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match);

document.getElementById("results").innerHTML=
`<div class="header">🍳 Recipes</div>`+
top.map(r=>`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match: ${r.match}<br>
Missing: ${r.missing.join(", ")||"None"}
</div>`).join("");

show("results");
}

/* PANTRY */
function openPantry(){
document.getElementById("pantry").innerHTML=
`<div class="header">🧺 Pantry</div>`+
ingredientItems.map(i=>
`<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`
).join("")+
`<div class="btn" onclick="showMatches()">Find Recipes</div>`;

show("pantry");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* RECIPE */
let current=null;

function openRecipe(name){
current=recipes.find(r=>r.name===name);
render();
show("recipe");
}

function render(){

let missing=current.ingredients.filter(i=>!selected.includes(i));

let steps=current.steps.map((s,i)=>`
<div class="card">
<b>Step ${i+1}: ${s.item}</b><br><br>
📝 ${s.text}<br><br>
📦 Amount: ${s.amount}<br>
⏱ Time: ${s.time} min<br>
🌡 Temp: ${s.temp}°F<br><br>
⚙️ ${s.detail}
</div>
`).join("");

document.getElementById("recipe").innerHTML=
`<div class="header">${current.name}</div>

${steps}

<div class="header">🛒 Missing Ingredients</div>
${missing.map(i=>{
let q=encodeURIComponent(i);
return `
<div class="card">
<b>${i}</b><br>
<a class="shopBtn instacartBtn" target="_blank" href="https://www.instacart.com/store/search?search=${q}">Instacart</a>
<a class="shopBtn walmartBtn" target="_blank" href="https://www.walmart.com/search?q=${q}">Walmart</a>
</div>`;
}).join("")}

<div class="btn" onclick="show('home')">Home</div>`;
}

show("home");

</script>

</body>
</html>
