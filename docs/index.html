<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v13</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
width:100%;
height:100%;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:opacity .25s ease, transform .25s ease;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
z-index:2;
}

/* UI */
.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,0.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

/* SHOP BUTTONS */
.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}

.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

/* HOME */
#homeBg{
position:fixed;
inset:0;
z-index:-2;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:44px;
font-weight:900;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translate(-50%,-60%) scale(0.9);}
to{opacity:1; transform:translate(-50%,-50%) scale(1);}
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.bottomDock .btn{
width:160px;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg"/>
  </div>

  <div id="introLogo">🔥 THE RUSTY CHEF 🔥</div>

  <div class="bottomDock">
    <div class="btn" onclick="openPantry()">🧺 Pantry</div>
    <div class="btn" onclick="showMatches()">🍳 Recipes</div>
  </div>

</div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

/* PAGE SWITCH */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>{
document.getElementById(id).classList.add("active");
});
}

/* INGREDIENTS */
const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* RECIPES */
const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
steps:[
{t:"Prep ingredients",time:5,temp:"Room"},
{t:"Cook chicken fully",time:8,temp:"375°F"},
{t:"Stir-fry vegetables",time:5,temp:"350°F"},
{t:"Combine rice + soy sauce",time:7,temp:"400°F"}
]
},
{
name:"Garlic Pasta",
ingredients:["Pasta","Garlic","Butter","Salt","Pepper","Cheese"],
steps:[
{t:"Boil pasta until tender",time:10,temp:"212°F"},
{t:"Melt butter slowly",time:2,temp:"Low"},
{t:"Add garlic gently without burning",time:2,temp:"Low"}
]
}
];

/* MATCH */
function score(r){
let matchList = r.ingredients.filter(i=>selected.includes(i));
let missingList = r.ingredients.filter(i=>!selected.includes(i));
return {
...r,
match: matchList.length,
matchList,
missing: missingList
};
}

function showMatches(){

let top = recipes.map(score)
.sort((a,b)=>b.match-a.match)
.slice(0,3);

let html=`<div class="header">🍳 Top 3 AI Recipes</div>`;

top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
✔ Pantry Match: ${r.matchList.length}/${r.ingredients.length}<br>
❌ Missing: ${r.missing.join(", ") || "None"}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

/* PANTRY */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
let on = selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});

html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* RECIPE ENGINE */
let current=null;
let stepIndex=0;

function openRecipe(name){
current = recipes.find(r=>r.name===name);
stepIndex=0;
render();
show("recipe");
}

function render(){

let step = current.steps[stepIndex];

let shop="";
current.ingredients.forEach(i=>{
let q = encodeURIComponent(i);

shop+=`
<div class="card">
<b>${i}</b><br>

<a class="shopBtn instacartBtn" target="_blank"
href="https://www.instacart.com/store/search?search=${q}">
Instacart
</a>

<a class="shopBtn walmartBtn" target="_blank"
href="https://www.walmart.com/search?q=${q}">
Walmart
</a>
</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="card">

<b>STEP:</b> ${step.t}<br><br>

🔥 COOKING INSTRUCTIONS (DETAILED):<br><br>

• Start by preparing ALL ingredients before heat is applied  
• Preheat pan or pot to ${step.temp} before cooking  
• Add oil/butter first, wait until it is fully heated  
• Cook main protein first until fully done inside  
• Add vegetables after protein for texture control  
• Stir continuously to prevent burning or sticking  
• Add sauces or seasoning near the end of cooking  
• Adjust heat if food is browning too fast or too slow  
• Let food rest 1–2 minutes before serving  

<br>

⏱ Time: ${step.time} minutes<br>
🌡 Temperature: ${step.temp}

</div>

<div class="btn" onclick="goHome()">Home</div>

${shop}
`;
}

/* HOME */
function goHome(){ show("home"); }

show("home");

</script>

</body>
</html>
