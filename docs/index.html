<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chef Jeff</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
        user-select: none;
        touch-action: manipulation;
    }

    .fullScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        opacity: 0;
        z-index: 5;
        transition: opacity 1s ease-in-out;
    }

    #yourLogoContainer img,
    #introContainer img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    #cameraScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }

    #cameraText {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        text-align: center;
        color: white;
        font-size: 22px;
        font-weight: 600;
        opacity: 0;
        transition: opacity 1s ease-in-out;
        z-index: 4;
        bottom: calc(8vh + 160px + 144px);
        text-shadow:
            0 0 8px rgba(255, 255, 255, 0.8),
            0 0 16px rgba(255, 255, 255, 0.6),
            0 0 24px rgba(255, 255, 255, 0.4);
        animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
        0% { text-shadow: 0 0 6px rgba(255,255,255,0.7); }
        50% { text-shadow: 0 0 24px rgba(255,255,255,1); }
        100% { text-shadow: 0 0 6px rgba(255,255,255,0.7); }
    }

    .camera-hotspot {
        position: absolute;
        bottom: 8vh;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(6px);
        border: 2px solid rgba(255, 255, 255, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 18px;
        text-align: center;
        z-index: 4;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }

    #cameraInput {
        display: none;
    }
</style>
</head>

<body>

<!-- Screen 1: Your logo -->
<div id="yourLogoContainer" class="fullScreen">
    <img src="your_logo.jpeg" alt="Your Logo">
</div>

<!-- Screen 2: Rusty intro -->
<div id="introContainer" class="fullScreen">
    <img src="rusty_intro.jpeg" alt="Rusty Intro Logo">
</div>

<!-- Screen 3: Camera screen -->
<img id="cameraScreen" src="copilot_image_1777179019874.jpeg" alt="Chef Jeff Camera Screen">

<!-- Glowing text -->
<div id="cameraText">
    Take a picture of your food and we will make something of it
</div>

<!-- Robot voice -->
<audio id="robotVoice" src="robot_voice.mp3"></audio>

<!-- Rusty intro voice -->
<audio id="rustyIntroVoice" src="rusty_intro.mp3"></audio>

<!-- Camera button -->
<div class="camera-hotspot" id="cameraButton">
    📷 Camera
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment"/>

<script type="module">
/* -------------------------------------------------
   GEMINI CLIENT (NO SERVER)
---------------------------------------------------*/
import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

const genAI = new GoogleGenerativeAI("YOUR_GEMINI_API_KEY");
const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

async function analyzeFoodImage(file) {
    const base64 = await toBase64(file);

    // STEP 1 — Detect ingredients
    const visionResponse = await model.generateContent([
        {
            inlineData: {
                data: base64,
                mimeType: file.type
            }
        },
        "Identify all food ingredients in this image. Respond ONLY with a JSON array of ingredient names."
    ]);

    const ingredients = JSON.parse(visionResponse.response.text().trim());

    // STEP 2 — Generate recipes
    const recipeResponse = await model.generateContent(
        `Using these ingredients: ${ingredients.join(", ")},
         give me 5 recipes I can make.
         Respond ONLY in JSON as an array of objects with: title, ingredients, steps.`
    );

    const recipes = JSON.parse(recipeResponse.response.text().trim());

    return { ingredients, recipes };
}

function toBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
    });
}

/* -------------------------------------------------
   UNLOCK AUDIO ON FIRST TAP
---------------------------------------------------*/
document.addEventListener("click", () => {
    const robot = document.getElementById("robotVoice");
    const rustyAudio = document.getElementById("rustyIntroVoice");

    robot.play().catch(() => {});
    rustyAudio.play().catch(() => {});

    robot.pause();
    robot.currentTime = 0;

}, { once: true });

/* -----------------------------
   SCREEN TRANSITION SEQUENCE
------------------------------*/
const yourLogo = document.getElementById("yourLogoContainer");
yourLogo.style.opacity = "1";

setTimeout(() => {
    yourLogo.style.opacity = "0";

    const rusty = document.getElementById("introContainer");
    rusty.style.opacity = "1";

    const rustyAudio = document.getElementById("rustyIntroVoice");
    rustyAudio.volume = 1;
    rustyAudio.currentTime = 0;
    rustyAudio.play().catch(() => {});

    setTimeout(() => {
        let fadeDuration = 1000;
        let fadeSteps = 20;
        let stepTime = fadeDuration / fadeSteps;
        let volumeStep = rustyAudio.volume / fadeSteps;

        let fadeInterval = setInterval(() => {
            if (rustyAudio.volume - volumeStep > 0) {
                rustyAudio.volume -= volumeStep;
            } else {
                rustyAudio.volume = 0;
                rustyAudio.pause();
                rustyAudio.currentTime = 0;
                clearInterval(fadeInterval);
            }
        }, stepTime);

    }, 10000);

    setTimeout(() => {
        rusty.style.opacity = "0";

        setTimeout(() => {
            document.getElementById("cameraScreen").style.opacity = "1";
            document.getElementById("cameraButton").style.opacity = "1";
            document.getElementById("cameraText").style.opacity = "1";

            rusty.style.zIndex = "-1";
            yourLogo.style.zIndex = "-1";

        }, 1500);

    }, 7500);

}, 4500);

/* -------------------------------------------------
   CAMERA BUTTON
---------------------------------------------------*/
document.getElementById("cameraButton").addEventListener("click", () => {
    document.getElementById("cameraInput").click();
});

/* -------------------------------------------------
   HANDLE PHOTO → GEMINI → REDIRECT
---------------------------------------------------*/
document.getElementById("cameraInput").addEventListener("change", async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const result = await analyzeFoodImage(file);

    window.location.href =
        `/recipes?items=${encodeURIComponent(JSON.stringify(result.ingredients))}`;
});
</script>

</body>
</html>
