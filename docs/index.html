<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Kitchen OS v3</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
white-space:pre-wrap;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg"/>
</div>

<div class="card">PRO KITCHEN OS v3</div>

<div class="dock">
<div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
<div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
<div class="dockBtn" onclick="openAppliances()">🔥<span>Setup</span></div>
</div>

</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
VOICE MODE
========================= */

let chefMode="ramsay";

function speak(text){

window.speechSynthesis.cancel();

if(chefMode==="ramsay"){
let r=["Focus!","Not good enough!","Better than that!","Come on chef!"];
text = r[Math.floor(Math.random()*r.length)]+" "+text;
}

let msg=new SpeechSynthesisUtterance(text);
msg.rate=1.1;
window.speechSynthesis.speak(msg);
}

/* =========================
DATA STORAGE
========================= */

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

let availableAppliances=JSON.parse(localStorage.getItem("appliances")||JSON.stringify({
stove:true,
oven:true,
airfryer:true,
grill:true
}));

/* =========================
100 INGREDIENTS
========================= */

const ingredientItems=[
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

/* =========================
CLASSIFY SYSTEM
========================= */

function classify(list){

let c={protein:[],veg:[],starch:[],fat:[],acid:[],other:[]};

list.forEach(i=>{

if(["Chicken breast","Ground beef","Eggs","Shrimp","Salmon","Steak","Tofu","Turkey","Pork chops"].includes(i))
c.protein.push(i);

else if(["Onions","Broccoli","Spinach","Mushrooms","Tomatoes","Carrots","Bell peppers"].includes(i))
c.veg.push(i);

else if(["Rice","Pasta","Bread","Tortilla","Ramen noodles","Potatoes","Quinoa"].includes(i))
c.starch.push(i);

else if(["Butter","Olive oil","Cheese","Cream","Avocado"].includes(i))
c.fat.push(i);

else if(["Lemon","Lime","Vinegar"].includes(i))
c.acid.push(i);

else c.other.push(i);

});

return c;
}

/* =========================
COOK PROFILES (TIME + TEMP)
========================= */

function getCookProfile(i){

const map={
"Chicken breast":{t:"12–18 min",temp:"400°F"},
"Steak":{t:"8–12 min",temp:"450°F"},
"Eggs":{t:"3–6 min",temp:"300°F"},
"Rice":{t:"15–20 min",temp:"200°F"},
"Pasta":{t:"8–12 min",temp:"212°F"},
"Potatoes":{t:"25–35 min",temp:"425°F"},
"Broccoli":{t:"6–10 min",temp:"350°F"},
"Onions":{t:"8–12 min",temp:"350°F"},
"Tomatoes":{t:"5–8 min",temp:"300°F"}
};

return map[i]||{t:"10–15 min",temp:"375°F"};
}

/* =========================
APPLIANCE CONTROL
========================= */

function openAppliances(){

let html=`<div class="header">Your Kitchen Setup</div>`;

for(let k in availableAppliances){
html+=`
<div class="item ${availableAppliances[k]?'selected':''}" onclick="toggleAppliance('${k}')">
${k.toUpperCase()} ${availableAppliances[k]?'✔':''}
</div>`;
}

html+=`<div class="btn" onclick="saveAppliances()">Save Setup</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggleAppliance(k){
availableAppliances[k]=!availableAppliances[k];
openAppliances();
}

function saveAppliances(){
localStorage.setItem("appliances",JSON.stringify(availableAppliances));
show("home");
speak("Kitchen setup saved.");
}

/* =========================
RECIPE ENGINE
========================= */

function generateAIRecipe(){

let cat=classify(selected);

let main=cat.protein[0]||cat.starch[0]||"Mixed Dish";
let sides=[...cat.veg,...cat.starch].filter(i=>i!==main);
let support=[...cat.fat,...cat.acid];

let guide=selected.map(i=>{
let p=getCookProfile(i);
return `${i} → ${p.t}, ${p.temp}`;
}).join("\n");

/* pick available appliance */
let appliance = availableAppliances.grill ? "grill"
: availableAppliances.oven ? "oven"
: availableAppliances.airfryer ? "airfryer"
: "stove";

let steps=[];

steps.push({text:`APPLIANCE: ${appliance.toUpperCase()}\n\n${guide}`,time:10});

steps.push({text:`Cook MAIN: ${main} first at correct temperature.`,time:420});

if(sides.length){
steps.push({text:`Cook SIDES: ${sides.join(", ")}`,time:300});
}

if(support.length){
steps.push({text:`Add SUPPORT flavors: ${support.join(", ")}`,time:120});
}

steps.push({text:`FINAL: Combine everything only when fully cooked.`,time:60});

return [{
name:`Kitchen Dish: ${main}`,
time:40,
ingredients:selected,
steps
}];
}

/* =========================
UI
========================= */

let activeRecipe=null;
let stepIndex=0;
let timer=null;
let timeLeft=0;

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){

let html=`<div class="header">Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
${i} ${on?'✔':''}
</div>`;
});

html+=`<div class="btn" onclick="openRecipes()">Generate Recipe</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){
activeRecipe=generateAIRecipe()[0];
stepIndex=0;

document.getElementById("recipes").innerHTML=`
<div class="header">${activeRecipe.name}</div>
<div class="card" onclick="openRecipe()">Start Cooking</div>
`;

show("recipes");
}

function openRecipe(){
renderStep();
show("detail");
}

function renderStep(){

let step=activeRecipe.steps[stepIndex];
speak(step.text);

document.getElementById("detail").innerHTML=`
<div class="header">${activeRecipe.name}</div>
<div class="card">${step.text}</div>
<div class="btn" onclick="startTimer()">Start</div>
<div class="btn" onclick="nextStep()">Next</div>
`;
}

function startTimer(){
clearInterval(timer);
timeLeft=30;
timer=setInterval(()=>{
timeLeft--;
if(timeLeft<=0){
clearInterval(timer);
speak("Step complete.");
}
},1000);
}

function nextStep(){
clearInterval(timer);
stepIndex++;
if(stepIndex>=activeRecipe.steps.length){
show("home");
}else{
renderStep();
}
}

openIngredients();

</script>

</body>
</html>
