<head>

<style>
html,body{

padding:0;
height:100%;
width:100%;
background:black;

position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
padding:12px;
box-sizing:border-box;
padding-bottom:120px;
}

.page.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,.25);
border-color:#4facfe;
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.bottomDock .btn{width:160px;}

.recipeTitle{
font-size:24px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.modeBadge{
text-align:center;
opacity:.8;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

"Spinach","Bell peppers","Mushrooms","Cucumber","Lettuce","Avocado","Lemon","Lime","Chicken broth","Beef broth",
"Soy sauce","Hot sauce","BBQ sauce","Teriyaki sauce","Ketchup","Mustard","Mayonnaise","Vinegar","Honey","Jam",
"Peanut butter","Oats","Yogurt","Cream","Parmesan","Mozzarella","Cheddar","Shrimp","Salmon","Tuna",
"Steak","Pork chops","Turkey","Sausage","Rice noodles","Ramen noodles","Corn","Peas","Green beans","Zucchini",
"Eggplant","Cabbage","Cauliflower","Sweet potato","Pumpkin","Coconut milk","Curry powder","Paprika","Oregano","Basil",
"Thyme","Parsley","Chives","Cinnamon","Nutmeg","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Almonds","Walnuts","Crackers","Granola","Marshmallows","Pineapple","Strawberries","Blueberries","Bananas","Apples",
"Fish sauce","Worcestershire sauce","Sesame oil","Cornstarch","Quinoa","Lentils","Chickpeas","Tofu","Beans","Noodles","Oil"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

function clearPantry(){
selected=[];
localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

function openPantry(){
let html = `<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
html += `<div class="item ${selected.includes(i)?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});
html += `
<div class="btn" onclick="showMatches()">🍳 Find Recipes</div>
<div class="btn" onclick="clearPantry()">🗑 Clear</div>
<div class="btn" onclick="show('home')">🏠 Home</div>
`;
document.getElementById("pantry").innerHTML = html;
show("pantry");
}

/* MATCH */
function showMatches(){
let top = recipes.map(r=>({
...r,
match:r.ingredients.filter(i=>selected.includes(i)).length
})).sort((a,b)=>b.match-a.match);

let html=`<div class="header">🍳 Recipes</div>`;

top.forEach(r=>{
html += `<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br><br>
Match: ${r.match}/${r.ingredients.length}
</div>`;
});

html += `<div class="btn" onclick="show('home')">🏠 Home</div>`;
document.getElementById("results").innerHTML = html;
show("results");
}

/* RECIPE */
let current=null;
let mode="simple";

function openRecipe(name){
current = recipes.find(r=>r.name===name);
mode="simple";
renderRecipe();
show("recipe");
}

function renderRecipe(){

let steps = mode==="simple"?current.simpleSteps:current.chefSteps;

let html = `
<div class="recipeTitle">${current.name}</div>
<div class="modeBadge">${mode==="simple"?"Simple Mode":"🔥 Chef Mode (Enhanced)"}</div>
`;

steps.forEach((s,i)=>{
html += `<div class="card"><b>${i+1}. ${s.t}</b><br><br>${s.a}</div>`;
});

html += `
<div class="btn" onclick="mode=mode==='simple'?'chef':'simple';renderRecipe();">
Switch Mode
</div>
<div class="btn" onclick="showMatches()">Back</div>
<div class="btn" onclick="show('home')">Home</div>
`;

document.getElementById("recipe").innerHTML = html;
}

show("home");
