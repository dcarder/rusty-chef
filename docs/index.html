<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff AI</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* ===== LOADING / LOGO STAGE ===== */
.stage{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

/* BACKGROUND ALWAYS SHOWS IMAGE (NO BLACK SCREEN) */
.logoStage{
background:url("your_logo.jpeg") center center no-repeat;
background-size:cover;
}

/* DARK OVERLAY FOR READABILITY */
.logoOverlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
display:flex;
align-items:center;
justify-content:center;
}

/* NETFLIX ANIMATION */
.logoAnim{
width:100%;
height:100%;
object-fit:cover;
animation:netflixIntro 5s ease forwards;
transform-origin:center;
}

@keyframes netflixIntro{
0%{
transform:scale(1.2);
filter:blur(14px);
opacity:0;
}
20%{
opacity:1;
filter:blur(8px);
}
55%{
transform:scale(1.05);
filter:blur(0px);
opacity:1;
}
85%{
transform:scale(1);
opacity:1;
}
100%{
transform:scale(1);
opacity:1;
}
}

/* NEXT SCREEN */
.stage img{
width:100%;
height:100%;
object-fit:cover;
}

/* APP */
#app{
position:fixed;
inset:0;
display:none;
background:black;
}

/* PAGES */
.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
padding-bottom:100px;
position:relative;
}

.page.active{
display:block;
}

/* COPILOT BACKGROUND */
.copilotBg{
position:fixed;
inset:0;
background:url("copilot_image_1777179019874.jpeg") center center no-repeat;
background-size:cover;
z-index:-1;
filter:brightness(0.5);
}

/* HEADER */
.header{
font-size:22px;
font-weight:700;
margin-bottom:12px;
position:relative;
z-index:2;
}

/* ===== BUTTONS ===== */
.btn{
display:flex;
align-items:center;
gap:14px;

padding:16px 18px;
margin-top:14px;

border-radius:999px;

background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.18);
backdrop-filter: blur(18px);

box-shadow:
0 12px 30px rgba(0,0,0,0.45),
inset 0 1px 0 rgba(255,255,255,0.15);

cursor:pointer;
transition:0.25s ease;

position:relative;
overflow:hidden;
z-index:2;
}

.btn:hover{
transform:translateY(-3px) scale(1.01);
background:rgba(255,255,255,0.12);
}

.btn:active{
transform:scale(0.97);
}

/* ICON */
.btnIcon{
font-size:20px;
width:38px;
height:38px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.10);
border:1px solid rgba(255,255,255,0.18);
flex-shrink:0;
}

/* TEXT */
.btnText{
display:flex;
flex-direction:column;
z-index:1;
}

.btnTitle{
font-size:15px;
font-weight:700;
}

.btnSub{
font-size:11px;
opacity:0.75;
}

/* CARD */
.card{
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.12);
border-radius:16px;
padding:14px;
margin:10px 0;
backdrop-filter: blur(10px);
position:relative;
z-index:2;
}

/* NAV */
#nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:rgba(0,0,0,0.85);
backdrop-filter: blur(15px);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.1);
z-index:10;
}

.navBtn{
font-size:12px;
text-align:center;
opacity:0.6;
cursor:pointer;
}
.navBtn.active{opacity:1;}

/* FLOAT BUTTON */
.fab{
position:fixed;
bottom:85px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#ff7a18,#af002d);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
z-index:10;
}

</style>
</head>

<body>

<!-- LOADING / LOGO (NO BLACK SCREEN ANYMORE) -->
<div id="logo" class="stage logoStage">

  <div class="logoOverlay">
    <img src="your_logo.jpeg" class="logoAnim">
  </div>

</div>

<!-- NEXT SCREEN -->
<div id="rusty" class="stage" style="display:none;">
  <img src="rusty_intro.jpeg">
</div>

<!-- APP -->
<div id="app">

<div id="home" class="page active">

<div class="copilotBg"></div>

<div class="header">🤖 Copilot Hub</div>

<div class="card">Smart Cooking Assistant Ready</div>

<div class="btn" onclick="openRecipes()">
<div class="btnIcon">🍳</div>
<div class="btnText">
<div class="btnTitle">Recipes</div>
<div class="btnSub">Discover meals instantly</div>
</div>
</div>

<div class="btn" onclick="openSmart()">
<div class="btnIcon">🧠</div>
<div class="btnText">
<div class="btnTitle">Smart Cook</div>
<div class="btnSub">Best matches from pantry</div>
</div>
</div>

<div class="btn" onclick="openPantry()">
<div class="btnIcon">🧺</div>
<div class="btnText">
<div class="btnTitle">Pantry</div>
<div class="btnSub">Your ingredients database</div>
</div>
</div>

</div>

<div id="recipes" class="page"></div>
<div id="smart" class="page"></div>
<div id="pantry" class="page"></div>

</div>

<!-- NAV -->
<div id="nav">
<div class="navBtn active">🏠<br>Home</div>
<div class="navBtn">🍳<br>Recipes</div>
<div class="navBtn">🧠<br>Smart</div>
<div class="navBtn">🧺<br>Pantry</div>
</div>

<!-- FLOAT -->
<div class="fab" onclick="openSmart()">🍳</div>

<script>

window.onload = () => {

  // Netflix-style timing flow
  setTimeout(() => {
    document.getElementById("logo").style.opacity = "0";
  }, 5000);

  setTimeout(() => {
    document.getElementById("logo").style.display = "none";
    document.getElementById("rusty").style.display = "flex";
  }, 5500);

  setTimeout(() => {
    document.getElementById("rusty").style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 9000);

};

/* NAV */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

function openRecipes(){show("recipes");}
function openSmart(){show("smart");}
function openPantry(){show("pantry");}

</script>

</body>
</html>
