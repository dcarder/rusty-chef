<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}
.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="app">

<div id="home" class="page active">

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>

</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* 🧺 100+ INGREDIENTS */
const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon","Lime","Coconut milk",
"Curry powder","Paprika","Oregano","Basil","Rice noodles","Tortilla","Bread","Parmesan","Cheddar","Mozzarella",
"Avocado","Chicken broth","Beef broth","Hot sauce","BBQ sauce","Peanut butter","Green beans","Cabbage","Corn","Honey"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");
let current=null;
let mode="simple";

/* 🍳 FULL 28 RECIPES */
const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
simpleSteps:[{t:"Cook rice."},{t:"Cook chicken & eggs."},{t:"Stir fry."}],
chefSteps:[{t:"Use cold rice for best texture."},{t:"Cook chicken fully."},{t:"High heat stir fry."}]
},
{
name:"Spaghetti Bolognese",
ingredients:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],
simpleSteps:[{t:"Boil pasta."},{t:"Cook beef sauce."},{t:"Combine."}],
chefSteps:[{t:"Cook pasta al dente."},{t:"Brown beef deeply."},{t:"Slow simmer sauce."}]
},
{
name:"Chicken Tacos",
ingredients:["Chicken breast","Tortilla","Cheese","Onions","Lime"],
simpleSteps:[{t:"Cook chicken."},{t:"Warm tortillas."},{t:"Assemble."}],
chefSteps:[{t:"Sear chicken."},{t:"Shred after resting."},{t:"Finish with lime."}]
},
{
name:"Beef Stir Fry",
ingredients:["Beef","Broccoli","Carrots","Soy sauce","Rice"],
simpleSteps:[{t:"Cook beef."},{t:"Add veggies."},{t:"Serve."}],
chefSteps:[{t:"High heat sear beef."},{t:"Stir fry vegetables."},{t:"Add soy glaze."}]
},
{
name:"Garlic Butter Shrimp Pasta",
ingredients:["Shrimp","Pasta","Butter","Garlic","Lemon"],
simpleSteps:[{t:"Cook pasta."},{t:"Cook shrimp."},{t:"Combine."}],
chefSteps:[{t:"Boil pasta."},{t:"Sauté shrimp."},{t:"Finish with lemon."}]
},
{
name:"Chicken Alfredo",
ingredients:["Chicken breast","Pasta","Cream","Parmesan","Garlic"],
simpleSteps:[{t:"Cook pasta."},{t:"Cook chicken."},{t:"Add sauce."}],
chefSteps:[{t:"Cook pasta al dente."},{t:"Pan sear chicken."},{t:"Creamy parmesan sauce."}]
},
{
name:"Tuna Salad Sandwich",
ingredients:["Tuna","Bread","Mayonnaise","Onions","Lettuce"],
simpleSteps:[{t:"Mix tuna."},{t:"Add mayo."},{t:"Serve."}],
chefSteps:[{t:"Drain tuna."},{t:"Mix creamy mayo."},{t:"Assemble sandwich."}]
},
{
name:"Vegetable Omelette",
ingredients:["Eggs","Bell peppers","Onions","Cheese","Spinach"],
simpleSteps:[{t:"Cook eggs."},{t:"Add veg."},{t:"Fold."}],
chefSteps:[{t:"Sauté vegetables."},{t:"Pour eggs."},{t:"Fold with cheese."}]
},
{
name:"BBQ Chicken Sandwich",
ingredients:["Chicken breast","BBQ sauce","Bread","Onions"],
simpleSteps:[{t:"Cook chicken."},{t:"Add BBQ."},{t:"Assemble."}],
chefSteps:[{t:"Shred chicken."},{t:"Mix BBQ sauce."},{t:"Toast bread."}]
},
{
name:"Peanut Butter Fudge",
ingredients:["Peanut butter","Sugar","Butter","Milk","Vanilla extract"],
simpleSteps:[{t:"Melt ingredients."},{t:"Mix."},{t:"Chill."}],
chefSteps:[{t:"Heat sugar + milk + butter."},{t:"Add peanut butter."},{t:"Cool to set."}]
}
];

/* 🔎 MATCH */
function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match: ${r.match}
</div>`;
});

html+=`<div class="btn" onclick="show('home')">Home</div>`;
document.getElementById("results").innerHTML=html;
show("results");
}

/* 🧺 PANTRY */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
html+=`<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});

html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>
<div class="btn" onclick="show('home')">Home</div>`;

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* 🍳 RECIPE VIEW */
function openRecipe(name){
current=recipes.find(r=>r.name===name);
mode="simple";
render();
show("recipe");
}

function switchMode(){
mode=mode==="simple"?"chef":"simple";
render();
}

function render(){

let missing=current.ingredients.filter(i=>!selected.includes(i));

let steps = mode==="simple"
? current.simpleSteps
: current.chefSteps;

let stepsHTML = steps.map((s,i)=>`
<div class="card"><b>${i+1}. ${s.t}</b></div>
`).join("");

let missingHTML=`<div class="header">Missing Ingredients</div>`;
missing.forEach(i=>{
missingHTML+=`<div class="card">${i}</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="btn" onclick="switchMode()">
Switch Mode
</div>

${stepsHTML}
${missingHTML}

<div class="btn" onclick="show('home')">Home</div>
`;
}

show("home");

</script>

</body>
</html>
