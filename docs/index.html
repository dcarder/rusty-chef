<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Kitchen OS v13</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

/* =========================
SNAP PAGE SYSTEM (FIXED)
========================= */

.page{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0;
pointer-events:none;
transition:none;

/* FIX: restore proper scrolling */
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.page.active{
opacity:1;
pointer-events:auto;
}

/* =========================
UI
========================= */

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0;
padding-top:20px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:14px;
padding:14px;
margin:10px;
border:1px solid rgba(255,255,255,0.15);
}

.item{
padding:10px;
margin:6px 10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin:10px;
cursor:pointer;
}

/* =========================
HOME BACKGROUND
========================= */

#homeBg{
position:fixed;
inset:0;
z-index:-10;
background:black;
}

#homeImg{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* =========================
BOTTOM BUTTON DOCK
========================= */

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
z-index:5;
}

.bottomDock .btn{
width:160px;
}

/* TIMER */
.timer{
text-align:center;
font-size:20px;
margin-top:10px;
}

/* SHOP BUTTONS */
.shopBtn{
display:inline-block;
margin-top:8px;
margin-right:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}

.instacartBtn{background:#43b02a;}
.walmartBtn{background:#0071ce;}

</style>
</head>

<body>

<div id="app">

<!-- 🏠 HOME -->
<div id="home" class="page active">

  <div id="homeBg">
    <img id="homeImg" src="./copilot_image_1777179019874.jpeg"/>
  </div>

  <div class="header" style="position:relative;z-index:2;">
    🍳 Smart Kitchen OS
  </div>

  <div class="bottomDock">
    <div class="btn" onclick="openPantry()">🧺 Pantry</div>
    <div class="btn" onclick="showMatches()">🍳 Recipes</div>
  </div>

</div>

<!-- 🧺 PANTRY -->
<div id="pantry" class="page"></div>

<!-- 🍳 RESULTS -->
<div id="results" class="page"></div>

<!-- 📖 RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

/* =========================
ROUTER (NO FLICKER)
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});
document.getElementById(id).classList.add("active");
}

/* =========================
INGREDIENTS
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
RECIPES
========================= */

const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
steps:[
{t:"Prep ingredients",time:5,temp:"Room"},
{t:"Cook chicken",time:8,temp:"375°F"},
{t:"Stir-fry vegetables",time:5,temp:"350°F"},
{t:"Add rice + soy sauce",time:7,temp:"400°F"}
]
}
];

/* =========================
PANTRY FIXED (NO SHRINK)
========================= */

function openPantry(){

let html = `
<div class="header">🧺 Pantry</div>
<div style="padding-bottom:120px;">
`;

ingredientItems.forEach(i=>{
let on = selected.includes(i);
html += `<div class="item ${on?'selected':''}" onclick="toggle('${i}')">${i}</div>`;
});

html += `</div>

<div class="bottomDock">
  <div class="btn" onclick="showMatches()">🍳 Find Recipes</div>
</div>`;

document.getElementById("pantry").innerHTML = html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* =========================
RECIPES MATCH
========================= */

function showMatches(){
let html=`<div class="header">🍳 Recipes</div>`;

recipes.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b>
</div>`;
});

document.getElementById("results").innerHTML = html;
show("results");
}

/* =========================
RECIPE VIEW
========================= */

let current=null;
let stepIndex=0;

function openRecipe(name){
current = recipes.find(r=>r.name===name);
stepIndex = 0;
renderRecipe();
show("recipe");
}

function renderRecipe(){
document.getElementById("recipe").innerHTML = `
<div class="header">${current.name}</div>

<div class="card">
Step: ${current.steps[stepIndex].t}<br>
Time: ${current.steps[stepIndex].time} min<br>
Temp: ${current.steps[stepIndex].temp}
</div>

<div class="btn" onclick="goHome()">Home</div>
`;
}

/* =========================
HOME SNAP
========================= */

function goHome(){
show("home");
}

/* INIT */
show("home");

</script>

</body>
</html>
