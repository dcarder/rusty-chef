<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Chef Jeff</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  /* FULL SCREEN APP LAYER */
  .app {
    position: fixed;
    inset: 0;
  }

  /* BACKGROUND IMAGE (APP STYLE) */
  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover; /* 🔥 real app look */
    object-position: center;
  }

  /* CAMERA BUTTON (SAFE + RESPONSIVE) */
  .camera-btn {
    position: absolute;
    left: 50%;
    bottom: 8%;
    transform: translateX(-50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255, 120, 0, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    font-weight: bold;
    color: white;
    z-index: 5;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .camera-btn:active {
    transform: translateX(-50%) scale(0.95);
  }

  /* OVERLAY */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10;
    padding: 20px;
  }

  #overlayBox {
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    background: #111;
    border-radius: 12px;
    padding: 20px;
  }

  button {
    margin-top: 15px;
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    background: orange;
    color: white;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="app">

  <!-- BACKGROUND IMAGE -->
  <img src="copilot_image_1777179019874.jpeg" class="bg" />

  <!-- CAMERA BUTTON -->
  <div class="camera-btn" id="cameraBtn">
    CAMERA
  </div>

</div>

<!-- OVERLAY -->
<div id="overlay">
  <div id="overlayBox">
    <h2>Chef Jeff</h2>
    <div id="overlayContent"></div>
    <button onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>

function showOverlay(html) {
  document.getElementById("overlayContent").innerHTML = html;
  document.getElementById("overlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("overlay").style.display = "none";
}

/* 🔥 UNIVERSAL CAMERA (WORKS ON ALL DEVICES) */
async function openCamera() {
  return new Promise((resolve) => {

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    // helps Android open camera directly
    input.setAttribute("capture", "environment");

    input.onchange = () => {
      resolve(input.files?.[0] || null);
    };

    input.click();
  });
}

/* convert image */
function fileToBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

/* FAKE AI FOR NOW (we’ll connect real AI next) */
async function detectIngredients(file) {
  await new Promise(r => setTimeout(r, 1200));

  return {
    ingredients: ["Eggs", "Bread", "Cheese"],
    recipes: [
      "Grilled Cheese Sandwich",
      "Egg Toast Breakfast",
      "Cheesy Omelet"
    ]
  };
}

/* BUTTON */
document.getElementById("cameraBtn").onclick = async () => {
  try {

    showOverlay("<p>Opening camera...</p>");

    const image = await openCamera();
    if (!image) {
      closeOverlay();
      return;
    }

    showOverlay("<p>Analyzing food...</p>");

    const result = await detectIngredients(image);

    let html = "<h3>Ingredients</h3><ul>";
    result.ingredients.forEach(i => html += `<li>${i}</li>`);
    html += "</ul>";

    html += "<h3>Recipes</h3><ul>";
    result.recipes.forEach(r => html += `<li>${r}</li>`);
    html += "</ul>";

    showOverlay(html);

  } catch (e) {
    console.error(e);
    alert("Camera error");
  }
};

</script>

</body>
</html>
