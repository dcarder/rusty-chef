<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chef Jeff V3</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* SCREENS */
.screen{
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition:opacity 800ms ease, transform 800ms ease;
transform:scale(1.05);
z-index:10;
}
.screen.active{
opacity:1;
pointer-events:auto;
transform:scale(1);
}
.screen img{
width:100%;
height:100%;
object-fit:cover;
}

/* CAMERA */
#cameraView{
position:fixed;
inset:0;
z-index:1;
}
video{
width:100%;
height:100%;
object-fit:cover;
}

/* UI */
#ui{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}
.button{
pointer-events:auto;
position:absolute;
bottom:35px;
width:110px;
height:110px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:14px;
}
#cameraBtn{right:20px;}
#factsBtn{left:20px;}
#recipeBtn{left:50%;transform:translateX(-50%);bottom:20px;}

#statusText{
position:absolute;
bottom:170px;
width:100%;
text-align:center;
color:white;
}

/* PANEL */
#panel{
position:fixed;
inset:0;
background:black;
color:white;
z-index:2000;
opacity:0;
pointer-events:none;
transition:opacity 300ms ease;
overflow:auto;
padding:20px;
}
#panel.active{
opacity:1;
pointer-events:auto;
}

.card{
padding:15px;
margin:10px 0;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.smallBtn{
padding:12px;
border:1px solid white;
margin-top:10px;
text-align:center;
cursor:pointer;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:none;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logo" class="screen active">
<img src="rusty_logo.jpeg">
</div>

<!-- INTRO -->
<div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div>

<!-- CAMERA -->
<div id="cameraView">
<video id="video" autoplay playsinline></video>
</div>

<!-- UI -->
<div id="ui">
<div id="cameraBtn" class="button">📷 Pantry</div>
<div id="factsBtn" class="button">🥩 Facts</div>
<div id="recipeBtn" class="button">🍳 Recipes</div>
<div id="statusText">Booting Chef...</div>
</div>

<!-- PANEL -->
<div id="panel"></div>

<script>
const video = document.getElementById("video");
const panel = document.getElementById("panel");
const statusText = document.getElementById("statusText");

/* CAMERA */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});
video.srcObject = stream;
statusText.innerText = "Tap Pantry or Recipes";
}catch(e){
statusText.innerText = "Camera unavailable";
}
}

/* PANEL */
function openPanel(html){
panel.innerHTML = html;
panel.classList.add("active");
}
function closePanel(){
panel.classList.remove("active");
}

/* STORAGE */
function getPantry(){
return JSON.parse(localStorage.getItem("pantry") || "[]");
}
function savePantry(p){
localStorage.setItem("pantry", JSON.stringify(p));
}
function getRecipes(){
return JSON.parse(localStorage.getItem("userRecipes") || "[]");
}
function saveRecipes(r){
localStorage.setItem("userRecipes", JSON.stringify(r));
}
function getFavorites(){
return JSON.parse(localStorage.getItem("favorites") || "[]");
}
function saveFavorites(f){
localStorage.setItem("favorites", JSON.stringify(f));
}

/* INGREDIENTS */
const ingredientsList = [
"chicken","beef","pork","fish","salmon","shrimp",
"rice","pasta","bread","tortilla","potato","flour",
"garlic","onion","carrot","broccoli","spinach","zucchini","mushroom",
"pepper","tomato","lettuce","cucumber","corn",
"egg","cheese","butter","milk","cream",
"salt","black pepper","paprika","oregano","basil","thyme",
"soy sauce","olive oil","vinegar","hot sauce"
];

/* BASE RECIPES */
const baseRecipes = [
{
name:"Garlic Chicken Rice",
ingredients:["chicken","rice","garlic","salt"],
time:25,
steps:"Cook chicken → add garlic → mix with rice."
},
{
name:"Veg Stir Fry",
ingredients:["broccoli","carrot","pepper","soy sauce"],
time:15,
steps:"Stir fry vegetables and add sauce."
}
];

function allRecipes(){
return [...baseRecipes, ...getRecipes()];
}

/* PANTRY */
function showPantry(){
let pantry = getPantry();

let html = `<h2>🧺 Pantry</h2>`;

ingredientsList.forEach(i=>{
let checked = pantry.includes(i) ? "checked" : "";
html += `
<div class="card">
<label><input type="checkbox" value="${i}" ${checked}> ${i}</label>
</div>`;
});

html += `
<div class="smallBtn" onclick="savePantryUI()">Save Pantry</div>
<div class="smallBtn" onclick="showRecipes()">Find Recipes</div>
<div class="smallBtn" onclick="closePanel()">Close</div>
`;

openPanel(html);
}

function savePantryUI(){
const checked = document.querySelectorAll("input:checked");
const pantry = Array.from(checked).map(i=>i.value);
savePantry(pantry);
alert("Saved!");
showPantry();
}

/* SCORE */
function scoreRecipe(recipe, pantry){
let match = recipe.ingredients.filter(i=>pantry.includes(i));
return {
...recipe,
score: match.length / recipe.ingredients.length,
missing: recipe.ingredients.filter(i=>!pantry.includes(i))
};
}

/* RECIPES */
function showRecipes(){
let pantry = getPantry();
let fav = getFavorites();

let recipes = allRecipes();

let html = `<h2>🍳 Recipes</h2>`;

html += `<input id="search" placeholder="Search recipes...">`;

setTimeout(()=>{
document.getElementById("search").oninput=(e)=>{
let val=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
};
},100);

recipes.forEach(r=>{
let isFav = fav.includes(r.name) ? "❤️" : "🤍";

html += `
<div class="card">
<h3>${r.name} ${isFav}</h3>
<p>⏱ ${r.time || "?"} min</p>
<p>${r.steps}</p>

<div class="smallBtn" onclick="toggleFav('${r.name}')">Toggle Favorite</div>
</div>`;
});

html += `<div class="smallBtn" onclick="closePanel()">Close</div>`;

openPanel(html);
}

/* FAVORITES */
function toggleFav(name){
let fav = getFavorites();
if(fav.includes(name)){
fav = fav.filter(f=>f!==name);
}else{
fav.push(name);
}
saveFavorites(fav);
showRecipes();
}

/* ADD RECIPE */
function addRecipe(){
let html = `
<h2>➕ Add Recipe</h2>
<div class="card">
<input id="name" placeholder="Name">
<input id="time" placeholder="Time">
<textarea id="steps" placeholder="Steps"></textarea>
<input id="ingredients" placeholder="Ingredients (comma separated)">
</div>
<div class="smallBtn" onclick="saveRecipe()">Save</div>
<div class="smallBtn" onclick="showRecipes()">Back</div>
`;
openPanel(html);
}

function saveRecipe(){
let r=getRecipes();
r.push({
name:document.getElementById("name").value,
time:document.getElementById("time").value,
steps:document.getElementById("steps").value,
ingredients:document.getElementById("ingredients").value.split(",")
});
saveRecipes(r);
alert("Saved!");
showRecipes();
}

/* BUTTONS */
document.getElementById("cameraBtn").onclick=showPantry;
document.getElementById("recipeBtn").onclick=showRecipes;

document.getElementById("factsBtn").onclick=()=>{
openPanel(`<div class="card">Cooking App V3 Complete</div>
<div class="smallBtn" onclick="closePanel()">Back</div>`);
};

/* FLOW */
setTimeout(()=>{
document.getElementById("logo").classList.remove("active");
document.getElementById("intro").classList.add("active");
},3500);

setTimeout(()=>{
document.getElementById("intro").style.display="none";
startCamera();
},8000);
</script>

</body>
</html>
