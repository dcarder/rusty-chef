<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;background:black;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
margin-bottom:10px;
text-align:center;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border:1px solid rgba(255,255,255,0.3);
border-radius:10px;
cursor:pointer;
font-size:12px;
}

.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
padding:12px;
margin:10px 0;
text-align:center;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin:6px 0;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:12px;
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.back{
margin-top:10px;
padding:10px;
border:1px solid rgba(255,255,255,0.3);
border-radius:10px;
text-align:center;
cursor:pointer;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:22px;
}

.dockBtn{
width:85px;
height:85px;
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
cursor:pointer;
}

.dockBtn.large{width:110px;height:110px;}

.dockBtn span{
font-size:10px;
margin-top:6px;
opacity:0.7;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg">
  </div>

  <div class="header">🤖 Rusty the Robot Chef</div>
  <div class="card">Smart AI Cooking Assistant</div>

  <div class="dock">
    <div class="dockBtn" onclick="openRecipes()">🍳<span>Recipes</span></div>
    <div class="dockBtn large" onclick="openSmart()">🧠<span>Smart Cook</span></div>
    <div class="dockBtn" onclick="openPantry()">🧺<span>Pantry</span></div>
  </div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="detail" class="page"></div>
<div id="smart" class="page"></div>

</div>

<script>

let selected = JSON.parse(localStorage.getItem("pantry") || "[]");

/* CLEAN NAV SYSTEM */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
window.scrollTo(0,0);
}

/* 🔥 FIXED HOME (ALWAYS RETURNS TO HUB) */
function goHome(){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("home").classList.add("active");
window.scrollTo(0,0);
}

/* NAV */
function openPantry(){loadPantry();}
function openRecipes(){findRecipes();}
function openSmart(){loadSmart();}

/* PANTRY */
const pantryItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Sausage","Pork chops",
"Potatoes","Onions","Garlic","Carrots","Broccoli","Spinach",
"Rice","Pasta","Cheese","Milk","Butter","Tomatoes","Beans",
"Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Honey",
"Chicken broth","Beef broth","Bell peppers","Mushrooms","Corn",
"Peas","Green beans","Cabbage","Lettuce","Cucumber","Zucchini",
"Apples","Bananas","Lemons","Lime","Ginger","Chili flakes",
"Paprika","Oregano","Basil","Thyme","Cinnamon","Nutmeg",
"Shrimp","Salmon","Tuna","Ground turkey","Ham","Steak"
];

function loadPantry(){
let html = `
<div class="topBar">
<div class="homeBtn" onclick="goHome()">🏠 Home</div>
</div>

<div class="header">🧺 Pantry</div>
`;

pantryItems.forEach(item=>{
let on = selected.includes(item);

html += `
<div class="item ${on?'selected':''}" onclick="toggleItem('${item}')">
<span>${item}</span><span>${on?'✔':''}</span>
</div>`;
});

html += `
<div class="btn" onclick="findRecipes()">🍳 What can I cook?</div>
<div class="back" onclick="goHome()">⬅ Home</div>
`;

document.getElementById("pantry").innerHTML = html;
show("pantry");
}

function toggleItem(item){
if(selected.includes(item)){
selected = selected.filter(i=>i!==item);
}else{
selected.push(item);
}
localStorage.setItem("pantry",JSON.stringify(selected));
loadPantry();
}

/* RECIPES */
const recipes = [
{
name:"Garlic Butter Chicken Rice",
ingredients:["Chicken breast","Rice","Garlic","Butter","Onions"],
time:25,
temp:"375°F",
steps:["Season chicken","Sear","Add garlic","Cook rice","Combine"]
},
{
name:"Cheesy Bacon Pasta",
ingredients:["Bacon","Pasta","Cheese","Milk","Butter"],
time:20,
temp:"350°F",
steps:["Cook pasta","Cook bacon","Add milk","Melt cheese","Combine"]
},
{
name:"Veggie Stir Fry",
ingredients:["Broccoli","Carrots","Onions","Garlic","Rice"],
time:15,
temp:"High heat",
steps:["Heat pan","Add garlic","Add veggies","Stir fry","Serve"]
}
];

/* MATCH */
function findRecipes(){
let ranked = recipes.map(r=>{
let match = r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,score:match/r.ingredients.length};
}).sort((a,b)=>b.score-a.score);

let html = `
<div class="topBar">
<div class="homeBtn" onclick="goHome()">🏠 Home</div>
</div>

<div class="header">🍳 Matches</div>
`;

ranked.forEach(r=>{
html += `
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
${(r.score*100).toFixed(0)}% match<br>
${r.time} min
</div>`;
});

html += `<div class="back" onclick="loadPantry()">⬅ Pantry</div>`;

document.getElementById("results").innerHTML = html;
show("results");
}

/* DETAIL */
function openRecipe(name){
let r = recipes.find(x=>x.name===name);

let html = `
<div class="topBar">
<div class="homeBtn" onclick="goHome()">🏠 Home</div>
</div>

<div class="header">${r.name}</div>

<div class="card">
⏱ ${r.time} min<br>
🌡 ${r.temp}<br><br>
<b>Ingredients:</b><br>${r.ingredients.join("<br>")}
</div>

<div class="card">
<b>Steps:</b><br>${r.steps.map(s=>"• "+s).join("<br>")}
</div>

<div class="back" onclick="findRecipes()">⬅ Back</div>
`;

document.getElementById("detail").innerHTML = html;
show("detail");
}

/* SMART */
function loadSmart(){
let html = `
<div class="topBar">
<div class="homeBtn" onclick="goHome()">🏠 Home</div>
</div>

<div class="header">🧠 Smart Cook AI</div>

<div class="card">
AI recipe generator coming soon.
</div>

<div class="back" onclick="goHome()">⬅ Home</div>
`;

document.getElementById("smart").innerHTML = html;
show("smart");
}

/* INIT */
loadPantry();

</script>

</body>
</html>
