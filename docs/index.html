<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chef Jeff</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Full‑screen background image */
        body {
            background: url("copilot_image_1777179019874.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        /* Dark overlay for readability */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.35);
        }

        /* Centered UI container */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            width: 90%;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px black;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            text-shadow: 0 0 8px black;
        }

        /* Camera button */
        .camera-btn {
            background: rgba(255,255,255,0.85);
            color: black;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 10px black;
        }

        .camera-btn:active {
            transform: scale(0.97);
        }

        /* Hidden file input */
        #cameraInput {
            display: none;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="content">
        <h1>Chef Jeff</h1>
        <p>Snap a photo of your food and I’ll help you make something with it</p>

        <button class="camera-btn" onclick="document.getElementById('cameraInput').click();">
            📸 Open Camera
        </button>

        <input id="cameraInput" type="file" accept="image/*" capture="environment" onchange="handleImage(event)">
    </div>

    <script>
        function handleImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            alert("Image captured! (Backend connection coming next)");
        }
    </script>
</body>
</html>
