<!-- Permanent tab bar - lives outside .page so fixed positioning works -->
<div id="tabBar" style="position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(0,0,0,0.92);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,0.1);padding:8px 12px 12px;display:flex;gap:8px;">
  <div class="btn" onclick="openPantry()" style="flex:1;margin-top:0;padding:10px 4px;font-size:12px;line-height:1.4;">🧺<br>Pantry</div>
  <div class="btn" onclick="showMatches()" style="flex:1;margin-top:0;padding:10px 4px;font-size:12px;line-height:1.4;">🍳<br>Recipes</div>

<script>

/* ================= NAV ================= */
function show(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  requestAnimationFrame(() => document.getElementById(id).classList.add("active"));
}

/* ================= INGREDIENTS ================= */
const ingredientItems = [
  "Avocado","Bacon","Baking soda","Bananas","Basil","BBQ sauce","Beans","Bell peppers","Bread","Breadcrumbs","Broccoli","Brown sugar","Butter","Cabbage","Carrots","Cheddar","Cheese","Chicken breast","Chicken broth","Chickpeas","Chocolate","Cinnamon","Coconut milk","Cornstarch","Crackers","Cream","Curry powder","Egg noodles","Eggs","Flour","Garlic","Garlic powder","Ginger","Ground beef","Honey","Hot sauce","Italian seasoning","Lemon","Lettuce","Lime","Maple syrup","Marinara sauce","Mayonnaise","Milk","Mushrooms","Noodles","Oats","Oil","Olive oil","Onions","Paprika","Parmesan","Parsley","Pasta","Pineapple","Pork chops","Potatoes","Ramen noodles","Ravioli","Rice","Salmon","Salt","Sausage","Sesame oil","Shrimp","Soy sauce","Steak","Sugar","Teriyaki sauce","Tofu","Tomatoes","Tortilla","Tuna","Turkey","Turmeric","Vanilla extract","Vinegar"
];

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

function toggleFavorite(idx){
  const name = typeof idx === "number" ? recipes[idx].name : idx;
  favorites = favorites.includes(name) ? favorites.filter(f=>f!==name) : [...favorites, name];
  localStorage.setItem("favorites", JSON.stringify(favorites));
  const star = document.querySelector('.fav-star');
  const isFav = favorites.includes(name);
  if(star){
    if(isFav){
      star.classList.add('saved');
      star.style.transform = 'scale(1.5)';
      setTimeout(() => star.style.transform = '', 200);
    } else {
      star.classList.remove('saved');
    }
  }
}

function showFavorites(){
  let html = `<div class="header">⭐ Saved Recipes</div>`;
  if(favorites.length === 0){
    html += `<div class="card" style="text-align:center;opacity:0.6;padding:30px;">
      No saved recipes yet.<br><br>Tap ⭐ on any recipe to save it here.
    </div>`;
  } else {
    favorites.forEach(name => {
      const r = recipes.find(x => x.name === name);
      if(!r) return;
      const match = r.ingredients.filter(i => selected.includes(i)).length;
      html += `
        <div class="card" style="display:flex;align-items:center;justify-content:space-between;" onclick="openRecipe(${recipes.findIndex(x=>x.name===name)})">
          <div><b>${name}</b><br><small style="opacity:0.6">Match: ${match}/${r.ingredients.length}</small></div>
          <span style="font-size:20px;color:#ffd700;">★</span>
        </div>`;
    });
  }
  html += `
    `;
  document.getElementById("favorites").innerHTML = html;
  show("favorites");
}

function clearPantry(){
  selected = [];
  localStorage.setItem("ingredients", JSON.stringify(selected));
  openPantry();
}

/* ================= RECIPES ================= */
const recipes = [

{
  name:"Chicken Fried Rice",
  category:"lunch",
  ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
  simpleSteps:[
    {t:"Cook rice", a:"fluffy"},
    {t:"Cook chicken", a:"done"},
    {t:"Scramble eggs", a:"soft"},
    {t:"Mix everything", a:"hot pan"}
  ],
  chefSteps:[
    {
      t:"Prep and cook the rice",
      a:"Rinse the rice under cold water 2–3 times until the water runs mostly clear — this removes excess starch and prevents a gummy texture. Cook using a 1:1.5 rice-to-water ratio. Once done, spread the rice on a tray or plate and refrigerate for at least 30 minutes (overnight is even better). Cold, dry rice fries instead of steams, giving you those distinct separated grains.",
      tip:"Day-old leftover rice is ideal. Never use freshly cooked rice — it'll clump and turn mushy."
    },
    {
      t:"Season and cook the chicken",
      a:"Dice the chicken breast into small, even ½-inch cubes so they cook quickly and evenly. Season generously with salt and pepper. Heat a wok or large skillet over high heat until it just begins to smoke. Add a thin layer of neutral oil and cook the chicken in a single layer without stirring for 90 seconds to develop a golden sear, then toss and finish cooking through. Remove from pan and set aside.",
      tip:"High heat is non-negotiable. A hot wok creates 'wok hei' — that smoky, slightly charred flavor you can't get at low temperatures."
    },
    {
      t:"Scramble the eggs separately",
      a:"Push everything to the side of the wok or use a clean pan. Add a touch of butter and crack in the eggs. Scramble them low and slow — stir gently and pull off heat while still slightly underdone and glossy. They'll finish cooking from residual heat. Soft, custardy eggs fold into the rice beautifully rather than becoming rubbery chunks.",
      tip:"Salt your eggs just before scrambling, not ahead of time — pre-salting draws out moisture and makes them watery."
    },
    {
      t:"Fry the rice and combine everything",
      a:"Add the cold rice to the hot wok and press it flat. Let it sit undisturbed for 60–90 seconds so the bottom layer starts to crisp. Then toss and repeat once more. Add the soy sauce in a ring around the outer edge of the wok (not directly on the rice) so it hits the hot metal first and caramelizes slightly before mixing in. Return the chicken and eggs, then add diced onions and carrots. Toss everything together over high heat for 2 minutes. Taste and adjust salt.",
      tip:"Add a few drops of sesame oil right at the end, off the heat, for aromatic depth. It burns easily if cooked too long."
    }
  ]
},

{
  name:"Spaghetti Bolognese",
  category:"dinner",
  ingredients:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],
  simpleSteps:[
    {t:"Boil pasta", a:"soft"},
    {t:"Cook beef", a:"brown"},
    {t:"Add sauce", a:"tomato"},
    {t:"Combine", a:"mix"}
  ],
  chefSteps:[
    {
      t:"Build your soffritto base",
      a:"Finely dice the onions and mince the garlic. Cook them in olive oil over medium-low heat for 10–12 minutes, stirring occasionally, until completely softened and lightly golden — not browned. This slow cook transforms them from sharp and pungent into sweet and deeply savory. This is the flavor foundation that separates a good bolognese from a great one.",
      tip:"Patience here pays dividends. Rushing the soffritto leaves a raw, one-dimensional base."

    {
      t:"Brown the beef deeply",
      a:"Raise heat to medium-high and add the ground beef in a single layer if possible. Do not stir for the first 3–4 minutes — you want a real sear, not a gray steam. Once a crust develops on the bottom, break it apart and continue browning. Season with salt and pepper. The goal is deeply caramelized, not just gray and cooked. Drain any excess fat if needed, but leave a little for richness.",

    },
    {
      t:"Build and simmer the sauce",
      a:"Add the crushed or diced tomatoes and stir to combine. Bring to a gentle bubble, then reduce to a low simmer. Cook uncovered for at least 25–30 minutes, stirring every few minutes. The sauce should reduce and thicken until it clings to a spoon rather than sliding off watery. Add a small pinch of sugar if the tomatoes taste sharp. Taste and adjust salt.",

    {
      t:"Cook and combine the pasta",
      a:"Boil pasta in heavily salted water (it should taste like mild sea water) until just shy of al dente — about 1 minute less than the package says. Reserve a large mug of pasta water before draining. Add the pasta directly into the sauce and toss over medium heat for 1–2 minutes, adding splashes of pasta water to loosen and emulsify. The starchy water helps the sauce coat every strand.",

    }
  ]
},

{
  name:"Chicken Tacos",
  category:"dinner",
  ingredients:["Chicken breast","Tortilla","Cheese","Onions","Lime"],
  simpleSteps:[
    {t:"Cook chicken", a:"done"},
    {t:"Warm tortillas", a:"soft"},
    {t:"Assemble tacos", a:"fresh"}
  ],
  chefSteps:[
    {
      t:"Season and cook the chicken",
      a:"Flatten the chicken breasts to an even thickness by pounding with a pan or rolling pin — this ensures they cook evenly without drying out. Season both sides generously with salt, pepper, cumin, and a pinch of paprika. Heat a cast iron or heavy skillet over medium-high until very hot. Cook 4–5 minutes per side without moving, then rest for 5 minutes before slicing. Resting is critical — cutting too early loses all the juices.",

  chefSteps:[

      tip:"Don't overfill. A burrito you can't close defeats the purpose. Less is more for a clean wrap."

  ]

{

{

{

      t:"Finish and rest",
      a:"Flip the salmon and cook flesh-side down for just 60–90 seconds — barely enough to color the top. The center should still be slightly translucent and deep orange. Remove from heat and let rest in the pan 2 minutes. The carry-over heat finishes it perfectly. Finish with minced garlic briefly sautéed in butter in the same pan, then squeeze fresh lemon over the fish just before serving.",

{

{

{
  name:"Pancakes",

  chefSteps:[
    {

      a:"Combine dry ingredients (flour, sugar, baking powder, pinch of salt) in one bowl. Whisk wet ingredients (eggs, milk, melted butter) in another. Pour the wet into the dry and stir with a fork until just combined — lumps are completely fine and expected. Overmixing develops gluten and makes tough, dense pancakes. Let the batter rest 5 minutes while the pan heats.",
      tip:"Lumpy batter makes fluffy pancakes. Smooth batter makes tough ones. Stop mixing early."

{
  name:"Fried Chicken",

  chefSteps:[
    {
      t:"Season the flour and prep for coating",
      a:"Season flour generously — add salt, black pepper, garlic powder, paprika, and cayenne to taste. This is where all the flavor of your crust comes from. Season your chicken directly with salt and pepper too. For the crispiest coating: dip the chicken in buttermilk or a beaten egg, then press firmly into the seasoned flour. Let it sit on a rack for 10 minutes before frying — this drying time helps the crust adhere and stay on during cooking.",
      tip:"Pressing the flour coating onto the chicken is critical. Shake it gently to remove excess but press firmly first."

    {
      t:"Fry at the right temperature",
      a:"Heat oil in a heavy pot to 350°F (175°C). Use a thermometer — oil temperature is everything. Too cool and the chicken absorbs oil and turns greasy. Too hot and the outside burns before the inside cooks. Fry in batches, never crowding the pot (crowding drops the temperature). Cook 6–8 minutes for breast pieces, turning halfway. The crust should be deep golden-brown. Rest on a rack — never a paper towel, which traps steam and softens the crust.",
      tip:"A wire rack for resting keeps the bottom crust crispy. Paper towels steam the bottom and destroy the crunch."
    }
  ]
},

{

{

{

{

{

/* ================= PANTRY ================= */
function openPantry(){
  let html = `
    <div class="header">🧺 Pantry</div>
    <div class="card">
      <input id="searchBox" class="searchInput" placeholder="Search ingredients..." oninput="filterIngredients()"/>
    </div>
    <div id="ingredientList">`;

  ingredientItems.forEach(i => {
    html += `<div class="item ${selected.includes(i)?'selected':''}" data-item="${i}">${i}</div>`;
  });

  html += `</div>
    <div class="btn" style="margin-bottom:8px;" onclick="showMatches()">🔍 Find Recipes</div>
    <div class="btn" style="background:#ff4d4d;color:white;margin-bottom:100px;" onclick="clearPantry()">🗑 Clear Pantry</div>
    `;

  document.getElementById("pantry").innerHTML = html;
  document.querySelectorAll(".item").forEach(el => { el.onclick = () => toggle(el.dataset.item); });
  show("pantry");
}

function filterIngredients(){
  let q = document.getElementById("searchBox").value.toLowerCase();
  let filtered = ingredientItems.filter(i => i.toLowerCase().includes(q));
  document.getElementById("ingredientList").innerHTML = filtered.map(i =>
    `<div class="item ${selected.includes(i)?'selected':''}" data-item="${i}">${i}</div>`
  ).join("");
  document.querySelectorAll(".item").forEach(el => { el.onclick = () => toggle(el.dataset.item); });
}

function toggle(i){
  selected = selected.includes(i) ? selected.filter(x=>x!==i) : [...selected,i];
  localStorage.setItem("ingredients", JSON.stringify(selected));
  filterIngredients();
}

/* ================= MATCH ================= */
const categoryOrder = ["breakfast","lunch","dinner","tofu","dessert"];
const categoryLabels = {
  breakfast: "🌅 Breakfast",
  lunch: "☀️ Lunch",
  dinner: "🌙 Dinner",
  tofu: "🥢 Tofu",
  dessert: "🍰 Dessert"
};

let activeCategory = "all";

function showMatches(cat){
  if(cat !== undefined) activeCategory = cat;

  let scored = recipes.map(r => ({
    ...r,
    match: r.ingredients.filter(i => selected.includes(i)).length
  }));

  let html = `<div class="header">🍳 Recipes</div>`;

  // Category filter pills
  const allCats = ["all", ...categoryOrder.filter(c => scored.some(r => r.category === c))];
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">`;
  allCats.forEach(c => {
    const active = activeCategory === c;
    const label = c === "all" ? "🍽 All" : categoryLabels[c];
    html += `<div onclick="showMatches('${c}')" style="padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid ${active ? '#4facfe' : 'rgba(255,255,255,0.25)'};background:${active ? 'rgba(79,172,254,0.25)' : 'rgba(255,255,255,0.06)'};">${label}</div>`;
  });
  html += `</div>`;

  if(activeCategory === "all"){
    categoryOrder.forEach(cat => {
      const group = scored.filter(r => r.category === cat).sort((a,b) => b.match - a.match);
      if(!group.length) return;
      const top3 = group.slice(0, 3);
      const hasMore = group.length > 3;
      html += `<div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 6px;">
        <div style="font-size:15px;font-weight:800;color:#ff914d;letter-spacing:1px;">${categoryLabels[cat]}</div>
        ${hasMore ? `<div onclick="showMatches('${cat}')" style="font-size:12px;color:#4facfe;cursor:pointer;font-weight:600;">See all ${group.length} →</div>` : ''}
      </div>`;
      top3.forEach(r => {
        const isFav = favorites.includes(r.name);
        html += `<div class="card" onclick="openRecipe(${recipes.findIndex(x=>x.name===r.name)})" style="display:flex;align-items:center;justify-content:space-between;">
          <div><b>${r.name}</b>${isFav ? '<span class="fav-badge">★ Saved</span>' : ''}<br><small style="opacity:0.6;margin-top:4px;display:block;">Match: ${r.match}/${r.ingredients.length}</small></div>
          <div style="font-size:20px;opacity:0.4;">›</div>
        </div>`;
      });
    });
  } else {
    const group = scored.filter(r => r.category === activeCategory).sort((a,b) => b.match - a.match);
    group.forEach(r => {
      const isFav = favorites.includes(r.name);
      html += `<div class="card" onclick="openRecipe(${recipes.findIndex(x=>x.name===r.name)})" style="display:flex;align-items:center;justify-content:space-between;">
        <div><b>${r.name}</b>${isFav ? '<span class="fav-badge">★ Saved</span>' : ''}<br><small style="opacity:0.6;margin-top:4px;display:block;">Match: ${r.match}/${r.ingredients.length}</small></div>
        <div style="font-size:20px;opacity:0.4;">›</div>
      </div>`;
    });
  }

  html += `<div style="margin-bottom:100px;"></div>`;
  document.getElementById("results").innerHTML = html;
  show("results");
}

/* ================= RECIPE ================= */
let current = null;
let mode = "simple";

function openRecipe(idx){
  current = recipes[idx];
  mode = "simple";
  renderRecipe();
  show("recipe");
}

function switchMode(){
  mode = mode === "simple" ? "chef" : "simple";
  renderRecipe();
  document.getElementById("recipe").scrollTop = 0;
}

function renderRecipe(){
  let steps = mode === "simple" ? current.simpleSteps : current.chefSteps;
  let isChef = mode === "chef";

  let isFav = favorites.includes(current.name);
  let html = `
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;">
      <div class="recipeTitle" style="margin-bottom:0;">${current.name}</div>
      <span class="fav-star ${isFav ? 'saved' : ''}" onclick="toggleFavorite(${recipes.indexOf(current)})">☆</span>
    </div>`;

  if(isChef){
    html += `
      <div class="chef-banner">
        <div class="chef-banner-title">🔥 CHEF MODE 🔥</div>
        <div class="chef-banner-sub">Professional techniques & detailed instructions</div>
      </div>`;
  } else {
    html += `<div class="modeBadge">🍳 Simple Mode</div>`;
  }

  steps.forEach((s, i) => {
    if(isChef){
      html += `
        <div class="chef-card">
          <div class="step-header">
            <span class="step-number">${i+1}</span>
            <div class="step-title">${s.t}</div>
          </div>
          <div class="step-body">${s.a}</div>
          ${s.tip ? `<div class="step-tip">💡 Pro tip: ${s.tip}</div>` : ''}
        </div>`;
    } else {
      html += `
        <div class="card">
          <b>${i+1}. ${s.t}</b><br><br>${s.a}
        </div>`;
    }
  });

  html += `<div class="header">🧂 Ingredients</div>`;
  current.ingredients.forEach(i => {
    let has = selected.includes(i);
    html += `<div class="card">${has ? "✅" : "❌"} ${i}</div>`;
  });

  let missing = current.ingredients.filter(i => !selected.includes(i));
  if(missing.length){
    html += `<div class="header">🛒 Missing Ingredients</div>`;
    missing.forEach(item => {
      let q = encodeURIComponent(item);
      html += `
        <div class="card">
          <b>${item}</b><br>
          <a class="shopBtn" target="_blank" href="https://www.walmart.com/search?q=${q}">Walmart</a>
        </div>`;
    });
  }

  html += `
    <div class="btn ${isChef ? 'btn-chef' : ''}" onclick="switchMode()">
      ${isChef ? "🍳 Switch to Simple Mode" : "🔥 Switch to Chef Mode"}
    </div>
    <div class="btn" onclick="showMatches()" style="margin-bottom:4px;">⬅ Back To Recipes</div>
    <a class="btn btn-feedback" href="mailto:therustychef1@gmail.com?subject=Rusty%20Chef%20Feedback" style="display:block;text-align:center;text-decoration:none;margin-bottom:100px;">✉️ Send Feedback</a>
    `;

  document.getElementById("recipe").innerHTML = html;
}

show("home");
</script>
