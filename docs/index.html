<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

/* 🍳 LOGO (ONLY VISUAL CHANGE) */
.logo{
text-align:center;
font-size:40px;
font-weight:950;
letter-spacing:4px;
margin-bottom:10px;
color:white;
text-shadow:
0 0 8px rgba(79,172,254,0.9),
0 0 20px rgba(79,172,254,0.6);
}

.card{
background:rgba(255,255,255,0.08);
padding:14px;
margin:10px 0;
border-radius:16px;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.3);
}

/* 🔥 DOCK (UNCHANGED) */
.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:85px;
height:85px;
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
cursor:pointer;
font-size:22px;
}

.dockBtn.large{
width:110px;
height:110px;
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.dockBtn span{
font-size:10px;
opacity:0.8;
margin-top:5px;
}

/* HOME BG (UNCHANGED) */
#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

.btn{
margin-top:10px;
padding:12px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg"/>
</div>

<!-- 🤖 ONLY CHANGE: LOGO -->
<div class="logo">🤖 THE RUSTY CHEF</div>

<div class="card">Smart Cooking Engine</div>

<!-- 🔥 3 BUTTON DOCK (UNCHANGED) -->
<div class="dock">

  <div class="dockBtn" onclick="openRecipes()">
    🍳
    <span>Recipes</span>
  </div>

  <div class="dockBtn large" onclick="openIngredients()">
    🧠
    <span>AI Cook</span>
  </div>

  <div class="dockBtn" onclick="openIngredients()">
    🧺
    <span>Ingredients</span>
  </div>

</div>

</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
   INGREDIENTS (UNCHANGED)
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Sausage","Turkey","Flour","Sugar","Salt","Pepper","Olive oil",
"Soy sauce","Lemon","Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rosemary",
"Rice noodles","Tortilla","Bread","Parmesan","Cheddar","Mozzarella","Feta","Avocado","Apples","Bananas",
"Strawberries","Blueberries","Chicken broth","Beef broth","Fish sauce","Worcestershire sauce","Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil",
"Peanut butter","Jam","Walnuts","Almonds","Cashews","Green beans","Zucchini","Eggplant","Cauliflower","Cabbage",
"Sweet potato","Pumpkin","Corn","Ramen noodles","Oats","Cornstarch","Chocolate","Coffee","Tea","Maple syrup",
"Brown sugar","Honey","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar","Chickpeas","Lentils",
"Quinoa","Tofu","Crackers","Granola","Marshmallows","Parsley","Chives","Cinnamon","Nutmeg","Ginger",
"Black beans","Kidney beans","Pinto beans","Cannellini beans"
];

/* STORAGE */
let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");
selected = selected.filter(i => ingredientItems.includes(i));
localStorage.setItem("ingredients", JSON.stringify(selected));

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* INGREDIENTS */
function openIngredients(){

let html=`<div class="logo" style="font-size:26px;">🧺 Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
<span>${i}</span><span>${on?'✔':''}</span></div>`;
});

html+=`<div class="btn" onclick="openRecipes()">🍳 Generate Recipe</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)
?selected.filter(x=>x!==i)
:[...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

/* CUISINE */
function detectCuisine(items){
let score={mexican:0,italian:0,asian:0,american:0};

items.forEach(i=>{
let x=i.toLowerCase();

if(["tortilla","beans","corn","lime","hot sauce"].some(w=>x.includes(w))) score.mexican++;
if(["pasta","basil","olive oil","parmesan","mozzarella"].some(w=>x.includes(w))) score.italian++;
if(["soy sauce","rice","noodles","sesame","ginger"].some(w=>x.includes(w))) score.asian++;
if(["beef","chicken","potato","bread","cheddar"].some(w=>x.includes(w))) score.american++;
});

return Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);
}

/* RECIPES */
function generateAIRecipe(){

if(selected.length < 3){
return [{name:"Select More Ingredients",ingredients:[],protein:"None",steps:[{text:"Pick at least 3 ingredients.",time:0}]}];
}

let used=[...selected].sort(()=>Math.random()-0.5).slice(0,6);

let cuisine = detectCuisine(used);

let protein = used.find(i =>
i.includes("Chicken")||i.includes("Beef")||
i.includes("Shrimp")||i.includes("Salmon")||
i.includes("Egg")||i.includes("Turkey")||
i.includes("Pork")
) || "Main Ingredient";

let steps=[];

steps.push({text:`Prep ingredients for ${cuisine.toUpperCase()} cooking style.`,time:300});
steps.push({text:`Cook base ingredients evenly.`,time:420});
steps.push({text:`Cook ${protein} to safe temperature.`,time:480});
steps.push({text:`Combine and finish dish.`,time:300});

return [{
name:`${cuisine.toUpperCase()} AI ${protein} Dish`,
ingredients:used,
protein:protein,
cuisine:cuisine,
steps:steps
}];
}

/* RECIPES PAGE */
function openRecipes(){

let list=generateAIRecipe();
window.generated=list;

let html=`<div class="logo" style="font-size:26px;">🍳 Recipes</div>`;

list.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>${r.cuisine.toUpperCase()}
</div>`;
});

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

/* DETAIL */
function openRecipe(name){

let r=window.generated.find(x=>x.name===name);

let html=`<div class="logo" style="font-size:26px;">${r.name}</div>

<div class="card"><b>Ingredients:</b><br>${r.ingredients.join("<br>")}</div>
<div class="card"><b>Protein:</b> ${r.protein}</div>
<div class="card"><b>Cuisine:</b> ${r.cuisine}</div>`;

r.steps.forEach((s,i)=>{
html+=`
<div class="card">
<b>Step ${i+1}</b><br><br>
${s.text}<br><br>
⏱ ${Math.floor(s.time/60)}m
</div>`;
});

document.getElementById("detail").innerHTML=html;
show("detail");
}

</script>

</body>
</html>
