<!DOCTYPE html><html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Jeff AI</title><style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

/* ===== APP STATE SYSTEM ===== */
.screen{
position:fixed;
inset:0;
opacity:0;
pointer-events:none;
transition:opacity 500ms ease;
}

.screen.active{
opacity:1;
pointer-events:auto;
z-index:10;
}

img{
width:100%;
height:100%;
object-fit:cover;
}

/* CAMERA VIEW */
#cameraView{
position:fixed;
inset:0;
background:black;
z-index:1;
display:none;
}

#cameraVideo{
width:100%;
height:100%;
object-fit:cover;
}

/* UI LAYER */
#ui{
position:fixed;
inset:0;
z-index:1000;
pointer-events:none;
}

.button{
pointer-events:auto;
position:absolute;
bottom:40px;
width:140px;
height:140px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:18px;
opacity:0;
transition:opacity 400ms ease;
}

.button.show{
opacity:1;
}

#cameraBtn{right:30px;}
#factsBtn{left:30px;}

#text{
position:absolute;
bottom:220px;
width:100%;
text-align:center;
color:white;
font-size:18px;
opacity:0;
transition:opacity 400ms ease;
}

#text.show{
opacity:1;
}

/* PANEL */
#panel{
position:fixed;
inset:0;
background:black;
color:white;
padding:20px;
opacity:0;
pointer-events:none;
transition:opacity 400ms ease;
z-index:2000;
overflow:auto;
}

#panel.active{
opacity:1;
pointer-events:auto;
}

.card{
margin:15px 0;
padding:15px;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.smallBtn{
margin-top:20px;
padding:12px;
border:1px solid white;
text-align:center;
cursor:pointer;
}

/* LOADING */
#loading{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
color:white;
z-index:3000;
}
</style></head><body><!-- SCREENS --><div id="logo" class="screen active">
<img src="your_logo.jpeg">
</div><div id="intro" class="screen">
<img src="rusty_intro.jpeg">
</div><img id="cameraScreen" src="copilot_image_1777179019874.jpeg"><!-- UI --><div id="ui">
<div id="cameraBtn" class="button">📷 Camera</div>
<div id="factsBtn" class="button">📘 Facts</div>
<div id="text">Loading camera preview...</div>
</div><!-- PANEL --><div id="panel"></div><!-- LOADING --><div id="loading">Analyzing food...</div><script>
console.log("AI APP LOADED");

/* ===== STATE ===== */
const State={LOGO:"logo",INTRO:"intro",CAMERA:"camera",FACTS:"facts",RESULTS:"results"};
let current=State.LOGO;

const logo=document.getElementById("logo");
const intro=document.getElementById("intro");
const camImg=document.getElementById("cameraScreen");
const panel=document.getElementById("panel");
const loading=document.getElementById("loading");

const camBtn=document.getElementById("cameraBtn");
const factsBtn=document.getElementById("factsBtn");
const text=document.getElementById("text");

function set(state){
current=state;
logo.classList.remove("active");
intro.classList.remove("active");
panel.classList.remove("active");

if(state===State.LOGO)logo.classList.add("active");
if(state===State.INTRO)intro.classList.add("active");

if(state===State.CAMERA){
camBtn.classList.remove("show");
factsBtn.classList.remove("show");
text.classList.remove("show");
}

if(state===State.FACTS){
panel.innerHTML=`
<h1>🍳 Food Facts</h1>
<div class="card"><h3>Chicken</h3>Garlic, lemon, paprika, oregano, pepper</div>
<div class="card"><h3>Pork</h3>Brown sugar, mustard, rosemary, garlic, smoked paprika</div>
<div class="card"><h3>Beef</h3>Salt, pepper, onion, cumin, smoked paprika</div>
<div class="smallBtn" onclick="set(State.CAMERA)">Back</div>
`;
panel.classList.add("active");
}

if(state===State.RESULTS){
panel.classList.add("active");
}
}

/* ===== WAIT FOR COPILOT IMAGE ===== */
function startAppWhenImageReady(){

camImg.onload=()=>{
console.log("Camera image loaded → showing UI");
set(State.CAMERA);

setTimeout(()=>{
camBtn.classList.add("show");
factsBtn.classList.add("show");
text.classList.add("show");
},300);
};

// fallback if cached
if(camImg.complete){
camImg.onload();
}
}

/* ===== CAMERA (optional real video) ===== */
async function startCamera(){
try{
const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
document.getElementById("cameraVideo").srcObject=stream;
}catch(e){console.log("camera blocked");}
}

/* ===== AI FAKE ===== */
function analyze(){
loading.style.display="flex";
setTimeout(()=>{
loading.style.display="none";
set(State.RESULTS);
panel.innerHTML=`
<h1>🍽️ AI Results</h1>
<div class="card"><b>Detected:</b> Chicken, garlic, rice</div>
<div class="card"><b>Recipe:</b> Garlic chicken rice bowl</div>
<div class="smallBtn" onclick="set(State.CAMERA)">Back</div>
`;
},1200);
}

/* BUTTONS */
camBtn.onclick=()=>set(State.CAMERA);
factsBtn.onclick=()=>set(State.FACTS);

camImg.onclick=()=>analyze();

/* BOOT SEQUENCE */
set(State.LOGO);
setTimeout(()=>set(State.INTRO),2000);
setTimeout(()=>startAppWhenImageReady(),4500);

</script></body>
</html>
