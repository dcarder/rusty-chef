<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty AI Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
margin-bottom:10px;
gap:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.2);
font-size:12px;
}

.card{
background:rgba(255,255,255,0.08);
padding:14px;
margin:10px 0;
border-radius:16px;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.3);
}

.btn{
margin-top:10px;
padding:12px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
cursor:pointer;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg"/>
</div>

<div class="header">🤖 Rusty AI Chef</div>
<div class="card">Smart Cooking System</div>

<div class="btn" onclick="openIngredients()">🧺 Open Ingredients</div>
</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
   INGREDIENTS (100)
========================= */

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Sausage","Turkey","Flour","Sugar","Salt","Pepper","Olive oil",
"Soy sauce","Lemon","Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rosemary",
"Rice noodles","Tortilla","Bread","Parmesan","Cheddar","Mozzarella","Feta","Avocado","Apples","Bananas",
"Strawberries","Blueberries","Chicken broth","Beef broth","Fish sauce","Worcestershire sauce","Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil",
"Peanut butter","Jam","Walnuts","Almonds","Cashews","Green beans","Zucchini","Eggplant","Cauliflower","Cabbage",
"Sweet potato","Pumpkin","Corn","Ramen noodles","Oats","Cornstarch","Chocolate","Coffee","Tea","Maple syrup",
"Brown sugar","Honey","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar","Chickpeas","Lentils",
"Quinoa","Tofu","Crackers","Granola","Marshmallows","Parsley","Chives","Cinnamon","Nutmeg","Ginger",
"Black beans","Kidney beans","Pinto beans","Cannellini beans"
];

/* =========================
   CLEAN STORAGE
========================= */

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");
selected = selected.filter(i => ingredientItems.includes(i));
localStorage.setItem("ingredients", JSON.stringify(selected));

/* =========================
   TIMER SYSTEM
========================= */

let activeTimers = {};

function startTimer(stepId, seconds, elId){

clearInterval(activeTimers[stepId]);

let time = seconds;

activeTimers[stepId] = setInterval(() => {

let m = Math.floor(time / 60);
let s = time % 60;

document.getElementById(elId).innerText =
`⏳ ${m}:${s.toString().padStart(2,'0')}`;

time--;

if(time < 0){
clearInterval(activeTimers[stepId]);
document.getElementById(elId).innerText = "✅ Done";
if(navigator.vibrate) navigator.vibrate(150);
}

}, 1000);
}

/* =========================
   NAV
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* =========================
   INGREDIENT UI
========================= */

function openIngredients(){

let html=`<div class="topBar">
<div class="homeBtn" onclick="show('home')">🏠 Home</div>
<div class="homeBtn" onclick="openRecipes()">🍳 Cook</div>
</div>

<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
<span>${i}</span><span>${on?'✔':''}</span></div>`;
});

html+=`<div class="btn" onclick="openRecipes()">🍳 Generate Recipe</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)
?selected.filter(x=>x!==i)
:[...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

/* =========================
   CUISINE DETECTION
========================= */

function detectCuisine(items){

let score={mexican:0,italian:0,asian:0,american:0};

items.forEach(i=>{
let x=i.toLowerCase();

if(["tortilla","beans","corn","lime","hot sauce"].some(w=>x.includes(w))) score.mexican++;
if(["pasta","basil","olive oil","parmesan","mozzarella"].some(w=>x.includes(w))) score.italian++;
if(["soy sauce","rice","noodles","sesame","ginger"].some(w=>x.includes(w))) score.asian++;
if(["beef","chicken","potato","bread","cheddar"].some(w=>x.includes(w))) score.american++;
});

return Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);
}

/* =========================
   RECIPE ENGINE
========================= */

function generateAIRecipe(){

if(selected.length < 3){
return [{name:"Select More Ingredients",ingredients:[],protein:"None",steps:[{text:"Pick at least 3 ingredients.",time:0}]}];
}

let used=[...selected].sort(()=>Math.random()-0.5).slice(0,6);

let cuisine = detectCuisine(used);

let protein = used.find(i =>
i.includes("Chicken")||i.includes("Beef")||
i.includes("Shrimp")||i.includes("Salmon")||
i.includes("Egg")||i.includes("Turkey")||
i.includes("Pork")
) || "Main Ingredient";

let steps=[];

steps.push({text:`Prep ingredients for ${cuisine.toUpperCase()} style cooking.`,time:300});

if(used.some(i=>i.includes("Ramen"))){
steps.push({text:`Boil water 100°C. Cook ramen 2–4 min. Drain if needed.`,time:240});
}

if(used.some(i=>i.includes("Rice"))){
steps.push({text:`Simmer rice 15–20 min until fluffy.`,time:900});
}

if(used.some(i=>i.includes("Pasta"))){
steps.push({text:`Boil salted water. Cook pasta 8–12 min.`,time:720});
}

steps.push({
text:`Cook ${protein} to safe temperature (165°F poultry / 145°F fish / 160°F beef).`,
time:480
});

steps.push({
text:`Add vegetables and apply ${cuisine} flavor profile.`,
time:420
});

steps.push({
text:`Let dish rest before serving.`,
time:180
});

return [{
name:`${cuisine.toUpperCase()} AI ${protein} Dish`,
ingredients:used,
protein:protein,
cuisine:cuisine,
steps:steps
}];
}

/* =========================
   RECIPES
========================= */

function openRecipes(){

let list=generateAIRecipe();
window.generated=list;

let html=`<div class="topBar">
<div class="homeBtn" onclick="openIngredients()">⬅ Ingredients</div>
<div class="homeBtn" onclick="show('home')">🏠 Home</div>
</div>

<div class="header">🍳 AI Recipe</div>`;

list.forEach(r=>{
html+=`<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
${r.cuisine.toUpperCase()}
</div>`;
});

document.getElementById("recipes").innerHTML=html;
show("recipes");
}

/* =========================
   DETAIL + TIMERS
========================= */

function openRecipe(name){

let r=window.generated.find(x=>x.name===name);

let html=`<div class="topBar">
<div class="homeBtn" onclick="openRecipes()">⬅ Back</div>
<div class="homeBtn" onclick="show('home')">🏠 Home</div>
</div>

<div class="header">${r.name}</div>

<div class="card"><b>Ingredients:</b><br>${r.ingredients.join("<br>")}</div>
<div class="card"><b>Protein:</b> ${r.protein}</div>
<div class="card"><b>Cuisine:</b> ${r.cuisine}</div>`;

r.steps.forEach((s,i)=>{

let id="t"+i;

html+=`
<div class="card">
<b>Step ${i+1}</b><br><br>
${s.text}<br><br>

⏱ ${Math.floor(s.time/60)}m ${s.time%60}s<br><br>

<div class="btn" onclick="startTimer(${i},${s.time},'${id}')">
▶ Start Timer
</div>

<div id="${id}">Ready</div>
</div>
`;
});

document.getElementById("detail").innerHTML=html;
show("detail");
}

</script>

</body>
</html>
