<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Kitchen OS v4</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
white-space:pre-wrap;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg"/>
</div>

<div class="card">PRO KITCHEN OS v4 - FINAL FIX</div>

<div class="dock">
<div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
<div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
<div class="dockBtn" onclick="toggleChef()">👨‍🍳<span>Chef</span></div>
</div>

</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
VOICE MODE
========================= */

let chefMode="ramsay";

function speak(text){
window.speechSynthesis.cancel();

if(chefMode==="ramsay"){
let r=["Focus!","Too slow!","Better!","Move it chef!"];
text = r[Math.floor(Math.random()*r.length)]+" "+text;
}

let msg=new SpeechSynthesisUtterance(text);
msg.rate=1.1;
window.speechSynthesis.speak(msg);
}

/* =========================
INGREDIENTS
========================= */

const ingredientItems=[
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
COOK PROFILES (TIME + TEMP)
========================= */

function getCookProfile(i){

const map={
"Chicken breast":{time:16,temp:"400°F"},
"Steak":{time:10,temp:"450°F"},
"Eggs":{time:5,temp:"300°F"},
"Rice":{time:18,temp:"200°F simmer"},
"Pasta":{time:10,temp:"212°F boil"},
"Potatoes":{time:30,temp:"425°F"},
"Broccoli":{time:8,temp:"350°F"},
"Onions":{time:10,temp:"350°F"},
"Tomatoes":{time:6,temp:"300°F"},
"Shrimp":{time:5,temp:"375°F"},
"Salmon":{time:12,temp:"400°F"}
};

return map[i]||{time:12,temp:"375°F"};
}

/* =========================
CLASSIFY
========================= */

function classify(list){

let c={protein:[],veg:[],starch:[],fat:[],acid:[],other:[]};

list.forEach(i=>{

if(["Chicken breast","Ground beef","Eggs","Shrimp","Salmon","Steak","Pork chops","Tofu","Turkey"].includes(i))
c.protein.push(i);

else if(["Broccoli","Onions","Tomatoes","Carrots","Spinach","Mushrooms","Bell peppers"].includes(i))
c.veg.push(i);

else if(["Rice","Pasta","Bread","Tortilla","Ramen noodles","Potatoes","Quinoa"].includes(i))
c.starch.push(i);

else if(["Butter","Olive oil","Cheese","Cream","Avocado"].includes(i))
c.fat.push(i);

else if(["Lemon","Lime","Vinegar"].includes(i))
c.acid.push(i);

else c.other.push(i);

});

return c;
}

/* =========================
RECIPE ENGINE (FIXED DETAIL + TIMER)
========================= */

let activeRecipe=null;
let stepIndex=0;
let timer=null;
let timeLeft=0;

function generateAIRecipe(){

let cat=classify(selected);

let main=cat.protein[0]||cat.starch[0]||"Mixed Dish";
let sides=[...cat.veg,...cat.starch].filter(i=>i!==main);
let support=[...cat.fat,...cat.acid];

/* build step objects with REAL data */
let steps=[];

let mainP=getCookProfile(main);

steps.push({
text:`MAIN: ${main}`,
time:mainP.time,
temp:mainP.temp
});

if(sides.length){
steps.push({
text:`SIDES: ${sides.join(", ")}`,
time:15,
temp:"350–425°F"
});
}

steps.push({
text:`SUPPORT FLAVORS`,
time:5,
temp:"low heat 200–250°F"
});

steps.push({
text:`FINAL PLATING`,
time:3,
temp:"resting"
});

return [{
name:`Chef Dish: ${main}`,
steps
}];
}

/* =========================
UI
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){

let html=`<div class="header">Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
${i} ${on?'✔':''}
</div>`;
});

html+=`<div class="btn" onclick="openRecipes()">Generate Recipe</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){
activeRecipe=generateAIRecipe()[0];
stepIndex=0;

document.getElementById("recipes").innerHTML=`
<div class="header">${activeRecipe.name}</div>
<div class="card" onclick="openRecipe()">Start Cooking</div>
`;

show("recipes");
}

function openRecipe(){
renderStep();
show("detail");
}

function renderStep(){

let step=activeRecipe.steps[stepIndex];

speak(step.text);

document.getElementById("detail").innerHTML=`
<div class="header">${activeRecipe.name}</div>

<div class="card">
🍳 ${step.text}
🌡 ${step.temp || ""}
⏱ ${step.time} min
</div>

<div class="card" id="timerBox">Ready</div>

<div class="btn" onclick="startTimer()">Start</div>
<div class="btn" onclick="nextStep()">Next</div>
`;
}

/* FIXED TIMER */
function startTimer(){

clearInterval(timer);

let step=activeRecipe.steps[stepIndex];
timeLeft=step.time*60;

timer=setInterval(()=>{
timeLeft--;

document.getElementById("timerBox").innerHTML="⏱ "+timeLeft+" sec";

if(timeLeft<=0){
clearInterval(timer);
speak("Step complete");
}
},1000);
}

function nextStep(){
clearInterval(timer);

if(stepIndex<activeRecipe.steps.length-1){
stepIndex++;
renderStep();
}else{
show("home");
}
}

function toggleChef(){
chefMode=chefMode==="ramsay"?"normal":"ramsay";
speak("Chef mode switched");
}

openIngredients();

</script>

</body>
</html>
