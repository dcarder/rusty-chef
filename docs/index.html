<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v14</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
<div class="header">🔥 THE RUSTY CHEF 🔥</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<!-- PANTRY -->
<div id="pantry" class="page"></div>

<!-- RESULTS -->
<div id="results" class="page"></div>

<!-- RECIPE -->
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

/* =========================
   PANTRY INGREDIENTS
========================= */
const ingredientItems = [
"Rice","Eggs","Chicken breast","Ground beef","Tortilla","Cheese","Onions","Garlic","Tomatoes","Butter",
"Milk","Flour","Salt","Pepper","Olive oil","Soy sauce","Lemon","Lime","Pasta","Bread",
"Potatoes","Carrots","Broccoli","Cream","Basil","Chicken broth","Beans","Curry powder","Coconut milk","Sugar"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
   SENSORIAL RECIPES (25)
========================= */
const recipes = [
{
name:"Skillet Beef Tacos",
serves:4,
ingredients:{
main:["Ground beef","Tortilla","Cheese","Onions"],
optional:["Lettuce","Tomato","Sour cream"]
},
steps:[
{
title:"Heat the pan",
sensory:"Warm air rises as the skillet heats.",
instruction:"Set skillet to medium heat for 1 minute."
},
{
title:"Cook the beef",
sensory:"You hear a steady sizzling as meat browns.",
instruction:"Add ground beef and break it apart until crumbly."
},
{
title:"Season",
sensory:"Smell deepens as spices bloom.",
instruction:"Add seasoning and stir evenly."
},
{
title:"Add water",
sensory:"A quick hiss, then thick sauce forms.",
instruction:"Add 3 tbsp water and mix until coated."
},
{
title:"Assemble",
sensory:"Warm tortillas become soft and flexible.",
instruction:"Fill tortillas with beef and toppings."
}
]
},

{
name:"Chicken Fried Rice",
serves:3,
ingredients:{
main:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
optional:["Peas"]
},
steps:[
{
title:"Cook rice",
sensory:"Steam rises softly from fluffy grains.",
instruction:"Cook rice until slightly dry."
},
{
title:"Cook chicken",
sensory:"Sizzle becomes sharp as it browns.",
instruction:"Cook diced chicken until firm."
},
{
title:"Scramble eggs",
sensory:"Eggs turn soft and fluffy.",
instruction:"Scramble in pan and break apart."
},
{
title:"Combine",
sensory:"A savory aroma fills the pan.",
instruction:"Add everything and stir with soy sauce."
}
]
},

{
name:"Spaghetti Bolognese",
serves:4,
ingredients:{
main:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],
optional:["Parmesan"]
},
steps:[
{
title:"Boil pasta",
sensory:"Water bubbles rapidly around noodles.",
instruction:"Cook until tender."
},
{
title:"Cook beef",
sensory:"Meat browns with strong sizzling sound.",
instruction:"Brown ground beef."
},
{
title:"Build sauce",
sensory:"Tomato aroma becomes rich and thick.",
instruction:"Add tomatoes and simmer."
},
{
title:"Serve",
sensory:"Steam rises from plated pasta.",
instruction:"Combine sauce with pasta."
}
]
},

{
name:"Creamy Tomato Soup",
serves:2,
ingredients:{
main:["Tomatoes","Onions","Garlic","Cream","Basil"],
optional:["Bread"]
},
steps:[
{
title:"Sauté base",
sensory:"Onions soften and smell sweet.",
instruction:"Cook onions and garlic."
},
{
title:"Simmer",
sensory:"Soup thickens and bubbles gently.",
instruction:"Add tomatoes and simmer."
},
{
title:"Blend",
sensory:"Texture becomes smooth and velvety.",
instruction:"Blend until smooth."
},
{
title:"Finish",
sensory:"Cream softens acidity.",
instruction:"Stir in cream and basil."
}
]
},

{
name:"Grilled Cheese",
serves:1,
ingredients:{
main:["Bread","Cheese","Butter"],
optional:[]
},
steps:[
{
title:"Butter bread",
sensory:"Butter melts instantly on warm pan.",
instruction:"Spread butter on bread."
},
{
title:"Melt cheese",
sensory:"Cheese begins stretching and bubbling.",
instruction:"Cook until golden on both sides."
}
]
},

{
name:"Scrambled Eggs",
serves:1,
ingredients:{
main:["Eggs","Milk","Butter"],
optional:["Salt","Pepper"]
},
steps:[
{
title:"Whisk eggs",
sensory:"Mixture becomes smooth and pale.",
instruction:"Whisk eggs with milk."
},
{
title:"Cook gently",
sensory:"Eggs slowly form soft curds.",
instruction:"Cook on low heat."
}
]
}

];

/* =========================
   MATCHING
========================= */
function score(r){
let all=[...r.ingredients.main,...(r.ingredients.optional||[])];
let match=all.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match Score: ${r.match}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

/* =========================
   PANTRY
========================= */
function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;

ingredientItems.forEach(i=>{
html+=`
<div class="card" onclick="toggle('${i}')">
${selected.includes(i)?"✅ ":""}${i}
</div>`;
});

document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* =========================
   RECIPE VIEW (SENSORY)
========================= */
function openRecipe(name){
let r=recipes.find(x=>x.name===name);

let ingMain=r.ingredients.main.map(i=>`• ${i}`).join("<br>");
let ingOpt=(r.ingredients.optional||[]).length
? "<br><br><b>Optional:</b><br>" + r.ingredients.optional.map(i=>`• ${i}`).join("<br>")
: "";

let steps=r.steps.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.title}</b><br><br>
👃 ${s.sensory}<br><br>
🍳 ${s.instruction}
</div>
`).join("");

document.getElementById("recipe").innerHTML=`
<div class="header">${r.name} (Serves ${r.serves})</div>

<div class="card">
<b>Ingredients</b><br><br>
${ingMain}
${ingOpt}
</div>

${steps}

<div class="btn" onclick="show('results')">⬅ Back</div>
`;

show("recipe");
}

</script>

</body>
</html>
