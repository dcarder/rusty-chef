<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px 0;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:rgba(79,172,254,.25);}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.shopBtn{
display:inline-block;
margin-top:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}

.walmartBtn{background:#0071ce;}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}
#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

#introLogo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.titleRow{
display:flex;
align-items:center;
gap:16px;
}

.titleText{
display:flex;
flex-direction:column;
font-weight:900;
line-height:.9;
}

.the{font-size:36px;}
.rusty{font-size:64px;}
.chef{font-size:54px;}

.flame{
width:50px;
height:120px;
position:relative;
}

.flame span{
position:absolute;
bottom:0;
font-size:22px;
animation:rise 1.2s infinite;
opacity:0;
}

@keyframes rise{
0%{opacity:0;transform:translateY(0);}
30%{opacity:1;}
100%{opacity:0;transform:translateY(-120px);}
}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="app">

<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg">
</div>

<div id="introLogo">
<div class="titleRow">

<div class="flame">
<span>🔥</span><span>🔥</span><span>🔥</span>
</div>

<div class="titleText">
<div class="the">THE</div>
<div class="rusty">RUSTY</div>
<div class="chef">CHEF</div>
</div>

<div class="flame">
<span>🔥</span><span>🔥</span><span>🔥</span>
</div>

</div>
</div>

<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>

</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

</div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
requestAnimationFrame(()=>document.getElementById(id).classList.add("active"));
}

const ingredientItems = [
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Turkey","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce",
"Lemon","Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Noodles",
"Tortilla","Bread","Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries",
"Chicken broth","Beef broth","Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam",
"Walnuts","Almonds","Fish sauce","Worcestershire sauce","Green beans","Sweet potato","Pumpkin","Ramen noodles",
"Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar","Tofu","Quinoa","Lentils","Chickpeas",
"Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar","Crackers","Granola","Marshmallows","Pineapple",
"Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley","Chives","Oats","Cinnamon","Nutmeg",
"Honey","Coconut","Croutons","Sausage","Corn"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
steps:[
{t:"Cook rice until fluffy and slightly dry.",a:"1 cup rice"},
{t:"Cook chicken until firm and no longer pink.",a:"1 chicken breast"},
{t:"Scramble eggs into soft curds.",a:"2 eggs"},
{t:"Combine and stir until aromatic and hot.",a:"final mix"}
],
simpleSteps:[
{t:"Cook rice until fluffy and slightly dry.",a:"1 cup rice"},
{t:"Cook chicken until firm and no longer pink.",a:"1 chicken breast"},
{t:"Scramble eggs into soft curds.",a:"2 eggs"},
{t:"Combine and stir until aromatic and hot.",a:"final mix"}
],
chefSteps:[
{t:"Rinse the rice under cool water until mostly clear. Cook until fluffy and slightly dry.",a:"1 cup rice"},
{t:"Cook chicken in a hot pan until springy and fully cooked.",a:"1 chicken breast"},
{t:"Whisk eggs smooth and scramble into soft curds.",a:"2 eggs"},
{t:"Sauté onions and carrots, then combine everything with soy sauce.",a:"final mix"}
]
},
{
name:"Spaghetti Bolognese",
ingredients:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],
steps:[
{t:"Boil pasta until tender but firm.",a:"1 box pasta"},
{t:"Cook onions and garlic until fragrant.",a:"1 onion"},
{t:"Brown beef completely.",a:"1 lb beef"},
{t:"Simmer sauce until thick and rich.",a:"tomato sauce"}
],
simpleSteps:[
{t:"Boil pasta until tender but firm.",a:"1 box pasta"},
{t:"Cook onions and garlic until fragrant.",a:"1 onion"},
{t:"Brown beef completely.",a:"1 lb beef"},
{t:"Simmer sauce until thick and rich.",a:"tomato sauce"}
],
chefSteps:[
{t:"Boil pasta until tender with a slight bite.",a:"1 box pasta"},
{t:"Cook onions until soft, then add garlic.",a:"1 onion"},
{t:"Brown beef until crumbly and fully cooked.",a:"1 lb beef"},
{t:"Simmer tomatoes until thick and savory.",a:"tomato sauce"}
]
},
{
name:"Chicken Tacos",
ingredients:["Chicken breast","Tortilla","Cheese","Onions","Lime"],
steps:[
{t:"Cook chicken until golden.",a:"1 lb chicken"},
{t:"Shred after resting.",a:"rest 5 min"},
{t:"Warm tortillas.",a:"8 tortillas"},
{t:"Assemble tacos.",a:"final"}
],
simpleSteps:[
{t:"Cook chicken until golden.",a:"1 lb chicken"},
{t:"Shred after resting.",a:"rest 5 min"},
{t:"Warm tortillas.",a:"8 tortillas"},
{t:"Assemble tacos.",a:"final"}
],
chefSteps:[
{t:"Cook chicken until sizzling and juicy.",a:"1 lb chicken"},
{t:"Rest and shred for tenderness.",a:"rest 5 min"},
{t:"Warm tortillas until soft and flexible.",a:"8 tortillas"},
{t:"Add toppings and finish with lime.",a:"final"}
]
}
];

function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top 3 Matches</div>`;

top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
Match Score: ${r.match}
</div>`;
});

html+=`<div class="btn" onclick="show('home')">Home</div>`;

document.getElementById("results").innerHTML=html;
show("results");
}

function openPantry(){

let html=`
<div class="header">🧺 Pantry</div>

<div class="card">
<input id="searchBox"
placeholder="Search ingredients..."
style="width:100%;padding:12px;border-radius:10px;border:none;outline:none;"
oninput="filterIngredients()"/>
</div>

<div id="ingredientList">
`;

ingredientItems.forEach(i=>{
html+=`
<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});

html+=`
</div>

<div class="btn" onclick="showMatches()">Find Recipes</div>
<div class="btn" onclick="show('home')">Home</div>
`;

document.getElementById("pantry").innerHTML=html;

show("pantry");
}

function filterIngredients(){

let q=document.getElementById("searchBox").value.toLowerCase();

let list=document.getElementById("ingredientList");

let filtered=ingredientItems.filter(i=>i.toLowerCase().includes(q));

list.innerHTML=filtered.map(i=>`
<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">
${i}
</div>
`).join("");

}

function toggle(i){

selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));

openPantry();

}

let current=null;
let mode="simple";

function openRecipe(name){
current=recipes.find(r=>r.name===name);
mode="simple";
render();
show("recipe");
}

function switchMode(){
mode = mode === "simple" ? "chef" : "simple";
render();
}

function render(){

let missing=current.ingredients.filter(i=>!selected.includes(i));

let stepsArray = mode === "simple"
? (current.simpleSteps || current.steps)
: (current.chefSteps || current.steps);

let stepsHTML=stepsArray.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.t}</b><br><br>
🍴 ${s.a}
</div>
`).join("");

let shopHTML=`<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{

let q=encodeURIComponent(item);

shopHTML+=`
<div class="card">
<b>${item}</b><br>
<a class="shopBtn walmartBtn" target="_blank" href="https://www.walmart.com/search?q=${q}">Walmart</a>
</div>`;

});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>

<div class="btn" onclick="switchMode()">
${mode === "simple" ? "Switch to Chef Mode 🔥" : "Switch to Simple Mode 🍳"}
</div>

${stepsHTML}

${shopHTML}

<div class="btn" onclick="show('home')">Home</div>
`;

}

show("home");

</script>

</body>
</html>
