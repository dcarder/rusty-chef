/* ================= PANTRY ================= */

function openPantry(){

let html = `
<div class="header">🧺 Pantry</div>

<div class="card">
<input
id="searchBox"
class="searchInput"
placeholder="Search ingredients..."
oninput="filterIngredients()"
/>
</div>

<div id="ingredientList">
`;

ingredientItems.forEach(i=>{

html += `
<div class="item ${selected.includes(i)?'selected':''}" data-item="${i}">
${i}
</div>
`;

});

html += `
</div>

<div class="btn" onclick="showMatches()">🍳 Find Recipes</div>

<div class="btn" style="background:#ff4d4d;color:white" onclick="clearPantry()">
🗑 Clear Pantry
</div>

<div class="btn" onclick="show('home')">
🏠 Home
</div>
`;

document.getElementById("pantry").innerHTML = html;

document.querySelectorAll(".item").forEach(el=>{
el.onclick = ()=>toggle(el.dataset.item);
});

show("pantry");
}

function filterIngredients(){

let q = document.getElementById("searchBox").value.toLowerCase();

let filtered = ingredientItems.filter(i=>
i.toLowerCase().includes(q)
);

document.getElementById("ingredientList").innerHTML =
filtered.map(i=>`
<div class="item ${selected.includes(i)?'selected':''}" data-item="${i}">
${i}
</div>
`).join("");

document.querySelectorAll(".item").forEach(el=>{
el.onclick = ()=>toggle(el.dataset.item);
});

}

function toggle(i){

selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients", JSON.stringify(selected));

filterIngredients();

}

/* ================= MATCH ================= */

function showMatches(){

let top = recipes.map(r=>{

return {
...r,
match:r.ingredients.filter(i=>selected.includes(i)).length
};

}).sort((a,b)=>b.match-a.match);

let html = `<div class="header">🍳 Recipes</div>`;

top.forEach(r=>{

html += `
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b>
<br><br>
Match: ${r.match}/${r.ingredients.length}
</div>
`;

});

html += `
<div class="btn" onclick="show('home')">
🏠 Home
</div>
`;

document.getElementById("results").innerHTML = html;

show("results");

}

/* ================= RECIPE ================= */

let current = null;
let mode = "simple";

function openRecipe(name){

current = recipes.find(r=>r.name===name);

mode = "simple";

renderRecipe();

show("recipe");

}

function switchMode(){

mode = mode==="simple"
? "chef"
: "simple";

renderRecipe();

}

function renderRecipe(){

let steps = mode==="simple"
? current.simpleSteps
: current.chefSteps;

let html = `
<div class="recipeTitle">${current.name}</div>

<div class="modeBadge">
${mode==="simple" ? "🍳 Simple Mode" : "🔥 Chef Mode"}
</div>
`;

steps.forEach((s,i)=>{

html += `
<div class="card">
<b>${i+1}. ${s.t}</b>
<br><br>
${s.a}
</div>
`;

});

html += `
<div class="header">🧂 Ingredients</div>
`;

current.ingredients.forEach(i=>{

let has = selected.includes(i);

html += `
<div class="card">
${has ? "✅" : "❌"} ${i}
</div>
`;

});

let missing = current.ingredients.filter(i=>
!selected.includes(i)
);

if(missing.length){

html += `<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{

let q = encodeURIComponent(item);

html += `
<div class="card">

<b>${item}</b>

<br>

<a
class="shopBtn"
target="_blank"
href="https://www.walmart.com/search?q=${q}"
>
Walmart
</a>

</div>
`;

});

}

html += `

<div class="btn" onclick="switchMode()">
${mode==="simple" ? "🔥 Chef Mode" : "🍳 Simple Mode"}
</div>

<div class="btn" onclick="showMatches()">
⬅ Back To Recipes
</div>

<div class="btn" onclick="show('home')">
🏠 Home
</div>

`;

document.getElementById("recipe").innerHTML = html;

}

show("home");

</script>
