<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty Chef AI - Ramsay Mode</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg"/>
</div>

<div class="card">AI Chef System - Ramsay Mode Enabled</div>

<div class="dock">
<div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
<div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
<div class="dockBtn" onclick="toggleChefMode()">👨‍🍳<span>Chef Mode</span></div>
</div>

</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
VOICE SYSTEM (RAMSAY MODE)
========================= */

let chefMode = "ramsay"; // "normal" | "ramsay"

function speak(text){

window.speechSynthesis.cancel();

if(chefMode === "ramsay"){
text = ramsayFilter(text);
}

let msg = new SpeechSynthesisUtterance(text);
msg.rate = chefMode === "ramsay" ? 1.15 : 1;
msg.pitch = chefMode === "ramsay" ? 0.85 : 1;

window.speechSynthesis.speak(msg);
}

function ramsayFilter(text){

let roast = [
"Come on! Focus up!",
"This is not how we cook in a proper kitchen!",
"You're rushing it—slow down!",
"Absolutely unacceptable!",
"You call that cooking?"
];

let praise = [
"Alright, that’s more like it.",
"Good, now we’re cooking properly.",
"Not bad—keep going.",
"That’s better!"
];

let pick = Math.random() > 0.5 ? praise : roast;

return pick[Math.floor(Math.random()*pick.length)] + " " + text;
}

/* =========================
MEMORY SYSTEM
========================= */

let chefMemory = JSON.parse(localStorage.getItem("chefMemory") || JSON.stringify({
favorites:{}
}));

function saveMemory(){
localStorage.setItem("chefMemory",JSON.stringify(chefMemory));
}

function learn(i){
chefMemory.favorites[i]=(chefMemory.favorites[i]||0)+1;
saveMemory();
}

/* =========================
RAMSAY MODE TOGGLE
========================= */

function toggleChefMode(){

if(chefMode === "ramsay"){
chefMode = "normal";
alert("Normal Chef Mode ON");
speak("Calm chef mode activated.");
}else{
chefMode = "ramsay";
alert("Gordon Ramsay Mode ON 🔥");
speak("Right then. Impress me. Let's cook properly.");
}

}

/* =========================
INGREDIENTS
========================= */

const ingredientItems=[
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Butter","Garlic",
"Onions","Tomatoes","Broccoli","Spinach","Mushrooms","Shrimp","Salmon",
"Salt","Pepper","Olive oil","Soy sauce","Lemon","Lime",
"Rice noodles","Tortilla","Bread","Hot sauce","BBQ sauce","Ramen noodles","Corn","Tofu"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
RECIPE ENGINE
========================= */

function generateAIRecipe(){

if(selected.length<3){
return [{
name:"You Need More Ingredients",
time:0,
ingredients:[],
steps:[{text:"Pick at least 3 ingredients before wasting my time.",time:0}]
}];
}

selected.forEach(learn);

let protein=selected.find(i=>
i.includes("Chicken")||i.includes("Beef")||
i.includes("Shrimp")||i.includes("Salmon")||
i.includes("Tofu")
)||"Mixed Protein";

let veg=selected.filter(i=>
["Carrots","Onions","Broccoli","Spinach","Mushrooms","Tomatoes"].includes(i)
);

let base=selected.find(i=>
["Rice","Pasta","Bread","Tortilla","Ramen noodles"].includes(i)
);

let steps=[];

steps.push({text:`Right—you're using ${selected.join(", ")}. Let's see if you can handle it.`,time:10});

steps.push({text:`Heat pan properly. No shortcuts. 375°F minimum.`,time:60});

steps.push({text:`Cook ${protein} until properly browned. If it's undercooked, start again.`,time:420});

if(veg.length){
steps.push({text:`Add vegetables: ${veg.join(", ")}. Don't overcook them.`,time:300});
}

if(base){
steps.push({text:`Prepare ${base} separately. No soggy food allowed.`,time:400});
}

steps.push({text:`Final step—season properly. If it tastes bland, that's on you.`,time:120});

return [{
name:`Ramsay Style ${protein} Dish`,
time:35,
ingredients:selected,
steps
}];
}

/* =========================
UI STATE
========================= */

let activeRecipe=null;
let stepIndex=0;
let timer=null;
let timeLeft=0;

/* =========================
UI
========================= */

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){

let html=`<div class="header">Ingredients</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
${i} ${on?'✔':''}
</div>`;
});

html+=`<div class="btn" onclick="openRecipes()">Generate Recipe</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){
activeRecipe=generateAIRecipe()[0];
stepIndex=0;

document.getElementById("recipes").innerHTML=`
<div class="header">${activeRecipe.name}</div>
<div class="card" onclick="openRecipe()">Start Cooking</div>
`;

show("recipes");
}

function openRecipe(){
renderStep();
show("detail");
}

function renderStep(){

let step=activeRecipe.steps[stepIndex];
speak(step.text);

document.getElementById("detail").innerHTML=`
<div class="header">${activeRecipe.name}</div>

<div class="card">${step.text}</div>

<div class="card" id="timerBox">⏱ ${step.time}s</div>

<div class="btn" onclick="startTimer()">Start</div>
<div class="btn" onclick="nextStep()">Next</div>
`;
}

function startTimer(){

clearInterval(timer);
timeLeft=activeRecipe.steps[stepIndex].time;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timerBox").innerHTML="⏱ "+timeLeft+"s";

if(timeLeft<=0){
clearInterval(timer);
speak("Step complete. Try not to mess it up.");
}
},1000);
}

function nextStep(){

clearInterval(timer);

if(stepIndex<activeRecipe.steps.length-1){
stepIndex++;
speak("Next step. Keep up.");
renderStep();
}else{
speak("Finished. Not bad... for once.");
goHome();
}
}

function goHome(){
show("home");
}

openIngredients();

</script>

</body>
</html>
