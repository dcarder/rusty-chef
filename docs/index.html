<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Rusty Chef v15</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
color:white;
font-family:Arial;
position:fixed;
inset:0;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
opacity:0;
transform:translateY(10px) scale(0.99);
pointer-events:none;
transition:.25s ease;
overflow-y:auto;
}
.page.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

.header{
text-align:center;
font-size:22px;
font-weight:700;
margin:10px 0;
}

.card{
background:rgba(255,255,255,.08);
border-radius:14px;
padding:14px;
margin:10px;
border:1px solid rgba(255,255,255,.15);
}

.item{
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}
.item.selected{background:#4facfe55;}

.btn{
padding:14px;
background:#4facfe;
color:black;
font-weight:700;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.shopBtn{
display:inline-block;
margin-top:8px;
padding:10px 14px;
border-radius:10px;
font-weight:700;
text-decoration:none;
color:white;
}

.walmartBtn{background:#0071ce;}

.bottomDock{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}
.bottomDock .btn{width:160px;}
</style>
</head>

<body>

<div id="home" class="page active">
<div class="bottomDock">
<div class="btn" onclick="openPantry()">🧺 Pantry</div>
<div class="btn" onclick="showMatches()">🍳 Recipes</div>
</div>
</div>

<div id="pantry" class="page"></div>
<div id="results" class="page"></div>
<div id="recipe" class="page"></div>

<script>

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= PANTRY ================= */

const ingredientItems = [
"Chicken breast","Ground beef","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Carrots","Broccoli","Spinach","Bell peppers","Shrimp","Salmon",
"Tuna","Steak","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce",
"Lemon","Tortilla","Bread","Cream","Curry powder","Basil"
];

let selected = JSON.parse(localStorage.getItem("ingredients")||"[]");

/* ================= FULL 25 RECIPES ================= */

const recipes = [
{
name:"Chicken Fried Rice",
ingredients:["Rice","Eggs","Chicken breast","Soy sauce","Onions","Carrots"],
simpleSteps:[{t:"Cook rice"},{t:"Cook chicken"},{t:"Scramble eggs"},{t:"Mix"}],
chefSteps:[{t:"Fry rice"},{t:"Sear chicken"},{t:"Combine everything"}]
},
{
name:"Spaghetti Bolognese",
ingredients:["Pasta","Ground beef","Tomatoes","Onions","Garlic"],
simpleSteps:[{t:"Boil pasta"},{t:"Cook beef"},{t:"Add sauce"}],
chefSteps:[{t:"Simmer sauce"},{t:"Brown beef"}]
},
{
name:"Chicken Tacos",
ingredients:["Chicken breast","Tortilla","Cheese","Onions","Lime"],
simpleSteps:[{t:"Cook chicken"},{t:"Warm tortillas"},{t:"Assemble"}],
chefSteps:[{t:"Season chicken"},{t:"Finish fresh"}]
},
{
name:"Garlic Shrimp Pasta",
ingredients:["Shrimp","Pasta","Garlic","Butter","Lemon"],
simpleSteps:[{t:"Boil pasta"},{t:"Cook shrimp"}],
chefSteps:[{t:"Sauté shrimp"}]
},
{
name:"Beef Stir Fry",
ingredients:["Ground beef","Broccoli","Carrots","Soy sauce","Rice"],
simpleSteps:[{t:"Cook beef"},{t:"Add veggies"}],
chefSteps:[{t:"Stir fry"}]
},
{
name:"Creamy Tomato Soup",
ingredients:["Tomatoes","Cream","Onions","Garlic"],
simpleSteps:[{t:"Cook"},{t:"Blend"}],
chefSteps:[{t:"Simmer"}]
},
{
name:"BBQ Chicken Sandwich",
ingredients:["Chicken breast","Bread","BBQ sauce"],
simpleSteps:[{t:"Cook chicken"},{t:"Assemble"}],
chefSteps:[{t:"Shred chicken"}]
},
{
name:"Veggie Omelette",
ingredients:["Eggs","Cheese","Onions"],
simpleSteps:[{t:"Cook eggs"}],
chefSteps:[{t:"Fold omelette"}]
},
{
name:"Lemon Salmon",
ingredients:["Salmon","Lemon"],
simpleSteps:[{t:"Cook salmon"}],
chefSteps:[{t:"Sear salmon"}]
},
{
name:"Chicken Alfredo",
ingredients:["Chicken breast","Pasta","Cream","Parmesan"],
simpleSteps:[{t:"Boil pasta"},{t:"Cook chicken"}],
chefSteps:[{t:"Cream sauce"}]
},
{
name:"Beef Burger",
ingredients:["Ground beef","Bread"],
simpleSteps:[{t:"Cook patty"}],
chefSteps:[{t:"Grill burger"}]
},
{
name:"Grilled Cheese",
ingredients:["Bread","Cheese"],
simpleSteps:[{t:"Toast"}],
chefSteps:[{t:"Grill sandwich"}]
},
{
name:"Chicken Curry",
ingredients:["Chicken breast","Curry powder","Coconut milk"],
simpleSteps:[{t:"Cook"}],
chefSteps:[{t:"Simmer curry"}]
},
{
name:"Mac and Cheese",
ingredients:["Pasta","Cheese","Milk"],
simpleSteps:[{t:"Boil pasta"}],
chefSteps:[{t:"Make cheese sauce"}]
},
{
name:"Fried Chicken",
ingredients:["Chicken breast","Flour","Oil"],
simpleSteps:[{t:"Fry"}],
chefSteps:[{t:"Crisp fry"}]
},
{
name:"Caesar Salad",
ingredients:["Lettuce","Cheese"],
simpleSteps:[{t:"Mix"}],
chefSteps:[{t:"Toss"}]
},
{
name:"Steak & Potatoes",
ingredients:["Steak","Potatoes"],
simpleSteps:[{t:"Cook steak"}],
chefSteps:[{t:"Sear steak"}]
},
{
name:"Veggie Stir Fry",
ingredients:["Broccoli","Carrots","Soy sauce"],
simpleSteps:[{t:"Cook"}],
chefSteps:[{t:"Stir fry"}]
},
{
name:"Tomato Basil Pasta",
ingredients:["Pasta","Tomatoes","Basil"],
simpleSteps:[{t:"Boil"}],
chefSteps:[{t:"Simmer"}]
},
{
name:"Breakfast Burrito",
ingredients:["Eggs","Tortilla"],
simpleSteps:[{t:"Cook eggs"},{t:"Wrap"}],
chefSteps:[{t:"Scramble eggs"}]
},
{
name:"Pancakes",
ingredients:["Flour","Eggs","Milk"],
simpleSteps:[{t:"Mix"},{t:"Cook"}],
chefSteps:[{t:"Pan cook"}]
},
{
name:"Chicken Noodle Soup",
ingredients:["Chicken breast","Carrots"],
simpleSteps:[{t:"Simmer"}],
chefSteps:[{t:"Boil soup"}]
},
{
name:"Teriyaki Chicken Bowl",
ingredients:["Chicken breast","Rice"],
simpleSteps:[{t:"Cook rice"}],
chefSteps:[{t:"Glaze chicken"}]
},
{
name:"Simple Fried Rice",
ingredients:["Rice","Eggs"],
simpleSteps:[{t:"Cook rice"}],
chefSteps:[{t:"Stir fry"}]
},
{
name:"Chocolate Banana Smoothie",
ingredients:["Milk","Banana"],
simpleSteps:[{t:"Blend"}],
chefSteps:[{t:"Blend smooth"}]
}
];

/* ================= ENGINE ================= */

function score(r){
let match=r.ingredients.filter(i=>selected.includes(i)).length;
return {...r,match};
}

function showMatches(){
let top=recipes.map(score).sort((a,b)=>b.match-a.match).slice(0,3);

let html=`<div class="header">🍳 Top Matches</div>`;
top.forEach(r=>{
html+=`
<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>Match: ${r.match}
</div>`;
});

document.getElementById("results").innerHTML=html;
show("results");
}

/* ================= PANTRY ================= */

function openPantry(){
let html=`<div class="header">🧺 Pantry</div>`;
ingredientItems.forEach(i=>{
html+=`
<div class="item ${selected.includes(i)?'selected':''}"
onclick="toggle('${i}')">${i}</div>`;
});
html+=`<div class="btn" onclick="showMatches()">Find Recipes</div>`;
document.getElementById("pantry").innerHTML=html;
show("pantry");
}

function toggle(i){
selected = selected.includes(i)
? selected.filter(x=>x!==i)
: [...selected,i];

localStorage.setItem("ingredients",JSON.stringify(selected));
openPantry();
}

/* ================= RECIPE ================= */

let current=null;
let mode="simple";

function openRecipe(name){
current=recipes.find(r=>r.name===name);
mode="simple";
render();
show("recipe");
}

function switchMode(){
mode = mode==="simple"?"chef":"simple";
render();
}

function render(){
let missing=current.ingredients.filter(i=>!selected.includes(i));

let steps = mode==="simple"?current.simpleSteps:current.chefSteps;

let stepsHTML=steps.map((s,i)=>`
<div class="card">
<b>${i+1}. ${s.t}</b>
</div>
`).join("");

let shopHTML=`<div class="header">🛒 Missing Ingredients</div>`;

missing.forEach(item=>{
let q=encodeURIComponent(item);
shopHTML+=`
<div class="card">
<b>${item}</b><br>
<a class="shopBtn walmartBtn" target="_blank"
href="https://www.walmart.com/search?q=${q}">Walmart</a>
</div>`;
});

document.getElementById("recipe").innerHTML=`
<div class="header">${current.name}</div>
<div class="btn" onclick="switchMode()">Switch Mode 🔥</div>
${stepsHTML}
${shopHTML}
<div class="btn" onclick="show('home')">Home</div>
`;
}

window.onload=()=>show("home");

</script>

</body>
</html>
