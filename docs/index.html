<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Kitchen OS - AI Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:100px;
height:100px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.dockBtn.large{
width:130px;
height:130px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
}

#homeBg{
position:fixed;
inset:0;
z-index:-1;
}

#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">

<div id="homeBg">
<img src="copilot_image_1777179019874.jpeg"/>
</div>

<div class="card">PRO KITCHEN OS - AI CHEF SYSTEM</div>

<div class="dock">
<div class="dockBtn" onclick="openRecipes()">🍳<span>Cook</span></div>
<div class="dockBtn large" onclick="openIngredients()">🧺<span>Ingredients</span></div>
<div class="dockBtn" onclick="toggleChefMode()">👨‍🍳<span>Chef Mode</span></div>
</div>

</div>

<div id="ingredients" class="page"></div>
<div id="recipes" class="page"></div>
<div id="detail" class="page"></div>

</div>

<script>

/* =========================
VOICE + RAMSAY MODE
========================= */

let chefMode="ramsay";

function speak(text){

window.speechSynthesis.cancel();

if(chefMode==="ramsay"){
text = ramsayTone(text);
}

let msg=new SpeechSynthesisUtterance(text);
msg.rate=chefMode==="ramsay"?1.15:1;

window.speechSynthesis.speak(msg);
}

function ramsayTone(text){

let lines=[
"Focus up!",
"That’s not good enough!",
"Better—keep going!",
"You call that cooking?",
"Alright, now we’re talking!"
];

return lines[Math.floor(Math.random()*lines.length)]+" "+text;
}

/* =========================
FULL 100 INGREDIENTS
========================= */

const ingredientItems=[
"Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic",
"Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Bell peppers","Mushrooms","Shrimp","Salmon",
"Tuna","Steak","Pork chops","Flour","Sugar","Salt","Pepper","Olive oil","Soy sauce","Lemon",
"Lime","Coconut milk","Curry powder","Paprika","Oregano","Basil","Thyme","Rice noodles","Tortilla","Bread",
"Parmesan","Cheddar","Mozzarella","Avocado","Apples","Bananas","Strawberries","Blueberries","Chicken broth","Beef broth",
"Hot sauce","BBQ sauce","Teriyaki sauce","Sesame oil","Peanut butter","Jam","Walnuts","Almonds","Fish sauce","Worcestershire sauce",
"Green beans","Sweet potato","Pumpkin","Ramen noodles","Cornstarch","Chocolate","Coffee","Tea","Maple syrup","Brown sugar",
"Tofu","Quinoa","Lentils","Chickpeas","Yogurt","Cream","Mustard","Ketchup","Mayonnaise","Vinegar",
"Crackers","Granola","Marshmallows","Pineapple","Cucumber","Zucchini","Eggplant","Cauliflower","Cabbage","Parsley",
"Chives","Oats","Cinnamon","Nutmeg","Honey","Coconut","Croutons","Sausage","Turkey","Corn"
];

let selected=JSON.parse(localStorage.getItem("ingredients")||"[]");

/* =========================
INGREDIENT CLASSIFICATION
========================= */

function classify(list){

let cat={
protein:[],
veg:[],
starch:[],
fat:[],
acid:[],
other:[]
};

list.forEach(i=>{

if(["Chicken breast","Beef","Shrimp","Salmon","Tuna","Pork chops","Eggs","Tofu","Turkey"].includes(i))
cat.protein.push(i);

else if(["Carrots","Onions","Broccoli","Spinach","Peppers","Tomatoes","Mushrooms"].includes(i))
cat.veg.push(i);

else if(["Rice","Pasta","Bread","Tortilla","Ramen noodles","Potatoes","Quinoa"].includes(i))
cat.starch.push(i);

else if(["Butter","Olive oil","Cheese","Cream","Avocado"].includes(i))
cat.fat.push(i);

else if(["Lemon","Lime","Vinegar","Tomatoes"].includes(i))
cat.acid.push(i);

else cat.other.push(i);

});

return cat;
}

/* =========================
PRO KITCHEN VALIDATION
========================= */

function validateDish(cat){

let warnings=[];

if(cat.protein.length===0)warnings.push("No protein detected");
if(cat.fat.length===0)warnings.push("No fat source");
if(cat.acid.length===0)warnings.push("No acid for balance");
if(cat.starch.length===0)warnings.push("No base/starch foundation");

return warnings;
}

/* =========================
RECIPE ENGINE
========================= */

function generateAIRecipe(){

if(selected.length<3){
return [{
name:"Insufficient Ingredients",
time:0,
ingredients:[],
steps:[{text:"Select more ingredients.",time:0}]
}];
}

let cat=classify(selected);
let warnings=validateDish(cat);

let protein=cat.protein[0]||"Mixed Protein";

let steps=[];

/* PRE-CHECK */
if(warnings.length){
steps.push({text:"KITCHEN ALERT: "+warnings.join(" | "),time:10});
}

/* STRUCTURE */
steps.push({text:`Protein: ${cat.protein.join(", ")||"none"}. Builds structure.`,time:10});
steps.push({text:`Veg: ${cat.veg.join(", ")||"none"}. Adds freshness.`,time:10});
steps.push({text:`Starch: ${cat.starch.join(", ")||"none"}. Adds body.`,time:10});

steps.push({text:"Heat pan to 375–400°F for proper searing.",time:60});
steps.push({text:`Cook ${protein} until fully browned and safe.`,time:420});

if(cat.veg.length){
steps.push({text:`Add vegetables: ${cat.veg.join(", ")}`,time:300});
}

if(cat.starch.length){
steps.push({text:`Prepare base: ${cat.starch.join(", ")}`,time:400});
}

steps.push({text:"Final seasoning balance: salt, fat, acid, umami.",time:120});

return [{
name:`Pro Kitchen ${protein} Dish`,
time:40,
ingredients:selected,
steps
}];
}

/* =========================
UI LOGIC (UNCHANGED CORE)
========================= */

let activeRecipe=null;
let stepIndex=0;
let timer=null;
let timeLeft=0;

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openIngredients(){

let html=`<div class="header">PRO KITCHEN INGREDIENTS</div>`;

ingredientItems.forEach(i=>{
let on=selected.includes(i);
html+=`<div class="item ${on?'selected':''}" onclick="toggle('${i}')">
${i} ${on?'✔':''}
</div>`;
});

html+=`<div class="btn" onclick="openRecipes()">Generate Recipe</div>`;

document.getElementById("ingredients").innerHTML=html;
show("ingredients");
}

function toggle(i){
selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
localStorage.setItem("ingredients",JSON.stringify(selected));
openIngredients();
}

function openRecipes(){
activeRecipe=generateAIRecipe()[0];
stepIndex=0;

document.getElementById("recipes").innerHTML=`
<div class="header">${activeRecipe.name}</div>
<div class="card" onclick="openRecipe()">Start Cooking</div>
`;

show("recipes");
}

function openRecipe(){
renderStep();
show("detail");
}

function renderStep(){

let step=activeRecipe.steps[stepIndex];
speak(step.text);

document.getElementById("detail").innerHTML=`
<div class="header">${activeRecipe.name}</div>

<div class="card">${step.text}</div>

<div class="card" id="timerBox">⏱ ${step.time}s</div>

<div class="btn" onclick="startTimer()">Start</div>
<div class="btn" onclick="nextStep()">Next</div>
`;
}

function startTimer(){

clearInterval(timer);
timeLeft=activeRecipe.steps[stepIndex].time;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timerBox").innerHTML="⏱ "+timeLeft+"s";
if(timeLeft<=0){
clearInterval(timer);
speak("Step complete");
}
},1000);
}

function nextStep(){

clearInterval(timer);

if(stepIndex<activeRecipe.steps.length-1){
stepIndex++;
speak("Next step");
renderStep();
}else{
speak("Cooking complete.");
goHome();
}
}

function toggleChefMode(){
chefMode = chefMode==="ramsay"?"normal":"ramsay";
alert("Chef Mode: "+chefMode);
speak("Mode changed.");
}

function goHome(){show("home");}

openIngredients();

</script>

</body>
</html>
