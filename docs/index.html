<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rusty the Robot Chef</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
background:black;
}

#app{position:fixed;inset:0;}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.page.active{display:block;}

.header{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.homeBtn{
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
padding:14px;
margin:10px 0;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.item{
display:flex;
justify-content:space-between;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.item.selected{
background:rgba(79,172,254,0.25);
border:1px solid rgba(79,172,254,0.6);
}

.btn{
margin-top:15px;
padding:14px;
border-radius:14px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
font-weight:700;
cursor:pointer;
}

.back{
margin-top:10px;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
}

/* HOME */
#homeBg{
position:fixed;
inset:0;
z-index:-1;
}
#homeBg img{
width:100%;
height:100%;
object-fit:cover;
}

/* BUTTONS */
.dock{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:20px;
}

.dockBtn{
width:90px;
height:90px;
border-radius:22px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
transition:0.2s;
border:2px solid rgba(255,255,255,0.15);
box-shadow:0 6px 20px rgba(0,0,0,0.5);
backdrop-filter: blur(8px);
}

.dockBtn span{
font-size:11px;
opacity:0.9;
margin-top:6px;
}

.dockBtn:nth-child(1){
background:linear-gradient(135deg,#ff9a3c,#ff5c00);
color:white;
}

.dockBtn.large{
width:120px;
height:120px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
box-shadow:0 0 25px rgba(79,172,254,0.6);
}

.dockBtn:nth-child(3){
background:linear-gradient(135deg,#42e695,#3bb2b8);
color:white;
}

.dockBtn:active{transform:scale(0.95);}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="page active">
  <div id="homeBg">
    <img src="copilot_image_1777179019874.jpeg">
  </div>

  <div class="header">🤖 Rusty the Robot Chef</div>
  <div class="card">AI Cooking System v6</div>

  <div class="dock">
    <div class="dockBtn" onclick="openRecipes()">🍳<span>Recipes</span></div>
    <div class="dockBtn large" onclick="openSmart()">🧠<span>AI Cook</span></div>
    <div class="dockBtn" onclick="openIngredients()">🧺<span>Ingredients</span></div>
  </div>
</div>

<div id="ingredients" class="page"></div>
<div id="results" class="page"></div>
<div id="detail" class="page"></div>
<div id="smart" class="page"></div>

</div>

<script>

let selected = JSON.parse(localStorage.getItem("ingredients") || "[]");

/* NAV */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
window.scrollTo(0,0);
}

function goHome(){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("home").classList.add("active");
}

/* BUTTONS */
function openIngredients(){ loadIngredients(); }
function openRecipes(){ findRecipes(); }
function openSmart(){ loadSmart(); }

/* INGREDIENT LIST */
const ingredientItems = ["Chicken breast","Ground beef","Bacon","Eggs","Rice","Pasta","Cheese","Milk","Butter","Garlic","Onions","Tomatoes","Potatoes","Carrots","Broccoli","Spinach","Lettuce","Cucumber","Bell peppers","Mushrooms"];

/* REAL RECIPES WITH DETAILED STEPS */
const recipesDB = [
{
name:"Grilled Chicken Breast",
ingredients:["Chicken breast","Olive oil","Salt","Pepper","Garlic"],
steps:[
{step:"Prep chicken",time:5,temp:"none",detail:"Pat dry chicken and season evenly."},
{step:"Heat pan",time:3,temp:"medium-high (375°F)",detail:"Preheat skillet until hot."},
{step:"Cook first side",time:6,temp:"medium-high",detail:"Cook without moving until golden."},
{step:"Flip and finish",time:6,temp:"medium",detail:"Cook until internal temp reaches 165°F."},
{step:"Rest",time:5,temp:"none",detail:"Let juices redistribute before serving."}
],
time:25
},
{
name:"Beef Tacos",
ingredients:["Ground beef","Tortilla","Onion","Taco seasoning","Cheese"],
steps:[
{step:"Brown beef",time:8,temp:"medium-high",detail:"Cook until no pink remains."},
{step:"Season",time:3,temp:"medium",detail:"Add seasoning and simmer."},
{step:"Warm tortillas",time:2,temp:"low",detail:"Heat until soft."},
{step:"Assemble",time:3,temp:"none",detail:"Add toppings and serve."}
],
time:20
}
];

/* ENGINE (NO REPEATS) */
function findRecipes(){

let pool = [...recipesDB];

for(let i=pool.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[pool[i],pool[j]]=[pool[j],pool[i]];
}

let recipes = pool.map(r=>{
let match = r.ingredients.filter(x=>selected.includes(x)).length;
return {...r,score:match/r.ingredients.length};
});

recipes.sort((a,b)=>b.score-a.score);

window.generatedRecipes = recipes;

let html = `<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🍳 What Can I Cook?</div>`;

recipes.forEach(r=>{
html += `<div class="card" onclick="openRecipe('${r.name}')">
<b>${r.name}</b><br>
${(r.score*100).toFixed(0)}% match<br>
${r.time} min
</div>`;
});

html += `<div class="back" onclick="loadIngredients()">⬅ Ingredients</div>`;
document.getElementById("results").innerHTML = html;
show("results");
}

/* DETAIL VIEW (FULL STEP SYSTEM) */
function openRecipe(name){

let r = (window.generatedRecipes||[]).find(x=>x.name===name);
if(!r){goHome();return;}

let stepsHTML = r.steps.map((s,i)=>`
<div class="card">
<b>Step ${i+1}: ${s.step}</b><br><br>
⏱ ${s.time} min<br>
🌡 ${s.temp}<br><br>
${s.detail}
</div>
`).join("");

let html = `
<div class="topBar">
<div class="homeBtn" onclick="goHome()">🏠 Home</div>
</div>

<div class="header">${r.name}</div>

<div class="card">
<b>Ingredients:</b><br>${r.ingredients.join("<br>")}
</div>

${stepsHTML}

<div class="back" onclick="findRecipes()">⬅ Back</div>
`;

document.getElementById("detail").innerHTML = html;
show("detail");
}

/* INGREDIENTS PAGE */
function loadIngredients(){

let html = `<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🧺 Ingredients</div>`;

ingredientItems.forEach(item=>{
let on = selected.includes(item);
html += `<div class="item ${on?'selected':''}" onclick="toggleItem('${item}')">
<span>${item}</span><span>${on?'✔':''}</span>
</div>`;
});

html += `<div class="btn" onclick="findRecipes()">🍳 Generate Recipes</div>
<div class="back" onclick="goHome()">⬅ Home</div>`;

document.getElementById("ingredients").innerHTML = html;
show("ingredients");
}

function toggleItem(item){
selected = selected.includes(item)
? selected.filter(i=>i!==item)
: [...selected,item];

localStorage.setItem("ingredients",JSON.stringify(selected));
loadIngredients();
}

/* SMART */
function loadSmart(){
document.getElementById("smart").innerHTML = `
<div class="topBar"><div class="homeBtn" onclick="goHome()">🏠 Home</div></div>
<div class="header">🧠 AI Chef Mode</div>
<div class="card">Fully detailed cooking system active.</div>
<div class="back" onclick="goHome()">⬅ Home</div>`;
show("smart");
}

/* INIT */
loadIngredients();

</script>

</body>
</html>
