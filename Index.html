<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chef Jeff</title>

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Theme color -->
    <meta name="theme-color" content="#ff7a00" />

    <!-- Basic styling so the screen isn't blank -->
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #fff7ef;
            color: #333;
        }
        h1 {
            color: #ff7a00;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 20px auto;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>👨‍🍳 Chef Jeff</h1>

    <div class="box">
        <p>Your cooking assistant is live.</p>
        <p>This is a working PWA — ready for Android packaging.</p>
    </div>

    <!-- Register service worker -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js")
                .catch(err => console.log("SW registration failed:", err));
        }
    </script>

</body>
</html>
